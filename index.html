devices","that","optional","glatiramer"],"drugTerms":[],"searchText":"fda alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/403159"},{"id":"fda-2026-week15-4","kind":"fda","issueId":"2026-week15","year":2026,"week":15,"weekLabel":"第 15 週","dateRange":"2026/04/06 – 04/12","href":"2026-week15.html","title":"FDA Accepts First In Silico Drug Development Tool Under ISTAND Program to Help Predict Drug-Induced Liver Injury","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["accepts","first","silico","development","tool","under","istand","program","help","predict"],"drugTerms":[],"searchText":"fda accepts first in silico drug development tool under istand program to help predict drug-induced liver injury fda drug safety 2026-06-03 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver"},{"id":"pmid-41910345","kind":"article","issueId":"2026-week14","year":2026,"week":14,"weekLabel":"第 14 週","dateRange":"2026/03/30 – 04/05","href":"2026-week14.html","title":"Ultrasound-Facilitated, Catheter-Directed Fibrinolysis for Acute Pulmonary Embolism","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Rosenfield","doi":"10.1056/NEJMoa2516567","url":"https://doi.org/10.1056/NEJMoa2516567","summary":"藥師重點：結論顯示在特定 intermediate-risk PE 病人中，導管超音波輔助纖溶加抗凝可降低短期惡化複合事件；藥師需協助評估 alteplase 出血風險、抗凝銜接與術後監測。","pubDate":"2026-05-28","terms":["ultrasound-facilitated","catheter-directed","fibrinolysis","acute","pulmonary","embolism","nejm","rosenfield","nejmoa2516567","intermediate-risk"],"drugTerms":[],"searchText":"ultrasound-facilitated, catheter-directed fibrinolysis for acute pulmonary embolism nejm rct rosenfield 10.1056/nejmoa2516567 研究背景：急性 intermediate-risk pulmonary embolism 是否僅以抗凝治療即足夠仍有爭議，特別是合併右心負荷與心肺窘迫指標者。 研究方法：此 多國 adaptive-design 試驗 納入 intermediate-risk pulmonary embolism 且具右心室擴大、troponin 升高與至少兩項心肺窘迫指標的病人 544 人，隨機接受 ultrasound-facilitated catheter-directed fibrinolysis with alteplase 加抗凝或單用抗凝；主要終點為 7 天內 pe 相關死亡、心肺代償失調或 collapse、或症狀性 pe 復發。 主要結果：主要終點發生率為介入組 4.0% vs control 組 10.3%（rr 0.39，95% ci 0.20 to 0.77；p=0.005），主要由心肺代償失調或 collapse 減少所驅動。7 天 重大出血 為 4.1% vs 2.2%，30 天為 4.1% vs 3.0%，未發生 intracranial hemorrhage。 藥師重點：結論顯示在特定 intermediate-risk pe 病人中，導管超音波輔助纖溶加抗凝可降低短期惡化複合事件；藥師需協助評估 alteplase 出血風險、抗凝銜接與術後監測。"},{"id":"pmid-41911022","kind":"article","issueId":"2026-week14","year":2026,"week":14,"weekLabel":"第 14 週","dateRange":"2026/03/30 – 04/05","href":"2026-week14.html","title":"Sirolimus-Coated Balloon Angioplasty for Infrainguinal Artery Disease","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Barco","doi":"10.1056/NEJMoa2600360","url":"https://doi.org/10.1056/NEJMoa2600360","summary":"藥師重點：結論顯示 sirolimus-coated balloon angioplasty 可降低 infrainguinal 動脈 疾病 血管內治療後 1 年 重大 adverse limb 事件；藥師仍需協助周邊動脈疾病病人的抗栓、降脂與傷口照護用藥整合。","pubDate":"2026-03-30","terms":["sirolimus-coated","balloon","angioplasty","infrainguinal","artery","nejm","barco","nejmoa2600360","adverse","limb"],"drugTerms":[],"searchText":"sirolimus-coated balloon angioplasty for infrainguinal artery disease nejm original article barco 10.1056/nejmoa2600360 研究背景：infrainguinal 動脈 疾病 接受血管內治療後仍可能發生 重大 adverse limb 事件，sirolimus-coated balloon 是否優於 uncoated balloon 仍需臨床試驗證實。 研究方法：此 prospective 開放標籤 不劣性 試驗 納入 1252 名 infrainguinal 動脈 疾病 病人，1:1 分配 sirolimus-coated balloon 或 uncoated balloon angioplasty；主要終點為 1 年內目標肢體非計畫 重大 amputation 或因 critical limb ischemia 進行目標病灶再血運重建。 主要結果：主要終點為 sirolimus-coated balloon 組 8.8% vs uncoated balloon 組 15.0%（風險差 -4.9 百分點，95% ci -8.5 to -1.3；p<0.001 for 不劣性；p=0.009 for superiority）。1 年死亡為 11.8% vs 12.8%，不良事件發生率大致相近。 藥師重點：結論顯示 sirolimus-coated balloon angioplasty 可降低 infrainguinal 動脈 疾病 血管內治療後 1 年 重大 adverse limb 事件；藥師仍需協助周邊動脈疾病病人的抗栓、降脂與傷口照護用藥整合。"},{"id":"pmid-41905383","kind":"article","issueId":"2026-week14","year":2026,"week":14,"weekLabel":"第 14 週","dateRange":"2026/03/30 – 04/05","href":"2026-week14.html","title":"Progress towards the WHO Global Initiative for Childhood Cancer target of 60% 5-year survival for all childhood cancers combined, 1990-2019 (CONCORD-4): a Cancer Survival Index derived for 68 countries by analysis of individual records for 613 021 children from 307 population-based cancer registries","journal":"Lancet","type":"OA","typeLabel":"Original Article","author":"Allemani","doi":"10.1016/S0140-6736(26)00189-3","url":"https://doi.org/10.1016/S0140-6736(26)00189-3","summary":"藥師重點：研究結果說明 CSI 可用於跨國監測兒童癌症存活進展，許多參與國已接近或超過 60% 目標；臨床解讀仍需注意 registry 覆蓋率、國家收入層級與癌別組成差異。","pubDate":"2026-04-04","terms":["progress","towards","global","initiative","childhood","cancer","target","year","survival","cancers"],"drugTerms":[],"searchText":"progress towards the who global initiative for childhood cancer target of 60% 5-year survival for all childhood cancers combined, 1990-2019 (concord-4): a cancer survival index derived for 68 countries by analysis of individual records for 613 021 children from 307 population-based cancer registries lancet original article allemani 10.1016/s0140-6736(26)00189-3 研究背景：who global initiative for childhood 癌症 設定 2030 年全球兒童癌症 5 年存活率達 60% 的目標，concord-4 評估多國長期趨勢與是否接近此目標。 研究方法：研究邀請 101 國 513 個 族群-based 癌症 registries，收集 1990-2019 年或更新年度 0-14 歲兒童癌症個案資料；以 2010-2019 年資料建立依年齡、性別與癌症 subtype 加權的 癌症 存活期 index（csi），估計 5-year net 存活期。 主要結果：研究收到 68 個國家與地區、307 個 registry 的 679,776 筆兒童癌症資料，存活分析限制於 613,021 名 1990-2019 年診斷兒童。2015-2019 年 all childhood cancers csi 在多數高收入國家 >80%，多數 upper-middle-income countries 為 60-80%，5 個 lower-middle-income countries 為 50-60%。 藥師重點：研究結果說明 csi 可用於跨國監測兒童癌症存活進展，許多參與國已接近或超過 60% 目標；臨床解讀仍需注意 registry 覆蓋率、國家收入層級與癌別組成差異。"},{"id":"pmid-41916664","kind":"article","issueId":"2026-week14","year":2026,"week":14,"weekLabel":"第 14 週","dateRange":"2026/03/30 – 04/05","href":"2026-week14.html","title":"Peer support intervention (ABA-feed) to improve breastfeeding: UK based, multicentre, parallel group, randomised controlled trial","journal":"BMJ","type":"RCT","typeLabel":"RCT","author":"Jolly","doi":"10.1136/bmj-2025-086558","url":"https://doi.org/10.1136/bmj-2025-086558","summary":"藥師重點：研究結果說明 ABA-feed 在英國情境下未提升哺乳率；臨床衛教可參考其增加短期社會支持的可能性，但不宜期待單一同儕支持方案即可改善主要哺乳結果。","pubDate":"2026-03-31","terms":["peer","support","intervention","aba-feed","improve","breastfeeding","multicentre","parallel","randomised","jolly"],"drugTerms":[],"searchText":"peer support intervention (aba-feed) to improve breastfeeding: uk based, multicentre, parallel group, randomised controlled trial bmj rct jolly 10.1136/bmj-2025-086558 研究背景：產後哺乳支持常仰賴常規照護與被動求助，aba-feed peer support 是否能進一步提高哺乳率仍需大型試驗確認。 研究方法：此英國多中心、parallel-group、unblinded 隨機對照試驗 納入 2475 名妊娠 20-35 週初產婦，比較 aba-feed 主動式同儕支持加 常規照護 與 常規照護 單用；主要終點為產後 8 週仍有任何哺乳。 主要結果：產後 8 週任何哺乳率在介入組與 常規照護 組相近（1013/1452，69.8% vs 698/1015，68.8%；校正 風險差 0.01，95% ci -0.03 to 0.04），其他多數次要終點亦未見差異。 藥師重點：研究結果說明 aba-feed 在英國情境下未提升哺乳率；臨床衛教可參考其增加短期社會支持的可能性，但不宜期待單一同儕支持方案即可改善主要哺乳結果。"},{"id":"pmid-41916649","kind":"article","issueId":"2026-week14","year":2026,"week":14,"weekLabel":"第 14 週","dateRange":"2026/03/30 – 04/05","href":"2026-week14.html","title":"Medial retropharyngeal nodal region sparing radiotherapy in nasopharyngeal carcinoma: five year analysis of open label, non-inferiority, multicentre, randomised phase 3 trial","journal":"BMJ","type":"RCT","typeLabel":"RCT","author":"Wang","doi":"10.1136/bmj-2025-086050","url":"https://doi.org/10.1136/bmj-2025-086050","summary":"藥師重點：結論顯示在無 MRLN 侵犯的非轉移性鼻咽癌，MRLN sparing radiotherapy 可維持局部控制並改善長期吞嚥相關結果；臨床採用仍需由放射腫瘤團隊依影像侵犯範圍評估。","pubDate":"2026-03-31","terms":["medial","retropharyngeal","nodal","region","sparing","radiotherapy","nasopharyngeal","carcinoma","five","year"],"drugTerms":[],"searchText":"medial retropharyngeal nodal region sparing radiotherapy in nasopharyngeal carcinoma: five year analysis of open label, non-inferiority, multicentre, randomised phase 3 trial bmj rct wang 10.1136/bmj-2025-086050 研究背景：鼻咽癌放射治療可能造成吞嚥功能受損，保留 medial retropharyngeal lymph node（mrln）區域是否能維持療效並降低長期毒性仍需追蹤。 研究方法：此 開放標籤、不劣性、多中心 隨機 第 3 期試驗 的 5 年預設分析，納入未治療、非角化、非轉移性且無 mrln 侵犯的鼻咽癌成人，1:1 分配 mrln sparing radiotherapy 或 standard radiotherapy。 主要結果：568 人納入分析，中位數 追蹤 70 個月；5 年 local relapse-free 存活期 為 89.2% vs 90.6%（stratified hr 1.03，95% ci 0.61 to 1.74；p=0.90），整體存活期 為 89.2% vs 90.3%。mrln sparing 組 等級 ≥1 dysphagia 與 等級 ≥2 dry mouth 較低。 藥師重點：結論顯示在無 mrln 侵犯的非轉移性鼻咽癌，mrln sparing radiotherapy 可維持局部控制並改善長期吞嚥相關結果；臨床採用仍需由放射腫瘤團隊依影像侵犯範圍評估。"},{"id":"pmid-41910394","kind":"article","issueId":"2026-week14","year":2026,"week":14,"weekLabel":"第 14 週","dateRange":"2026/03/30 – 04/05","href":"2026-week14.html","title":"Mavacamten in Adolescents with Obstructive Hypertrophic Cardiomyopathy","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Rossano","doi":"10.1056/NEJMoa2601103","url":"https://doi.org/10.1056/NEJMoa2601103","summary":"藥師重點：結論顯示 mavacamten 可明顯降低青少年 obstructive hypertrophic cardiomyopathy 的 LVOT obstruction；實務仍需依藥品可近性與適應症，嚴密追蹤 LVEF、症狀與潛在交互作用。","pubDate":"2026-03-29","terms":["mavacamten","adolescents","obstructive","hypertrophic","cardiomyopathy","nejm","rossano","nejmoa2601103","cardiac","myosin"],"drugTerms":[],"searchText":"mavacamten in adolescents with obstructive hypertrophic cardiomyopathy nejm original article rossano 10.1056/nejmoa2601103 研究背景：兒童與青少年 obstructive hypertrophic cardiomyopathy 缺乏核准藥物選項，成人可用的 cardiac myosin 抑制劑 mavacamten 需評估於青少年族群的療效與安全性。 研究方法：此 第 3 期、雙盲、隨機 安慰劑對照 試驗 納入 12 至 <18 歲、nyha class ii 或 iii 有症狀 obstructive hypertrophic cardiomyopathy 青少年 44 人，1:1 分配 mavacamten 或 安慰劑；主要終點為 week 28 valsalva provoked lvot pressure gradient 自基準變化。 主要結果：week 28 valsalva lvot gradient 最小平方平均變化 為 mavacamten -48.5 mm hg vs 安慰劑 -0.5 mm hg（差異 -48.0 mm hg，95% ci -67.7 to -28.3；p<0.001）。不良事件發生率相近，無 lvef 降至 <50%，試驗期間無死亡。 藥師重點：結論顯示 mavacamten 可明顯降低青少年 obstructive hypertrophic cardiomyopathy 的 lvot obstruction；實務仍需依藥品可近性與適應症，嚴密追蹤 lvef、症狀與潛在交互作用。"},{"id":"pmid-41910380","kind":"article","issueId":"2026-week14","year":2026,"week":14,"weekLabel":"第 14 週","dateRange":"2026/03/30 – 04/05","href":"2026-week14.html","title":"Left Ventricular Unloading in High-Risk Percutaneous Coronary Intervention","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Perera","doi":"10.1056/NEJMoa2515704","url":"https://doi.org/10.1056/NEJMoa2515704","summary":"藥師重點：研究結果未支持在高風險複雜 PCI 常規使用 elective microaxial flow pump unloading 以降低重大臨床事件；藥師可留意此類病人仍需嚴密監測血流動力、抗栓治療與併發症。","pubDate":"2026-05-07","terms":["left","ventricular","unloading","high-risk","percutaneous","coronary","intervention","nejm","perera","nejmoa2515704"],"drugTerms":[],"searchText":"left ventricular unloading in high-risk percutaneous coronary intervention nejm rct perera 10.1056/nejmoa2515704 研究背景：嚴重左心室功能不全且需複雜 pci 的病人併發症風險高，elective left ventricular unloading 是否能改善臨床結果仍不確定。 研究方法：研究將 300 名 重度 left ventricular 功能障礙 且 extensive 冠狀動脈 動脈 疾病 病人 1:1 分配至計畫性複雜 pci 期間使用 microaxial flow pump unloading 或 標準照護；主要終點為以 win 比值 分析的階層式複合事件，包含全因死亡、失能性中風、自發性心肌梗塞、心血管住院或程序相關心肌損傷。 主要結果：中位數 追蹤 22 個月，36.6% pairwise comparisons 有利於 microaxial flow pump，43.0% 有利於 標準照護（win 比值 0.85，95% ci 0.63 to 1.15；p=0.30）。全因死亡為 47 人 vs 33 人（hr 1.54，95% ci 0.99 to 2.41），出血或血管併發症未見實質差異。 藥師重點：研究結果未支持在高風險複雜 pci 常規使用 elective microaxial flow pump unloading 以降低重大臨床事件；藥師可留意此類病人仍需嚴密監測血流動力、抗栓治療與併發症。"},{"id":"pmid-41910347","kind":"article","issueId":"2026-week14","year":2026,"week":14,"weekLabel":"第 14 週","dateRange":"2026/03/30 – 04/05","href":"2026-week14.html","title":"Left Atrial Appendage Closure or Anticoagulation for Atrial Fibrillation","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Doshi","doi":"10.1056/NEJMoa2517213","url":"https://doi.org/10.1056/NEJMoa2517213","summary":"藥師重點：結論顯示在適合抗凝的心房顫動病人，左心耳封堵 對主要栓塞相關複合終點不劣於 NOAC，且非程序相關出血較少；選擇時仍需納入程序風險與短期術後抗栓策略。","pubDate":"2026-06-04","terms":["left","atrial","appendage","closure","anticoagulation","fibrillation","nejm","doshi","nejmoa2517213","anticoagulant"],"drugTerms":[],"searchText":"left atrial appendage closure or anticoagulation for atrial fibrillation nejm rct doshi 10.1056/nejmoa2517213 研究背景：心房顫動病人使用 口服 anticoagulant 預防中風會受出血風險限制，左心耳封堵 在可使用抗凝者中的定位尚未確立。 研究方法：此 進行中、prospective、international 隨機試驗 納入適合抗凝治療的心房顫動病人 3000 人，1:1 分配 device-based 左心耳封堵 或 noac 治療；主要療效終點為 3 年心血管死亡、中風或全身性栓塞，主要安全終點為非程序相關出血。 主要結果：3 年主要療效終點為 device 組 5.7% vs noac 組 4.8%（差異 0.9 百分點，95% ci -0.8 to 2.6；p<0.001 for 不劣性）。non-procedure-related 出血 為 10.9% vs 19.0%（hr 0.55，95% ci 0.45 to 0.67；p<0.001）。 藥師重點：結論顯示在適合抗凝的心房顫動病人，左心耳封堵 對主要栓塞相關複合終點不劣於 noac，且非程序相關出血較少；選擇時仍需納入程序風險與短期術後抗栓策略。"},{"id":"pmid-41910985","kind":"article","issueId":"2026-week14","year":2026,"week":14,"weekLabel":"第 14 週","dateRange":"2026/03/30 – 04/05","href":"2026-week14.html","title":"Lead-Attributable Cardiovascular Disease Burden: Global Burden of Disease Study 2023","journal":"JAMA","type":"MA","typeLabel":"Meta-analysis","author":"Stanaway","doi":"10.1001/jama.2026.2197","url":"https://doi.org/10.1001/jama.2026.2197","summary":"藥師重點：研究結果說明累積鉛暴露仍是全球心血管疾病可預防負擔之一；臨床與公衛端可強化高風險族群暴露史詢問、監測與環境減量政策連結。","pubDate":"2026-04-28","terms":["lead-attributable","cardiovascular","burden","global","jama","meta-analysis","stanaway","nhanes","meta-regression","dalys"],"drugTerms":[],"searchText":"lead-attributable cardiovascular disease burden: global burden of disease study 2023 jama meta-analysis stanaway 10.1001/jama.2026.2197 研究背景：鉛暴露雖已下降，仍可能是心血管死亡的重要可預防風險因子；以累積骨鉛估計全球疾病負擔可協助公共衛生決策。 研究方法：研究結合 nhanes 1988-2013 年 42,028 名成人資料、死亡追蹤至 2015 年，以及 systematic review 與 meta-regression；以血鉛、年齡與世代暴露史估計骨鉛，並推估 1990-2023 年全球、區域與國家的鉛暴露歸因心血管疾病負擔。 主要結果：較高骨鉛與較高心血管死亡風險相關；以 2023 年估計，全球有 350 萬例死亡（95% ui 260-440 萬）與 7160 萬 dalys（95% ui 5240-9030 萬）歸因於鉛暴露，分別占所有死亡 5.8% 與所有 dalys 2.6%。 藥師重點：研究結果說明累積鉛暴露仍是全球心血管疾病可預防負擔之一；臨床與公衛端可強化高風險族群暴露史詢問、監測與環境減量政策連結。"},{"id":"pmid-41910396","kind":"article","issueId":"2026-week14","year":2026,"week":14,"weekLabel":"第 14 週","dateRange":"2026/03/30 – 04/05","href":"2026-week14.html","title":"Iptacopan in IgA Nephropathy - Final 24-Month Data","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Barratt","doi":"10.1056/NEJMoa2600743","url":"https://doi.org/10.1056/NEJMoa2600743","summary":"藥師重點：結論顯示 iptacopan 可減緩 IgA nephropathy 腎功能下降並降低腎衰竭複合事件；藥師需留意補體抑制相關感染風險、疫苗與腎功能及蛋白尿追蹤。","pubDate":"2026-03-29","terms":["iptacopan","nephropathy","final","month","nejm","barratt","nejmoa2600743","alternative","complement","pathway"],"drugTerms":[],"searchText":"iptacopan in iga nephropathy - final 24-month data nejm original article barratt 10.1056/nejmoa2600743 研究背景：alternative complement pathway 過度活化會促進 iga nephropathy 腎絲球發炎，iptacopan 為 complement factor b 抑制劑，先前 9 個月分析已顯示可降低蛋白尿。 研究方法：此 第 3 期試驗 納入接受支持性治療後仍有 iga nephropathy、egfr ≥30 ml/min/1.73 m2 且 24 小時 urinary protein-to-creatinine 比值 ≥1 的成人 477 人，1:1 分配 iptacopan 200 mg 每日兩次 或 安慰劑；最終分析主要終點為 24 個月 annualized total egfr slope。 主要結果：iptacopan 組 annualized total egfr slope 為 -3.10 vs 安慰劑 -6.12 ml/min/1.73 m2/year（差異 3.02，95% ci 2.02 to 4.01；校正 p<0.001）。複合 kidney-failure 終點 為 21.4% vs 33.5%（hr 0.57，95% ci 0.40 to 0.81；校正 p=0.003），嚴重感染為 6.7% vs 2.1%。 藥師重點：結論顯示 iptacopan 可減緩 iga nephropathy 腎功能下降並降低腎衰竭複合事件；藥師需留意補體抑制相關感染風險、疫苗與腎功能及蛋白尿追蹤。"},{"id":"pmid-41911016","kind":"article","issueId":"2026-week14","year":2026,"week":14,"weekLabel":"第 14 週","dateRange":"2026/03/30 – 04/05","href":"2026-week14.html","title":"Intravascular Ultrasound-Guided or Angiography-Guided Complex High-Risk PCI","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Diletti","doi":"10.1056/NEJMoa2601521","url":"https://doi.org/10.1056/NEJMoa2601521","summary":"藥師重點：結論顯示 routine IVUS-guided complex high-risk PCI 未降低 目標血管失敗；藥師解讀介入結果時可留意此研究不支持將影像導引視為一定改善臨床事件的策略。","pubDate":"2026-06-11","terms":["intravascular","ultrasound-guided","angiography-guided","complex","high-risk","nejm","diletti","nejmoa2601521","ivus","guidance"],"drugTerms":[],"searchText":"intravascular ultrasound-guided or angiography-guided complex high-risk pci nejm rct diletti 10.1056/nejmoa2601521 研究背景：ivus guidance 可提升 stent optimization，但在歐洲當代 complex high-risk pci 實務中，是否能降低 目標血管失敗 仍需直接證據。 研究方法：此 investigator-initiated、international 開放標籤 隨機試驗 納入接受 complex pci 的病人 2020 人，分配至依預設 stent-optimization criteria 執行 ivus-guided pci 或 angiography-guided pci；主要終點為心因性死亡、target-vessel myocardial infarction 或 clinically indicated target-vessel revascularization。 主要結果：中位數 追蹤 19.0 個月，目標血管失敗 為 ivus-guided pci 組 13.9% vs angiography-guided pci 組 11.1%（hr 1.25，95% ci 0.97 to 1.60；p=0.08）。ivus 組 procedure duration 較長，程序併發症與不良事件頻率相近。 藥師重點：結論顯示 routine ivus-guided complex high-risk pci 未降低 目標血管失敗；藥師解讀介入結果時可留意此研究不支持將影像導引視為一定改善臨床事件的策略。"},{"id":"pmid-41910315","kind":"article","issueId":"2026-week14","year":2026,"week":14,"weekLabel":"第 14 週","dateRange":"2026/03/30 – 04/05","href":"2026-week14.html","title":"Intensive LDL Cholesterol Targeting in Atherosclerotic Cardiovascular Disease","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Lee","doi":"10.1056/NEJMoa2600283","url":"https://doi.org/10.1056/NEJMoa2600283","summary":"藥師重點：研究結果支持 ASCVD 次級預防中較積極 LDL 膽固醇 目標可降低 3 年心血管事件；藥師需協助追蹤降脂藥物耐受性、腎功能與是否能穩定達標。","pubDate":"2026-04-09","terms":["intensive","cholesterol","targeting","atherosclerotic","cardiovascular","nejm","nejmoa2600283","nonfatal","myocardial","infarction"],"drugTerms":[],"searchText":"intensive ldl cholesterol targeting in atherosclerotic cardiovascular disease nejm rct lee 10.1056/nejmoa2600283 研究背景：動脈粥樣硬化心血管疾病次級預防需控制 ldl 膽固醇，但 隨機試驗 對 <55 mg/dl 與 <70 mg/dl 目標的直接比較仍有限。 研究方法：此韓國 開放標籤 優越性試驗 將 3048 名 atherosclerotic 心血管 疾病 病人 1:1 分配至 ldl 膽固醇 目標 <55 mg/dl 或 <70 mg/dl；主要終點為 3 年 心血管 死亡、nonfatal myocardial infarction、nonfatal stroke、revascularization 或 unstable angina 住院。 主要結果：3 年追蹤中，intensive-targeting 組與 conventional-targeting 組 試驗 期間 中位數 ldl 膽固醇 為 56 vs 66 mg/dl；主要終點為 6.6% vs 9.7%（hr 0.67，95% ci 0.52 to 0.86；p=0.002），多數安全性終點相近。 藥師重點：研究結果支持 ascvd 次級預防中較積極 ldl 膽固醇 目標可降低 3 年心血管事件；藥師需協助追蹤降脂藥物耐受性、腎功能與是否能穩定達標。"},{"id":"pmid-41911017","kind":"article","issueId":"2026-week14","year":2026,"week":14,"weekLabel":"第 14 週","dateRange":"2026/03/30 – 04/05","href":"2026-week14.html","title":"IVUS-Guided versus Angiography-Guided PCI in Unprotected Left Main Coronary Disease","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Testa","doi":"10.1056/NEJMoa2600440","url":"https://doi.org/10.1056/NEJMoa2600440","summary":"藥師重點：研究結果未顯示 unprotected left main PCI 中常規 IVUS guidance 可優於 angiography guidance；臨床仍需依病灶複雜度、造影品質與介入醫師判斷使用影像導引。","pubDate":"2026-06-11","terms":["ivus-guided","angiography-guided","unprotected","left","main","coronary","nejm","testa","nejmoa2600440","ivus"],"drugTerms":[],"searchText":"ivus-guided versus angiography-guided pci in unprotected left main coronary disease nejm rct testa 10.1056/nejmoa2600440 研究背景：unprotected left main 冠狀動脈 動脈 疾病 越來越常以 pci 進行血運重建，ivus guidance 是否比單純 angiography guidance 改善長期結果仍不確定。 研究方法：此 international 多中心 開放標籤試驗 將 806 名 unprotected left main 冠狀動脈 動脈 疾病 病人 1:1 分配接受 ivus-guided pci 或 angiography-guided pci；主要終點為最長追蹤期間任何中風、心肌梗塞、再血運重建或全因死亡的 patient-oriented 複合。 主要結果：中位數 追蹤 2.9 年，主要終點為 ivus-guided pci 組 33.7% vs angiography-guided pci 組 30.9%（hr 1.11，95% ci 0.87 to 1.42；p=0.40），死亡、心肌梗塞、再血運重建與安全事件大致相近。 藥師重點：研究結果未顯示 unprotected left main pci 中常規 ivus guidance 可優於 angiography guidance；臨床仍需依病灶複雜度、造影品質與介入醫師判斷使用影像導引。"},{"id":"pmid-41905364","kind":"article","issueId":"2026-week14","year":2026,"week":14,"weekLabel":"第 14 週","dateRange":"2026/03/30 – 04/05","href":"2026-week14.html","title":"Efficacy and safety of LEVI-04 in patients with osteoarthritis of the knee: a randomised, double-blind, placebo-controlled, phase 2 trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Conaghan","doi":"10.1016/S0140-6736(26)00131-5","url":"https://doi.org/10.1016/S0140-6736(26)00131-5","summary":"藥師重點：結論顯示 LEVI-04 對膝關節骨關節炎疼痛與功能有改善訊號且耐受性尚可；但目前為 第 2 期 資料，藥師解讀時仍需留意劑量、給藥途徑與長期關節安全性。","pubDate":"2026-03-28","terms":["efficacy","levi-04","osteoarthritis","knee","randomised","double-blind","placebo-controlled","phase","lancet","conaghan"],"drugTerms":[],"searchText":"efficacy and safety of levi-04 in patients with osteoarthritis of the knee: a randomised, double-blind, placebo-controlled, phase 2 trial lancet rct conaghan 10.1016/s0140-6736(26)00131-5 研究背景：膝關節骨關節炎現有治療仍有限，levi-04 為 p75 neurotrophin 受體（p75ntr）fusion protein，可抑制 neurotrophin-3，本研究評估其止痛與安全性。 研究方法：此 隨機、雙盲、安慰劑對照 第 2 期 試驗 納入具疼痛與影像學膝關節骨關節炎者 518 人，1:1:1:1 分配每月靜脈給予 安慰劑 或 levi-04 0·3、1·0、2·0 mg/kg 至 week 16；主要終點為 week 17 womac pain 變化。 主要結果：week 17 時 levi-04 0·3、1·0、2·0 mg/kg 相較 安慰劑 的 womac pain least squares 平均差 分別為 -0·51、-0·62、-0·79，且未增加嚴重不良事件、治療期間不良事件或快速惡化骨關節炎等關節病變。 藥師重點：結論顯示 levi-04 對膝關節骨關節炎疼痛與功能有改善訊號且耐受性尚可；但目前為 第 2 期 資料，藥師解讀時仍需留意劑量、給藥途徑與長期關節安全性。"},{"id":"pmid-41910427","kind":"article","issueId":"2026-week14","year":2026,"week":14,"weekLabel":"第 14 週","dateRange":"2026/03/30 – 04/05","href":"2026-week14.html","title":"Discontinuation of Beta-Blocker Therapy after Myocardial Infarction","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Choi","doi":"10.1056/NEJMoa2601005","url":"https://doi.org/10.1056/NEJMoa2601005","summary":"藥師重點：結論顯示對已超過心肌梗塞後 1 年、LVEF 保留且無心衰竭者，停用 beta-blocker 在複合臨床終點上不劣於續用；藥師可協助評估心率、血壓、其他適應症與停藥後監測。","pubDate":"2026-04-02","terms":["discontinuation","beta-blocker","myocardial","infarction","nejm","choi","nejmoa2601005","lvef"],"drugTerms":[],"searchText":"discontinuation of beta-blocker therapy after myocardial infarction nejm rct choi 10.1056/nejmoa2601005 研究背景：在現代冠狀動脈再灌流與次級預防治療下，無左心室收縮功能不全或心衰竭的心肌梗塞病人是否需長期使用 beta-blocker 仍不明確。 研究方法：此韓國 25 中心 開放標籤、隨機 不劣性 試驗 納入心肌梗塞後狀況穩定、lvef ≥40%、無心衰竭且已使用 beta-blocker 至少 1 年的病人 2540 人，1:1 分配停用或續用 beta-blocker；主要終點為全因死亡、復發心肌梗塞或心衰竭住院。 主要結果：中位數 追蹤 3.1 年，主要終點在停用組與續用組分別為 7.2% vs 9.0%（hr 0.80，95% ci 0.57 to 1.13；p=0.001 for 不劣性），嚴重不良事件 發生率相近。 藥師重點：結論顯示對已超過心肌梗塞後 1 年、lvef 保留且無心衰竭者，停用 beta-blocker 在複合臨床終點上不劣於續用；藥師可協助評估心率、血壓、其他適應症與停藥後監測。"},{"id":"pmid-41921523","kind":"article","issueId":"2026-week14","year":2026,"week":14,"weekLabel":"第 14 週","dateRange":"2026/03/30 – 04/05","href":"2026-week14.html","title":"Deferral of percutaneous coronary intervention in patients undergoing transcatheter aortic valve implantation (PRO-TAVI): an investigator-initiated, multicentre, open-label, non-inferiority, randomised controlled trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Delewi","doi":"10.1016/S0140-6736(26)00308-9","url":"https://doi.org/10.1016/S0140-6736(26)00308-9","summary":"藥師重點：結論顯示在選定 TAVI 合併冠狀動脈疾病病人中，延後 PCI 對 1 年複合事件不劣於 TAVI 前 PCI；團隊決策仍需依冠狀動脈解剖、症狀、抗血小板與出血風險個別化。","pubDate":"2026-04-11","terms":["deferral","percutaneous","coronary","intervention","undergoing","transcatheter","aortic","valve","implantation","pro-tavi"],"drugTerms":[],"searchText":"deferral of percutaneous coronary intervention in patients undergoing transcatheter aortic valve implantation (pro-tavi): an investigator-initiated, multicentre, open-label, non-inferiority, randomised controlled trial lancet rct delewi 10.1016/s0140-6736(26)00308-9 研究背景：接受 tavi 的病人常合併冠狀動脈疾病，是否需在 tavi 前常規執行 pci，或可先延後 pci，仍是臨床決策問題。 研究方法：pro-tavi 為荷蘭 12 家醫院 investigator-initiated、開放標籤、不劣性 隨機試驗，將合併冠狀動脈疾病的 tavi 病人 466 人分配至 deferral of pci 或 tavi 前 pci；主要終點為 1 年全因死亡、心肌梗塞、中風與 重大出血 複合事件。 主要結果：主要終點發生率為 deferral 組 24% vs pci 組 26%（比率 差異 -1·7%，95% ci -9·5 to 6·2；hr 0·89，95% ci 0·62-1·28；p=0·0008 for 不劣性），superiority 未達顯著。 藥師重點：結論顯示在選定 tavi 合併冠狀動脈疾病病人中，延後 pci 對 1 年複合事件不劣於 tavi 前 pci；團隊決策仍需依冠狀動脈解剖、症狀、抗血小板與出血風險個別化。"},{"id":"pmid-41931048","kind":"article","issueId":"2026-week14","year":2026,"week":14,"weekLabel":"第 14 週","dateRange":"2026/03/30 – 04/05","href":"2026-week14.html","title":"CRISPR-Cas12a Gene Editing of HBG1 and HBG2 Promoters to Treat β-Thalassemia","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Frangoul","doi":"10.1056/NEJMoa2501277","url":"https://doi.org/10.1056/NEJMoa2501277","summary":"藥師重點：研究結果顯示 reni-cel 在小型早期研究中可提高 HbF 並達成輸血獨立，但研究提前終止且分析非預設；藥師解讀時需特別留意 conditioning 毒性、感染與長期追蹤不足。","pubDate":"2026-04-02","terms":["crispr-cas12a","gene","editing","hbg1","hbg2","promoters","treat","thalassemia","nejm","frangoul"],"drugTerms":[],"searchText":"crispr-cas12a gene editing of hbg1 and hbg2 promoters to treat β-thalassemia nejm original article frangoul 10.1056/nejmoa2501277 研究背景：reni-cel 為 investigational crispr-cas12a gene-edited autologous hematopoietic stem-cell 治療，透過破壞 hbg1/hbg2 promoters 的 bcl11a binding sites 以重新活化 fetal hemoglobin，用於 transfusion-dependent β-thalassemia。 研究方法：此 第 1 期-2 多中心 開放標籤 single-group 研究 納入 18-35 歲 transfusion-dependent β-thalassemia 參與者 9 人，busulfan myeloablative conditioning 後輸注 reni-cel；主要終點為 42 天內 neutrophil engraftment 與不良事件。 主要結果：中位數 postinfusion 追蹤 17.5 個月，所有參與者於 42 天內完成 neutrophil 與 platelet engraftment；9 人最後追蹤時皆不需輸血，6 名可評估 12 個月以上者達 transfusion independence。共通報 69 件 等級 3 或 4 不良事件，6 件 嚴重不良事件 發生於 4 人，多數與 myeloablative conditioning 一致。 藥師重點：研究結果顯示 reni-cel 在小型早期研究中可提高 hbf 並達成輸血獨立，但研究提前終止且分析非預設；藥師解讀時需特別留意 conditioning 毒性、感染與長期追蹤不足。"},{"id":"pmid-41931047","kind":"article","issueId":"2026-week14","year":2026,"week":14,"weekLabel":"第 14 週","dateRange":"2026/03/30 – 04/05","href":"2026-week14.html","title":"CRISPR-Cas12a Gene Editing of HBG1 and HBG2 Promoters to Treat Sickle Cell Disease","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Hanna","doi":"10.1056/NEJMoa2415550","url":"https://doi.org/10.1056/NEJMoa2415550","summary":"藥師重點：結論顯示 reni-cel 對 重度 sickle cell 疾病 有提高 total hemoglobin 與 HbF、減少 vaso-occlusive 事件 的早期訊號；但研究為單組且提前終止，需審慎評估 busulfan conditioning 與長期基因編輯安全性。","pubDate":"2026-04-02","terms":["crispr-cas12a","gene","editing","hbg1","hbg2","promoters","treat","sickle","cell","nejm"],"drugTerms":[],"searchText":"crispr-cas12a gene editing of hbg1 and hbg2 promoters to treat sickle cell disease nejm original article hanna 10.1056/nejmoa2415550 研究背景：reni-cel 透過 crispr-cas12a gene editing 破壞 hbg1/hbg2 promoters 的 bcl11a binding sites，以重新活化 fetal hemoglobin，可能用於 重度 sickle cell 疾病。 研究方法：此 第 1 期-2 多中心 開放標籤 single-group 研究 納入 12-50 歲、過去 2 年每年至少 2 次 重度 vaso-occlusive 事件 的 重度 sickle cell 疾病 病人；busulfan myeloablative conditioning 後單次輸注 reni-cel，追蹤 engraftment、hemoglobin measures、allelic editing、vaso-occlusive 事件 與 不良事件。 主要結果：截至 2024 年 10 月 29 日，共 28 人接受 reni-cel，中位數 追蹤 9.5 個月；27 人完成 neutrophil 與 platelet engraftment。month 6 時，18 名有資料者 平均值 total hemoglobin 由 9.8±1.7 增至 13.8±1.9 g/dl，平均值 fetal hemoglobin 由 2.5±2.5% 增至 48.1±3.2%；輸注後 27/28 人未再發生 vaso-occlusive 事件。 藥師重點：結論顯示 reni-cel 對 重度 sickle cell 疾病 有提高 total hemoglobin 與 hbf、減少 vaso-occlusive 事件 的早期訊號；但研究為單組且提前終止，需審慎評估 busulfan conditioning 與長期基因編輯安全性。"},{"id":"pmid-41931046","kind":"article","issueId":"2026-week14","year":2026,"week":14,"weekLabel":"第 14 週","dateRange":"2026/03/30 – 04/05","href":"2026-week14.html","title":"Base Editing of HBG1 and HBG2 Promoters for Sickle Cell Disease","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Gupta","doi":"10.1056/NEJMoa2504835","url":"https://doi.org/10.1056/NEJMoa2504835","summary":"藥師重點：研究結果顯示 risto-cel 具有快速 engraftment、持續 HbF 表現與降低 HbS 的早期訊號；但安全性事件與死亡案例需審慎解讀，仍需更長追蹤確認基因編輯與 conditioning 相關風險。","pubDate":"2026-05-07","terms":["base","editing","hbg1","hbg2","promoters","sickle","cell","nejm","gupta","nejmoa2504835"],"drugTerms":[],"searchText":"base editing of hbg1 and hbg2 promoters for sickle cell disease nejm original article gupta 10.1056/nejmoa2504835 研究背景：鐮刀型細胞疾病以慢性溶血性貧血與反覆 重度 vaso-occlusive crises 為特徵，risto-cel 為 base-edited autologous cd34+ hematopoietic stem and progenitor cells，目標為 hbg1/hbg2 promoters 以提高 hbf 並降低 hbs。 研究方法：此 第 1 期-2 研究 納入 12-35 歲、收案前 2 年至少 4 次 重度 vaso-occlusive crises 的 sickle cell 疾病 病人；busulfan myeloablative conditioning 後單次輸注 risto-cel ≥3.0×106 viable cd34+ cells/kg。此為未計畫 interim 分析，描述安全性、editing、engraftment、hemoglobin production 與 crisis 發生。 主要結果：31 人接受 risto-cel，平均值 追蹤 6.6 個月；neutrophil engraftment 中位數 17.5 天，platelet engraftment 中位數 19 天。1 人死於 idiopathic pneumonia 症候群，27 人（87%）發生 等級 ≥3 不良事件，12 人（39%）有 嚴重不良事件；6 個月時 周邊血液 目標位點編輯等位基因 平均值 67.4%，hbf >60%，hbs <40%，且最後一次輸血後 60 天起未通報 重度 vaso-occlusive crises。 藥師重點：研究結果顯示 risto-cel 具有快速 engraftment、持續 hbf 表現與降低 hbs 的早期訊號；但安全性事件與死亡案例需審慎解讀，仍需更長追蹤確認基因編輯與 conditioning 相關風險。"},{"id":"pmid-41921522","kind":"article","issueId":"2026-week14","year":2026,"week":14,"weekLabel":"第 14 週","dateRange":"2026/03/30 – 04/05","href":"2026-week14.html","title":"Aspirin versus clopidogrel for chronic maintenance monotherapy after percutaneous coronary intervention: 10-year follow-up of the HOST-EXAM trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Kang","doi":"10.1016/S0140-6736(26)00422-8","url":"https://doi.org/10.1016/S0140-6736(26)00422-8","summary":"藥師重點：結論顯示 PCI 後慢性維持期可將 clopidogrel 視為 aspirin 以外的長期單一抗血小板選項；實務仍需考量出血風險、缺血風險、CYP2C19 相關疑慮與病人用藥可近性。","pubDate":"2026-04-11","terms":["aspirin","clopidogrel","chronic","maintenance","monotherapy","percutaneous","coronary","intervention","year","follow-up"],"drugTerms":["clopidogrel"],"searchText":"aspirin versus clopidogrel for chronic maintenance monotherapy after percutaneous coronary intervention: 10-year follow-up of the host-exam trial lancet rct kang 10.1016/s0140-6736(26)00422-8 研究背景：pci 後完成 雙重抗血小板治療 且進入慢性維持期後，clopidogrel 單藥與 aspirin 單藥的長期臨床結果仍有不確定性。 研究方法：host-exam 10 年延伸追蹤納入 pci 後 6-18 個月無臨床事件並完成 雙重抗血小板治療 的病人，隨機接受 clopidogrel 75 mg 每日一次 或 aspirin 100 mg 每日一次；主要終點為全因死亡、非致死性心肌梗塞、中風、急性 冠狀動脈 症候群 再住院或 barc type ≥3 出血。 主要結果：5438 人隨機分組，中位數 追蹤 10·5 年；clopidogrel 組主要複合終點低於 aspirin 組（25·4% vs 28·5%；hr 0·86，95% ci 0·77-0·96；log-rank p=0·0050），thrombotic 終點 與 出血 終點 亦較低，全因死亡相近。 藥師重點：結論顯示 pci 後慢性維持期可將 clopidogrel 視為 aspirin 以外的長期單一抗血小板選項；實務仍需考量出血風險、缺血風險、cyp2c19 相關疑慮與病人用藥可近性。"},{"id":"pmid-41910384","kind":"article","issueId":"2026-week14","year":2026,"week":14,"weekLabel":"第 14 週","dateRange":"2026/03/30 – 04/05","href":"2026-week14.html","title":"Angiography-Derived Fractional Flow Reserve to Guide PCI","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Fearon","doi":"10.1056/NEJMoa2600949","url":"https://doi.org/10.1056/NEJMoa2600949","summary":"藥師重點：結論顯示 FFRangio 用於中度冠狀動脈病灶生理評估，在 1 年複合臨床終點上不劣於 pressure-wire 策略；此結果主要影響介入決策流程，藥師可關注後續抗血小板與次級預防照護。","pubDate":"2026-03-29","terms":["angiography-derived","fractional","flow","reserve","guide","nejm","fearon","nejmoa2600949","pressure-wire-based","ffrangio"],"drugTerms":[],"searchText":"angiography-derived fractional flow reserve to guide pci nejm original article fearon 10.1056/nejmoa2600949 研究背景：中度冠狀動脈狹窄以 pressure-wire-based ffr 評估可改善 pci 決策，但臨床使用率低；ffrangio 由冠狀動脈造影影像推估，可能簡化流程。 研究方法：此 international 不劣性 試驗 將接受 冠狀動脈 angiography 並發現至少一處 intermediate 冠狀動脈 stenosis 的病人 1930 人，隨機分配至 ffrangio 或 pressure-wire-based measurements；主要終點為 1 年死亡、心肌梗塞或非計畫且具臨床適應症的冠狀動脈再血運重建。 主要結果：1 年主要終點為 ffrangio 組 6.9% vs pressure-wire 組 7.1%（hr 0.98，95% ci 0.70 to 1.39；差異 -0.2 百分點；p<0.001 for 不劣性），出血、急性腎損傷與程序相關不良事件未見明顯差異。 藥師重點：結論顯示 ffrangio 用於中度冠狀動脈病灶生理評估，在 1 年複合臨床終點上不劣於 pressure-wire 策略；此結果主要影響介入決策流程，藥師可關注後續抗血小板與次級預防照護。"},{"id":"pmid-41910382","kind":"article","issueId":"2026-week14","year":2026,"week":14,"weekLabel":"第 14 週","dateRange":"2026/03/30 – 04/05","href":"2026-week14.html","title":"Angiography-Based Physiology to Guide Coronary Revascularization","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Daemen","doi":"10.1056/NEJMoa2601841","url":"https://doi.org/10.1056/NEJMoa2601841","summary":"藥師重點：研究結果說明 vFFR-guided revascularization 在 1 年複合事件上不劣於傳統 FFR-guided strategy；藥師仍應把重點放在 PCI 後抗栓、降脂與危險因子控制。","pubDate":"2026-03-29","terms":["angiography-based","physiology","guide","coronary","revascularization","nejm","daemen","nejmoa2601841","guidelines","vffr"],"drugTerms":[],"searchText":"angiography-based physiology to guide coronary revascularization nejm original article daemen 10.1056/nejmoa2601841 研究背景：治療中度冠狀動脈病灶時，guidelines 建議以生理評估引導血運重建；vffr 可由三維定量冠狀動脈造影推估，無需 pressure wire 或 hyperemic agent。 研究方法：此歐洲 37 站 international 開放標籤 隨機 不劣性 試驗 納入 chronic 或 急性 冠狀動脈 syndromes 且有 30-80% intermediate 冠狀動脈-動脈 lesions 的病人，隨機接受 vffr-guided 或 ffr-guided revascularization；主要終點為 1 年死亡、心肌梗塞或再血運重建。 主要結果：主要終點納入 vffr 組 1116 人與 ffr 組 1095 人，1 年事件率皆為 7.5%（風險差 -0.02 百分點，95% ci -2.25 to 2.21；p=0.004 for 不劣性），嚴重不良事件 大致相近。 藥師重點：研究結果說明 vffr-guided revascularization 在 1 年複合事件上不劣於傳統 ffr-guided strategy；藥師仍應把重點放在 pci 後抗栓、降脂與危險因子控制。"},{"id":"pmid-41910335","kind":"article","issueId":"2026-week14","year":2026,"week":14,"weekLabel":"第 14 週","dateRange":"2026/03/30 – 04/05","href":"2026-week14.html","title":"A Phase 3 Trial of Brepocitinib in Dermatomyositis","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Vleugels","doi":"10.1056/NEJMoa2503531","url":"https://doi.org/10.1056/NEJMoa2503531","summary":"藥師重點：結論顯示 brepocitinib 30 mg 對先前治療反應不佳的成人皮肌炎有臨床改善，但感染風險需納入評估；藥師應留意免疫抑制背景、疫苗與感染監測。","pubDate":"2026-05-14","terms":["phase","brepocitinib","dermatomyositis","nejm","vleugels","nejmoa2503531","cytokine","signaling","tyk2-jak1","week"],"drugTerms":["brepocitinib"],"searchText":"a phase 3 trial of brepocitinib in dermatomyositis nejm rct vleugels 10.1056/nejmoa2503531 研究背景：皮肌炎與多種 cytokine signaling 有關，brepocitinib 為口服選擇性 tyk2-jak1 抑制劑，可能改善對既有治療反應不佳的疾病活動。 研究方法：此 第 3 期、雙盲、隨機、安慰劑對照 試驗 納入成人皮肌炎患者 241 人，1:1:1 分配 brepocitinib 30 mg、brepocitinib 15 mg 或 安慰劑 每日一次 52 週；主要終點為 week 52 total improvement score。 主要結果：week 52 平均值 total improvement score 為 46.5、37.5、31.2；brepocitinib 30 mg 相較 安慰劑 差異 15.3（95% ci 6.7 to 24.0；p<0.001），15 mg 未達顯著。30 mg 組在皮膚病灶、glucocorticoid tapering 與功能失能等次要終點較佳，但嚴重感染較 安慰劑 多（10% vs 1%）。 藥師重點：結論顯示 brepocitinib 30 mg 對先前治療反應不佳的成人皮肌炎有臨床改善，但感染風險需納入評估；藥師應留意免疫抑制背景、疫苗與感染監測。"},{"id":"fda-2026-week14-1","kind":"fda","issueId":"2026-week14","year":2026,"week":14,"weekLabel":"第 14 週","dateRange":"2026/03/30 – 04/05","href":"2026-week14.html","title":"FDA’s Concerns with Unapproved GLP-1 Drugs Used for Weight Loss","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["concerns","unapproved","glp-1","drugs","used","weight","loss","https","drug-alerts-and-statements","fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"],"drugTerms":["glp-1"],"searchText":"fda’s concerns with unapproved glp-1 drugs used for weight loss fda drug safety 2026-06-15 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"},{"id":"fda-2026-week14-3","kind":"fda","issueId":"2026-week14","year":2026,"week":14,"weekLabel":"第 14 週","dateRange":"2026/03/30 – 04/05","href":"2026-week14.html","title":"FDA issues final decision to withdraw approval of Pepaxto (melphalan flufenamide)","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/398713","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["issues","final","decision","withdraw","approval","pepaxto","melphalan","flufenamide","https","node"],"drugTerms":[],"searchText":"fda issues final decision to withdraw approval of pepaxto (melphalan flufenamide) fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/398713"},{"id":"fda-2026-week14-2","kind":"fda","issueId":"2026-week14","year":2026,"week":14,"weekLabel":"第 14 週","dateRange":"2026/03/30 – 04/05","href":"2026-week14.html","title":"FDA alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/403159","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["alerts","caregivers","providers","cross-compatibility","issues","autoinjector","devices","that","optional","glatiramer"],"drugTerms":[],"searchText":"fda alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/403159"},{"id":"fda-2026-week14-4","kind":"fda","issueId":"2026-week14","year":2026,"week":14,"weekLabel":"第 14 週","dateRange":"2026/03/30 – 04/05","href":"2026-week14.html","title":"FDA Accepts First In Silico Drug Development Tool Under ISTAND Program to Help Predict Drug-Induced Liver Injury","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["accepts","first","silico","development","tool","under","istand","program","help","predict"],"drugTerms":[],"searchText":"fda accepts first in silico drug development tool under istand program to help predict drug-induced liver injury fda drug safety 2026-06-03 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver"},{"id":"pmid-41880608","kind":"article","issueId":"2026-week13","year":2026,"week":13,"weekLabel":"第 13 週","dateRange":"2026/03/23 – 03/29","href":"2026-week13.html","title":"Transdermal Estradiol Patches in Locally Advanced Prostate Cancer","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Langley","doi":"10.1056/NEJMoa2511781","url":"https://doi.org/10.1056/NEJMoa2511781","summary":"藥師重點：結論顯示 tE2 在局部晚期前列腺癌的 3-year 無轉移存活期 不劣於 LHRH agonists，且熱潮紅較少但男性女乳症較多；藥師需留意貼片使用、皮膚反應、荷爾蒙相關不良反應與病人對副作用取捨的偏好。","pubDate":"2026-04-23","terms":["transdermal","estradiol","patches","locally","advanced","prostate","cancer","nejm","langley","nejmoa2511781"],"drugTerms":[],"searchText":"transdermal estradiol patches in locally advanced prostate cancer nejm rct langley 10.1056/nejmoa2511781 研究背景：te2 patches 可作為前列腺癌 androgen-deprivation 治療 的替代選項，可能減少 lhrh agonists 造成的 estrogen depletion 相關副作用與口服 estrogen 的血栓風險。 研究方法：此 第 3 期 不劣性 隨機試驗 將局部晚期（m0 且 n0 或 n+）前列腺癌男性分配至 te2 patches（100 μg estradiol every 24 hours）或 lhrh agonists。主要結果為 3-year 無轉移存活期，不劣性 margin 為 4 百分點，次要結果包括 castrate testosterone level、整體存活期 與安全性。 主要結果：2007 至 2022 年於英國 75 個中心收錄 1360 人；3-year 無轉移存活期 為 te2 87.1% 與 lhrh agonists 85.9%，confirmed metastasis or 死亡 的 hr 0.96，one-sided 95% ci upper limit 1.11，符合 不劣性。5-year 整體存活期 為 81.1% vs 79.2%（hr 0.90，95% ci 0.75 to 1.07）；hot flashes 為 44% vs 89%，gynecomastia 為 85% vs 42%。 藥師重點：結論顯示 te2 在局部晚期前列腺癌的 3-year 無轉移存活期 不劣於 lhrh agonists，且熱潮紅較少但男性女乳症較多；藥師需留意貼片使用、皮膚反應、荷爾蒙相關不良反應與病人對副作用取捨的偏好。"},{"id":"pmid-41879829","kind":"article","issueId":"2026-week13","year":2026,"week":13,"weekLabel":"第 13 週","dateRange":"2026/03/23 – 03/29","href":"2026-week13.html","title":"Setidegrasib in Advanced Non-Small-Cell Lung Cancer and Pancreatic Cancer","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Park","doi":"10.1056/NEJMoa2600752","url":"https://doi.org/10.1056/NEJMoa2600752","summary":"藥師重點：研究結果顯示 setidegrasib 在先前治療過的 KRAS p.G12D-mutated NSCLC 或 pancreatic ductal adenocarcinoma 具有早期抗腫瘤活性，且因不良事件停藥比例低；但資料仍屬 第 1 期，藥師需留意輸注反應、噁心、600 mg 每週 靜脈給藥與後續 第 2 期/3 確認資料。","pubDate":"2026-04-09","terms":["setidegrasib","advanced","non-small-cell","lung","cancer","pancreatic","nejm","park","nejmoa2600752","kras"],"drugTerms":[],"searchText":"setidegrasib in advanced non-small-cell lung cancer and pancreatic cancer nejm original article park 10.1056/nejmoa2600752 研究背景：kras p.g12d variant 見於約 5% nsclc 與約 40% pancreatic ductal adenocarcinoma，但目前尚無針對此變異核准的標靶治療；setidegrasib（asp3082）為 kras g12d-targeted protein degrader。 研究方法：此 第 1 期 研究 評估 setidegrasib 用於先前接受治療、帶有 kras p.g12d variants 的晚期 solid tumors 病人之安全性、pharmacokinetics、pharmacodynamics 與抗腫瘤活性。主要目標為 dose-limiting toxic effects、不良事件 與 第 2 期 dose；setidegrasib 以每週一次靜脈給藥 10-800 mg。 主要結果：共 203 人納入；最終選定 第 2 期 dose 為 600 mg。600 mg 組 76 人中，所有病人皆發生 治療期間出現的不良事件，等級 ≥3 為 42%；治療相關不良事件 為 93%，最常見為 transient 輸注相關反應（80%）與 nausea（30%），2 人因 不良事件 停藥。600 mg 劑量下，nsclc 病人 partial 反應 為 36%（95% ci 22 to 51），中位數 無惡化存活期 8.3 個月；第二或三線 轉移性 pancreatic ductal adenocarcinoma 病人 反應 為 24%（95% ci 8 to 47），中位數 無惡化存活期 3.0 個月，中位數 整體存活期 10.3 個月。 藥師重點：研究結果顯示 setidegrasib 在先前治療過的 kras p.g12d-mutated nsclc 或 pancreatic ductal adenocarcinoma 具有早期抗腫瘤活性，且因不良事件停藥比例低；但資料仍屬 第 1 期，藥師需留意輸注反應、噁心、600 mg 每週 靜脈給藥與後續 第 2 期/3 確認資料。"},{"id":"pmid-41875914","kind":"article","issueId":"2026-week13","year":2026,"week":13,"weekLabel":"第 13 週","dateRange":"2026/03/23 – 03/29","href":"2026-week13.html","title":"Proton beam therapy for oropharyngeal cancer (TORPEdO): a phase 3, randomised controlled trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Thomson","doi":"10.1016/S0140-6736(26)00314-4","url":"https://doi.org/10.1016/S0140-6736(26)00314-4","summary":"藥師重點：研究結果說明 IMPT 未在本試驗中顯示較 IMRT 改善晚期身體生活品質、餵食管依賴、局部控制或存活；藥師在 cisplatin 合併放療照護時仍應聚焦腎功能、噁心嘔吐、聽力、神經毒性與營養支持監測。","pubDate":"2026-03-28","terms":["proton","beam","oropharyngeal","cancer","torpedo","phase","randomised","lancet","thomson","s0140-6736"],"drugTerms":["cisplatin"],"searchText":"proton beam therapy for oropharyngeal cancer (torpedo): a phase 3, randomised controlled trial lancet rct thomson 10.1016/s0140-6736(26)00314-4 研究背景：口咽鱗狀細胞癌接受放射治療後可能影響吞嚥、唾液、味覺與生活品質；impt 相較 imrt 是否能改善晚期功能與病人回報結果仍不確定。 研究方法：torpedo 為英國 20 家 nhs 醫院進行的 第 3 期 隨機對照試驗，將局部晚期 口咽鱗狀細胞癌 病人以 2:1 分配至 impt 或 imrt（70 gy in 33 fractions, 持續 6.5 週），並合併兩個療程 高劑量 cisplatin 100 mg/m2 每 3 週。共同主要終點為 12 個月 胃造口管依賴 或 重度 體重減輕，以及 uw-qol physical 複合 score。 主要結果：共 205 人隨機分組，impt 136 人、imrt 69 人。12 個月時 胃造口管依賴 皆約 2%，重度 體重減輕 為 18% vs 6%，combined 勝算比 2.80（97.5% ci 0.75 to 10.4；p=0.079）；uw-qol physical 複合 score 為 78.3 vs 77.1（差異 1.3，97.5% ci -3.7 to 6.2；p=0.56）。24-month freedom from loco-regional recurrence 與 整體存活期 亦相近，無 治療-related deaths。 藥師重點：研究結果說明 impt 未在本試驗中顯示較 imrt 改善晚期身體生活品質、餵食管依賴、局部控制或存活；藥師在 cisplatin 合併放療照護時仍應聚焦腎功能、噁心嘔吐、聽力、神經毒性與營養支持監測。"},{"id":"pmid-41876122","kind":"article","issueId":"2026-week13","year":2026,"week":13,"weekLabel":"第 13 週","dateRange":"2026/03/23 – 03/29","href":"2026-week13.html","title":"Home based, tailored intervention to reduce rate of falls after stroke (FAST): randomised trial","journal":"BMJ","type":"RCT","typeLabel":"RCT","author":"Clemson","doi":"10.1136/bmj-2025-085519","url":"https://doi.org/10.1136/bmj-2025-085519","summary":"藥師重點：研究結果說明中風後跌倒預防不只依賴藥物調整，也需要復健、職能治療與居家環境介入；藥師可在用藥評估時同步檢視鎮靜、降壓、低血糖或姿勢性低血壓相關藥物，並協助轉介跌倒風險管理。","pubDate":"2026-03-24","terms":["home","tailored","intervention","reduce","rate","falls","stroke","fast","randomised","clemson"],"drugTerms":[],"searchText":"home based, tailored intervention to reduce rate of falls after stroke (fast): randomised trial bmj rct clemson 10.1136/bmj-2025-085519 研究背景：中風後社區居住且可行走者仍有跌倒風險，居家多專業、個別化介入是否能降低跌倒率是本研究重點。 研究方法：此 two-arm 隨機試驗 於澳洲三州進行，納入中風 5 年內、50 歲以上、已由正式復健出院至社區且可行走 10 m 的病人。介入組接受 6 個月習慣養成功能性運動、居家跌倒危害改善與社區移動目標導向 coaching；對照組接受 常規照護，主要終點為 12 個月跌倒率。 主要結果：共 370 名中風病人納入；12 個月時介入組跌倒率較低，代表跌倒減少 33%（發生率比 0.67，95% ci 0.48 to 0.94；p=0.02）。曾發生跌倒的病人比例未見顯著差異（absolute risk reduction 0.03，95% ci -0.07 to 0.13；p=0.52），但社區參與、自我效能、步行速度與平衡表現較有利。 藥師重點：研究結果說明中風後跌倒預防不只依賴藥物調整，也需要復健、職能治療與居家環境介入；藥師可在用藥評估時同步檢視鎮靜、降壓、低血糖或姿勢性低血壓相關藥物，並協助轉介跌倒風險管理。"},{"id":"pmid-41903215","kind":"article","issueId":"2026-week13","year":2026,"week":13,"weekLabel":"第 13 週","dateRange":"2026/03/23 – 03/29","href":"2026-week13.html","title":"Evolocumab to Reduce First Major Cardiovascular Events in Patients Without Known Significant Atherosclerosis and With Diabetes: Results From the VESALIUS-CV Trial","journal":"JAMA","type":"RCT","typeLabel":"RCT","author":"Marston","doi":"10.1001/jama.2026.3277","url":"https://doi.org/10.1001/jama.2026.3277","summary":"藥師重點：研究結果說明 evolocumab 加於可耐受 statin 治療，可降低無已知重大動脈粥樣硬化且合併糖尿病高風險病人的首次 MACE；藥師應協助確認 LDL-C 基準、既有 statin 最適化程度、給藥頻率與成本可近性。","pubDate":"2026-04-28","terms":["evolocumab","reduce","first","major","cardiovascular","events","known","significant","atherosclerosis","diabetes"],"drugTerms":["evolocumab","statin"],"searchText":"evolocumab to reduce first major cardiovascular events in patients without known significant atherosclerosis and with diabetes: results from the vesalius-cv trial jama rct marston 10.1001/jama.2026.3277 研究背景：pcsk9 抑制劑 過去多用於已有明顯動脈粥樣硬化的高風險病人；對沒有已知重大動脈粥樣硬化但合併糖尿病者，evolocumab 是否能預防首次主要心血管事件仍需資料支持。 研究方法：vesalius-cv 為 隨機、雙盲、安慰劑對照 試驗，本次為預先指定 次族群 分析，分析無 prior myocardial infarction 或 stroke、ldl-c ≥90 mg/dl、無已知重大動脈粥樣硬化且皆有 diabetes 的 3655 名病人。受試者以 1:1 接受 evolocumab 140 mg 每 2 週 或 安慰劑，皆加於 optimally tolerated statin 治療；雙主要終點為 3-p mace 與 4-p mace。 主要結果：次族群 中 evolocumab 組 1849 人、安慰劑 組 1806 人，中位數 追蹤 4.8 years。48 週 ldl-c 中位數為 52 mg/dl vs 111 mg/dl（p<.001）；3-p mace 為 5.0% vs 7.1%（hr 0.69，95% ci 0.52-0.91；p=.009），4-p mace 為 7.6% vs 10.5%（hr 0.69，95% ci 0.55-0.86；p=.001），全因死亡為 7.8% vs 10.1%（hr 0.76，95% ci 0.61-0.95）。 藥師重點：研究結果說明 evolocumab 加於可耐受 statin 治療，可降低無已知重大動脈粥樣硬化且合併糖尿病高風險病人的首次 mace；藥師應協助確認 ldl-c 基準、既有 statin 最適化程度、給藥頻率與成本可近性。"},{"id":"pmid-41865758","kind":"article","issueId":"2026-week13","year":2026,"week":13,"weekLabel":"第 13 週","dateRange":"2026/03/23 – 03/29","href":"2026-week13.html","title":"Efficacy and safety of oral semaglutide 14 mg (flexible dose) in early-stage symptomatic Alzheimer's disease (evoke and evoke+): two phase 3, randomised, placebo-controlled trials","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Cummings","doi":"10.1016/S0140-6736(26)00459-9","url":"https://doi.org/10.1016/S0140-6736(26)00459-9","summary":"藥師重點：結論顯示 口服 semaglutide 未能延緩早期 Alzheimer 疾病 的臨床進展，安全性與耐受性大致符合其他適應症經驗；藥師不應將代謝疾病或觀察性失智風險訊號直接外推為 Alzheimer 疾病 治療效果。","pubDate":"2026-05-30","terms":["efficacy","oral","semaglutide","flexible","dose","early-stage","symptomatic","alzheimer","evoke","phase"],"drugTerms":["semaglutide","glp-1"],"searchText":"efficacy and safety of oral semaglutide 14 mg (flexible dose) in early-stage symptomatic alzheimer's disease (evoke and evoke+): two phase 3, randomised, placebo-controlled trials lancet rct cummings 10.1016/s0140-6736(26)00459-9 研究背景：glp-1 受體 致效劑 暴露曾在動物、臨床與真實世界資料中與較低失智或 alzheimer 疾病 風險相關，但 口服 semaglutide 對早期 alzheimer 疾病 臨床進展是否有效仍需大型試驗驗證。 研究方法：evoke 與 evoke+ 為 40 國 566 個中心進行的 多中心、隨機、雙盲、安慰劑對照 第 3 期試驗s，納入 55-85 歲、amyloid-confirmed alzheimer 疾病，且為 mild cognitive impairment 或 mild dementia 的病人。受試者以 1:1 接受 口服 semaglutide up to 14 mg 每日一次（flexible dose）或 安慰劑，最長 156 週；主要終點為第 104 週 cdr-sb 相對基準值變化。 主要結果：共 3808 人隨機分組；evoke 與 evoke+ 中，第 104 週 cdr-sb 平均變化為 semaglutide 2.3 與 2.2，安慰劑 2.3 與 2.1，estimated 差異 分別為 -0.08（95% ci -0.35 to 0.20；p=0.57）與 0.10（95% ci -0.17 to 0.38；p=0.46）。治療期間出現的不良事件 為 91.2% vs 84.8%，研究因 negative 臨床 結果指標 已停止。 藥師重點：結論顯示 口服 semaglutide 未能延緩早期 alzheimer 疾病 的臨床進展，安全性與耐受性大致符合其他適應症經驗；藥師不應將代謝疾病或觀察性失智風險訊號直接外推為 alzheimer 疾病 治療效果。"},{"id":"pmid-41880613","kind":"article","issueId":"2026-week13","year":2026,"week":13,"weekLabel":"第 13 週","dateRange":"2026/03/23 – 03/29","href":"2026-week13.html","title":"Early Surgery or Conservative Care for Asymptomatic Aortic Stenosis at 10 Years","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Kang","doi":"10.1056/NEJMoa2511920","url":"https://doi.org/10.1056/NEJMoa2511920","summary":"藥師重點：結論顯示無症狀 極重度主動脈瓣狹窄 病人早期手術可降低 10 年心血管死亡相關複合風險；藥師在圍手術期照護可協助釐清抗凝、抗血小板、心衰竭與血壓用藥調整，但治療決策仍需由心臟團隊依手術風險與病人偏好評估。","pubDate":"2026-03-26","terms":["early","surgery","conservative","asymptomatic","aortic","stenosis","years","nejm","kang","nejmoa2511920"],"drugTerms":[],"searchText":"early surgery or conservative care for asymptomatic aortic stenosis at 10 years nejm rct kang 10.1056/nejmoa2511920 研究背景：無症狀重度主動脈瓣狹窄是否應早期手術仍有爭議，先前分析顯示早期手術可能降低手術死亡或心血管死亡風險，但長期存活效益仍需追蹤。 研究方法：研究將無症狀 極重度主動脈瓣狹窄 病人以 1:1 隨機分配至 early surgery 或 conservative care。納入條件包含 aortic-valve area ≤0.75 cm2 且 peak aortic jet velocity ≥4.5 m/s；主要終點為 10 年追蹤期間 operative 死亡率 或 心血管 死亡 的複合終點。 主要結果：共 145 人隨機分組；意向治療分析 中，主要終點事件在 early-surgery 組為 2/73 人（3%），conservative-care 組為 17/72 人（24%）（hr 0.10，95% ci 0.02 to 0.43；p=0.002）。10 年 operative 死亡率 或 心血管 死亡 累積發生率為 1% vs 19%；全因死亡為 15% vs 32%（hr 0.42，95% ci 0.21 to 0.86）。 藥師重點：結論顯示無症狀 極重度主動脈瓣狹窄 病人早期手術可降低 10 年心血管死亡相關複合風險；藥師在圍手術期照護可協助釐清抗凝、抗血小板、心衰竭與血壓用藥調整，但治療決策仍需由心臟團隊依手術風險與病人偏好評估。"},{"id":"pmid-41880612","kind":"article","issueId":"2026-week13","year":2026,"week":13,"weekLabel":"第 13 週","dateRange":"2026/03/23 – 03/29","href":"2026-week13.html","title":"Atezolizumab plus FOLFOX for Stage III Mismatch Repair-Deficient Colon Cancer","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Sinicrope","doi":"10.1056/NEJMoa2507874","url":"https://doi.org/10.1056/NEJMoa2507874","summary":"藥師重點：結論顯示 atezolizumab 加入 mFOLFOX6 可改善已切除 stage III dMMR colon 癌症 的 無病存活期；藥師需留意免疫相關不良反應、化療毒性疊加、12 個月治療銜接與 dMMR 狀態確認。","pubDate":"2026-03-26","terms":["atezolizumab","plus","folfox","stage","mismatch","repair-deficient","colon","cancer","nejm","sinicrope"],"drugTerms":["atezolizumab","fluoropyrimidine-plus-oxaliplatin","anti-programmed","oxaliplatin"],"searchText":"atezolizumab plus folfox for stage iii mismatch repair-deficient colon cancer nejm rct sinicrope 10.1056/nejmoa2507874 研究背景：stage iii colon 癌症 的標準輔助治療為 fluoropyrimidine-加上-oxaliplatin 處方；對 dmmr 腫瘤，在 mfolfox6 加入 atezolizumab 是否能改善預後仍需驗證。 研究方法：此 第 3 期試驗 將已切除 stage iii dmmr colon 癌症 病人以 1:1 分配至 atezolizumab 加 mfolfox6 6 個月、之後 atezolizumab 單藥至總療程 12 個月，或 mfolfox6 單用 6 個月。主要終點為 無病存活期，次要終點包括 整體存活期 與 adverse-event profile。 主要結果：共有 355 人接受 atezolizumab 加 mfolfox6，357 人接受 mfolfox6；中位數 追蹤 40.9 個月 時，3-year 無病存活期 為 86.3%（95% ci 81.8 to 89.8）vs 76.2%（95% ci 70.9 to 80.6），疾病 recurrence or 死亡 的 hr 0.50（95% ci 0.35 to 0.73；p<0.001）。等級 3 or 4 不良事件 為 84.1% vs 71.9%。 藥師重點：結論顯示 atezolizumab 加入 mfolfox6 可改善已切除 stage iii dmmr colon 癌症 的 無病存活期；藥師需留意免疫相關不良反應、化療毒性疊加、12 個月治療銜接與 dmmr 狀態確認。"},{"id":"pmid-41879224","kind":"article","issueId":"2026-week13","year":2026,"week":13,"weekLabel":"第 13 週","dateRange":"2026/03/23 – 03/29","href":"2026-week13.html","title":"A Placebo-Controlled Trial of the Oral PCSK9 Inhibitor Enlicitide","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Navar","doi":"10.1056/NEJMoa2511002","url":"https://doi.org/10.1056/NEJMoa2511002","summary":"藥師重點：結論顯示 enlicitide 可在具動脈粥樣硬化心血管事件病史或高風險族群中明顯降低 LDL 膽固醇；藥師需留意這是 lipid-lowering 終點，臨床採用前仍需確認長期心血管事件資料、服藥順從性與既有降脂治療的銜接。","pubDate":"2026-02-05","terms":["placebo-controlled","oral","pcsk9","inhibitor","enlicitide","nejm","navar","nejmoa2511002","decanoate","intention-to-treat"],"drugTerms":[],"searchText":"a placebo-controlled trial of the oral pcsk9 inhibitor enlicitide nejm rct navar 10.1056/nejmoa2511002 研究背景：enlicitide decanoate 為口服 pcsk9 抑制劑，第 2 期 試驗已顯示可降低 ldl 膽固醇，但較長期療效與安全性仍需確認。 研究方法：此 多國、雙盲、隨機、安慰劑對照 試驗 納入曾有重大動脈粥樣硬化心血管事件且 ldl 膽固醇 ≥55 mg/dl，或有首次事件風險且 ldl 膽固醇 ≥70 mg/dl 的成人。受試者以 2:1 分配接受 enlicitide 20 mg 每日 或 安慰劑 52 週，主要終點為第 24 週 ldl 膽固醇 平均百分比變化。 主要結果：intention-to-treat 族群 共 2909 人；第 24 週 ldl 膽固醇 變化為 enlicitide -57.1%（95% ci -61.8 to -52.5）與 安慰劑 3.0%（95% ci 0.9 to 5.1），校正 between-group 差異 為 -55.8 百分點（95% ci -60.9 to -50.7；p<0.001）。第 52 週 ldl 膽固醇，以及第 24 週 non-hdl 膽固醇、apolipoprotein b 與 lipoprotein(a) 亦均較 安慰劑 改善，不良事件發生率未見明顯差異。 藥師重點：結論顯示 enlicitide 可在具動脈粥樣硬化心血管事件病史或高風險族群中明顯降低 ldl 膽固醇；藥師需留意這是 lipid-lowering 終點，臨床採用前仍需確認長期心血管事件資料、服藥順從性與既有降脂治療的銜接。"},{"id":"fda-2026-week13-1","kind":"fda","issueId":"2026-week13","year":2026,"week":13,"weekLabel":"第 13 週","dateRange":"2026/03/23 – 03/29","href":"2026-week13.html","title":"FDA’s Concerns with Unapproved GLP-1 Drugs Used for Weight Loss","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss","s evices that are optional for use with glatiramer acetate injection fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/403159"},{"id":"fda-2026-week13-4","kind":"fda","issueId":"2026-week13","year":2026,"week":13,"weekLabel":"第 13 週","dateRange":"2026/03/23 – 03/29","href":"2026-week13.html","title":"FDA Accepts First In Silico Drug Development Tool Under ISTAND Program to Help Predict Drug-Induced Liver Injury","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["accepts","first","silico","development","tool","under","istand","program","help","predict"],"drugTerms":[],"searchText":"fda accepts first in silico drug development tool under istand program to help predict drug-induced liver injury fda drug safety 2026-06-03 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver"},{"id":"pmid-41837962","kind":"article","issueId":"2026-week12","year":2026,"week":12,"weekLabel":"第 12 週","dateRange":"2026/03/16 – 03/22","href":"2026-week12.html","title":"Tumor Debulking in Combination With Chemotherapy in Multiorgan Metastatic Colorectal Cancer: The ORCHESTRA Randomized Clinical Trial","journal":"JAMA","type":"RCT","typeLabel":"RCT","author":"Gootjes","doi":"10.1001/jama.2026.1929","url":"https://doi.org/10.1001/jama.2026.1929","summary":"藥師重點：結論顯示在可行大幅 腫瘤減積 的 multiorgan mCRC 族群中，加上局部減積治療未改善 整體存活期，且 嚴重不良事件 較高；治療討論仍應以全身治療效益、手術風險與化療中斷影響為核心。","pubDate":"2026-04-21","terms":["tumor","debulking","combination","chemotherapy","multiorgan","metastatic","colorectal","cancer","orchestra","jama"],"drugTerms":["oxaliplatin","bevacizumab"],"searchText":"tumor debulking in combination with chemotherapy in multiorgan metastatic colorectal cancer: the orchestra randomized clinical trial jama rct gootjes 10.1001/jama.2026.1929 研究背景：多器官轉移性大腸直腸癌（mcrc）病人愈來愈常使用手術、放射治療或消融等局部治療，但 腫瘤減積 是否能在全身治療外帶來存活效益仍缺乏前瞻性證據。 研究方法：orchestra 為 investigator-initiated、開放標籤、多中心 隨機臨床試驗，於荷蘭 27 家醫院與英國 1 家醫院納入 multiorgan mcrc 成人。病人需在第一線緩和性化療後達到 objective 反應 或 stable 疾病，且評估可完成超過 80% 腫瘤減積，隨機接受 chemotherapy 單用 或 腫瘤減積 後續接 chemotherapy；主要終點為 整體存活期。 主要結果：382 名病人隨機分組，追蹤中位數 32.3 個月後，chemotherapy 單用 組與 化療加上 腫瘤減積 組 中位數 整體存活期 為 27.5 vs 30.0 個月（校正 hr 0.88，95% ci 0.70-1.10；p=0.26）。中位數 無惡化存活期 為 10.4 vs 10.5 個月（校正 hr 0.83，95% ci 0.67-1.02；p=0.08），嚴重不良事件 較常見於 腫瘤減積 組（53% vs 39%；p=0.006）。 藥師重點：結論顯示在可行大幅 腫瘤減積 的 multiorgan mcrc 族群中，加上局部減積治療未改善 整體存活期，且 嚴重不良事件 較高；治療討論仍應以全身治療效益、手術風險與化療中斷影響為核心。"},{"id":"pmid-41864749","kind":"article","issueId":"2026-week12","year":2026,"week":12,"weekLabel":"第 12 週","dateRange":"2026/03/16 – 03/22","href":"2026-week12.html","title":"Survival outcome of VATS compared with open lobectomy for lung cancer: an individual patient data meta-analysis of randomised trials","journal":"Lancet","type":"MA","typeLabel":"Meta-analysis","author":"Harris","doi":"10.1016/S0140-6736(26)00031-0","url":"https://doi.org/10.1016/S0140-6736(26)00031-0","summary":"藥師重點：研究結果支持技術可行時 VATS lobectomy 可能在早期 non-small-cell lung 癌症 提供存活優勢且未犧牲 無病存活期；解讀時仍需留意僅納入 3 項試驗，並回到手術可行性與圍手術期用藥管理。","pubDate":"2026-03-21","terms":["survival","vats","open","lobectomy","lung","cancer","individual","meta-analysis","randomised","trials"],"drugTerms":[],"searchText":"survival outcome of vats compared with open lobectomy for lung cancer: an individual patient data meta-analysis of randomised trials lancet meta-analysis harris 10.1016/s0140-6736(26)00031-0 研究背景：vats lobectomy 已廣泛用於早期肺癌，主要優勢多來自疼痛、併發症與恢復速度等非腫瘤結果；其相較 open lobectomy 的存活影響仍需整合隨機試驗資料。 研究方法：此 individual patient 資料 統合分析 系統性搜尋 2000 年 1 月 1 日至 2025 年 6 月 13 日發表、比較 vats 與 open lobectomy 的隨機試驗，納入 18 歲以上 臨床 early-stage non-small-cell lung 癌症 且有死亡與復發資料者。主要終點為 整體存活期，次要終點為 無病存活期，分析使用 random effects cox proportional hazards model。 主要結果：554 篇文獻中 3 項研究符合納入條件，共 1185 名病人（vats 586 人、open lobectomy 599 人）。整體存活期 較有利於 vats lobectomy（pooled hr 0·79，95% ci 0·65-0·96），相當於死亡風險降低 21%；無病存活期 兩組相近（pooled hr 0·91，95% ci 0·75-1·12），且未見統計異質性。 藥師重點：研究結果支持技術可行時 vats lobectomy 可能在早期 non-small-cell lung 癌症 提供存活優勢且未犧牲 無病存活期；解讀時仍需留意僅納入 3 項試驗，並回到手術可行性與圍手術期用藥管理。"},{"id":"pmid-41841304","kind":"article","issueId":"2026-week12","year":2026,"week":12,"weekLabel":"第 12 週","dateRange":"2026/03/16 – 03/22","href":"2026-week12.html","title":"Restrictive vs Liberal Physical Restraint Strategies in Critically Ill Patients: The R2D2-ICU Randomized Clinical Trial","journal":"JAMA","type":"RCT","typeLabel":"RCT","author":"Sonneville","doi":"10.1001/jama.2026.2897","url":"https://doi.org/10.1001/jama.2026.2897","summary":"藥師重點：研究結果說明低使用腕部約束策略未改善 14 天無譫妄或昏迷天數，也未明顯增加自拔管；藥師參與 ICU 照護時仍應聚焦鎮靜、止痛、譫妄風險與非藥物安全措施的整體評估。","pubDate":"2026-04-14","terms":["restrictive","liberal","physical","restraint","strategies","critically","r2d2-icu","jama","sonneville","rass"],"drugTerms":[],"searchText":"restrictive vs liberal physical restraint strategies in critically ill patients: the r2d2-icu randomized clinical trial jama rct sonneville 10.1001/jama.2026.2897 研究背景：icu 中接受侵入性機械通氣的病人常因安全考量使用腕部身體約束，但其對譫妄、昏迷與自拔管等結果的影響仍不明確。 研究方法：r2d2-icu 為法國 10 個 icu 的 開放標籤 隨機臨床試驗，納入 405 名開始侵入性機械通氣 6 小時內且預期需通氣至少 48 小時的成人。受試者分配至低使用約束策略，僅在 rass ≥3 嚴重躁動且必要時使用腕帶，或高使用策略，系統性使用腕帶並每日重新評估；主要終點為隨機後 14 天內存活且無昏迷或譫妄天數。 主要結果：396 名病人有主要終點資料，低使用與高使用策略組平均存活且無昏迷或譫妄天數為 6.67 vs 6.30 天（校正 平均差 0.37 天，95% ci -0.71 to 1.46；p=0.51）。自拔管為 9.2% vs 8.5%，day-90 死亡率 為 37.2% vs 41.0%。 藥師重點：研究結果說明低使用腕部約束策略未改善 14 天無譫妄或昏迷天數，也未明顯增加自拔管；藥師參與 icu 照護時仍應聚焦鎮靜、止痛、譫妄風險與非藥物安全措施的整體評估。"},{"id":"pmid-41839514","kind":"article","issueId":"2026-week12","year":2026,"week":12,"weekLabel":"第 12 週","dateRange":"2026/03/16 – 03/22","href":"2026-week12.html","title":"Pyrotinib or placebo in combination with trastuzumab and docetaxel for HER2 positive metastatic breast cancer: long term survival results from randomised phase 3 PHILA trial","journal":"BMJ","type":"RCT","typeLabel":"RCT","author":"Ma","doi":"10.1136/bmj-2025-087259","url":"https://doi.org/10.1136/bmj-2025-087259","summary":"藥師重點：結論顯示 pyrotinib 合併 trastuzumab 與 docetaxel 可延長 untreated HER2 陽性 轉移性 breast 癌症 的 無惡化存活期 並改善 整體存活期；藥師需留意口服標靶藥順從性、docetaxel 停用後治療銜接與不良事件追蹤。","pubDate":"2026-03-16","terms":["pyrotinib","placebo","combination","trastuzumab","docetaxel","her2","positive","metastatic","breast","cancer"],"drugTerms":["pyrotinib","trastuzumab","docetaxel","anti-her2"],"searchText":"pyrotinib or placebo in combination with trastuzumab and docetaxel for her2 positive metastatic breast cancer: long term survival results from randomised phase 3 phila trial bmj rct ma 10.1136/bmj-2025-087259 研究背景：her2 陽性 轉移性 breast 癌症 第一線治療仍需兼顧疾病控制與長期存活，phila 試驗 更新分析評估 pyrotinib 加 trastuzumab 與 docetaxel 的長期療效與安全性。 研究方法：此中國 40 個中心、雙盲、隨機、安慰劑對照 第 3 期試驗 納入 590 名未治療 her2 陽性 轉移性 breast 癌症 女性，隨機接受 pyrotinib 400 mg orally 每日一次 或 安慰劑，兩組皆合併 trastuzumab 與 docetaxel，每 21 天為一療程；主要終點為 investigator-assessed 無惡化存活期。 主要結果：追蹤中位數約 35 個月時，pyrotinib 組死亡比例低於 安慰劑 組（20% vs 30%），整體存活期 較佳（hr 0.64，95% ci 0.46 to 0.89；nominal one-sided p=0.004），兩組 中位數 整體存活期 皆尚未達到。無惡化存活期 效益維持（22.1 vs 10.5 個月；hr 0.44，95% ci 0.36 to 0.53；nominal one-sided p<0.001），安全性型態與期中分析一致。 藥師重點：結論顯示 pyrotinib 合併 trastuzumab 與 docetaxel 可延長 untreated her2 陽性 轉移性 breast 癌症 的 無惡化存活期 並改善 整體存活期；藥師需留意口服標靶藥順從性、docetaxel 停用後治療銜接與不良事件追蹤。"},{"id":"pmid-41864748","kind":"article","issueId":"2026-week12","year":2026,"week":12,"weekLabel":"第 12 週","dateRange":"2026/03/16 – 03/22","href":"2026-week12.html","title":"Prevention of urinary stones with hydration: a randomised clinical trial of an adherence intervention","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Desai","doi":"10.1016/S0140-6736(25)02637-6","url":"https://doi.org/10.1016/S0140-6736(25)02637-6","summary":"藥師重點：研究結果說明促進飲水的行為介入可小幅增加尿量，但未降低 2 年內結石復發；藥師衛教時可強調飲水目標、順從性與泌尿症狀，同時避免把尿量改善直接等同於復發風險下降。","pubDate":"2026-03-21","terms":["prevention","urinary","stones","hydration","randomised","adherence","intervention","lancet","desai","s0140-6736"],"drugTerms":[],"searchText":"prevention of urinary stones with hydration: a randomised clinical trial of an adherence intervention lancet rct desai 10.1016/s0140-6736(25)02637-6 研究背景：增加水分攝取常被建議用於降低尿路結石復發，但長期維持足夠飲水量並不容易，行為介入是否能減少症狀性復發仍缺乏明確證據。 研究方法：此美國 6 個學術醫學中心 隨機臨床試驗 納入 12 歲以上、有尿路結石病史且 24 h urine volume 偏低者，隨機接受多元行為介入或 guideline-concordant care。介入包含 fluid prescription、財務誘因、健康 coaching 與簡訊等病人自選提醒，主要終點為 2 年內症狀性結石復發。 主要結果：共 1658 人隨機分組，追蹤中位數 738 天時，介入組與對照組症狀性結石事件為 19% vs 20%（hr 0·96，95% ci 0·77-1·20）。介入組 24 h urine volume 較高，但結石新增或增大、複合終點皆未見差異；未發生需住院的 hyponatremia，無症狀 hyponatraemia 為 1% vs <1%。 藥師重點：研究結果說明促進飲水的行為介入可小幅增加尿量，但未降低 2 年內結石復發；藥師衛教時可強調飲水目標、順從性與泌尿症狀，同時避免把尿量改善直接等同於復發風險下降。"},{"id":"pmid-41841706","kind":"article","issueId":"2026-week12","year":2026,"week":12,"weekLabel":"第 12 週","dateRange":"2026/03/16 – 03/22","href":"2026-week12.html","title":"Prehospital Whole Blood in Traumatic Hemorrhage - A Randomized Controlled Trial","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Smith","doi":"10.1056/NEJMoa2516043","url":"https://doi.org/10.1056/NEJMoa2516043","summary":"藥師重點：結論顯示到院前輸注 2 units whole blood 未優於標準血液成分治療以降低 24 小時死亡或 massive transfusion；輸血流程規劃仍需兼顧血品可近性、凝血監測與創傷團隊後續大量輸血策略。","pubDate":"2026-06-18","terms":["prehospital","whole","blood","traumatic","hemorrhage","nejm","smith","nejmoa2516043","ambulance","services"],"drugTerms":[],"searchText":"prehospital whole blood in traumatic hemorrhage - a randomized controlled trial nejm rct smith 10.1056/nejmoa2516043 研究背景：嚴重創傷出血的到院前輸血策略近年重新關注 全血輸血，但其相較紅血球與血漿成分治療的臨床效益與安全性仍缺乏大型試驗資料。 研究方法：此英格蘭 10 個 air ambulance services 進行的 實務型、第 3 期、多中心、unblinded、隨機 優越性試驗，納入重大創傷出血病人。受試者在到院前隨機接受 全血輸血 up to 2 units，或 標準照護 with blood components（red cells 與 plasma 各 up to 2 units）；主要終點為隨機後 24 小時內全因死亡或 massive transfusion。 主要結果：942 人隨機分組，排除非創傷出血或創傷性心跳停止後，616 人納入分析。主要終點事件為 48.7% vs 47.7%（rr 1.02，95% ci 0.80 to 1.31；p=0.84），各時間點死亡、massive transfusion 與其他次要終點大致相近；prothrombin time 高於正常範圍為 40.7% vs 30.5%，thrombotic 事件 相近。 藥師重點：結論顯示到院前輸注 2 units whole blood 未優於標準血液成分治療以降低 24 小時死亡或 massive transfusion；輸血流程規劃仍需兼顧血品可近性、凝血監測與創傷團隊後續大量輸血策略。"},{"id":"pmid-41865411","kind":"article","issueId":"2026-week12","year":2026,"week":12,"weekLabel":"第 12 週","dateRange":"2026/03/16 – 03/22","href":"2026-week12.html","title":"National Estimates of Pediatric Sepsis in US Hospitals Using Clinical Data","journal":"JAMA","type":"OA","typeLabel":"Original Article","author":"Rhee","doi":"10.1001/jama.2026.3100","url":"https://doi.org/10.1001/jama.2026.3100","summary":"藥師重點：結論顯示 EHR-based PSE definition 可作為兒童敗血症監測工具，並凸顯兒童 sepsis 仍有約 10% 院內死亡率；藥師可將其作為抗感染 stewardship 與 sepsis protocol 規劃背景，但不應取代個別病人的臨床診斷。","pubDate":"2026-04-21","terms":["national","estimates","pediatric","sepsis","hospitals","jama","rhee","morbidity","event","epic"],"drugTerms":[],"searchText":"national estimates of pediatric sepsis in us hospitals using clinical data jama original article rhee 10.1001/jama.2026.3100 研究背景：兒童敗血症會造成顯著 morbidity 與 死亡率，但以行政編碼進行族群監測的準確性有限；本研究評估以 ehr 臨床資料建立的 pediatric sepsis event（pse）定義。 研究方法：此 回溯性世代研究 使用兩個 ehr 資料庫，共 3.9 百萬 筆 >30 天至 17 歲住院資料，包含 epic cosmos（245 健康 care systems，2016-2023）與 hca healthcare（146 hospitals，2018-2023）。pse 定義為疑似感染合併 phoenix-derived organ 功能障礙 threshold，septic shock 則為 pse 合併 心血管 功能障礙，並以 581 筆高風險病歷審查驗證。 主要結果：2016 至 2023 年 3,925,809 筆兒科住院中，pse 辨識出 51,542 例 sepsis（incidence 1.3%），其中 72.6% 為 community onset，61.6% 有 septic shock；院內死亡率為 10.1%，死亡住院中 17.8% 有 sepsis。pse 對 physician-adjudicated phoenix sepsis 的 sensitivity 為 69.9%（95% ci 58.1%-79.8%），specificity 為 93.1%（95% ci 89.6%-95.7%）；2022 年全美估計 18,231 例與 1877 死亡。 藥師重點：結論顯示 ehr-based pse definition 可作為兒童敗血症監測工具，並凸顯兒童 sepsis 仍有約 10% 院內死亡率；藥師可將其作為抗感染 stewardship 與 sepsis protocol 規劃背景，但不應取代個別病人的臨床診斷。"},{"id":"pmid-41849741","kind":"article","issueId":"2026-week12","year":2026,"week":12,"weekLabel":"第 12 週","dateRange":"2026/03/16 – 03/22","href":"2026-week12.html","title":"Left Atrial Appendage Closure or Medical Therapy in Atrial Fibrillation","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Landmesser","doi":"10.1056/NEJMoa2513310","url":"https://doi.org/10.1056/NEJMoa2513310","summary":"藥師重點：結論顯示在高中風與高出血風險心房顫動患者中，左心耳封堵 未證實不劣於 physician-directed best 醫療照護；藥師評估時仍需重視 DOAC 適用性、出血風險、順從性與裝置治療後的抗血栓銜接。","pubDate":"2026-04-02","terms":["left","atrial","appendage","closure","fibrillation","nejm","landmesser","nejmoa2513310","physician-directed","best"],"drugTerms":[],"searchText":"left atrial appendage closure or medical therapy in atrial fibrillation nejm rct landmesser 10.1056/nejmoa2513310 研究背景：心房顫動且同時具有高中風與高出血風險的患者，左心耳封堵 常被視為口服抗凝血治療替代方案，但相較 physician-directed best 醫療照護 的效果仍不確定。 研究方法：此德國多中心 隨機試驗 納入 912 名高風險心房顫動成人，分配接受 左心耳封堵 或 physician-directed best 醫療照護，後者包含符合條件者使用 direct 口服 anticoagulants。主要終點以 不劣性 檢定，為中風、systemic embolism、重大出血、心血管或原因不明死亡的複合終點，不劣性 margin 為 hr 1.3。 主要結果：主要分析納入 device 組 446 人與 medical-治療 組 442 人，平均年齡 77.9 歲，平均 cha2ds2-vasc score 5.2、has-bled score 3.0。追蹤中位數 3 年後，主要終點事件率為 16.8 vs 13.3 per 100 patient-years，restricted 平均值 存活期 time 差異為 -0.36 years（95% ci -0.70 to -0.01；p=0.44 for 不劣性）；嚴重不良事件 為 82.5% vs 77.4%。 藥師重點：結論顯示在高中風與高出血風險心房顫動患者中，左心耳封堵 未證實不劣於 physician-directed best 醫療照護；藥師評估時仍需重視 doac 適用性、出血風險、順從性與裝置治療後的抗血栓銜接。"},{"id":"pmid-41841715","kind":"article","issueId":"2026-week12","year":2026,"week":12,"weekLabel":"第 12 週","dateRange":"2026/03/16 – 03/22","href":"2026-week12.html","title":"High-Flow or Standard Oxygen in Acute Hypoxemic Respiratory Failure","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Frat","doi":"10.1056/NEJMoa2516087","url":"https://doi.org/10.1056/NEJMoa2516087","summary":"藥師重點：結論顯示 高流量鼻導管 未降低急性低血氧性呼吸衰竭病人的 28 天死亡率，雖有較低插管率訊號；臨床照護仍需密切評估呼吸惡化、升階治療時機與相關併發症。","pubDate":"2026-06-04","terms":["high-flow","standard","oxygen","acute","hypoxemic","respiratory","failure","nejm","frat","nejmoa2516087"],"drugTerms":[],"searchText":"high-flow or standard oxygen in acute hypoxemic respiratory failure nejm rct frat 10.1056/nejmoa2516087 研究背景：急性低血氧性呼吸衰竭病人常使用 高流量鼻導管，但相較標準氧氣治療，其對插管與死亡的影響仍需大型隨機試驗確認。 研究方法：此 多中心、開放標籤試驗 將急性低血氧性呼吸衰竭病人隨機分配至 high-flow-oxygen 或 standard-oxygen 治療。納入條件包括 pao2/fio2 ≤200、呼吸速率 >25 breaths per minute，且胸部影像有肺部浸潤；主要終點為 第 28 天 死亡。 主要結果：1110 名病人納入分析，第 28 天 死亡率 在 high-flow-oxygen 組與 standard-oxygen 組皆為 14.6%（差異 -0.05 百分點，95% ci -4.21 to 4.10；p=0.98）。第 28 天 插管率為 42.4% vs 48.4%（差異 -5.93 百分點，95% ci -11.78 to -0.08）；自發呼吸期間 嚴重不良事件 為 2.3% vs 1.1%。 藥師重點：結論顯示 高流量鼻導管 未降低急性低血氧性呼吸衰竭病人的 28 天死亡率，雖有較低插管率訊號；臨床照護仍需密切評估呼吸惡化、升階治療時機與相關併發症。"},{"id":"pmid-41862204","kind":"article","issueId":"2026-week12","year":2026,"week":12,"weekLabel":"第 12 週","dateRange":"2026/03/16 – 03/22","href":"2026-week12.html","title":"Effect of a clinical decision support system on stroke care quality and outcomes in patients with acute ischaemic stroke (GOLDEN BRIDGE II): cluster randomised clinical trial","journal":"BMJ","type":"RCT","typeLabel":"RCT","author":"Zhang","doi":"10.1136/bmj-2025-085810","url":"https://doi.org/10.1136/bmj-2025-085810","summary":"藥師重點：結論顯示 stroke CDSS 可改善急性缺血性中風照護品質並降低血管事件；藥師可將其視為流程輔助工具，仍需逐案確認抗血栓、降脂與出血風險等用藥決策。","pubDate":"2026-03-20","terms":["decision","support","system","stroke","quality","acute","ischaemic","golden","bridge","cluster"],"drugTerms":[],"searchText":"effect of a clinical decision support system on stroke care quality and outcomes in patients with acute ischaemic stroke (golden bridge ii): cluster randomised clinical trial bmj rct zhang 10.1136/bmj-2025-085810 研究背景：急性缺血性中風照護需快速完成影像判讀、病因分類與證據導向治療，臨床 decision support system（cdss）是否能改善照護品質與臨床事件仍需大型試驗驗證。 研究方法：golden bridge ii 為中國 77 家醫院的 多中心 群集隨機試驗，納入發病 7 天內住院的 21,603 名急性缺血性中風患者。介入醫院使用 stroke cdss，包括 ai 輔助影像分析、中風病因分類與 evidence-based 治療 recommendations；對照組為 常規照護，主要終點為 3 個月內新發血管事件。 主要結果：3 個月新發血管事件於 cdss 組與對照組分別為 2.9% vs 3.9%（校正 hr 0.74，95% ci 0.58 to 0.93；p=0.01）。cdss 組 evidence-based performance 複合 measure 較高（校正 or 1.21，95% ci 1.17 to 1.26；p<0.001），12 個月新發血管事件亦較低（4.0% vs 5.5%；校正 hr 0.73，95% ci 0.56 to 0.95；p=0.02），失能、全因死亡與出血未見顯著差異。 藥師重點：結論顯示 stroke cdss 可改善急性缺血性中風照護品質並降低血管事件；藥師可將其視為流程輔助工具，仍需逐案確認抗血栓、降脂與出血風險等用藥決策。"},{"id":"pmid-41864747","kind":"article","issueId":"2026-week12","year":2026,"week":12,"weekLabel":"第 12 週","dateRange":"2026/03/16 – 03/22","href":"2026-week12.html","title":"Angiography-derived fractional flow reserve versus coronary angiography to guide coronary artery bypass grafting in patients undergoing surgical valve procedures with concomitant coronary artery disease in China (FAVOR IV-QVAS): a multicentre, triple-blind, randomised trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Zhu","doi":"10.1016/S0140-6736(25)02418-3","url":"https://doi.org/10.1016/S0140-6736(25)02418-3","summary":"藥師重點：結論顯示瓣膜手術合併冠狀動脈疾病患者中，以 angiography-derived FFR 指引的選擇性 CABG 可降低圍手術期複合事件；藥師在術前後照護可留意抗血栓策略、腎功能與血流動力學風險，並避免將結果外推至未接受瓣膜手術族群。","pubDate":"2026-03-21","terms":["angiography-derived","fractional","flow","reserve","coronary","angiography","guide","artery","bypass","grafting"],"drugTerms":[],"searchText":"angiography-derived fractional flow reserve versus coronary angiography to guide coronary artery bypass grafting in patients undergoing surgical valve procedures with concomitant coronary artery disease in china (favor iv-qvas): a multicentre, triple-blind, randomised trial lancet rct zhu 10.1016/s0140-6736(25)02418-3 研究背景：接受瓣膜手術且合併冠狀動脈疾病的患者，cabg 傳統上依冠狀動脈攝影狹窄程度決定；angiography-derived ffr 是否能協助選擇需要繞道的病灶，是 favor iv-qvas 的研究重點。 研究方法：favor iv-qvas 為中國 12 家三級醫院進行的 investigator-initiated、多中心、隨機、triple-blind 試驗，納入預計接受瓣膜手術且至少一條主要冠狀動脈有臨床重要狹窄的成人。受試者分配至 physiologically guided cabg（angiography-derived ffr ≤0·80 才繞道）或 anatomically guided cabg（冠狀動脈攝影狹窄直徑 ≥50% 才繞道），主要終點為術後 30 天複合不良事件。 主要結果：共 793 人納入，angiography-derived ffr 組與 冠狀動脈 angiography 組實際接受 concomitant cabg 比例為 56% vs 98%。30 天主要複合終點為 7·8% vs 13·4%（absolute 差異 -5·6 百分點，95% ci -9·9 to -1·3；rr 0·58，95% ci 0·38 to 0·89；p=0·011）；追蹤中位數 27 個月時，關鍵次要複合終點為 20·7% vs 26·8%（hr 0·74，95% ci 0·55-0·98；p=0·036）。 藥師重點：結論顯示瓣膜手術合併冠狀動脈疾病患者中，以 angiography-derived ffr 指引的選擇性 cabg 可降低圍手術期複合事件；藥師在術前後照護可留意抗血栓策略、腎功能與血流動力學風險，並避免將結果外推至未接受瓣膜手術族群。"},{"id":"pmid-41856526","kind":"article","issueId":"2026-week12","year":2026,"week":12,"weekLabel":"第 12 週","dateRange":"2026/03/16 – 03/22","href":"2026-week12.html","title":"Accuracy of glomerular filtration rate estimation based on creatinine and cystatin C for monitoring moderate chronic kidney disease in adults: prospective, longitudinal cohort study","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"Scandrett","doi":"10.1136/bmj-2025-085005","url":"https://doi.org/10.1136/bmj-2025-085005","summary":"藥師重點：結論顯示 creatinine 合併 cystatin C 的公式較能追蹤中度慢性腎臟病 GFR 變化，但對疾病進展的敏感度仍不足；藥師進行腎功能劑量調整時，宜結合趨勢、臨床狀態與必要時的進一步檢測。","pubDate":"2026-03-19","terms":["accuracy","glomerular","filtration","rate","estimation","creatinine","cystatin","monitoring","moderate","chronic"],"drugTerms":["cystatin","ckd-epicreatinine-cystatin","creatinine-cystatin","ekfccreatinine-cystatin"],"searchText":"accuracy of glomerular filtration rate estimation based on creatinine and cystatin c for monitoring moderate chronic kidney disease in adults: prospective, longitudinal cohort study bmj original article scandrett 10.1136/bmj-2025-085005 研究背景：中度慢性腎臟病病人的腎功能追蹤常依賴 estimated gfr，但 creatinine 與 cystatin c 合併估算是否比單一 biomarker 更能反映 gfr 變化仍需長期資料。 研究方法：此英格蘭 6 個中心 prospective longitudinal 世代研究 納入 1229 名成人，條件為 creatinine estimated gfr 30-59 ml/min/1.73 m2 且持續至少 3 個月。研究比較 ckd-epi 與 ekfc 等 gfr estimating equations 在 3 年內追蹤 measured gfr（iohexol clearance）變化與偵測腎病進展的準確性。 主要結果：875 名受試者有完整起始與 3 年資料，中位數 measured gfr 由 48.1 降至 43.6 ml/min/1.73 m2。所有公式皆低估 measured gfr 下降幅度；dual biomarker equations 與 measured gfr 變化的一致性較好（ckd-epicreatinine-cystatin 78.6%、ckd-epi(2021)creatinine-cystatin 78.1%、ekfccreatinine-cystatin 80.2%），優於 ckd-epicreatinine 73.1%（all p<0.001）。所有公式偵測腎病進展的 sensitivity 皆 <54.1%，specificity 皆 >90.4%。 藥師重點：結論顯示 creatinine 合併 cystatin c 的公式較能追蹤中度慢性腎臟病 gfr 變化，但對疾病進展的敏感度仍不足；藥師進行腎功能劑量調整時，宜結合趨勢、臨床狀態與必要時的進一步檢測。"},{"id":"fda-2026-week12-1","kind":"fda","issueId":"2026-week12","year":2026,"week":12,"weekLabel":"第 12 週","dateRange":"2026/03/16 – 03/22","href":"2026-week12.html","title":"FDA’s Concerns with Unapproved GLP-1 Drugs Used for Weight Loss","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["concerns","unapproved","glp-1","drugs","used","weight","loss","https","drug-alerts-and-statements","fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"],"drugTerms":["glp-1"],"searchText":"fda’s concerns with unapproved glp-1 drugs used for weight loss fda drug safety 2026-06-15 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"},{"id":"fda-2026-week12-3","kind":"fda","issueId":"2026-week12","year":2026,"week":12,"weekLabel":"第 12 週","dateRange":"2026/03/16 – 03/22","href":"2026-week12.html","title":"FDA issues final decision to withdraw approval of Pepaxto (melphalan flufenamide)","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/398713","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["issues","final","decision","withdraw","approval","pepaxto","melphalan","flufenamide","https","node"],"drugTerms":[],"searchText":"fda issues final decision to withdraw approval of pepaxto (melphalan flufenamide) fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/398713"},{"id":"fda-2026-week12-2","kind":"fda","issueId":"2026-week12","year":2026,"week":12,"weekLabel":"第 12 週","dateRange":"2026/03/16 – 03/22","href":"2026-week12.html","title":"FDA alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/403159","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["alerts","caregivers","providers","cross-compatibility","issues","autoinjector","devices","that","optional","glatiramer"],"drugTerms":[],"searchText":"fda alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/403159"},{"id":"fda-2026-week12-4","kind":"fda","issueId":"2026-week12","year":2026,"week":12,"weekLabel":"第 12 週","dateRange":"2026/03/16 – 03/22","href":"2026-week12.html","title":"FDA Accepts First In Silico Drug Development Tool Under ISTAND Program to Help Predict Drug-Induced Liver Injury","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["accepts","first","silico","development","tool","under","istand","program","help","predict"],"drugTerms":[],"searchText":"fda accepts first in silico drug development tool under istand program to help predict drug-induced liver injury fda drug safety 2026-06-03 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver"},{"id":"pmid-41812193","kind":"article","issueId":"2026-week11","year":2026,"week":11,"weekLabel":"第 11 週","dateRange":"2026/03/09 – 03/15","href":"2026-week11.html","title":"Romiplostim versus Placebo for Chemotherapy-Induced Thrombocytopenia","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Al-Samkari","doi":"10.1056/NEJMoa2511882","url":"https://doi.org/10.1056/NEJMoa2511882","summary":"藥師重點：結論顯示 romiplostim 可提高持續 CIT 病人維持化療劑量的機會；藥師需留意血栓栓塞風險、化療相關高等級不良事件，以及此結果主要來自接受 oxaliplatin-based 治療的胃腸道癌症族群。","pubDate":"2026-03-12","terms":["romiplostim","placebo","chemotherapy-induced","thrombocytopenia","nejm","al-samkari","nejmoa2511882","recite","oxaliplatin-based"],"drugTerms":[],"searchText":"romiplostim versus placebo for chemotherapy-induced thrombocytopenia nejm rct al-samkari 10.1056/nejmoa2511882 研究背景：化療誘發血小板低下（cit）會增加出血風險，並可能造成化療劑量降低或延後；目前臨床上仍缺乏廣泛可用且核准的治療選項。 研究方法：recite 為 第 3 期、國際多中心、雙盲、隨機、安慰劑對照試驗，納入接受 oxaliplatin-based 多藥細胞毒性化療且持續 cit 的胃腸道癌症病人。165 名病人以 2:1 分配接受 romiplostim 或 安慰劑 三個化療週期，主要終點為第 2 與第 3 週期均未因 cit 調整化療劑量。 主要結果：未因 cit 調整化療劑量的比例為 romiplostim 組 84%（92/109）對 安慰劑 組 36%（20/56），or 10.16（95% ci 4.44-23.72；p<0.001），rr 2.77（95% ci 1.78-4.30；p<0.001）。等級 3 以上不良事件為 37% 對 22%，血栓栓塞事件為 2% 對 0%。 藥師重點：結論顯示 romiplostim 可提高持續 cit 病人維持化療劑量的機會；藥師需留意血栓栓塞風險、化療相關高等級不良事件，以及此結果主要來自接受 oxaliplatin-based 治療的胃腸道癌症族群。"},{"id":"pmid-41796601","kind":"article","issueId":"2026-week11","year":2026,"week":11,"weekLabel":"第 11 週","dateRange":"2026/03/09 – 03/15","href":"2026-week11.html","title":"Pimicotinib versus placebo for tenosynovial giant cell tumour (MANEUVER): an international, randomised, placebo-controlled, phase 3 trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Xu","doi":"10.1016/S0140-6736(25)02602-9","url":"https://doi.org/10.1016/S0140-6736(25)02602-9","summary":"藥師重點：結論顯示 pimicotinib 在不可切除、有症狀 TGCT 可提高腫瘤反應率並改善症狀負擔；藥師需留意皮膚與水腫相關不良反應、creatine phosphokinase 監測，以及長期治療安全性仍需後續資料支持。","pubDate":"2026-03-14","terms":["pimicotinib","placebo","tenosynovial","giant","cell","tumour","maneuver","international","randomised","placebo-controlled"],"drugTerms":["pimicotinib"],"searchText":"pimicotinib versus placebo for tenosynovial giant cell tumour (maneuver): an international, randomised, placebo-controlled, phase 3 trial lancet rct xu 10.1016/s0140-6736(25)02602-9 研究背景：腱鞘巨細胞瘤（tgct）為罕見且具局部侵襲性的腫瘤，部分病人無法手術且有症狀，目前全身性治療選項有限。pimicotinib 為選擇性 colony-stimulating factor-1 受體 抑制劑，本研究評估其療效與安全性。 研究方法：maneuver 為國際、多中心、隨機、安慰劑對照 第 3 期 試驗，於亞洲、歐洲與北美 40 家專科醫院進行。94 名不可切除且有症狀的成人 tgct 病人以 2:1、雙盲分配接受 pimicotinib 50 mg 每日一次 或 安慰劑 24 週，主要終點為第 25 週依 recist version 1.1 評估的 orr。 主要結果：第 25 週 orr 為 pimicotinib 組 54%（34/63）對 安慰劑 組 3%（1/31），absolute 差異 51%（95% ci 33-63；p<0.0001）。pimicotinib 常見不良事件多為輕度，包含搔癢、臉部水腫、皮疹、眼眶周圍水腫與疲倦；等級 3 或 4 creatine phosphokinase 增加發生於 13%。 藥師重點：結論顯示 pimicotinib 在不可切除、有症狀 tgct 可提高腫瘤反應率並改善症狀負擔；藥師需留意皮膚與水腫相關不良反應、creatine phosphokinase 監測，以及長期治療安全性仍需後續資料支持。"},{"id":"pmid-41831847","kind":"article","issueId":"2026-week11","year":2026,"week":11,"weekLabel":"第 11 週","dateRange":"2026/03/09 – 03/15","href":"2026-week11.html","title":"Integrated community-based versus facility-based care for people with HIV, diabetes, and hypertension in sub-Saharan Africa (INTE-COMM): an open-label, multicountry, cluster-randomised trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Kasujja","doi":"10.1016/S0140-6736(25)02641-8","url":"https://doi.org/10.1016/S0140-6736(25)02641-8","summary":"藥師重點：研究結果說明，在資源有限且 HIV 與慢性病共存的地區，整合式社區照護可維持糖尿病或高血壓照護品質，且未不利影響 HIV 控制；藥師可留意此模式對慢性病續方、用藥整合與追蹤可近性的啟示。","pubDate":"2026-03-14","terms":["integrated","community-based","facility-based","people","diabetes","hypertension","sub-saharan","africa","inte-comm","open-label"],"drugTerms":[],"searchText":"integrated community-based versus facility-based care for people with hiv, diabetes, and hypertension in sub-saharan africa (inte-comm): an open-label, multicountry, cluster-randomised trial lancet rct kasujja 10.1016/s0140-6736(25)02641-8 研究背景：撒哈拉以南非洲同時面臨糖尿病、高血壓與 hiv 的照護負擔，是否能以社區模式整合慢性病與 hiv 照護仍需臨床證據。 研究方法：inte-comm 為開放標籤、多國、cluster-隨機試驗，於 tanzania 與 uganda 的 14 家基層醫療機構進行。1864 名臨床穩定且可接受社區照護的成人依群組分配至整合式社區照護或院所照護，追蹤 12 個月；共同主要終點為血壓或空腹血糖控制，以及 hiv 病人的 viral load suppression。 主要結果：糖尿病或高血壓病人的血壓或空腹血糖控制率兩組無顯著差異（55.2% vs 53.2%；校正 風險差 1.80，95% ci -4.
