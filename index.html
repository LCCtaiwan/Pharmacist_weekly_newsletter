52 to 8.12；p=0.58）。hiv 病人的 viral suppression 維持高比例（99.1% vs 98.7%；校正 風險差 0.44，95% ci -1.12 to 1.99；p不劣性<0.0001），兩組各有 7 例死亡。 藥師重點：研究結果說明，在資源有限且 hiv 與慢性病共存的地區，整合式社區照護可維持糖尿病或高血壓照護品質，且未不利影響 hiv 控制；藥師可留意此模式對慢性病續方、用藥整合與追蹤可近性的啟示。"},{"id":"pmid-41812190","kind":"article","issueId":"2026-week11","year":2026,"week":11,"weekLabel":"第 11 週","dateRange":"2026/03/09 – 03/15","href":"2026-week11.html","title":"Inhaled Treprostinil for Idiopathic Pulmonary Fibrosis","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Nathan","doi":"10.1056/NEJMoa2512911","url":"https://doi.org/10.1056/NEJMoa2512911","summary":"藥師重點：結論顯示 inhaled treprostinil 可減少 IPF 病人 52 週內 FVC 下降並降低 臨床 worsening；藥師需留意吸入裝置使用、咳嗽與停藥風險，並確認病人是否同時使用背景抗纖維化治療。","pubDate":"2026-03-11","terms":["inhaled","treprostinil","idiopathic","pulmonary","fibrosis","nejm","nathan","nejmoa2512911","teton-2","breaths"],"drugTerms":[],"searchText":"inhaled treprostinil for idiopathic pulmonary fibrosis nejm original article nathan 10.1056/nejmoa2512911 研究背景：特發性肺纖維化（ipf）會造成肺功能逐步下降；吸入型 treprostinil 可能具抗纖維化作用，但其對 ipf 病人肺功能與臨床惡化的影響仍需驗證。 研究方法：teton-2 為 第 3 期、雙盲試驗，將 593 名 ipf 病人隨機分配接受 inhaled treprostinil 或 安慰劑，劑量為 12 breaths four times 每日，治療 52 週。主要終點為第 52 週 absolute fvc 相較基準值的變化，並依序評估 臨床 worsening、急性惡化與安全性。 主要結果：第 52 週 fvc 中位變化為 treprostinil 組 -49.9 ml 對 安慰劑 組 -136.4 ml，組間差異 95.6 ml（95% ci 52.2-139.0；p<0.001）。臨床 worsening 為 27.2% 對 39.0%（hr 0.71，95% ci 0.53-0.95；p=0.02）；最常見不良事件為咳嗽（48.3% vs 24.1%），停藥率為 33.6% 對 24.7%。 藥師重點：結論顯示 inhaled treprostinil 可減少 ipf 病人 52 週內 fvc 下降並降低 臨床 worsening；藥師需留意吸入裝置使用、咳嗽與停藥風險，並確認病人是否同時使用背景抗纖維化治療。"},{"id":"pmid-41811336","kind":"article","issueId":"2026-week11","year":2026,"week":11,"weekLabel":"第 11 週","dateRange":"2026/03/09 – 03/15","href":"2026-week11.html","title":"Hospital Adoption and Pricing for Oncology Biosimilars","journal":"JAMA","type":"OA","typeLabel":"Original Article","author":"Robinson","doi":"10.1001/jama.2026.1777","url":"https://doi.org/10.1001/jama.2026.1777","summary":"藥師重點：研究結果說明腫瘤 biosimilars 的採用增加，伴隨醫院 markup margin 上升；藥師與藥事管理團隊評估 biosimilars 導入時，除療效與安全性外，也需理解採購、給付與藥品政策對臨床使用的影響。","pubDate":"2026-04-14","terms":["hospital","adoption","pricing","oncology","biosimilars","jama","robinson","blue","cross","shield"],"drugTerms":["bevacizumab","trastuzumab","rituximab"],"searchText":"hospital adoption and pricing for oncology biosimilars jama original article robinson 10.1001/jama.2026.1777 研究背景：多項由醫師給藥的腫瘤生物製劑即將面臨專利到期與 biosimilars 競爭，醫院採購價、保險給付價與節省成本如何分配，會影響 biosimilars 的採用。 研究方法：此觀察性研究使用 2020-2024 年 blue cross blue shield 保險病人資料，連結醫院向藥廠支付的採購價、保險人支付給醫院的 reimbursement prices、340b 資格，以及醫院、病人與市場特徵。主要評估 bevacizumab、trastuzumab 與 rituximab biosimilars 的採購價、給付價、醫院 markup margin 與採用情形。 主要結果：66139 名病人、1541 家醫院資料顯示，bevacizumab、trastuzumab 與 rituximab biosimilars 的醫院採購價分別下降 60%、72% 與 63%，但保險給付價僅下降 32%、36% 與 34%。同期 biosimilars 使用占比分別由 2020 年的 32%、37% 與 18%，上升至 2024 年的 93%、87% 與 84%。 藥師重點：研究結果說明腫瘤 biosimilars 的採用增加，伴隨醫院 markup margin 上升；藥師與藥事管理團隊評估 biosimilars 導入時，除療效與安全性外，也需理解採購、給付與藥品政策對臨床使用的影響。"},{"id":"pmid-41819560","kind":"article","issueId":"2026-week11","year":2026,"week":11,"weekLabel":"第 11 週","dateRange":"2026/03/09 – 03/15","href":"2026-week11.html","title":"Camrelizumab plus CAPOX with camrelizumab based maintenance versus CAPOX alone as initial treatment for gastric or gastro-oesophageal junction adenocarcinoma: randomised phase 3 trial","journal":"BMJ","type":"RCT","typeLabel":"RCT","author":"Peng","doi":"10.1136/bmj-2025-086115","url":"https://doi.org/10.1136/bmj-2025-086115","summary":"藥師重點：結論顯示 camrelizumab 併 CAPOX 後續 camrelizumab-based maintenance 可較 CAPOX 單用 改善存活；加入 apatinib 的探索性比較未見額外存活效益，且高等級治療相關不良事件較多，需審慎評估維持治療的效益與耐受性。","pubDate":"2026-03-12","terms":["camrelizumab","plus","capox","maintenance","alone","initial","gastric","gastro-oesophageal","junction","adenocarcinoma"],"drugTerms":["camrelizumab","oxaliplatin","apatinib"],"searchText":"camrelizumab plus capox with camrelizumab based maintenance versus capox alone as initial treatment for gastric or gastro-oesophageal junction adenocarcinoma: randomised phase 3 trial bmj rct peng 10.1136/bmj-2025-086115 研究背景：her2 陰性、不可切除、局部晚期或轉移性胃癌與胃食道接合部腺癌，第一線治療仍需改善整體存活；本研究比較 camrelizumab 併 capox 後續不同維持策略與 capox 單獨治療。 研究方法：此隨機、開放標籤、第 3 期 試驗於中國 75 家醫院進行，納入 885 名先前未治療的成人病人。病人分配至 camre+capox followed by camre+apa、capox 單用，或中途新增的 camre+capox followed by camre，主要終點為 pd-l1 陽性 與整體族群的 整體存活期。 主要結果：相較 capox 單用，camre+capox followed by camre+apa 在 pd-l1 陽性 族群延長 整體存活期（中位數 15.0 vs 12.5 個月；hr 0.80，95% ci 0.65-0.98；one sided p=0.02），整體族群亦較佳（中位數 13.5 vs 12.1 個月；hr 0.80，95% ci 0.68-0.94；one sided p=0.004）。等級 ≥3 治療相關不良事件 為 67.9%、45.3% 與 46.9%。 藥師重點：結論顯示 camrelizumab 併 capox 後續 camrelizumab-based maintenance 可較 capox 單用 改善存活；加入 apatinib 的探索性比較未見額外存活效益，且高等級治療相關不良事件較多，需審慎評估維持治療的效益與耐受性。"},{"id":"pmid-41812192","kind":"article","issueId":"2026-week11","year":2026,"week":11,"weekLabel":"第 11 週","dateRange":"2026/03/09 – 03/15","href":"2026-week11.html","title":"Bleeding Risk with Apixaban vs. Rivaroxaban in Acute Venous Thromboembolism","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Castellucci","doi":"10.1056/NEJMoa2510703","url":"https://doi.org/10.1056/NEJMoa2510703","summary":"藥師重點：結論顯示急性靜脈血栓栓塞治療 3 個月期間，apixaban 的臨床相關出血風險低於 rivaroxaban；藥師進行抗凝血藥選擇與衛教時，仍需同時評估腎功能、交互作用、服藥頻次與病人出血風險。","pubDate":"2026-03-12","terms":["bleeding","apixaban","rivaroxaban","acute","venous","thromboembolism","nejm","castellucci","nejmoa2510703","cobrra"],"drugTerms":["apixaban","rivaroxaban"],"searchText":"bleeding risk with apixaban vs. rivaroxaban in acute venous thromboembolism nejm rct castellucci 10.1056/nejmoa2510703 研究背景：apixaban 與 rivaroxaban 是急性靜脈血栓栓塞常用的口服抗凝血藥，但兩者在臨床相關出血風險上的差異仍需直接比較。 研究方法：cobrra 為國際、前瞻性、隨機、開放標籤且終點盲性評估試驗，納入急性有症狀肺栓塞或近端深部靜脈栓塞病人。2760 名病人以 1:1 分配接受 apixaban 或 rivaroxaban 3 個月，主要結果為 重大出血 或 clinically relevant non重大出血 的複合終點。 主要結果：主要出血相關終點發生率為 apixaban 組 3.3%（44/1345）對 rivaroxaban 組 7.1%（96/1355），相對風險 0.46（95% ci 0.33-0.65；p<0.001）。非出血或靜脈血栓相關的 嚴重不良事件 分別為 2.7% 與 2.2%。 藥師重點：結論顯示急性靜脈血栓栓塞治療 3 個月期間，apixaban 的臨床相關出血風險低於 rivaroxaban；藥師進行抗凝血藥選擇與衛教時，仍需同時評估腎功能、交互作用、服藥頻次與病人出血風險。"},{"id":"fda-2026-week11-1","kind":"fda","issueId":"2026-week11","year":2026,"week":11,"weekLabel":"第 11 週","dateRange":"2026/03/09 – 03/15","href":"2026-week11.html","title":"FDA’s Concerns with Unapproved GLP-1 Drugs Used for Weight Loss","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["concerns","unapproved","glp-1","drugs","used","weight","loss","https","drug-alerts-and-statements","fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"],"drugTerms":["glp-1"],"searchText":"fda’s concerns with unapproved glp-1 drugs used for weight loss fda drug safety 2026-06-15 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"},{"id":"fda-2026-week11-3","kind":"fda","issueId":"2026-week11","year":2026,"week":11,"weekLabel":"第 11 週","dateRange":"2026/03/09 – 03/15","href":"2026-week11.html","title":"FDA issues final decision to withdraw approval of Pepaxto (melphalan flufenamide)","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/398713","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["issues","final","decision","withdraw","approval","pepaxto","melphalan","flufenamide","https","node"],"drugTerms":[],"searchText":"fda issues final decision to withdraw approval of pepaxto (melphalan flufenamide) fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/398713"},{"id":"fda-2026-week11-2","kind":"fda","issueId":"2026-week11","year":2026,"week":11,"weekLabel":"第 11 週","dateRange":"2026/03/09 – 03/15","href":"2026-week11.html","title":"FDA alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/403159","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["alerts","caregivers","providers","cross-compatibility","issues","autoinjector","devices","that","optional","glatiramer"],"drugTerms":[],"searchText":"fda alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/403159"},{"id":"fda-2026-week11-4","kind":"fda","issueId":"2026-week11","year":2026,"week":11,"weekLabel":"第 11 週","dateRange":"2026/03/09 – 03/15","href":"2026-week11.html","title":"FDA Accepts First In Silico Drug Development Tool Under ISTAND Program to Help Predict Drug-Induced Liver Injury","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["accepts","first","silico","development","tool","under","istand","program","help","predict"],"drugTerms":[],"searchText":"fda accepts first in silico drug development tool under istand program to help predict drug-induced liver injury fda drug safety 2026-06-03 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver"},{"id":"pmid-41780062","kind":"article","issueId":"2026-week10","year":2026,"week":10,"weekLabel":"第 10 週","dateRange":"2026/03/02 – 03/08","href":"2026-week10.html","title":"Zorevunersen in Children and Adolescents with Dravet Syndrome","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Laux","doi":"10.1056/NEJMoa2506295","url":"https://doi.org/10.1056/NEJMoa2506295","summary":"藥師重點：早期資料支持 zorevunersen 持續開發作為 Dravet 症候群 可能的 疾病-modifying 治療，但目前為 開放標籤 第 1 期-2a 與延伸研究；藥師需注意鞘內給藥相關流程、腰椎穿刺後症候群、CSF protein 變化與長期安全性仍待確認。","pubDate":"2026-03-05","terms":["zorevunersen","children","adolescents","dravet","syndrome","nejm","laux","nejmoa2506295","scn1a","haploinsufficiency"],"drugTerms":[],"searchText":"zorevunersen in children and adolescents with dravet syndrome nejm original article laux 10.1056/nejmoa2506295 研究背景：dravet 症候群 多由 scn1a haploinsufficiency 造成，屬嚴重 developmental and epileptic encephalopathy，患者有較高 sudden unexpected 死亡 in epilepsy 與認知缺損風險；zorevunersen 為設計用來 up-regulate nav1.1 sodium channels 的 antisense oligonucleotide。 研究方法：monarch 與 admiral 為 第 1 期-2a、開放標籤、多中心研究，納入 2-18 歲且使用標準抗癲癇藥的 dravet 症候群 患者。受試者接受 single-ascending-dose zorevunersen 10-70 mg，或 multiple-ascending-dose 20-70 mg；符合條件者可進入 swallowtail 與 longwing extension 研究，持續每 4 個月接受 zorevunersen ≤45 mg。 主要結果：第 1 期-2a 研究共納入 81 名患者，75 名進入 extension 研究。多數不良事件為輕至中度；最常見為 lumbar puncture 後症候群（25%）與 extension 研究 中 cerebrospinal fluid protein 升高（45%）。接受 70 mg 後續 up to 45 mg 的患者，在 extension 研究 前 20 個月各 1 個月區間內 convulsive-seizure frequency 中位變化為 -58.82% 至 -90.91%，且整體臨床狀態、生活品質與適應行為有改善訊號。 藥師重點：早期資料支持 zorevunersen 持續開發作為 dravet 症候群 可能的 疾病-modifying 治療，但目前為 開放標籤 第 1 期-2a 與延伸研究；藥師需注意鞘內給藥相關流程、腰椎穿刺後症候群、csf protein 變化與長期安全性仍待確認。"},{"id":"pmid-41786356","kind":"article","issueId":"2026-week10","year":2026,"week":10,"weekLabel":"第 10 週","dateRange":"2026/03/02 – 03/08","href":"2026-week10.html","title":"Prognostic score for predicting respiratory admissions among patients with chronic obstructive pulmonary disease in primary care: development and validation in population cohorts (Birmingham Lung Improvement Studies (BLISS))","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"Jordan","doi":"10.1136/bmj-2025-084521","url":"https://doi.org/10.1136/bmj-2025-084521","summary":"藥師重點：BLISS score 可作為 COPD 患者兩年呼吸道住院風險分層工具的候選證據；藥師在吸入劑使用評估、急性惡化預防與共病管理時可參考其風險因子，但臨床導入前仍需 impact evaluation 確認是否改善照護結果。","pubDate":"2026-03-05","terms":["prognostic","score","predicting","respiratory","admissions","chronic","obstructive","pulmonary","development","validation"],"drugTerms":[],"searchText":"prognostic score for predicting respiratory admissions among patients with chronic obstructive pulmonary disease in primary care: development and validation in population cohorts (birmingham lung improvement studies (bliss)) bmj original article jordan 10.1136/bmj-2025-084521 研究背景：copd 患者未來呼吸道相關住院風險差異大，若能以臨床易取得變項建立預後分數，可能有助於基層照護中的風險分層與追蹤。 研究方法：此研究以 bliss 基層照護 世代 建立並內部驗證模型，另以 eclipse 國際 世代 與連結 hospital episode statistics 的 uk cprd aurum 資料庫進行外部驗證。研究納入 bliss 1894 名、eclipse 1749 名與 cprd 27,340 名 copd 患者，主要預測兩年內 respiratory admission 或 eclipse 世代 中 重度 exacerbation。 主要結果：bliss score 保留 6 個預測因子：age、copd assessment test score、過去 12 個月 respiratory admissions、body mass index、diabetes、forced expiratory volume in 1 second % predicted。模型判別力在內部驗證 c statistic 0.73（95% ci 0.70-0.77），外部驗證 eclipse c=0.73（0.71-0.76）、cprd c=0.71（0.70-0.72），校準表現良好，且優於個別預測因子與 bertens' score。 藥師重點：bliss score 可作為 copd 患者兩年呼吸道住院風險分層工具的候選證據；藥師在吸入劑使用評估、急性惡化預防與共病管理時可參考其風險因子，但臨床導入前仍需 impact evaluation 確認是否改善照護結果。"},{"id":"pmid-41780001","kind":"article","issueId":"2026-week10","year":2026,"week":10,"weekLabel":"第 10 週","dateRange":"2026/03/02 – 03/08","href":"2026-week10.html","title":"Neoadjuvant GOLP in Resectable High-Risk Intrahepatic Cholangiocarcinoma","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Shi","doi":"10.1056/NEJMoa2513918","url":"https://doi.org/10.1056/NEJMoa2513918","summary":"藥師重點：結論顯示 neoadjuvant GOLP 可延長可切除高風險肝內膽管癌的 無事件存活期；藥師需留意 gemcitabine-oxaliplatin、lenvatinib、toripalimab 與 capecitabine 銜接時程、肝功能與免疫相關不良事件監測。","pubDate":"2026-03-05","terms":["neoadjuvant","golp","resectable","high-risk","intrahepatic","cholangiocarcinoma","nejm","nejmoa2513918","gemcitabine-oxaliplatin","lenvatinib"],"drugTerms":["gemcitabine-oxaliplatin","lenvatinib","anti-programmed","toripalimab","anti-pd-1"],"searchText":"neoadjuvant golp in resectable high-risk intrahepatic cholangiocarcinoma nejm rct shi 10.1056/nejmoa2513918 研究背景：可切除但復發風險高的肝內膽管癌，目前尚無確立的標準術前輔助治療；golp 處方（gemcitabine-oxaliplatin、lenvatinib 與 anti-pd-1 抗體）先前在晚期肝內膽管癌與膽道癌已顯示初步活性。 研究方法：此 第 2 期-3 隨機試驗將 178 名可切除高風險肝內膽管癌患者，以 1:1 分配至 neoadjuvant golp 後接受根治性切除，或直接根治性切除且不接受術前治療。兩組術後皆接受 8 個療程 adjuvant capecitabine，主要終點為 無事件存活期。 主要結果：中位追蹤 16.9 個月時，neoadjuvant golp 組 中位數 無事件存活期 較對照組延長（18.0 vs 8.7 個月；p<0.001）。24 個月 整體存活期 為 79% vs 61%（hr for 死亡 0.43，95% ci 0.23-0.79；p=0.005），但未達預設顯著性門檻；術前治療期 等級 3 以上治療相關不良事件為 26%，未發生治療相關死亡。 藥師重點：結論顯示 neoadjuvant golp 可延長可切除高風險肝內膽管癌的 無事件存活期；藥師需留意 gemcitabine-oxaliplatin、lenvatinib、toripalimab 與 capecitabine 銜接時程、肝功能與免疫相關不良事件監測。"},{"id":"pmid-41765025","kind":"article","issueId":"2026-week10","year":2026,"week":10,"weekLabel":"第 10 週","dateRange":"2026/03/02 – 03/08","href":"2026-week10.html","title":"Hormone therapy use and duration with postoperative radiotherapy for recurrent prostate cancer: an individual patient data meta-analysis","journal":"Lancet","type":"MA","typeLabel":"Meta-analysis","author":"Kishan","doi":"10.1016/S0140-6736(26)00137-6","url":"https://doi.org/10.1016/S0140-6736(26)00137-6","summary":"藥師重點：研究結果說明 PSA 0.5 ng/mL 以下接受 PORT 的患者，加用短期或長期 hormone 治療 可能無明確 整體存活期 benefit；藥師協助治療討論時，需將 pre-PORT PSA、預期療效、代謝與心血管風險、骨骼健康與生活品質一起納入評估。","pubDate":"2026-03-14","terms":["hormone","duration","postoperative","radiotherapy","recurrent","prostate","cancer","individual","meta-analysis","lancet"],"drugTerms":[],"searchText":"hormone therapy use and duration with postoperative radiotherapy for recurrent prostate cancer: an individual patient data meta-analysis lancet meta-analysis kishan 10.1016/s0140-6736(26)00137-6 研究背景：局部攝護腺癌接受 definitive radiotherapy 時加用 hormone 治療 可改善 整體存活期，但根治性攝護腺切除後 postoperative radiotherapy（port）是否也有相同效益仍不確定。 研究方法：此 individual patient 資料 統合分析 納入 port 合併或不合併 hormone 治療 的隨機第三期試驗，透過 marcap consortium 取得 ipd。主要終點為 整體存活期，並分析 short-term hormone 治療（4-6 個月）、long-term hormone 治療（24 個月）與 pre-port psa 的交互作用。 主要結果：分析包含 6 項隨機試驗、6057 名患者，中位追蹤 9.0 年。port 加用 hormone 治療 未顯著改善 整體存活期（hr 0.87，95% ci 0.76-1.01；p=0.06）；hormone 治療 duration 與效果無顯著交互作用（pinteraction=0.17），但 pre-port psa >0.5 ng/ml 與 ≤0.5 ng/ml 有交互作用（pinteraction=0.02）。psa ≤0.5 ng/ml 時未見有意義 整體存活期 benefit；long-term hormone 治療 在 psa >1.6 ng/ml 時 95% ci 上限低於 1.0。 藥師重點：研究結果說明 psa 0.5 ng/ml 以下接受 port 的患者，加用短期或長期 hormone 治療 可能無明確 整體存活期 benefit；藥師協助治療討論時，需將 pre-port psa、預期療效、代謝與心血管風險、骨骼健康與生活品質一起納入評估。"},{"id":"pmid-41781010","kind":"article","issueId":"2026-week10","year":2026,"week":10,"weekLabel":"第 10 週","dateRange":"2026/03/02 – 03/08","href":"2026-week10.html","title":"Glucagon-like peptide-1 receptor agonists and risk of substance use disorders among US veterans with type 2 diabetes: cohort study","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"Cai","doi":"10.1136/bmj-2025-086886","url":"https://doi.org/10.1136/bmj-2025-086886","summary":"藥師重點：此觀察性研究提供 GLP-1 受體 agonists 與多類 SUD 風險下降的訊號，但不能直接推論因果或作為 SUD 治療建議；藥師解讀時需注意族群為美國退伍軍人第二型糖尿病患者、active comparator 選擇與殘餘混雜。","pubDate":"2026-03-04","terms":["glucagon-like","peptide-1","receptor","agonists","substance","disorders","veterans","type","diabetes","bmj-2025-086886"],"drugTerms":["glp-1","cocaine"],"searchText":"glucagon-like peptide-1 receptor agonists and risk of substance use disorders among us veterans with type 2 diabetes: cohort study bmj original article cai 10.1136/bmj-2025-086886 研究背景：glp-1 受體 agonists 是否與較低 substance 使用 疾患（suds）新發風險，以及既有 sud 患者較少不良臨床結果相關，仍需要大型真實世界資料評估。 研究方法：此美國退伍軍人電子病歷 世代研究 以 target 試驗 emulation 方式，比較第二型糖尿病患者新啟用 glp-1 受體 agonists 或 sglt-2 抑制劑。研究分為無 sud 病史者的新發 sud protocol，以及既有 sud 患者的不良結果 protocol，追蹤最長 3 年並以 inverse probability weighting cox models 分析。 主要結果：相較 sglt-2 抑制劑，glp-1 受體 agonists 與較低新發 alcohol 使用 疾患（hr 0.82，95% ci 0.78-0.85）、cannabis 使用 疾患（0.86，0.81-0.90）、cocaine 使用 疾患（0.80，0.72-0.88）、nicotine 使用 疾患（0.80，0.74-0.87）與 opioid 使用 疾患（0.75，0.67-0.85）風險相關。既有 sud 患者中，glp-1 受體 agonists 也與較低 sud-related emergency department visits（0.69，0.61-0.78）、hospital admissions（0.74，0.65-0.85）與 死亡率（0.50，0.32-0.79）相關。 藥師重點：此觀察性研究提供 glp-1 受體 agonists 與多類 sud 風險下降的訊號，但不能直接推論因果或作為 sud 治療建議；藥師解讀時需注意族群為美國退伍軍人第二型糖尿病患者、active comparator 選擇與殘餘混雜。"},{"id":"pmid-41780000","kind":"article","issueId":"2026-week10","year":2026,"week":10,"weekLabel":"第 10 週","dateRange":"2026/03/02 – 03/08","href":"2026-week10.html","title":"Finerenone in Type 1 Diabetes and Chronic Kidney Disease","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Heerspink","doi":"10.1056/NEJMoa2512854","url":"https://doi.org/10.1056/NEJMoa2512854","summary":"藥師重點：研究結果說明 finerenone 可降低第一型糖尿病合併 CKD 成人的 albuminuria；臨床使用仍需謹慎評估 eGFR、血鉀、ACE 抑制劑 或 ARB 併用情形，並持續追蹤腎功能變化。","pubDate":"2026-03-05","terms":["finerenone","type","diabetes","chronic","kidney","nejm","heerspink","nejmoa2512854","egfr","albuminuria"],"drugTerms":[],"searchText":"finerenone in type 1 diabetes and chronic kidney disease nejm rct heerspink 10.1056/nejmoa2512854 研究背景：finerenone 已知可改善第二型糖尿病合併慢性腎臟病患者的腎臟與心血管結果，但在第一型糖尿病合併 ckd 的療效與安全性仍不明確。 研究方法：此 第 3 期 試驗納入 242 名第一型糖尿病、ckd（egfr 25 to <90 ml/min/1.73 m2）且有 albuminuria 的成人，且皆使用 ace 抑制劑 或 angiotensin-受體 blocker。受試者隨機接受 finerenone 10 或 20 mg/day 或 安慰劑，主要終點為 6 個月 urinary albumin-to-creatinine 比值 相對變化。 主要結果：6 個月內 urinary albumin-to-creatinine 比值 在 finerenone 組下降 34%，安慰劑 組下降 12%，相當於 finerenone 較 安慰劑 多下降 25%（geometric 平均值 比值 0.75，95% ci 0.65-0.87；p<0.001）。高血鉀為最常見不良事件（10.1% vs 3.3%），finerenone 組 1.7% 因高血鉀停藥；egfr 下降幅度較大但 washout 期間接近基準值。 藥師重點：研究結果說明 finerenone 可降低第一型糖尿病合併 ckd 成人的 albuminuria；臨床使用仍需謹慎評估 egfr、血鉀、ace 抑制劑 或 arb 併用情形，並持續追蹤腎功能變化。"},{"id":"pmid-41765029","kind":"article","issueId":"2026-week10","year":2026,"week":10,"weekLabel":"第 10 週","dateRange":"2026/03/02 – 03/08","href":"2026-week10.html","title":"Efficacy and safety of once-daily oral orforglipron compared with oral semaglutide in adults with type 2 diabetes (ACHIEVE-3): a multinational, multicentre, non-inferiority, open-label, randomised, phase 3 trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Rosenstock","doi":"10.1016/S0140-6736(26)00202-3","url":"https://doi.org/10.1016/S0140-6736(26)00202-3","summary":"藥師重點：結論顯示 orforglipron 對 metformin 控制不佳的第二型糖尿病可提供較大的 HbA1c 降幅，但胃腸道耐受性、停藥率與心跳增加需納入用藥諮詢與追蹤；其每日口服且無飲食限制的特性也需與既有 口服 semaglutide 服用規則比較。","pubDate":"2026-03-21","terms":["efficacy","once-daily","oral","orforglipron","semaglutide","adults","type","diabetes","achieve-3","multinational"],"drugTerms":["semaglutide","glp-1"],"searchText":"efficacy and safety of once-daily oral orforglipron compared with oral semaglutide in adults with type 2 diabetes (achieve-3): a multinational, multicentre, non-inferiority, open-label, randomised, phase 3 trial lancet rct rosenstock 10.1016/s0140-6736(26)00202-3 研究背景：orforglipron 為每日一次口服、無食物或飲水限制的新型 非胜肽 glp-1 受體 致效劑；本研究比較其與 口服 semaglutide 用於 metformin 控制不佳第二型糖尿病的療效與安全性。 研究方法：achieve-3 為 52 週、隨機、開放標籤、活性對照、多國 第 3 期試驗，納入 metformin ≥1500 mg/day 後 hba1c 7.0%-10.5% 且 bmi ≥25 kg/m2 的成人。1698 名受試者以 1:1:1:1 分配至 orforglipron 12 mg 或 36 mg，或 semaglutide 7 mg 或 14 mg，每日口服；主要目標為第 52 週 hba1c 變化的 不劣性，達成後進行 superiority 分析。 主要結果：第 52 週 hba1c 平均下降為 orforglipron 12 mg -1.71%、36 mg -1.91%，semaglutide 7 mg -1.23%、14 mg -1.47%；兩劑 orforglipron 皆達 不劣性 且優於兩劑 semaglutide。胃腸道事件在 orforglipron 較常見（59% 與 58% vs 37% 與 45%），因不良事件停藥與脈搏增加也較多。 藥師重點：結論顯示 orforglipron 對 metformin 控制不佳的第二型糖尿病可提供較大的 hba1c 降幅，但胃腸道耐受性、停藥率與心跳增加需納入用藥諮詢與追蹤；其每日口服且無飲食限制的特性也需與既有 口服 semaglutide 服用規則比較。"},{"id":"pmid-41789864","kind":"article","issueId":"2026-week10","year":2026,"week":10,"weekLabel":"第 10 週","dateRange":"2026/03/02 – 03/08","href":"2026-week10.html","title":"Efficacy and Safety of Obinutuzumab in Active Systemic Lupus Erythematosus","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Furie","doi":"10.1056/NEJMoa2516150","url":"https://doi.org/10.1056/NEJMoa2516150","summary":"藥師重點：結論顯示 obinutuzumab 加入標準治療可改善 active SLE 的主要與關鍵次要終點；藥師需留意 B-cell depletion 相關感染風險、輸注反應、疫苗接種時機、glucocorticoid 減量與既有 lupus nephritis 適應症外的族群差異。","pubDate":"2026-03-06","terms":["efficacy","obinutuzumab","active","systemic","lupus","erythematosus","nejm","furie","nejmoa2516150","glycoengineered"],"drugTerms":["obinutuzumab","anti-cd20"],"searchText":"efficacy and safety of obinutuzumab in active systemic lupus erythematosus nejm original article furie 10.1056/nejmoa2516150 研究背景：obinutuzumab 為 glycoengineered type ii anti-cd20 monoclonal 抗體，可造成 b-cell depletion，已核准用於 active lupus nephritis；其在 active systemic lupus erythematosus（sle）但無增生性或膜性 lupus nephritis 患者的療效與安全性仍需確認。 研究方法：allegory 為 第 3 期、多中心、雙盲、安慰劑對照 試驗，納入接受標準治療的 active sle 成人，排除 proliferative 或 membranous lupus nephritis。303 名患者以 1:1 隨機接受 obinutuzumab 1000 mg 或 安慰劑，於 第 1 天、week 2、24、26 給藥；主要終點為第 52 週 sle responder index 4（sri-4）反應。 主要結果：第 52 週 sri-4 反應 在 obinutuzumab 組為 76.7%，安慰劑 組為 53.5%（校正 差異 23.1 百分點，95% ci 12.5-33.6；p<0.001）。obinutuzumab 在 bilag-based 複合 lupus assessment 反應、glucocorticoid dose sustained reduction、sustained sri-4、sri-6 與首次 bilag-defined flare 時間等關鍵次要終點皆優於 安慰劑；不良事件為 88.7% vs 81.5%，嚴重不良事件 為 15.9% vs 11.9%。 藥師重點：結論顯示 obinutuzumab 加入標準治療可改善 active sle 的主要與關鍵次要終點；藥師需留意 b-cell depletion 相關感染風險、輸注反應、疫苗接種時機、glucocorticoid 減量與既有 lupus nephritis 適應症外的族群差異。"},{"id":"pmid-41794437","kind":"article","issueId":"2026-week10","year":2026,"week":10,"weekLabel":"第 10 週","dateRange":"2026/03/02 – 03/08","href":"2026-week10.html","title":"Effect of baxdrostat on ambulatory blood pressure in patients with resistant hypertension (Bax24): a phase 3, randomised, double-blind, placebo-controlled trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Azizi","doi":"10.1016/S0140-6736(25)02549-8","url":"https://doi.org/10.1016/S0140-6736(25)02549-8","summary":"藥師重點：結論顯示 baxdrostat 可降低 resistant hypertension 患者的 24 小時動態收縮壓；藥師需留意背景降壓藥、diuretic 使用、血鉀與腎功能監測，特別是高血鉀風險。","pubDate":"2026-03-07","terms":["baxdrostat","ambulatory","blood","pressure","resistant","hypertension","bax24","phase","randomised","double-blind"],"drugTerms":[],"searchText":"effect of baxdrostat on ambulatory blood pressure in patients with resistant hypertension (bax24): a phase 3, randomised, double-blind, placebo-controlled trial lancet rct azizi 10.1016/s0140-6736(25)02549-8 研究背景：aldosterone dysregulation 是難治型高血壓的重要機轉之一；baxdrostat 為 selective aldosterone synthase 抑制劑，本研究評估其對 resistant hypertension 患者 24 小時動態血壓的影響。 研究方法：bax24 為國際多中心、第 3 期、隨機、雙盲、安慰劑對照 試驗，納入接受至少 3 種降壓藥且含 diuretic 後 seated sbp 仍 ≥140 且 <170 mm hg 的成人。經 2 週 安慰劑 run-in 後，患者隨機接受 baxdrostat 2 mg 每日一次 或 安慰劑 12 週，主要終點為 24 h ambulatory sbp 自基準至第 12 週的變化。 主要結果：217 名患者隨機接受治療；第 12 週 24 h ambulatory sbp 在 baxdrostat 組下降 -16.6 mm hg，安慰劑 組下降 -2.6 mm hg，安慰劑-corrected 差異 為 -14.0 mm hg（95% ci -17.2 to -10.8；p<0.0001）。不良事件發生率為 52% vs 37%，baxdrostat 組 3% 出現確認血鉀 >6 mmol/l。 藥師重點：結論顯示 baxdrostat 可降低 resistant hypertension 患者的 24 小時動態收縮壓；藥師需留意背景降壓藥、diuretic 使用、血鉀與腎功能監測，特別是高血鉀風險。"},{"id":"pmid-41779422","kind":"article","issueId":"2026-week10","year":2026,"week":10,"weekLabel":"第 10 週","dateRange":"2026/03/02 – 03/08","href":"2026-week10.html","title":"A Decision-Support System to Personalize Antidepressant Treatment in Major Depressive Disorder: A Randomized Clinical Trial","journal":"JAMA","type":"RCT","typeLabel":"RCT","author":"Cipriani","doi":"10.1001/jama.2026.1327","url":"https://doi.org/10.1001/jama.2026.1327","summary":"藥師重點：研究結果說明 PETRUSHKA tool 可協助個人化抗憂鬱藥選擇並降低早期停藥；藥師參與憂鬱症用藥追蹤時，可將其視為 shared decision-making 輔助工具，但仍需留意研究設計限制、追蹤資料缺漏與本地藥品可近性。","pubDate":"2026-04-14","terms":["decision-support","system","personalize","antidepressant","major","depressive","disorder","jama","cipriani","evidence-based"],"drugTerms":[],"searchText":"a decision-support system to personalize antidepressant treatment in major depressive disorder: a randomized clinical trial jama rct cipriani 10.1001/jama.2026.1327 研究背景：中重度 重大 depressive 疾患 患者常因抗憂鬱藥不適合個別病人而提早停藥，臨床指引也強調更精準的抗憂鬱藥選擇。 研究方法：此多中心 隨機臨床試驗 在巴西、加拿大與英國 47 個場域進行，納入 18-74 歲 重大 depressive 疾患 患者。540 名受試者以 1:1 分配至 evidence-based 臨床 decision-support system（petrushka tool）或 常規照護，主要終點為第 8 週因任何原因停止處方抗憂鬱藥。 主要結果：主要分析納入 493 名受試者；第 8 週 petrushka 組因任何原因停用抗憂鬱藥較 常規照護 低（17% vs 27%；校正 rr 0.62，95% ci 0.44-0.88；p=.007），因不良事件停藥亦較低（9% vs 16%；校正 rr 0.59，95% ci 0.36-0.97；p=.04）。第 24 週 phq-9 與 gad-7 分數也較 常規照護 改善，但缺乏 雙盲 design 且遺失資料較多。 藥師重點：研究結果說明 petrushka tool 可協助個人化抗憂鬱藥選擇並降低早期停藥；藥師參與憂鬱症用藥追蹤時，可將其視為 shared decision-making 輔助工具，但仍需留意研究設計限制、追蹤資料缺漏與本地藥品可近性。"},{"id":"pmid-41794436","kind":"article","issueId":"2026-week10","year":2026,"week":10,"weekLabel":"第 10 週","dateRange":"2026/03/02 – 03/08","href":"2026-week10.html","title":"5-year results of hypofractionated locoregional radiotherapy in early breast cancer HypoG-01 (UNICANCER): a French multicentre, randomised, non-inferiority, phase 3, open-label, controlled trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Rivera","doi":"10.1016/S0140-6736(25)02597-8","url":"https://doi.org/10.1016/S0140-6736(25)02597-8","summary":"藥師重點：研究結果支持需 locoregional radiotherapy 的早期乳癌患者可考慮 3 週 hypofractionated 處方，且手臂淋巴水腫風險不劣於 5 週療程；臨床仍需依腫瘤科與放射腫瘤科評估照射範圍、晚期毒性與病人可近性。","pubDate":"2026-03-07","terms":["year","hypofractionated","locoregional","radiotherapy","early","breast","cancer","hypog-01","unicancer","french"],"drugTerms":[],"searchText":"5-year results of hypofractionated locoregional radiotherapy in early breast cancer hypog-01 (unicancer): a french multicentre, randomised, non-inferiority, phase 3, open-label, controlled trial lancet rct rivera 10.1016/s0140-6736(25)02597-8 研究背景：乳癌全乳放射治療已常用 hypofractionated radiotherapy，但需要淋巴結照射時，許多國家仍因晚期毒性疑慮使用 50 gy in 25 fractions 的 5 週療程。 研究方法：unicancer hypog-01 為法國 29 個中心進行的 開放標籤、隨機、第 3 期 不劣性 試驗，納入手術後需區域淋巴結照射的早期侵犯性乳癌女性。患者以 1:1 分配至 3-week radiotherapy（40 gy in 15 fractions）或 5-week radiotherapy（50 gy in 25 fractions），主要終點為同側手臂淋巴水腫。 主要結果：依計畫書分析納入 1221 名患者，中位追蹤 4.8 年。手臂淋巴水腫共 275 例，3 週療程相較 5 週療程達 不劣性（hr 1.02，95% ci 0.79-1.31；p不劣性<0.001），3 年累積發生率為 23.4% vs 22.2%；等級 3 以上不良事件為 8% vs 13%。 藥師重點：研究結果支持需 locoregional radiotherapy 的早期乳癌患者可考慮 3 週 hypofractionated 處方，且手臂淋巴水腫風險不劣於 5 週療程；臨床仍需依腫瘤科與放射腫瘤科評估照射範圍、晚期毒性與病人可近性。"},{"id":"fda-2026-week10-1","kind":"fda","issueId":"2026-week10","year":2026,"week":10,"weekLabel":"第 10 週","dateRange":"2026/03/02 – 03/08","href":"2026-week10.html","title":"FDA’s Concerns with Unapproved GLP-1 Drugs Used for Weight Loss","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["concerns","unapproved","glp-1","drugs","used","weight","loss","https","drug-alerts-and-statements","fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"],"drugTerms":["glp-1"],"searchText":"fda’s concerns with unapproved glp-1 drugs used for weight loss fda drug safety 2026-06-15 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"},{"id":"fda-2026-week10-3","kind":"fda","issueId":"2026-week10","year":2026,"week":10,"weekLabel":"第 10 週","dateRange":"2026/03/02 – 03/08","href":"2026-week10.html","title":"FDA issues final decision to withdraw approval of Pepaxto (melphalan flufenamide)","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/398713","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["issues","final","decision","withdraw","approval","pepaxto","melphalan","flufenamide","https","node"],"drugTerms":[],"searchText":"fda issues final decision to withdraw approval of pepaxto (melphalan flufenamide) fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/398713"},{"id":"fda-2026-week10-2","kind":"fda","issueId":"2026-week10","year":2026,"week":10,"weekLabel":"第 10 週","dateRange":"2026/03/02 – 03/08","href":"2026-week10.html","title":"FDA alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/403159","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["alerts","caregivers","providers","cross-compatibility","issues","autoinjector","devices","that","optional","glatiramer"],"drugTerms":[],"searchText":"fda alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/403159"},{"id":"fda-2026-week10-4","kind":"fda","issueId":"2026-week10","year":2026,"week":10,"weekLabel":"第 10 週","dateRange":"2026/03/02 – 03/08","href":"2026-week10.html","title":"FDA Accepts First In Silico Drug Development Tool Under ISTAND Program to Help Predict Drug-Induced Liver Injury","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["accepts","first","silico","development","tool","under","istand","program","help","predict"],"drugTerms":[],"searchText":"fda accepts first in silico drug development tool under istand program to help predict drug-induced liver injury fda drug safety 2026-06-03 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver"},{"id":"pmid-41739468","kind":"article","issueId":"2026-week09","year":2026,"week":9,"weekLabel":"第 9 週","dateRange":"2026/02/23 – 03/01","href":"2026-week09.html","title":"Worldwide Radiation Dose in Coronary Artery Disease Diagnostic Imaging","journal":"JAMA","type":"OA","typeLabel":"Original Article","author":"Einstein","doi":"10.1001/jama.2026.0703","url":"https://doi.org/10.1001/jama.2026.0703","summary":"藥師重點：研究結果顯示 CAD 非侵入性影像檢查的 radiation dose 在地區、收入層級與檢查方式間差異大，特別影響低與中收入國家及接受 CCTA 的病人。藥師雖非影像檢查主要決策者，但在心血管共照與病人諮詢中可協助提醒檢查必要性、重複檢查紀錄與整體風險溝通。","pubDate":"2026-04-07","terms":["worldwide","radiation","dose","coronary","artery","diagnostic","imaging","jama","einstein","ionizing"],"drugTerms":[],"searchText":"worldwide radiation dose in coronary artery disease diagnostic imaging jama original article einstein 10.1001/jama.2026.0703 研究背景：冠狀動脈 動脈 疾病（cad）診斷檢查近年快速增加，其中多種影像檢查會使病人暴露於 ionizing radiation。了解不同國家、不同檢查方式的 輻射有效劑量，可作為改善檢查品質與降低不必要暴露的依據。 研究方法：此 worldwide 橫斷面研究 於 2023 年進行，納入 101 國 742 個中心在 2023 年 10 至 12 月單週內連續接受 noninvasive cad diagnostic testing 的 19,302 名成人。檢查包括 spect、pet、cacs 與 ccta；主要結果為病人 輻射有效劑量，以及各中心 中位數 effective dose ≤9 msv 的比例。 主要結果：受試者中 8515 人（44%）為女性，中位年齡 63 歲。各檢查 中位數 effective dose 差異明顯：cacs 1.2 msv、pet 2.0 msv、spect 6.5 msv、ccta 7.4 msv；nuclear cardiology 較 ccta 有較多中心與病人達到 ≤9 msv（81% vs 56%；79% vs 56%；皆 p<.001）。低與中收入國家 nuclear cardiology 劑量較高 20%（95% ci 3.6%-38.4%），ccta 劑量在低與中低收入國家可較高收入國家高達 96%（95% ci 41.7%-170.8%）。 藥師重點：研究結果顯示 cad 非侵入性影像檢查的 radiation dose 在地區、收入層級與檢查方式間差異大，特別影響低與中收入國家及接受 ccta 的病人。藥師雖非影像檢查主要決策者，但在心血管共照與病人諮詢中可協助提醒檢查必要性、重複檢查紀錄與整體風險溝通。"},{"id":"pmid-41740032","kind":"article","issueId":"2026-week09","year":2026,"week":9,"weekLabel":"第 9 週","dateRange":"2026/02/23 – 03/01","href":"2026-week09.html","title":"Tecovirimat for the Treatment of Mpox","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Zucker","doi":"10.1056/NEJMoa2506495","url":"https://doi.org/10.1056/NEJMoa2506495","summary":"藥師重點：結論顯示 tecovirimat 未縮短成人 clade II mpox 的臨床緩解時間，也未改善疼痛、病灶癒合或 viral clearance。藥師在相關用藥評估時，應避免將動物模型或 smallpox 適應症直接外推至 clade II mpox，並協助確認支持療法、感染管制與研究性用藥條件。","pubDate":"2026-02-26","terms":["tecovirimat","mpox","nejm","zucker","nejmoa2506495","food","administration","animal","rule","smallpox"],"drugTerms":[],"searchText":"tecovirimat for the treatment of mpox nejm original article zucker 10.1056/nejmoa2506495 研究背景：tecovirimat 依據 food and drug administration animal rule 核准用於 smallpox，且非人類靈長類 mpox 模型顯示有效，但對人類 clade ii mpox 的臨床療效仍不明確。本研究評估口服 tecovirimat 是否能加速 clade ii mpox 的臨床緩解。 研究方法：此 第 3 期、international、雙盲、隨機、安慰劑對照 試驗 納入成人 laboratory-confirmed clade ii mpox。受試者以 2:1 分配接受 tecovirimat 或 安慰劑 14 天；主要終點為有皮膚或黏膜病灶者的 臨床 resolution time-to-event 分析，次要終點包括疼痛下降、病灶完全癒合、viral dna clearance 與安全性。 主要結果：412 名受試者隨機分組，344 人為 laboratory-confirmed mpox，336 人有活動性皮膚或黏膜病灶並納入主要分析。第 29 天 臨床 resolution cumulative incidence 為 83% vs 84%，competing-risks 風險比 0.98（95% ci 0.74 to 1.31；p=0.89）；嚴重疼痛下降、complete lesion healing（hr 0.97，95% ci 0.75 to 1.26）與 viral dna clearance 皆未見實質組間差異，等級 3 或以上不良事件為 4% vs 3%。 藥師重點：結論顯示 tecovirimat 未縮短成人 clade ii mpox 的臨床緩解時間，也未改善疼痛、病灶癒合或 viral clearance。藥師在相關用藥評估時，應避免將動物模型或 smallpox 適應症直接外推至 clade ii mpox，並協助確認支持療法、感染管制與研究性用藥條件。"},{"id":"pmid-41763229","kind":"article","issueId":"2026-week09","year":2026,"week":9,"weekLabel":"第 9 週","dateRange":"2026/02/23 – 03/01","href":"2026-week09.html","title":"Switch to single-tablet bictegravir-lenacapavir from a complex HIV regimen (ARTISTRY-1): a randomised, open-label, phase 3 clinical trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Orkin","doi":"10.1016/S0140-6736(26)00307-7","url":"https://doi.org/10.1016/S0140-6736(26)00307-7","summary":"藥師重點：結論顯示 bictegravir-lenacapavir STR 可作為病毒量穩定但處方複雜之 HIV-1 病人的簡化選項，療效不劣於原複雜處方。藥師導入前仍需確認既往抗藥性、併用藥交互作用、用藥禁忌與病人對簡化處方的期待。","pubDate":"2026-03-28","terms":["switch","single-tablet","bictegravir-lenacapavir","from","complex","regimen","artistry-1","randomised","open-label","phase"],"drugTerms":["bictegravir-lenacapavir"],"searchText":"switch to single-tablet bictegravir-lenacapavir from a complex hiv regimen (artistry-1): a randomised, open-label, phase 3 clinical trial lancet rct orkin 10.1016/s0140-6736(26)00307-7 研究背景：hiv-1 治療使用 single-tablet 處方（str）可簡化用藥並提升治療滿意度，但部分病人因抗藥性、禁忌症或 drug-drug interactions 仍需複雜多錠處方。本研究評估 bictegravir-lenacapavir str 用於病毒量已受控制且原本使用複雜治療處方者的療效與安全性。 研究方法：artistry-1 為 15 國多中心、隨機、開放標籤、活性對照、不劣性 第 3 期試驗，納入 hiv-1 rna 已受控制且使用複雜抗反轉錄病毒處方的病人。受試者以 2:1 分配至 每日一次 口服 bictegravir-lenacapavir 75 mg/50 mg str 或持續原複雜處方；主要終點為第 48 週 hiv-1 rna ≥50 copies per ml 的比例。 主要結果：557 名受試者接受治療，bictegravir-lenacapavir 組 371 人、複雜處方組 186 人；基線中位年齡 60 歲、hiv 治療時間中位數 28 年，原本每日抗病毒藥錠中位數為 3 顆。第 48 週 hiv-1 rna ≥50 copies per ml 為 1% vs 1%（差異 -0.3%；95.002% ci -2.3 to 1.8），達到 4% 不劣性 margin；未出現抗藥性，兩組不良事件相近，轉換後治療滿意度增加。 藥師重點：結論顯示 bictegravir-lenacapavir str 可作為病毒量穩定但處方複雜之 hiv-1 病人的簡化選項，療效不劣於原複雜處方。藥師導入前仍需確認既往抗藥性、併用藥交互作用、用藥禁忌與病人對簡化處方的期待。"},{"id":"pmid-41763743","kind":"article","issueId":"2026-week09","year":2026,"week":9,"weekLabel":"第 9 週","dateRange":"2026/02/23 – 03/01","href":"2026-week09.html","title":"Survivorship of modern total hip replacement to 30 years: systematic review, meta-analysis, and extrapolation of global joint registry data","journal":"Lancet","type":"MA","typeLabel":"Meta-analysis","author":"Pentland","doi":"10.1016/S0140-6736(25)02305-0","url":"https://doi.org/10.1016/S0140-6736(25)02305-0","summary":"藥師重點：研究結果說明 contemporary 全髖關節置換術 估計 30 年仍約有 92% 未因全因原因翻修，可作為病人期待設定與醫療規劃背景。藥師在骨科共照時仍應聚焦圍手術期止痛、抗凝、感染預防與高齡多重用藥管理，並注意此研究主要反映植入物耐久性而非藥物療效。","pubDate":"2026-02-28","terms":["survivorship","modern","total","replacement","years","meta-analysis","extrapolation","global","joint","registry"],"drugTerms":[],"searchText":"survivorship of modern total hip replacement to 30 years: systematic review, meta-analysis, and extrapolation of global joint registry data lancet meta-analysis pentland 10.1016/s0140-6736(25)02305-0 研究背景：全髖關節置換術 可改善髖關節功能與生活品質，長期植入物存活率會影響病人諮詢、手術規劃與醫療資源配置。近 20 年 現代承載面材料 已改變磨耗與可能的耐久性，因此需要整合長期資料評估現代人工髖關節壽命。 研究方法：此 systematic review、統合分析 與 registry extrapolation 聚焦現代 bearing surfaces，包括 highly cross-linked polyethylene 搭配金屬或第三、四代 ceramic heads，以及 ceramic-on-ceramic 主要 全髖關節置換術。研究搜尋 medline 與 embase 至 2024 年 6 月 13 日，納入至少 10 年 survivorship 資料，並整合 8 個 national joint registries 估計 all-cause revision 與 30 年存活率。 主要結果：共納入 29 項臨床研究與 8 個 national joint registries，涵蓋 1,904,237 例 total hip arthroplasties。臨床研究 pooled all-cause implant survivorship 為 0.97（0.96-0.98）；registry 資料 顯示 20 年 survivorship 為 93.6%（95% ci 92.3-94.7），外推 25 年與 30 年 survivorship 分別為 92.8%（91.2-94.2）與 92.1%（90.1-93.7）。 藥師重點：研究結果說明 contemporary 全髖關節置換術 估計 30 年仍約有 92% 未因全因原因翻修，可作為病人期待設定與醫療規劃背景。藥師在骨科共照時仍應聚焦圍手術期止痛、抗凝、感染預防與高齡多重用藥管理，並注意此研究主要反映植入物耐久性而非藥物療效。"},{"id":"pmid-41740031","kind":"article","issueId":"2026-week09","year":2026,"week":9,"weekLabel":"第 9 週","dateRange":"2026/02/23 – 03/01","href":"2026-week09.html","title":"Phase 1 Study of Rezatapopt, a p53 Reactivator, in TP53 Y220C-Mutated Tumors","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Dumbrava","doi":"10.1056/NEJMoa2508820","url":"https://doi.org/10.1056/NEJMoa2508820","summary":"藥師重點：研究結果提供 TP53 Y220C-mutated tumors 中 p53 reactivation 的早期 proof of concept，但目前仍屬 第 1 期 單臂資料。藥師若於臨床試驗或後續研究場域參與照護，需特別留意 nausea、vomiting、anemia、creatinine 上升、with food 給藥要求與 TP53 Y220C/KRAS biomarker 條件。","pubDate":"2026-02-26","terms":["phase","rezatapopt","reactivator","tp53","y220c-mutated","tumors","nejm","dumbrava","nejmoa2508820","investigational"],"drugTerms":[],"searchText":"phase 1 study of rezatapopt, a p53 reactivator, in tp53 y220c-mutated tumors nejm original article dumbrava 10.1056/nejmoa2508820 研究背景：rezatapopt 是 investigational、first-in-class、口服 selective p53 reactivator，可結合 y220c-mutated p53 並穩定其 wild-type conformation，以恢復 p53 功能。本研究評估 rezatapopt 用於 tp53 y220c-mutated advanced or 轉移性 solid tumors 的安全性、建議劑量與初步抗腫瘤活性。 研究方法：此 第 1 期、single-group、dose-escalation and dose-optimization 研究 納入多線治療後、局部晚期或轉移性且帶有 tp53 y220c mutation 的實體腫瘤病人，於連續 21 天治療週期 接受 rezatapopt。主要目標為 最大耐受劑量 與 recommended 第 2 期 dose，主要終點包括 dose-limiting toxic effects 與 不良事件，次要終點包括初步療效與 pharmacokinetics。 主要結果：77 名病人接受 150 mg 至 2500 mg 每日一次 或 1500 mg 每日兩次 等劑量；最大耐受劑量 為 1500 mg 每日兩次，recommended 第 2 期 dose 選定為 2000 mg 每日一次 with food。治療期間 99% 至少發生一項 不良事件，常見為 nausea 58%、vomiting 44%、血中 creatinine 增加 39%、fatigue 39% 與 anemia 36%；等級 3 或以上 anemia 為 16%。整體 反應率 為 20%，在 kras wild-type 且劑量至少 1150 mg 每日一次 者為 30%。 藥師重點：研究結果提供 tp53 y220c-mutated tumors 中 p53 reactivation 的早期 proof of concept，但目前仍屬 第 1 期 單臂資料。藥師若於臨床試驗或後續研究場域參與照護，需特別留意 nausea、vomiting、anemia、creatinine 上升、with food 給藥要求與 tp53 y220c/kras biomarker 條件。"},{"id":"pmid-41763744","kind":"article","issueId":"2026-week09","year":2026,"week":9,"weekLabel":"第 9 週","dateRange":"2026/02/23 – 03/01","href":"2026-week09.html","title":"Feasibility and safety of cellular therapy for in-utero repair of myelomeningocele (CuRe Trial): a first-in-human, phase 1, single-arm study","journal":"Lancet","type":"OA","typeLabel":"Original Article","author":"Farmer","doi":"10.1016/S0140-6736(25)02466-3","url":"https://doi.org/10.1016/S0140-6736(25)02466-3","summary":"藥師重點：結論顯示此 allogeneic live stem cell 介入在 6 例 first-in-human 經驗中未見 cell-related adverse effects，安全性足以進入非 staggered enrollment 的 第 1 期/2a 試驗。由於樣本數極小且為產前手術合併細胞治療，藥師解讀時需保守，並關注感染預防、圍產期用藥、細胞產品保存與後續長期追蹤資料。","pubDate":"2026-02-28","terms":["feasibility","cellular","in-utero","repair","myelomeningocele","cure","first-in-human","phase","single-arm","lancet"],"drugTerms":[],"searchText":"feasibility and safety of cellular therapy for in-utero repair of myelomeningocele (cure trial): a first-in-human, phase 1, single-arm study lancet original article farmer 10.1016/s0140-6736(25)02466-3 研究背景：moms 試驗 已證實 myelomeningocele 進行 in-utero repair 可降低 ventriculoperitoneal shunt 需求，但多數患者運動功能仍有限。placenta-derived mesenchymal stem cells（pmscs）置於 extracellular matrix 上，在 fetal ovine model 顯示可能改善神經功能，本研究評估其加強 prenatal repair 的安全性。 研究方法：此 第 1 期、first-in-human、single-dose、單臂 研究 於 uc davis 進行，納入胎兒診斷為 myelomeningocele 的孕婦。資格包括 gestational age 19 至 26 週、缺損上緣介於 t1 至 s1、mri 顯示 hindbrain herniation 且 karyotype 正常；手術時局部使用 allogeneic human pmscs seeded on extracellular matrix，主要安全性終點為修補部位癒合、cerebrospinal fluid leak、infection、異常增生或 tumor formation。 主要結果：2021 年 6 月 21 日至 2022 年 12 月 5 日共納入 6 名孕婦，胎兒 gestational age 為 24+5 至 25+5 週；新生兒於中位 34+5 週剖腹產出生。出生時所有嬰兒修補部位完整，未見 cerebrospinal fluid leak、infection 或 abnormal tissue growth；治療後 mri 顯示 hindbrain herniation reversal 且無 tumor formation，未發生 cell-mediated 不良事件。 藥師重點：結論顯示此 allogeneic live stem cell 介入在 6 例 first-in-human 經驗中未見 cell-related adverse effects，安全性足以進入非 staggered enrollment 的 第 1 期/2a 試驗。由於樣本數極小且為產前手術合併細胞治療，藥師解讀時需保守，並關注感染預防、圍產期用藥、細胞產品保存與後續長期追蹤資料。"},{"id":"pmid-41740992","kind":"article","issueId":"2026-week09","year":2026,"week":9,"weekLabel":"第 9 週","dateRange":"2026/02/23 – 03/01","href":"2026-week09.html","title":"Extended follow-up of invasive cervical cancer risk after quadrivalent HPV vaccination: nationwide, register based study","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"Wu","doi":"10.1136/bmj-2025-087326","url":"https://doi.org/10.1136/bmj-2025-087326","summary":"藥師重點：結論顯示 quadrivalent HPV vaccination 與 invasive cervical 癌症 長期風險降低相關，且未見明顯保護力衰退訊號，早期與 school based vaccination 的族群效益較明顯。藥師進行疫苗諮詢時，可強調及早接種的重要性，同時提醒仍需依建議接受子宮頸癌篩檢。","pubDate":"2026-02-25","terms":["extended","follow-up","invasive","cervical","cancer","quadrivalent","vaccination","nationwide","register","bmj-2025-087326"],"drugTerms":[],"searchText":"extended follow-up of invasive cervical cancer risk after quadrivalent hpv vaccination: nationwide, register based study bmj original article wu 10.1136/bmj-2025-087326 研究背景：quadrivalent human papillomavirus（hpv）疫苗 可降低 hpv 相關病變風險，但其對 invasive cervical 癌症 的長期保護、是否隨時間減弱，以及 school based vaccination programme 的族群影響仍需長期資料確認。 研究方法：此瑞典 nationwide register based 世代研究 追蹤 2006 年 1 月 1 日至 2023 年 12 月 31 日間 926,362 名女孩與女性，依出生世代區分 opportunistic、subsidised、catch-up 與 school based cohorts。研究以 poisson regression 估計接種 quadrivalent hpv 疫苗 者相較未接種者的 invasive cervical 癌症 發生率比s，並依接種年齡與接種後時間分層。 主要結果：追蹤期間 365,502 人（39.5%）至少接種一劑 quadrivalent hpv 疫苗，共發現 930 例 invasive cervical 癌症，其中接種者 97 例、未接種者 833 例。17 歲前接種者相較未接種者的 fully 校正 發生率比 為 0.21（95% ci 0.13 to 0.32），接種後 13-15 年仍維持保護（irr 0.23，95% ci 0.11 to 0.46）；17 歲或以上接種者整體 irr 為 0.63（95% ci 0.49 to 0.81）。 藥師重點：結論顯示 quadrivalent hpv vaccination 與 invasive cervical 癌症 長期風險降低相關，且未見明顯保護力衰退訊號，早期與 school based vaccination 的族群效益較明顯。藥師進行疫苗諮詢時，可強調及早接種的重要性，同時提醒仍需依建議接受子宮頸癌篩檢。"},{"id":"pmid-41729549","kind":"article","issueId":"2026-week09","year":2026,"week":9,"weekLabel":"第 9 週","dateRange":"2026/02/23 – 03/01","href":"2026-week09.html","title":"Does This Patient Have Volume Overload?: The Rational Clinical Examination","journal":"JAMA","type":"SR","typeLabel":"Systematic Review","author":"Drum","doi":"10.1001/jama.2026.0446","url":"https://doi.org/10.1001/jama.2026.0446","summary":"藥師重點：結論顯示 BNP ≥100 ng/mL 與胸部 X 光 vascular congestion 可協助確認 容積負荷過多，而缺乏 pulmonary B-lines 或 BNP <100 ng/mL 有助於排除。藥師協助調整利尿劑、輸液或心衰竭用藥時，應將檢查結果與症狀、腎功能、電解質及血流動力狀態一起判讀。","pubDate":"2026-04-07","terms":["does","this","have","volume","overload","rational","examination","jama","drum","medline"],"drugTerms":[],"searchText":"does this patient have volume overload?: the rational clinical examination jama systematic review drum 10.1001/jama.2026.0446 研究背景：準確評估 血管內容積 可協助判斷體液管理、利尿或補液策略，尤其對疑似 容積負荷過多 且仍可自主呼吸的病人更具臨床價值。本研究整理身體診察、影像與實驗室檢查對 容積負荷過多 的診斷準確性。 研究方法：此 systematic review 搜尋 medline 1946 年至 2026 年 1 月 6 日，納入 peer-reviewed english-language 研究，對象為非插管且自主呼吸、疑似 intravascular 容積負荷過多 的病人。三位作者獨立抽取資料並計算 sensitivity、specificity 與 likelihood ratios（lrs），再以 2-level mixed logistic regression model 合併估計值。 主要結果：共納入 40 項研究、11,490 名成人，容積負荷過多 盛行率為 35% 至 69%。bnp ≥100 ng/ml 最能支持 容積負荷過多（lr 6.9，95% ci 2.4-20.4），正常 bnp 則降低可能性（lr 0.14，95% ci 0.08-0.24）；胸部 x 光 vascular congestion（lr 5.9）、頸靜脈怒張超過胸骨角上方 3 cm（lr 4.1）、bilateral pulmonary b-lines（lr 4.0）與 inferior vena cava collapsibility index <50%（lr 3.9）亦增加診斷可能性。 藥師重點：結論顯示 bnp ≥100 ng/ml 與胸部 x 光 vascular congestion 可協助確認 容積負荷過多，而缺乏 pulmonary b-lines 或 bnp <100 ng/ml 有助於排除。藥師協助調整利尿劑、輸液或心衰竭用藥時，應將檢查結果與症狀、腎功能、電解質及血流動力狀態一起判讀。"},{"id":"pmid-41763745","kind":"article","issueId":"2026-week09","year":2026,"week":9,"weekLabel":"第 9 週","dateRange":"2026/02/23 – 03/01","href":"2026-week09.html","title":"Comparative efficacy and tolerability of antidopaminergic and muscarinic antipsychotics for acute schizophrenia: a network meta-analysis of randomised controlled trials indexed in international English and Chinese databases","journal":"Lancet","type":"MA","typeLabel":"Meta-analysis","author":"Schneider-Thoma","doi":"10.1016/S0140-6736(25)02365-7","url":"https://doi.org/10.1016/S0140-6736(25)02365-7","summary":"藥師重點：研究結果說明急性 schizophrenia 用藥之間存在小至中等但具臨床意義的療效差異，選藥不宜只看平均療效。藥師需同步評估體重、代謝、錐體外症狀、鎮靜、cholinergic 或 anticholinergic 不良事件，以及 partial dopamine agonists 與 xanomeline-trospium 的耐受性差異。","pubDate":"2026-02-28","terms":["comparative","efficacy","tolerability","antidopaminergic","muscarinic","antipsychotics","acute","schizophrenia","network","meta-analysis"],"drugTerms":["clozapine","olanzapine"],"searchText":"comparative efficacy and tolerability of antidopaminergic and muscarinic antipsychotics for acute schizophrenia: a network meta-analysis of randomised controlled trials indexed in international english and chinese databases lancet meta-analysis schneider-thoma 10.1016/s0140-6736(25)02365-7 研究背景：急性思覺失調症常以 antipsychotic drugs 治療，但各藥物受體結合特性、療效與耐受性差異明顯；xanomeline-trospium 作為 muscarinic 受體 致效劑 也帶來不同於傳統 antidopaminergic agents 的治療選項。本研究以 network 統合分析 比較多種 antipsychotics 的療效與耐受性。 研究方法：此 systematic review（prospero crd42022380708）納入 blinded 與 open rcts，研究對象為任何年齡、急性 schizophrenia psychotic symptoms 3 週至 3 個月者。納入 23 種主要 dopamine-受體 blocking medications 與 xanomeline-trospium，主要結果為量表評估的整體 schizophrenia symptoms，並以 random-effects frequentist network 統合分析 分析。 主要結果：研究篩選 18,859 筆文獻並納入 438 項 rct，其中 388 項、78,193 名受試者至少提供一項可用結果；主要終點分析來自 256 項 雙盲 研究、58,948 人。所有 antipsychotics 均較 安慰劑 減少症狀，standardised 平均差s 介於 -0.90（95% ci -1.03 to -0.77）至 -0.23（-0.39 to -0.06）；clozapine、amisulpride、olanzapine 與 risperidone 的療效優於至少三種其他藥物，但信心等級多為 low-to-moderate，耐受性則依藥物而異。 藥師重點：研究結果說明急性 schizophrenia 用藥之間存在小至中等但具臨床意義的療效差異，選藥不宜只看平均療效。藥師需同步評估體重、代謝、錐體外症狀、鎮靜、cholinergic 或 anticholinergic 不良事件，以及 partial dopamine agonists 與 xanomeline-trospium 的耐受性差異。"},{"id":"pmid-41740998","kind":"article","issueId":"2026-week09","year":2026,"week":9,"weekLabel":"第 9 週","dateRange":"2026/02/23 – 03/01","href":"2026-week09.html","title":"Adherence to legislation and recommendations to publicly post protocols and results of post-authorisation studies registered with European Medicines Agency: cross sectional study","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"Ramezani","doi":"10.1136/bmj-2025-086693","url":"https://doi.org/10.1136/bmj-2025-086693","summary":"藥師重點：研究結果說明 EMA 登錄上市後研究的公開程度仍不足，尤其是僅受建議而非法律義務約束的研究。藥師使用 post-authorisation 或 real-world evidence 支持用藥決策時，應確認 protocol、結果報告與研究限制是否可取得，避免只依摘要或登錄資訊判斷藥品風險。","pubDate":"2026-02-25","terms":["adherence","legislation","recommendations","publicly","post","protocols","post-authorisation","studies","registered","european"],"drugTerms":[],"searchText":"adherence to legislation and recommendations to publicly post protocols and results of post-authorisation studies registered with european medicines agency: cross sectional study bmj original article ramezani 10.1136/bmj-2025-086693 研究背景：上市後研究 可補足藥品上市後安全性與真實世界使用證據，但若研究 protocol 與 results 未公開，會影響研究透明度與臨床解讀。本研究評估 european medicines agency（ema）登錄之上市後研究是否遵循公開 protocol 與 results 的法規及建議。 研究方法：此 cross sectional 研究 使用 2024 年 2 月 ema catalogue of real-world 資料 研究，納入 2010 年 11 月後登錄的 上市後研究。研究評估 2300 項 進行中 或 finalised 研究 的 protocol availability，以及 1482 項 finalised 研究 的 results availability，並依 eu risk management plan（rmp）類別分層。 主要結果：整體而言，1370/2300 項 進行中 與 finalised 研究（59.6%）可取得 protocol，1014/1482 項 finalised 研究（68.4%）可取得 results。eu rmp category 1 與 2 finalised 研究 的 results available 均為 90%，但未納入 rmp 的 上市後研究 protocol available 僅 55.3%，results available 為 64.1%。 藥師重點：研究結果說明 ema 登錄上市後研究的公開程度仍不足，尤其是僅受建議而非法律義務約束的研究。藥師使用 post-authorisation 或 real-world evidence 支持用藥決策時，應確認 protocol、結果報告與研究限制是否可取得，避免只依摘要或登錄資訊判斷藥品風險。"},{"id":"fda-2026-week09-1","kind":"fda","issueId":"2026-week09","year":2026,"week":9,"weekLabel":"第 9 週","dateRange":"2026/02/23 – 03/01","href":"2026-week09.html","title":"FDA’s Concerns with Unapproved GLP-1 Drugs Used for Weight Loss","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["concerns","unapproved","glp-1","drugs","used","weight","loss","https","drug-alerts-and-statements","fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"],"drugTerms":["glp-1"],"searchText":"fda’s concerns with unapproved glp-1 drugs used for weight loss fda drug safety 2026-06-15 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"},{"id":"fda-2026-week09-3","kind":"fda","issueId":"2026-week09","year":2026,"week":9,"weekLabel":"第 9 週","dateRange":"2026/02/23 – 03/01","href":"2026-week09.html","title":"FDA issues final decision to withdraw approval of Pepaxto (melphalan flufenamide)","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/398713","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["issues","final","decision","withdraw","approval","pepaxto","melphalan","flufenamide","https","node"],"drugTerms":[],"searchText":"fda issues final decision to withdraw approval of pepaxto (melphalan flufenamide) fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/398713"},{"id":"fda-2026-week09-2","kind":"fda","issueId":"2026-week09","year":2026,"week":9,"weekLabel":"第 9 週","dateRange":"2026/02/23 – 03/01","href":"2026-week09.html","title":"FDA alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/403159","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["alerts","caregivers","providers","cross-compatibility","issues","autoinjector","devices","that","optional","glatiramer"],"drugTerms":[],"searchText":"fda alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/403159"},{"id":"fda-2026-week09-4","kind":"fda","issueId":"2026-week09","year":2026,"week":9,"weekLabel":"第 9 週","dateRange":"2026/02/23 – 03/01","href":"2026-week09.html","title":"FDA Accepts First In Silico Drug Development Tool Under ISTAND Program to Help Predict Drug-Induced Liver Injury","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["accepts","first","silico","development","tool","under","istand","program","help","predict"],"drugTerms":[],"searchText":"fda accepts first in silico drug development tool under istand program to help predict drug-induced liver injury fda drug safety 2026-06-03 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver"},{"id":"pmid-41702641","kind":"article","issueId":"2026-week08","year":2026,"week":8,"weekLabel":"第 8 週","dateRange":"2026/02/16 – 02/22","href":"2026-week08.html","title":"Vitamin D supplementation before in vitro fertilisation in women with polycystic ovary syndrome: multicentre, double blind, placebo controlled, randomised clinical trial","journal":"BMJ","type":"RCT","typeLabel":"RCT","author":"Hu","doi":"10.1136/bmj-2025-087438","url":"https://doi.org/10.1136/bmj-2025-087438","summary":"藥師重點：結論顯示 vitamin D 4000 IU/day 可提高血清 25-OHD，但未轉化為第一次胚胎植入後活產率改善；藥師可將其視為校正缺乏的營養補充資訊，不宜期待可單獨改善 IVF 活產結果。","pubDate":"2026-02-17","terms":["vitamin","supplementation","vitro","fertilisation","women","polycystic","ovary","syndrome","multicentre","double"],"drugTerms":[],"searchText":"vitamin d supplementation before in vitro fertilisation in women with polycystic ovary syndrome: multicentre, double blind, placebo controlled, randomised clinical trial bmj rct hu 10.1136/bmj-2025-087438 研究背景：多囊性卵巢症候群女性接受體外受精時，vitamin d 補充是否能改善活產率仍不明確。 研究方法：此中國 24 個生殖中心進行的 多中心、雙盲、安慰劑對照 rct，納入 876 名多囊性卵巢症候群且接受體外受精的女性。受試者以 1:1 隨機接受 vitamin d 4000 iu/day 或 安慰劑，最長治療 90 天至 trigger day；主要終點為第一次胚胎植入後活產。 主要結果：修正 意向治療分析共 865 人，vitamin d 組 trigger day 的 25-ohd 較高（32.3±11.2 vs 18.2±7.6 ng/ml；校正 平均差 13.6，95% ci 10.9 to 16.3），但活產率未增加（52.0% vs 50.2%；校正 rr 1.03，95% ci 0.91 to 1.18）。嚴重卵巢過度刺激症候群為 3 例 vs 6 例。 藥師重點：結論顯示 vitamin d 4000 iu/day 可提高血清 25-ohd，但未轉化為第一次胚胎植入後活產率改善；藥師可將其視為校正缺乏的營養補充資訊，不宜期待可單獨改善 ivf 活產結果。"},{"id":"pmid-41712219","kind":"article","issueId":"2026-week08","year":2026,"week":8,"weekLabel":"第 8 週","dateRange":"2026/02/16 – 02/22","href":"2026-week08.html","title":"Treatment for Brain Metastases With Stereotactic Radiation vs Hippocampal-Avoidance Whole Brain Radiation: A Randomized Clinical Trial","journal":"JAMA","type":"RCT","typeLabel":"RCT","author":"Aizer","doi":"10.1001/jama.2026.0076","url":"https://doi.org/10.1001/jama.2026.0076","summary":"藥師重點：研究支持在 5-20 顆腦轉移患者中，立體定位放射治療 較 海馬迴避全腦放射治療 更能改善症狀與日常功能干擾；臨床解讀需注意 6 個月完成率偏低，並與腫瘤科、放射腫瘤科共同評估病灶數量與整體預後。","pubDate":"2026-04-07","terms":["brain","metastases","stereotactic","radiation","hippocampal-avoidance","whole","jama","aizer","anderson","symptom"],"drugTerms":[],"searchText":"treatment for brain metastases with stereotactic radiation vs hippocampal-avoidance whole brain radiation: a randomized clinical trial jama rct aizer 10.1001/jama.2026.0076 研究背景：多發腦轉移患者常需放射治療，但 5-20 顆腦轉移時，局部 立體定位放射治療 與 海馬迴避全腦放射治療 對症狀與生活功能的差異仍需釐清。 研究方法：此美國 4 中心 第 3 期 開放標籤 rct 納入 196 名 5-20 顆腦轉移且未接受過腦部放射治療的患者，隨機接受 立體定位放射治療 或 海馬迴避全腦放射治療。主要終點為 6 個月內 md anderson symptom inventory-brain tumor 加權症狀嚴重度與日常功能干擾分數變化。 主要結果：僅 83 人（42%）完成 6 個月評估。立體定位放射治療 組分數由 2.69 變為 2.37，海馬迴避全腦放射治療 組由 2.29 變為 3.03，平均差 -1.06（95% ci -1.54 to -0.58；p<.001）。治療相關 等級 3-5 不良事件 為 12% vs 13%，疲倦較常見於全腦放射組（28% vs 44%）。 藥師重點：研究支持在 5-20 顆腦轉移患者中，立體定位放射治療 較 海馬迴避全腦放射治療 更能改善症狀與日常功能干擾；臨床解讀需注意 6 個月完成率偏低，並與腫瘤科、放射腫瘤科共同評估病灶數量與整體預後。"},{"id":"pmid-41707170","kind":"article","issueId":"2026-week08","year":2026,"week":8,"weekLabel":"第 8 週","dateRange":"2026/02/16 – 02/22","href":"2026-week08.html","title":"Perioperative Enfortumab Vedotin and Pembrolizumab in Bladder Cancer","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Vulsteke","doi":"10.1056/NEJMoa2511674","url":"https://doi.org/10.1056/NEJMoa2511674","summary":"藥師重點：結論顯示 perioperative enfortumab vedotin 加 pembrolizumab 可改善 cisplatin 不適合族群的 無事件存活期、整體存活期 與病理完全反應；藥師需同步監測皮膚毒性、周邊神經病變、高血糖與免疫相關不良事件。","pubDate":"2026-04-02","terms":["perioperative","enfortumab","vedotin","pembrolizumab","bladder","cancer","nejm","vulsteke","nejmoa2511674","cisplatin-based"],"drugTerms":["enfortumab","pembrolizumab","vedotin-pembrolizumab","cisplatin"],"searchText":"perioperative enfortumab vedotin and pembrolizumab in bladder cancer nejm rct vulsteke 10.1056/nejmoa2511674 研究背景：無法接受或拒絕 cisplatin-based chemotherapy 的 muscle-invasive bladder 癌症 患者常直接接受 radical cystectomy，perioperative systemic 治療 是否可改善預後是重要問題。 研究方法：此 第 3 期 開放標籤試驗 將 344 名 muscle-invasive bladder 癌症 患者隨機分配至 perioperative enfortumab vedotin 加 pembrolizumab 合併手術，或單純手術。治療包含 enfortumab vedotin 1.25 mg/kg 天 1 and 8 與 pembrolizumab 200 mg 第 1 天 每 3 週，手術安排於 3 cycles 後；主要終點為 無事件存活期。 主要結果：中位追蹤 25.6 個月，2 年 無事件存活期 為 74.7% vs 39.4%（hr 0.40，95% ci 0.28-0.57；p<0.001），整體存活期 為 79.7% vs 63.1%（hr 0.50，95% ci 0.33-0.74；p<0.001）。pathological 完全反應 為 57.1% vs 8.6%；enfortumab vedotin-pembrolizumab 組 等級 ≥3 drug-related 不良事件 為 45.5%。 藥師重點：結論顯示 perioperative enfortumab vedotin 加 pembrolizumab 可改善 cisplatin 不適合族群的 無事件存活期、整體存活期 與病理完全反應；藥師需同步監測皮膚毒性、周邊神經病變、高血糖與免疫相關不良事件。"},{"id":"pmid-41708152","kind":"article","issueId":"2026-week08","year":2026,"week":8,"weekLabel":"第 8 週","dateRange":"2026/02/16 – 02/22","href":"2026-week08.html","title":"Menopausal hormone therapy and long term mortality: nationwide, register based cohort study","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"Mikkelsen","doi":"10.1136/bmj-2025-085998","url":"https://doi.org/10.1136/bmj-2025-085998","summary":"藥師重點：此全國世代研究未發現 停經荷爾蒙治療 與死亡率增加相關；用藥諮詢仍應回到症狀嚴重度、乳癌與血栓風險、用藥期間及個別禁忌症，而非單以全因死亡率判斷是否使用。","pubDate":"2026-02-18","terms":["menopausal","hormone","long","term","mortality","nationwide","register","mikkelsen","bmj-2025-085998","registry-based"],"drugTerms":[],"searchText":"menopausal hormone therapy and long term mortality: nationwide, register based cohort study bmj original article mikkelsen 10.1136/bmj-2025-085998 研究背景：停經荷爾蒙治療是否增加長期全因死亡風險仍是用藥諮詢常見問題，本研究以全國登錄資料評估其關聯。 研究方法：此丹麥 nationwide registry-based 世代研究 納入 876,805 名 1950-1977 年出生且 45 歲仍存活的女性，追蹤至 2023 年 7 月 31 日。研究比較曾領取 systemic 停經荷爾蒙治療 處方與未暴露者的全因死亡及 cause-specific 死亡率，並以 cox regression 校正共變項。 主要結果：共有 104,086 人（11.9%）曾使用 停經荷爾蒙治療，47,594 人（5.4%）死亡，中位追蹤 14.3 年。使用者與未暴露者死亡率為 54.9 vs 35.5 per 10,000 person-years，校正後 hr 0.96（95% ci 0.93-0.98）；不同累積使用期間未見死亡風險增加，cause-specific 死亡率 也未見明確差異。 藥師重點：此全國世代研究未發現 停經荷爾蒙治療 與死亡率增加相關；用藥諮詢仍應回到症狀嚴重度、乳癌與血栓風險、用藥期間及個別禁忌症，而非單以全因死亡率判斷是否使用。"},{"id":"pmid-41692020","kind":"article","issueId":"2026-week08","year":2026,"week":8,"weekLabel":"第 8 週","dateRange":"2026/02/16 – 02/22","href":"2026-week08.html","title":"Lisocabtagene maraleucel in patients with relapsed or refractory marginal zone lymphoma (TRANSCEND FL): primary analysis results from the global, multicohort, single-arm, phase 2 study","journal":"Lancet","type":"OA","typeLabel":"Original Article","author":"Palomba","doi":"10.1016/S0140-6736(25)02435-3","url":"https://doi.org/10.1016/S0140-6736(25)02435-3","summary":"藥師重點：研究結果顯示 lisocabtagene maraleucel 在 復發或難治性 MZL 有高反應率且未見新安全性訊號，但資料來自 單臂 第 2 期 研究；藥師需留意 CAR-T 前處置、cytokine release 症候群、神經毒性、感染風險與長期追蹤安排。","pubDate":"2026-03-07","terms":["lisocabtagene","maraleucel","relapsed","refractory","marginal","zone","lymphoma","transcend","from","global"],"drugTerms":["car-t"],"searchText":"lisocabtagene maraleucel in patients with relapsed or refractory marginal zone lymphoma (transcend fl): primary analysis results from the global, multicohort, single-arm, phase 2 study lancet original article palomba 10.1016/s0140-6736(25)02435-3 研究背景：復發或難治性 marginal zone 淋巴瘤（mzl）缺乏可帶來深度且持久反應的治療，本研究評估 cd19-directed car t-cell 治療 lisocabtagene maraleucel 的療效與安全性。 研究方法：transcend fl 為 第 2 期 單臂 multi世代研究，納入美國、加拿大、歐洲與日本 30 個中心、曾接受至少兩線全身治療的 復發或難治性 mzl 患者。符合條件者接受 lisocabtagene maraleucel 100×10^6 car+ t cells，允許 bridging 治療；主要終點為 independent review committee 依 lugano 2014 criteria 評估的 整體反應率。 主要結果：77 名接受 leukapheresis 患者中，67 人接受 lisocabtagene maraleucel，66 人可評估療效；mzl 亞型包括 nodal 48%、splenic 27%、extranodal malt 25%。中位追蹤 24.1 個月，整體反應率 為 95%（95% ci 87.3-99.1；one-sided p<0.0001）。所有患者均有 治療-related 不良事件；等級 3 cytokine release 症候群 與 neurological 事件 各為 4%，未見 等級 4-5 事件，等級 ≥3 infections 為 16%。 藥師重點：研究結果顯示 lisocabtagene maraleucel 在 復發或難治性 mzl 有高反應率且未見新安全性訊號，但資料來自 單臂 第 2 期 研究；藥師需留意 car-t 前處置、cytokine release 症候群、神經毒性、感染風險與長期追蹤安排。"},{"id":"pmid-41707137","kind":"article","issueId":"2026-week08","year":2026,"week":8,"weekLabel":"第 8 週","dateRange":"2026/02/16 – 02/22","href":"2026-week08.html","title":"Hematopoietic Stem-Cell Gene Therapy for Cystinosis","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Barshop","doi":"10.1056/NEJMoa2506431","url":"https://doi.org/10.1056/NEJMoa2506431","summary":"藥師重點：此小型早期研究顯示 CTNS-RD-04 後白血球 cystine levels 下降，安全性多與 myeloablative 處方 及原疾病相關；臨床解讀應保守，需持續追蹤長期造血重建、插入突變風險與是否能轉化為器官功能效益。","pubDate":"2026-02-19","terms":["hematopoietic","stem-cell","gene","cystinosis","nejm","barshop","nejmoa2506431","ctns","pathogenic","variants"],"drugTerms":[],"searchText":"hematopoietic stem-cell gene therapy for cystinosis nejm original article barshop 10.1056/nejmoa2506431 研究背景：cystinosis 是 ctns pathogenic variants 造成的多系統 溶小體儲積疾病，cysteamine 可延緩但無法阻止疾病進展；ctns-rd-04 為針對 cystinosis 的 ex vivo gene 治療。 研究方法：此 第 1 期-2 開放標籤 進行中 研究 初步評估 ctns-rd-04，內容為以 lentiviral vectors 帶入 ctns complementary dna 的 autologous cd34+ cells。研究納入 cystinosis 患者，主要終點為安全性與副作用型態，次要終點包括白血球 cystine levels 與 cystine storage depletion。 主要結果：6 名 20-46 歲受試者接受 ctns-rd-04，追蹤 29-63 個月；劑量為 3.63×10^6 至 9.59×10^6 cd34+ cells/kg。所有患者均有持續且高度 polyclonal hematopoietic reconstitution；共發生 217 件 不良事件，多為輕至中度且與處置或原疾病相符，未見 monoclonal expansion。除 vector copy number 最低的 patient 4 外，白血球 cystine levels 較基線下降。 藥師重點：此小型早期研究顯示 ctns-rd-04 後白血球 cystine levels 下降，安全性多與 myeloablative 處方 及原疾病相關；臨床解讀應保守，需持續追蹤長期造血重建、插入突變風險與是否能轉化為器官功能效益。"},{"id":"pmid-41722967","kind":"article","issueId":"2026-week08","year":2026,"week":8,"weekLabel":"第 8 週","dateRange":"2026/02/16 – 02/22","href":"2026-week08.html","title":"Cumulative incidence of advanced breast cancer in women aged 40-49 years in the Japan Strategic Anti-cancer Randomised Trial (J-START) of adjunctive ultrasonography: a prespecified secondary analysis","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Harada-Shoji","doi":"10.1016/S0140-6736(25)02319-0","url":"https://doi.org/10.1016/S0140-6736(25)02319-0","summary":"藥師重點：結果顯示超音波輔助乳房攝影可降低 40-49 歲女性晚期乳癌累積發生率，尤其對乳房緻密族群與亞洲篩檢策略具參考價值；解讀時仍需注意此為篩檢介入，並非藥物治療研究。","pubDate":"2026-02-21","terms":["cumulative","incidence","advanced","breast","cancer","women","aged","years","japan","strategic"],"drugTerms":["anti-cancer"],"searchText":"cumulative incidence of advanced breast cancer in women aged 40-49 years in the japan strategic anti-cancer randomised trial (j-start) of adjunctive ultrasonography: a prespecified secondary analysis lancet rct harada-shoji 10.1016/s0140-6736(25)02319-0 研究背景：j-start 先前顯示乳房超音波輔助篩檢可提高乳癌偵測率，本分析評估其對 40-49 歲女性晚期乳癌累積發生率的長期影響。 研究方法：研究納入日本 42 個研究據點、40-49 歲且無乳癌病史的無症狀女性，1:1 分配接受超音波加乳房攝影或單用乳房攝影，於 2 年篩檢期間進行兩次篩檢。此預先設定次要分析追蹤至 2024 年 10 月 4 日，評估 tnm stage 2 或以上乳癌累積發生率。 主要結果：共 72,661 名女性隨機分組，中位追蹤約 11 年。介入組偵測到 894 例乳癌，其中 234 例（26%）為晚期；對照組 843 例中有 277 例（33%）為晚期，hr 0.83（95.6% ci 0.70-0.98；p=0.026）。差異約在第 4 年後出現，至第 8 年擴大後趨於穩定。 藥師重點：結果顯示超音波輔助乳房攝影可降低 40-49 歲女性晚期乳癌累積發生率，尤其對乳房緻密族群與亞洲篩檢策略具參考價值；解讀時仍需注意此為篩檢介入，並非藥物治療研究。"},{"id":"pmid-41707171","kind":"article","issueId":"2026-week08","year":2026,"week":8,"weekLabel":"第 8 週","dateRange":"2026/02/16 – 02/22","href":"2026-week08.html","title":"Cabotegravir plus Rilpivirine for Persons with HIV and Adherence Challenges","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Rana","doi":"10.1056/NEJMoa2508228","url":"https://doi.org/10.1056/NEJMoa2508228","summary":"藥師重點：結論顯示每月 cabotegravir-rilpivirine 對已先達病毒抑制但有 adherence 挑戰者，可降低 處方 failure；藥師需確認注射回診可近性、missed dose 處理、口服 lead-in 需求與抗藥性監測。","pubDate":"2026-02-26","terms":["cabotegravir","plus","rilpivirine","persons","adherence","challenges","nejm","rana","nejmoa2508228","long-acting"],"drugTerms":["cabotegravir"],"searchText":"cabotegravir plus rilpivirine for persons with hiv and adherence challenges nejm original article rana 10.1056/nejmoa2508228 研究背景：對口服 art adherence 困難的 hiv 感染者，long-acting injectable art 是否優於持續標準口服治療，過去缺乏隨機試驗資料。 研究方法：此 開放標籤 隨機試驗 納入 adherence 不佳或曾失聯的 hiv 感染者。step 1 先提供最長 24 週 adherence support、conditional economic incentives 與標準口服 art；hiv-1 rna 降至 ≤200 copies/ml 者進入 step 2，隨機接受每月 long-acting cabotegravir 加上 rilpivirine 注射或標準照護，主要終點為 處方 failure。 主要結果：step 1 共納入 453 人，step 2 有 306 人隨機分組；cabotegravir-rilpivirine 組 152 人、標準照護 組 154 人。中位追蹤 48 週時因次要結果達優勢而提前停止；48 週 處方 failure 累積發生率為 22.8% vs 41.2%（差異 -18.4 百分點；98.4% ci -32.4 to -4.3；p=0.002）。不良事件 累積發生率相近（43.5% vs 42.4%），兩組各有 2 名 confirmed virologic failure 者出現 resistance-associated mutations。 藥師重點：結論顯示每月 cabotegravir-rilpivirine 對已先達病毒抑制但有 adherence 挑戰者，可降低 處方 failure；藥師需確認注射回診可近性、missed dose 處理、口服 lead-in 需求與抗藥性監測。"},{"id":"pmid-41708134","kind":"article","issueId":"2026-week08","year":2026,"week":8,"weekLabel":"第 8 週","dateRange":"2026/02/16 – 02/22","href":"2026-week08.html","title":"Analysis of non-prospective trial registration in clinical trials submitted to The BMJ: observational study","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"Blanco","doi":"10.1136/bmj-2025-086467","url":"https://doi.org/10.1136/bmj-2025-086467","summary":"藥師重點：研究結果提醒臨床試驗登錄狀態會影響證據判讀；藥師在閱讀治療研究時，除療效數字外，也應檢查 試驗 registration、登錄時間與 結果指標 是否前後一致，以降低選擇性報告偏差的影響。","pubDate":"2026-02-18","terms":["non-prospective","registration","trials","submitted","observational","blanco","bmj-2025-086467","icmje","consort","funding"],"drugTerms":[],"searchText":"analysis of non-prospective trial registration in clinical trials submitted to the bmj: observational study bmj original article blanco 10.1136/bmj-2025-086467 研究背景：臨床試驗未前瞻性登錄會影響研究透明度與可信度，本研究分析提交至 the bmj 且疑似未符合登錄要求試驗的後續情形。 研究方法：此 observational 研究 比較 2019-2023 年提交至 the bmj、被編輯標記為可能未前瞻性登錄的 239 項臨床試驗，與同期間隨機抽樣且已於 icmje 接受登錄平台前瞻性登錄的 239 項試驗。主要評估非前瞻性登錄相關因素、登錄缺失類型、後續發表狀態與是否揭露登錄問題。 主要結果：較大樣本數、作者數較多、提及 consort、較近期投稿與有 funding 與較低非前瞻性登錄 odds 相關；亞洲通訊作者則較高。2019-2021 年間 176 項未前瞻性登錄試驗中，83% 為回溯登錄、13% 未登錄、4% 登錄於非 icmje 接受平台；88% 後續仍發表，僅約六分之一明確揭露登錄缺失。 藥師重點：研究結果提醒臨床試驗登錄狀態會影響證據判讀；藥師在閱讀治療研究時，除療效數字外，也應檢查 試驗 registration、登錄時間與 結果指標 是否前後一致，以降低選擇性報告偏差的影響。"},{"id":"pmid-41707138","kind":"article","issueId":"2026-week08","year":2026,"week":8,"weekLabel":"第 8 週","dateRange":"2026/02/16 – 02/22","href":"2026-week08.html","title":"An Antibody-Oligonucleotide Conjugate for Myotonic Dystrophy Type 1","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Johnson","doi":"10.1056/NEJMoa2407326","url":"https://doi.org/10.1056/NEJMoa2407326","summary":"藥師重點：研究結果支持 del-desiran 可進入肌肉並在部分患者改善 aberrant alternative splicing，但仍屬早期小型試驗且已有 嚴重不良事件；後續臨床應重點追蹤輸注安全性、劑量反應與功能性臨床效益。","pubDate":"2026-02-19","terms":["antibody-oligonucleotide","conjugate","myotonic","dystrophy","type","nejm","johnson","nejmoa2407326","del-desiran","oligonucleotide"],"drugTerms":[],"searchText":"an antibody-oligonucleotide conjugate for myotonic dystrophy type 1 nejm rct johnson 10.1056/nejmoa2407326 研究背景：myotonic dystrophy type 1 是罕見且逐漸惡化的遺傳性神經肌肉疾病，目前缺乏核准治療；del-desiran 以 抗體-oligonucleotide conjugate 方式標的 dmpk mrna。 研究方法：此 第 1 期-2、多中心、雙盲、隨機、安慰劑對照 試驗，將 myotonic dystrophy type 1 患者分配接受 del-desiran 單劑 1 mg/kg、三劑 2 mg/kg 或 4 mg/kg 靜脈輸注，或 安慰劑。主要終點為安全性，次要終點包括藥動學、藥效學，以及肌肉切片中 aberrant splicing 變化。 主要結果：del-desiran 1、2、4 mg/kg 組分別有 6、9、13 人，安慰劑 組 10 人；35/38 名接受輸注者發生輕至中度不良事件。2 名受試者發生 重度 嚴重不良事件，其中 1 名停止試驗；dmpk mrna 在 1、2、4 mg/kg 組分別下降 46%、44%、37%，安慰劑 為 0.9%。 藥師重點：研究結果支持 del-desiran 可進入肌肉並在部分患者改善 aberrant alternative splicing，但仍屬早期小型試驗且已有 嚴重不良事件；後續臨床應重點追蹤輸注安全性、劑量反應與功能性臨床效益。"},{"id":"fda-2026-week08-1","kind":"fda","issueId":"2026-week08","year":2026,"week":8,"weekLabel":"第 8 週","dateRange":"2026/02/16 – 02/22","href":"2026-week08.html","title":"FDA’s Concerns with Unapproved GLP-1 Drugs Used for Weight Loss","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["concerns","unapproved","glp-1","drugs","used","weight","loss","https","drug-alerts-and-statements","fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"],"drugTerms":["glp-1"],"searchText":"fda’s concerns with unapproved glp-1 drugs used for weight loss fda drug safety 2026-06-15 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"},{"id":"fda-2026-week08-3","kind":"fda","issueId":"2026-week08","year":2026,"week":8,"weekLabel":"第 8 週","dateRange":"2026/02/16 – 02/22","href":"2026-week08.html","title":"FDA issues final decision to withdraw approval of Pepaxto (melphalan flufenamide)","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/398713","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["issues","final","decision","withdraw","approval","pepaxto","melphalan","flufenamide","https","node"],"drugTerms":[],"searchText":"fda issues final decision to withdraw approval of pepaxto (melphalan flufenamide) fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/398713"},{"id":"fda-2026-week08-2","kind":"fda","issueId":"2026-week08","year":2026,"week":8,"weekLabel":"第 8 週","dateRange":"2026/02/16 – 02/22","href":"2026-week08.html","title":"FDA alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/403159","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["alerts","caregivers","providers","cross-compatibility","issues","autoinjector","devices","that","optional","glatiramer"],"drugTerms":[],"searchText":"fda alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/403159"},{"id":"fda-2026-week08-4","kind":"fda","issueId":"2026-week08","year":2026,"week":8,"weekLabel":"第 8 週","dateRange":"2026/02/16 – 02/22","href":"2026-week08.html","title":"FDA Accepts First In Silico Drug Development Tool Under ISTAND Program to Help Predict Drug-Induced Liver Injury","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["accepts","first","silico","development","tool","under","istand","program","help","predict"],"drugTerms":[],"searchText":"fda accepts first in silico drug development tool under istand program to help predict drug-induced liver injury fda drug safety 2026-06-03 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver"},{"id":"pmid-41655588","kind":"article","issueId":"2026-week07","year":2026,"week":7,"weekLabel":"第 7 週","dateRange":"2026/02/09 – 02/15","href":"2026-week07.html","title":"Tenecteplase versus standard medical treatment for basilar artery occlusion within 24 h (TRACE-5): a multicentre, prospective, randomised, open-label, blinded-endpoint, superiority, phase 3 trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Xiong","doi":"10.1016/S0140-6736(25)02633-9","url":"https://doi.org/10.1016/S0140-6736(25)02633-9","summary":"藥師重點：研究結果說明 tenecteplase 於基底動脈阻塞中風 24 h 內使用，可能改善 90 天功能預後且未增加症狀性顱內出血；實務應依中風團隊流程評估給藥時間窗、出血風險、後續 血管內取栓 與 alteplase 替代策略。","pubDate":"2026-02-21","terms":["tenecteplase","standard","basilar","artery","occlusion","within","trace-5","multicentre","prospective","randomised"],"drugTerms":[],"searchText":"tenecteplase versus standard medical treatment for basilar artery occlusion within 24 h (trace-5): a multicentre, prospective, randomised, open-label, blinded-endpoint, superiority, phase 3 trial lancet rct xiong 10.1016/s0140-6736(25)02633-9 研究背景：基底動脈阻塞造成的缺血性中風預後不佳，症狀發生 24 h 內使用 tenecteplase 靜脈血栓溶解的療效與安全性仍缺乏大型證據。 研究方法：trace-5 為中國 66 個中風中心進行的前瞻性、隨機、開放標籤、盲性終點評估 superiority 第 3 期試驗，收錄 18 歲以上、基底動脈阻塞且發病或最後正常時間 24 h 內可接受靜脈血栓溶解的患者。患者分配至 tenecteplase 0.25 mg/kg（最高 25 mg）單次靜脈 bolus，或標準醫療治療，可合併或不合併 血管內取栓；主要終點為 90 天 mrs 0-1 或回到基線 mrs。 主要結果：共 452 人納入分析，tenecteplase 組 221 人、標準治療組 231 人，其中 49% 後續接受 血管內取栓。90 天達主要終點者為 38% vs 29%（校正 relative 比率 1.50，95% ci 1.09-2.08，p=0.014）；36 h 內 有症狀 顱內出血 為 2% vs 3%，90 天全因死亡率為 29% vs 31%。 藥師重點：研究結果說明 tenecteplase 於基底動脈阻塞中風 24 h 內使用，可能改善 90 天功能預後且未增加症狀性顱內出血；實務應依中風團隊流程評估給藥時間窗、出血風險、後續 血管內取栓 與 alteplase 替代策略。"},{"id":"pmid-41667193","kind":"article","issueId":"2026-week07","year":2026,"week":7,"weekLabel":"第 7 週","dateRange":"2026/02/09 – 02/15","href":"2026-week07.html","title":"Standard chemoradiotherapy with concurrent and adjuvant camrelizumab in patients with high risk nasopharyngeal carcinoma: multicentre, randomised, open label, phase 3 trial","journal":"BMJ","type":"RCT","typeLabel":"RCT","author":"You","doi":"10.1136/bmj-2025-085863","url":"https://doi.org/10.1136/bmj-2025-085863","summary":"藥師重點：結論顯示 camrelizumab 加入同步化放療並作為維持治療，可改善誘導化療後高風險鼻咽癌患者的 無惡化存活期；藥師需留意免疫相關不良事件、治療週期長度與病人是否符合試驗族群。","pubDate":"2026-02-10","terms":["standard","chemoradiotherapy","concurrent","adjuvant","camrelizumab","high","nasopharyngeal","carcinoma","multicentre","randomised"],"drugTerms":["camrelizumab","cisplatin"],"searchText":"standard chemoradiotherapy with concurrent and adjuvant camrelizumab in patients with high risk nasopharyngeal carcinoma: multicentre, randomised, open label, phase 3 trial bmj rct you 10.1136/bmj-2025-085863 研究背景：高風險鼻咽癌在誘導化療後仍有復發風險，camrelizumab 作為 pd-1 抑制劑 併入同步化放療與維持治療，是否能改善疾病控制仍需臨床試驗驗證。 研究方法：研究為中國 7 家醫院進行的多中心、隨機、開放標籤 第 3 期試驗，收錄 18-70 歲、接受 3 個療程 gemcitabine/cisplatin 誘導化療後的新診斷高風險鼻咽癌患者。患者以 1:1 分配至 cisplatin 為主的標準同步化放療，或標準治療加上 camrelizumab 200 mg 每 3 週一次共 19 個療程，主要終點為 無惡化存活期。 主要結果：共 390 人隨機分配至 camrelizumab 組 194 人與標準治療組 196 人；中位追蹤 39.9 個月時，36 個月 無惡化存活期 為 83.4% vs 71.3%（stratified hr 0.51，95% ci 0.34-0.77，p=0.001）。等級 3 或 4 急性與晚期不良事件分別為 50.5%/3.2% vs 48.7%/3.7%，camrelizumab 組 等級 3 或 4 免疫相關不良事件為 10.2%。 藥師重點：結論顯示 camrelizumab 加入同步化放療並作為維持治療，可改善誘導化療後高風險鼻咽癌患者的 無惡化存活期；藥師需留意免疫相關不良事件、治療週期長度與病人是否符合試驗族群。"},{"id":"pmid-41670966","kind":"article","issueId":"2026-week07","year":2026,"week":7,"weekLabel":"第 7 週","dateRange":"2026/02/09 – 02/15","href":"2026-week07.html","title":"Emergency Department-Initiated Buprenorphine for Opioid Use Disorder: A Randomized Clinical Trial","journal":"JAMA","type":"RCT","typeLabel":"RCT","author":"D'Onofrio","doi":"10.1001/jama.2025.27019","url":"https://doi.org/10.1001/jama.2025.27019","summary":"藥師重點：結論顯示急診啟動 7 天 extended-release buprenorphine 未提高第 7 天治療參與率，但兩種 buprenorphine 形式皆具可接受耐受性；藥師需協助銜接後續治療、評估 fentanyl 使用背景下的 precipitated withdrawal 風險與衛教給藥形式差異。","pubDate":"2026-03-17","terms":["emergency","department-initiated","buprenorphine","opioid","disorder","jama","onofrio","extended-release","injectable","withdrawal"],"drugTerms":[],"searchText":"emergency department-initiated buprenorphine for opioid use disorder: a randomized clinical trial jama rct d'onofrio 10.1001/jama.2025.27019 研究背景：opioid 使用 疾患 患者常在急診接觸醫療體系，extended-release injectable buprenorphine 可能讓高風險或較難追蹤的患者在較低 withdrawal 程度下啟動治療。 研究方法：研究為美國 29 家急診進行的多中心隨機臨床試驗，收錄未治療 opioid 使用 疾患 且 臨床 opiate withdrawal scale（cows）至少 4 分的成人。患者分配至 7 天 extended-release buprenorphine 24 mg 注射（約等同 16 mg/d）或 sublingual buprenorphine，兩組皆安排 7 天內後續治療門診；主要終點為第 7 天仍參與 opioid 使用 疾患 治療。 主要結果：排除重複收案後共分析 1994 人，extended-release 組 991 人、sublingual 組 1003 人，76% fentanyl 檢測陽性。第 7 天治療參與率為 40.5% vs 38.5%（校正 差異 1.6%，95% ci -2.8% to 6.0%），第 30 天亦相近；precipitated withdrawal 罕見（0.6% vs 0.8%），30 天內 overdose 兩組各 18 人。 藥師重點：結論顯示急診啟動 7 天 extended-release buprenorphine 未提高第 7 天治療參與率，但兩種 buprenorphine 形式皆具可接受耐受性；藥師需協助銜接後續治療、評估 fentanyl 使用背景下的 precipitated withdrawal 風險與衛教給藥形式差異。"},{"id":"pmid-41655584","kind":"article","issueId":"2026-week07","year":2026,"week":7,"weekLabel":"第 7 週","dateRange":"2026/02/09 – 02/15","href":"2026-week07.html","title":"Efimosfermin alfa (BOS-580) once per month in people with metabolic dysfunction-associated steatohepatitis with F2 or F3 fibrosis: results from a 24-week, randomised, double-blind, placebo-controlled, phase 2 trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Noureddin","doi":"10.1016/S0140-6736(25)02276-7","url":"https://doi.org/10.1016/S0140-6736(25)02276-7","summary":"藥師重點：結論顯示每月一次 efimosfermin 在切片確認 MASH 且 F2/F3 fibrosis 患者中整體耐受性尚可，但目前仍屬小型 第 2 期 證據；藥師可重點追蹤胃腸道症狀、肝功能與後續抗纖維化療效資料。","pubDate":"2026-02-21","terms":["efimosfermin","alfa","bos-580","once","month","people","metabolic","dysfunction-associated","steatohepatitis","fibrosis"],"drugTerms":[],"searchText":"efimosfermin alfa (bos-580) once per month in people with metabolic dysfunction-associated steatohepatitis with f2 or f3 fibrosis: results from a 24-week, randomised, double-blind, placebo-controlled, phase 2 trial lancet rct noureddin 10.1016/s0140-6736(25)02276-7 研究背景：metabolic 功能障礙-associated steatohepatitis（mash）盛行率上升，具 f2 或 f3 fibrosis 的患者仍需要安全且具肝臟標的性的抗纖維化治療。efimosfermin alfa（bos-580）為每月一次給藥的 fgf21 analogue，本研究評估其安全性與療效訊號。 研究方法：研究為 24 週、隨機、雙盲、安慰劑對照 第 2 期 試驗，於美國 34 個研究中心收錄 18-75 歲、bmi 至少 27 kg/m2、肝切片確認 mash 且 f2 或 f3 fibrosis 的成人。受試者以 1:1 分配至 efimosfermin 300 mg q4w 皮下注射或 安慰劑，主要終點為安全性與耐受性。 主要結果：1171 人篩選後，84 人隨機分配至 efimosfermin 組 43 人與 安慰劑 組 41 人；57% 為 f2 fibrosis、43% 為 f3 fibrosis。治療後不良事件為 67% vs 55%，多為輕度或中度，最常見為短暫胃腸道事件；兩組未見具臨床意義的生命徵象差異、等級 3 以上實驗室異常、死亡或 等級 3 以上不良事件。 藥師重點：結論顯示每月一次 efimosfermin 在切片確認 mash 且 f2/f3 fibrosis 患者中整體耐受性尚可，但目前仍屬小型 第 2 期 證據；藥師可重點追蹤胃腸道症狀、肝功能與後續抗纖維化療效資料。"},{"id":"pmid-41690769","kind":"article","issueId":"2026-week07","year":2026,"week":7,"weekLabel":"第 7 週","dateRange":"2026/02/09 – 02/15","href":"2026-week07.html","title":"Effectiveness of drug interventions to prevent delirium after surgery for older adults: systematic review and network meta-analysis of randomised controlled trials","journal":"BMJ","type":"MA","typeLabel":"Meta-analysis","author":"Luney","doi":"10.1136/bmj-2025-085539","url":"https://doi.org/10.1136/bmj-2025-085539","summary":"藥師重點：研究結果支持 dexmedetomidine 可預防術後 delirium，其他藥物雖有潛在效益但證據品質從中等到極低不等；藥師參與圍手術期用藥時，應同時評估鎮靜深度、低血壓、心搏過緩與納入研究異質性。","pubDate":"2026-02-12","terms":["effectiveness","interventions","prevent","delirium","surgery","older","a
