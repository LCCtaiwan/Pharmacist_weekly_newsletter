0 mg 每日一次；主要終點為 investigator-assessed imaging-based 無惡化存活期，key 次要終點 為 整體存活期。 主要結果：599 人隨機分組；3 年 無惡化存活期 為 77% vs 56%（hr for 疾病 progression or 死亡 0.48，95% ci 0.36 to 0.65；p<0.001）。interim 整體存活期 3 年為 78% vs 72%（hr for 死亡 0.77，95% ci 0.56 to 1.04）；嚴重不良事件 為 42% vs 32%，talazoparib 組 等級 3 以上 anemia 為 51%，並有 2 例 治療-related deaths。 藥師重點：talazoparib 加 enzalutamide 可延長具 dna repair gene alterations 的 轉移性 apms prostate 癌症 影像無惡化存活，但整體存活仍屬 interim 結果；藥師需確認基因檢測結果並密切監測 anemia、neutropenia、疲倦與劑量調整需求。"},{"id":"pmid-42251769","kind":"article","issueId":"2026-week23","year":2026,"week":23,"weekLabel":"第 23 週","dateRange":"2026/06/01 – 06/07","href":"2026-week23.html","title":"Orforglipron Added to Titrated Insulin Glargine in Type 2 Diabetes: The ACHIEVE-5 Randomized Clinical Trial","journal":"JAMA","type":"OA","typeLabel":"Original Article","author":"Giorgino","doi":"10.1001/jama.2026.9512","url":"https://doi.org/10.1001/jama.2026.9512","summary":"藥師重點：Orforglipron 併用 insulin glargine 可改善 HbA1c 並減重，且摘要未見臨床顯著低血糖增加；藥師需監測胃腸道耐受性、insulin 劑量調整、低血糖衛教與口服 GLP-1 類藥物服藥順從性。","pubDate":"2026-06-07","terms":["orforglipron","added","titrated","insulin","glargine","type","diabetes","achieve-5","jama","giorgino"],"drugTerms":["glp-1"],"searchText":"orforglipron added to titrated insulin glargine in type 2 diabetes: the achieve-5 randomized clinical trial jama original article giorgino 10.1001/jama.2026.9512 研究背景：orforglipron 為 口服 nonpeptide glp-1 受體 致效劑；其加到已滴定 insulin glargine 後對第二型糖尿病血糖與體重的影響尚需 第 3 期 評估。 研究方法：achieve-5 為 40 週、隨機、雙盲、第 3 期 研究，於 5 國 72 個中心收錄使用 insulin glargine、可併用 metformin 或 sglt2 抑制劑 但控制不足的第二型糖尿病成人。受試者以 1:1:1:1 接受 orforglipron 3 mg、12 mg、36 mg 每日一次 或 安慰劑，皆併用 titrated insulin glargine；主要終點為 week 40 hba1c 變化。 主要結果：546 人隨機分組；week 40 hba1c 變化為 -1.58%、-1.88%、-1.82% vs -0.79%，相對 安慰劑 差異分別為 -0.78%、-1.08%、-1.03%（p<.001 for all）。體重變化為 -2.6%、-4.8%、-5.4% vs 0.2%；常見不良事件為輕至中度 gastrointestinal 事件，未增加 clinically significant hypoglycemia。 藥師重點：orforglipron 併用 insulin glargine 可改善 hba1c 並減重，且摘要未見臨床顯著低血糖增加；藥師需監測胃腸道耐受性、insulin 劑量調整、低血糖衛教與口服 glp-1 類藥物服藥順從性。"},{"id":"pmid-42246654","kind":"article","issueId":"2026-week23","year":2026,"week":23,"weekLabel":"第 23 週","dateRange":"2026/06/01 – 06/07","href":"2026-week23.html","title":"Obinutuzumab or Tacrolimus in Primary Membranous Nephropathy","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Fervenza","doi":"10.1056/NEJMoa2602678","url":"https://doi.org/10.1056/NEJMoa2602678","summary":"藥師重點：Obinutuzumab 在 主要 membranous nephropathy 誘導 complete 緩解 優於 tacrolimus；藥師需監測 infusion reaction、感染、neutropenia、疫苗接種時機與免疫抑制背景治療。","pubDate":"2026-06-05","terms":["obinutuzumab","tacrolimus","membranous","nephropathy","nejm","fervenza","nejmoa2602678","type","anti-cd20","majesty"],"drugTerms":["obinutuzumab","anti-cd20"],"searchText":"obinutuzumab or tacrolimus in primary membranous nephropathy nejm original article fervenza 10.1056/nejmoa2602678 研究背景：obinutuzumab 為 type ii anti-cd20 抗體，已用於血液腫瘤與自體免疫疾病；主要 membranous nephropathy 中其相較 tacrolimus 的療效與安全性仍需評估。 研究方法：majesty 為 第 3 期試驗，將 主要 membranous nephropathy 成人以 1:1 分配接受 intravenous obinutuzumab 或 口服 tacrolimus。主要終點為 week 104 complete 緩解，定義為 urinary protein-to-creatinine 比值 ≤0.3 且 egfr 穩定；並評估 緩解、egfr decline、promis fatigue t score 與安全性。 主要結果：142 人隨機分組；week 104 complete 緩解 為 37% vs 6%，校正 差異 31 百分點（95% ci 18 to 44；p<0.001）。complete/partial 緩解 與 week 76 complete 緩解 亦支持 obinutuzumab；等級 3 以上 不良事件 為 22% vs 19%，嚴重不良事件 為 17% vs 14%，obinutuzumab 相關反應包括 輸注相關反應、respiratory tract infections 與 neutropenia。 藥師重點：obinutuzumab 在 主要 membranous nephropathy 誘導 complete 緩解 優於 tacrolimus；藥師需監測 infusion reaction、感染、neutropenia、疫苗接種時機與免疫抑制背景治療。"},{"id":"pmid-42233621","kind":"article","issueId":"2026-week23","year":2026,"week":23,"weekLabel":"第 23 週","dateRange":"2026/06/01 – 06/07","href":"2026-week23.html","title":"Obexelimab for the Treatment of IgG4-Related Disease","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Della-Torre","doi":"10.1056/NEJMoa2601337","url":"https://doi.org/10.1056/NEJMoa2601337","summary":"藥師重點：Obexelimab 可能作為 IgG4-related 疾病 的 steroid-sparing 選項；藥師需協助規劃 steroid taper、感染風險與疫苗評估，並追蹤 hypersensitivity、diarrhea 與疾病 flare。","pubDate":"2026-06-02","terms":["obexelimab","igg4-related","nejm","della-torre","nejmoa2601337","glucocorticoid","cd19","riib","coengagement","b-cell"],"drugTerms":["obexelimab"],"searchText":"obexelimab for the treatment of igg4-related disease nejm original article della-torre 10.1056/nejmoa2601337 研究背景：igg4-related 疾病 為可侵犯多器官的慢性纖維發炎性疾病，glucocorticoid 雖為治療基石，但長期毒性與停藥後復發是臨床限制；obexelimab 透過 cd19 與 fcγriib coengagement 抑制 b-cell activity。 研究方法：indigo 為 第 3 期、雙盲、隨機、安慰劑對照 試驗，active igg4-related 疾病 患者接受 subcutaneous obexelimab 250 mg once 每週 或 安慰劑 共 52 週。兩組 glucocorticoids 皆依標準化 schedule 於 week 8 taper 至停用；主要終點為需 rescue 治療 的首次 flare 時間。 主要結果：194 人隨機分組；obexelimab 延長首次需救援治療的 flare 時間（hr 0.44，95% ci 0.28 to 0.71；p<0.001），flare 發生率為 26.8% vs 54.6%。complete 緩解 為 37.1% vs 19.6%（p=0.005），cumulative glucocorticoid rescue dose 為 329.5 mg vs 929.8 mg（p=0.004）；嚴重不良事件 為 10.3% vs 18.6%。 藥師重點：obexelimab 可能作為 igg4-related 疾病 的 steroid-sparing 選項；藥師需協助規劃 steroid taper、感染風險與疫苗評估，並追蹤 hypersensitivity、diarrhea 與疾病 flare。"},{"id":"pmid-42235014","kind":"article","issueId":"2026-week23","year":2026,"week":23,"weekLabel":"第 23 週","dateRange":"2026/06/01 – 06/07","href":"2026-week23.html","title":"Kidney Transplantation in Two Highly Sensitized Candidates after CAR T-Cell Therapy","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Bhoj","doi":"10.1056/NEJMoa2513428","url":"https://doi.org/10.1056/NEJMoa2513428","summary":"藥師重點：此報告提示 CAR T-cell desensitization 可能擴大高度 HLA sensitized 患者的移植機會，但證據仍限於 2 例 safety run-in；藥師應回原文確認 lymphodepletion、感染預防、免疫抑制銜接、CRS/ICANS 與移植後 rejection surveillance。","pubDate":"2026-06-04","terms":["kidney","transplantation","highly","sensitized","candidates","t-cell","nejm","bhoj","nejmoa2513428","sensitization"],"drugTerms":["anti-hla"],"searchText":"kidney transplantation in two highly sensitized candidates after car t-cell therapy nejm original article bhoj 10.1056/nejmoa2513428 研究背景：高度 hla sensitization 會明顯限制 end-stage kidney 疾病 患者接受 kidney transplantation 的機會，既有 desensitization 對 calculated panel-reactive 抗體 score ≥99.9% 族群效果不穩定。 研究方法：本文為 多中心 第 1 期 臨床 研究 的 safety run-in 世代 報告，評估 combined cd19-targeted 與 bcma-targeted car t cells 用於清除 preformed anti-hla 抗體 的細胞來源。摘要描述兩位高度 sensitized 候選者在 dual car t-cell 治療 desensitization 後接受 kidney transplantation。 主要結果：摘要指出兩位高度 sensitized 候選者在 dual car t-cell 治療 後完成 kidney transplantation，但未提供完整抗體下降幅度、移植後腎功能、排斥或感染等量化結果。研究登錄為 nct06056102，屬早期安全性與可行性訊號。 藥師重點：此報告提示 car t-cell desensitization 可能擴大高度 hla sensitized 患者的移植機會，但證據仍限於 2 例 safety run-in；藥師應回原文確認 lymphodepletion、感染預防、免疫抑制銜接、crs/icans 與移植後 rejection surveillance。"},{"id":"pmid-42218899","kind":"article","issueId":"2026-week23","year":2026,"week":23,"weekLabel":"第 23 週","dateRange":"2026/06/01 – 06/07","href":"2026-week23.html","title":"Ivonescimab plus chemotherapy versus tislelizumab plus chemotherapy in advanced squamous non-small-cell lung cancer (HARMONi-6): interim overall survival analysis of a randomised, double-blind, phase 3 trial in China","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Lu","doi":"10.1016/S0140-6736(26)00966-9","url":"https://doi.org/10.1016/S0140-6736(26)00966-9","summary":"藥師重點：ivonescimab 加化療在此中國族群較 tislelizumab 加化療延長 整體存活期，但 VEGF blockade 相關出血訊號較高；藥師需評估出血風險、抗凝/抗血小板併用、免疫相關不良事件與化療骨髓抑制。","pubDate":"2026-06-27","terms":["ivonescimab","plus","chemotherapy","tislelizumab","advanced","squamous","non-small-cell","lung","cancer","harmoni-6"],"drugTerms":["ivonescimab","tislelizumab","paclitaxel","carboplatin"],"searchText":"ivonescimab plus chemotherapy versus tislelizumab plus chemotherapy in advanced squamous non-small-cell lung cancer (harmoni-6): interim overall survival analysis of a randomised, double-blind, phase 3 trial in china lancet rct lu 10.1016/s0140-6736(26)00966-9 研究背景：ivonescimab 為同時作用於 pd-1 與 vegf 的 bispecific 抗體；harmoni-6 先前顯示其合併化療可延長 advanced squamous nsclc 的 無惡化存活期，本次報告預先設定的 interim 整體存活期 分析。 研究方法：harmoni-6 為中國 50 家醫院執行的 雙盲、隨機、第 3 期試驗，收錄未治療、不可切除 stage iiib/iiic 或 stage iv squamous nsclc，ecog 0-1、年齡 18-75 歲患者。受試者接受 ivonescimab 或 tislelizumab 合併 paclitaxel/carboplatin 四個 cycles，之後以對應單藥維持；整體存活期 為 key 次要終點。 主要結果：532 人隨機分組；資料截止時死亡 84/266 vs 120/265。中位數 整體存活期 為 27.9 個月 vs 23.7 個月（hr for 死亡 0.66，95% ci 0.50-0.87；pone-sided=0.0017），達預設邊界；等級 3 以上 治療相關不良事件 為 69% vs 59%，等級 3 以上 haemorrhage 為 3% vs 1%。 藥師重點：ivonescimab 加化療在此中國族群較 tislelizumab 加化療延長 整體存活期，但 vegf blockade 相關出血訊號較高；藥師需評估出血風險、抗凝/抗血小板併用、免疫相關不良事件與化療骨髓抑制。"},{"id":"pmid-42250272","kind":"article","issueId":"2026-week23","year":2026,"week":23,"weekLabel":"第 23 週","dateRange":"2026/06/01 – 06/07","href":"2026-week23.html","title":"Insulin Costs and Use by Medicare Beneficiaries After the Inflation Reduction Act Out-of-Pocket Cap","journal":"JAMA","type":"OA","typeLabel":"Original Article","author":"Myerson","doi":"10.1001/jama.2026.5975","url":"https://doi.org/10.1001/jama.2026.5975","summary":"藥師重點：自付額上限可降低並穩定 insulin 花費，主要改善原本負擔較高者的使用；藥師在用藥諮詢時可主動評估費用障礙、換藥風險、續方中斷與低收入或高自付病人的援助資源。","pubDate":"2026-06-06","terms":["insulin","costs","medicare","beneficiaries","inflation","reduction","out-of-pocket","jama","myerson","cost"],"drugTerms":[],"searchText":"insulin costs and use by medicare beneficiaries after the inflation reduction act out-of-pocket cap jama original article myerson 10.1001/jama.2026.5975 研究背景：美國 inflation reduction act 於 2023 年將 medicare 受益者 insulin out-of-pocket cost 限制為每 30-day supply $35；其對 insulin 可近性與使用量的實際影響需評估。 研究方法：此 interrupted time series 分析 使用 2021-2023 年美國資料，比較 medicare part d insulin users 在政策實施前後的額外變化。主要結果包括每 30-day insulin supply 自付費用、30-day insulin fills、基礎胰島素 adherence（proportion of 天 covered）與 persistence。 主要結果：納入 2,860,394 名 insulin users；政策後幾乎沒有 insulin fills 超過上限，2021-2022 年則有 13% 可能超過。每 30-day supply cost 由 $22.95 降至 $18.16，差異 -$4.79（95% ci -$4.84 to -$4.74）；整體 insulin fills、adherence 與 persistence 未增加，但 基準值 cost top decile（>$58/30-day supply）者 fills 增加 0.8 fills/year，proportion of 天 covered 增加 2.7 百分點。 藥師重點：自付額上限可降低並穩定 insulin 花費，主要改善原本負擔較高者的使用；藥師在用藥諮詢時可主動評估費用障礙、換藥風險、續方中斷與低收入或高自付病人的援助資源。"},{"id":"pmid-42242779","kind":"article","issueId":"2026-week23","year":2026,"week":23,"weekLabel":"第 23 週","dateRange":"2026/06/01 – 06/07","href":"2026-week23.html","title":"Global, regional, and national levels and trends in under 5, infant, and neonatal mortality during 1990-2024 with scenario based projections to 2030: modelling study","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"Sharrow","doi":"10.1136/bmj-2025-088684","url":"https://doi.org/10.1136/bmj-2025-088684","summary":"藥師重點：結果提醒兒童死亡改善速度已放緩，尤其 neonatal period 與高死亡地區需加強照護；藥師可將此作為疫苗、感染治療、孕產與新生兒用藥安全及轉介資源規劃的背景資料。","pubDate":"2026-06-04","terms":["global","regional","national","levels","trends","under","infant","neonatal","mortality","scenario"],"drugTerms":[],"searchText":"global, regional, and national levels and trends in under 5, infant, and neonatal mortality during 1990-2024 with scenario based projections to 2030: modelling study bmj original article sharrow 10.1136/bmj-2025-088684 研究背景：neonatal、infant 與 under 5 死亡率 仍是全球兒童健康核心指標；本研究估計 1990-2024 年 200 個國家與地區趨勢，並推估 2025-2030 年不同情境下死亡數。 研究方法：此 modelling 研究 使用 country-specific household surveys、vital registration、sample vital registration systems、unaids、災害與衝突資料庫及 world 族群 prospects 2024 等來源。研究納入全國代表性資料，並排除疑似品質不足或危機干擾的調查資料。 主要結果：2024 年估計 4.9 百萬（90% ui 4.7 to 5.2 百萬）名兒童於 5 歲前死亡，其中 neonatal deaths 為 2.3 百萬。2015-2024 年 under 5 死亡率 比率 年下降 1.5%，低於 2000-2015 年的 3.9%；若近期趨勢持續，2025-2030 年 under 5 deaths 預估 27.3 百萬，近半發生於 neonatal period。 藥師重點：結果提醒兒童死亡改善速度已放緩，尤其 neonatal period 與高死亡地區需加強照護；藥師可將此作為疫苗、感染治療、孕產與新生兒用藥安全及轉介資源規劃的背景資料。"},{"id":"pmid-42242781","kind":"article","issueId":"2026-week23","year":2026,"week":23,"weekLabel":"第 23 週","dateRange":"2026/06/01 – 06/07","href":"2026-week23.html","title":"Global, regional, and national levels and trends in older child, adolescent, and youth (5-24 years) all cause mortality from 1990 to 2024: modelling study","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"You","doi":"10.1136/bmj-2025-088685","url":"https://doi.org/10.1136/bmj-2025-088685","summary":"藥師重點：此研究屬人口健康監測，不能外推為個別藥物療效；藥師可用於青少年與青年風險溝通、預防照護資源配置，以及辨識高死亡負擔地區的用藥與公共衛生需求。","pubDate":"2026-06-04","terms":["global","regional","national","levels","trends","older","child","adolescent","youth","years"],"drugTerms":[],"searchText":"global, regional, and national levels and trends in older child, adolescent, and youth (5-24 years) all cause mortality from 1990 to 2024: modelling study bmj original article you 10.1136/bmj-2025-088685 研究背景：隨著 5 歲以下死亡下降，5-24 歲兒童、青少年與青年死亡的公共衛生重要性增加；本研究估計 1990-2024 年 200 個國家與地區的 全因死亡率 趨勢。 研究方法：此 modelling 研究 建立 死亡率 databases，整合 vital registration、sample vital registration、household surveys 與 族群 censuses 等全國代表性資料，估計 5-24 歲各年齡層 死亡率 risk 並評估區域與國家趨勢。 主要結果：2024 年全球估計 5-24 歲死亡 2.1 百萬（90% ui 2.1 to 2.4 百萬），占 25 歲以下死亡 31%，高於 1990 年的 21%。死亡風險於 10-14 歲最低，15-19 與 20-24 歲上升；1990-2024 年 5-9 歲死亡下降 64%，20-24 歲僅下降 33%，且 2015 年後進展放緩。 藥師重點：此研究屬人口健康監測，不能外推為個別藥物療效；藥師可用於青少年與青年風險溝通、預防照護資源配置，以及辨識高死亡負擔地區的用藥與公共衛生需求。"},{"id":"pmid-42246672","kind":"article","issueId":"2026-week23","year":2026,"week":23,"weekLabel":"第 23 週","dateRange":"2026/06/01 – 06/07","href":"2026-week23.html","title":"Finerenone in Persons with Chronic Kidney Disease without Diabetes","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Heerspink","doi":"10.1056/NEJMoa2604625","url":"https://doi.org/10.1056/NEJMoa2604625","summary":"藥師重點：Finerenone 在非糖尿病 CKD 族群可減緩 eGFR 下降，但 potassium 監測仍是用藥安全核心；藥師需確認 RAAS 抑制劑 背景治療、eGFR 起始條件、albuminuria 範圍與高血鉀處置計畫。","pubDate":"2026-06-04","terms":["finerenone","persons","chronic","kidney","diabetes","nejm","heerspink","nejmoa2604625","type","find-ckd"],"drugTerms":[],"searchText":"finerenone in persons with chronic kidney disease without diabetes nejm original article heerspink 10.1056/nejmoa2604625 研究背景：finerenone 已在 type 2 diabetes 合併 ckd 患者顯示腎臟與心血管效益；find-ckd 評估其在沒有糖尿病但有 albuminuria 的 ckd 成人是否同樣能減緩腎功能下降。 研究方法：研究收錄無糖尿病、egfr 25 to <90 ml per minute per 1.73 m2 且 urinary albumin-to-creatinine 比值 200 to ≤3500 的 ckd 成人，且皆使用 renin-angiotensin system 抑制劑。受試者接受 finerenone 10 或 20 mg 每日 或 安慰劑；主要終點為 基準值 至 month 32 的 total egfr slope。 主要結果：1584 人隨機分組；egfr 年變化率為 finerenone -3.3 vs 安慰劑 -4.0 ml per minute per 1.73 m2，差異 0.7（95% ci 0.3 to 1.1；p<0.001）。複合 kidney or 心血管 結果指標 風險較低（hr 0.77，95% ci 0.60 to 0.99；p=0.04）；hyperkalemia 為 17.0% vs 13.3%，因 hyperkalemia 停藥為 1.5% vs 0.1%。 藥師重點：finerenone 在非糖尿病 ckd 族群可減緩 egfr 下降，但 potassium 監測仍是用藥安全核心；藥師需確認 raas 抑制劑 背景治療、egfr 起始條件、albuminuria 範圍與高血鉀處置計畫。"},{"id":"pmid-42246414","kind":"article","issueId":"2026-week23","year":2026,"week":23,"weekLabel":"第 23 週","dateRange":"2026/06/01 – 06/07","href":"2026-week23.html","title":"Finerenone in Patients With Chronic Kidney Disease Due to Glomerular Diseases: A Randomized Clinical Trial","journal":"JAMA","type":"OA","typeLabel":"Original Article","author":"Neuen","doi":"10.1001/jama.2026.9923","url":"https://doi.org/10.1001/jama.2026.9923","summary":"藥師重點：此 exploratory 分析 支持 finerenone 可作為 glomerular 疾病 相關 CKD 的腎功能保護背景證據；藥師需注意這不是主要族群單獨確證試驗，仍需依 eGFR、albuminuria、serum potassium 與 RAAS blockade 情形個別評估。","pubDate":"2026-06-05","terms":["finerenone","chronic","kidney","glomerular","diseases","jama","neuen","failure","prespecified","exploratory"],"drugTerms":[],"searchText":"finerenone in patients with chronic kidney disease due to glomerular diseases: a randomized clinical trial jama original article neuen 10.1001/jama.2026.9923 研究背景：glomerular diseases 是 ckd 與 kidney failure 的重要原因；finerenone 在 ckd 中可降低腎功能惡化風險，但 glomerular diseases 族群資料較有限。 研究方法：此研究為 第 3 期 隨機、雙盲、安慰劑對照 試驗 的 prespecified exploratory 次族群 分析，聚焦 investigator-reported glomerular 疾病 之 nondiabetic ckd 患者。整體 試驗 納入特定 egfr 與 albuminuria 範圍者，介入為 finerenone 10 mg 或 20 mg 每日一次 vs 安慰劑；評估 total egfr slope、albuminuria 變化與 kidney failure 或 sustained ≥40% egfr decline。 主要結果：1584 人中 903 人有 glomerular 疾病，其中 immunoglobulin a nephropathy 46.1%、focal segmental glomerulosclerosis 23.8%、membranous nephropathy 10.0%。至 month 32 total egfr slope 為 -3.50 vs -4.23 ml/min/1.73 m2 per year，差異 0.73（95% ci 0.22-1.24）；month 12 albuminuria 降低 42%（95% ci 35%-48%），kidney failure 或 ≥40% egfr decline 風險較低（hr 0.74，95% ci 0.57-0.97）。 藥師重點：此 exploratory 分析 支持 finerenone 可作為 glomerular 疾病 相關 ckd 的腎功能保護背景證據；藥師需注意這不是主要族群單獨確證試驗，仍需依 egfr、albuminuria、serum potassium 與 raas blockade 情形個別評估。"},{"id":"pmid-42242773","kind":"article","issueId":"2026-week23","year":2026,"week":23,"weekLabel":"第 23 週","dateRange":"2026/06/01 – 06/07","href":"2026-week23.html","title":"Estimates of global causes of death for children and adolescents aged 5-19 in 2000-24: secondary data analysis using bayesian multinomial logistic regression","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"Eilerts-Spinelli","doi":"10.1136/bmj-2025-088687","url":"https://doi.org/10.1136/bmj-2025-088687","summary":"藥師重點：此研究可協助藥師在青少年照護中重視外傷預防、malaria/感染控制、癌症支持療法與自傷風險轉介；解讀時需記得其為模型估計，不代表單一介入效果。","pubDate":"2026-06-04","terms":["estimates","global","causes","death","children","adolescents","aged","bayesian","multinomial","logistic"],"drugTerms":[],"searchText":"estimates of global causes of death for children and adolescents aged 5-19 in 2000-24: secondary data analysis using bayesian multinomial logistic regression bmj original article eilerts-spinelli 10.1136/bmj-2025-088687 研究背景：了解 5-19 歲兒童與青少年死因分布，有助於將預防與醫療資源放在道路傷害、感染、腫瘤與心理健康等主要負擔。 研究方法：此 次要 資料 分析 使用 bayesian multinomial logistic regression model，整合 pubmed、embase、who 死亡率 database、dhs、mics 等資料來源，估計 195 國 2000-2024 年 cause-specific 死亡率 fractions。 主要結果：2024 年全球 5-19 歲死亡約 1.4 百萬；主要死因為 road traffic injuries 113,138（90% ui 106,901 to 119,375）、malaria 99,219（85,840 to 112,597）與 neoplasms 87,827（81,143 to 94,511）。15-19 歲女性以 self-harm 死亡較突出，男性則以 road traffic injuries 最高；高死亡地區多數 communicable、maternal、perinatal、nutritional conditions 的下降自 2015 年後放緩。 藥師重點：此研究可協助藥師在青少年照護中重視外傷預防、malaria/感染控制、癌症支持療法與自傷風險轉介；解讀時需記得其為模型估計，不代表單一介入效果。"},{"id":"pmid-42250575","kind":"article","issueId":"2026-week23","year":2026,"week":23,"weekLabel":"第 23 週","dateRange":"2026/06/01 – 06/07","href":"2026-week23.html","title":"Efficacy and safety of retatrutide, a GIP, GLP-1, and glucagon receptor agonist, in people with type 2 diabetes and inadequate glycaemic control with diet and exercise (TRANSCEND-T2D-1): a double-blind, randomised, phase 3 trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Bajaj","doi":"10.1016/S0140-6736(26)00967-0","url":"https://doi.org/10.1016/S0140-6736(26)00967-0","summary":"藥師重點：結論顯示 retatrutide 單藥在早期、以生活型態控制不足的第二型糖尿病族群可改善 HbA1c 並降低體重；用藥評估需特別關注胃腸道耐受性、體重快速下降、低血糖風險與未來核准適應症。","pubDate":"2026-06-13","terms":["efficacy","retatrutide","glp-1","glucagon","receptor","agonist","people","type","diabetes","inadequate"],"drugTerms":["glp-1"],"searchText":"efficacy and safety of retatrutide, a gip, glp-1, and glucagon receptor agonist, in people with type 2 diabetes and inadequate glycaemic control with diet and exercise (transcend-t2d-1): a double-blind, randomised, phase 3 trial lancet rct bajaj 10.1016/s0140-6736(26)00967-0 研究背景：retatrutide 是 gip、glp-1 與 glucagon triple hormone 受體 致效劑，正在開發用於第二型糖尿病、肥胖及相關併發症；本研究評估其作為單一療法用於飲食與運動控制仍不足之第二型糖尿病患者。 研究方法：transcend-t2d-1 為 40 週、第 3 期、隨機、雙盲、安慰劑對照試驗，於美國、墨西哥與印度 48 個中心收錄 hba1c 7.0%-9.5%、bmi 至少 23 kg/m2 的成人。受試者以 1:1:1:1 分配接受每週一次皮下注射 retatrutide 4 mg、9 mg、12 mg 或 安慰劑，主要終點為 week 40 hba1c 變化。 主要結果：共 537 人隨機分組；week 40 hba1c 變化為 retatrutide -1.69%、-1.86%、-1.94%，安慰劑 為 -0.81%，相對 安慰劑 差異分別為 -0.88%、-1.04%、-1.12%（all p<0.0001）。體重變化為 -11.5%、-13.9%、-15.3% vs -2.6%；常見不良事件多為輕至中度胃腸道事件，未通報 重度 hypoglycaemia。 藥師重點：結論顯示 retatrutide 單藥在早期、以生活型態控制不足的第二型糖尿病族群可改善 hba1c 並降低體重；用藥評估需特別關注胃腸道耐受性、體重快速下降、低血糖風險與未來核准適應症。"},{"id":"pmid-42248158","kind":"article","issueId":"2026-week23","year":2026,"week":23,"weekLabel":"第 23 週","dateRange":"2026/06/01 – 06/07","href":"2026-week23.html","title":"Efficacy and safety of finerenone in patients with chronic kidney disease: an individual participant data pooled analysis (INFINITY)","journal":"Lancet","type":"MA","typeLabel":"Meta-analysis","author":"Neuen","doi":"10.1016/S0140-6736(26)01009-3","url":"https://doi.org/10.1016/S0140-6736(26)01009-3","summary":"藥師重點：此 pooled 分析 支持 finerenone 在較廣 CKD 族群可能兼具腎臟與心血管保護；處方審查需把 eGFR、albuminuria、RAAS blockade、SGLT2 抑制劑 併用與 serum potassium 監測列為重點。","pubDate":"2026-06-13","terms":["efficacy","finerenone","chronic","kidney","individual","participant","pooled","infinity","lancet","meta-analysis"],"drugTerms":[],"searchText":"efficacy and safety of finerenone in patients with chronic kidney disease: an individual participant data pooled analysis (infinity) lancet meta-analysis neuen 10.1016/s0140-6736(26)01009-3 研究背景：mineralocorticoid 受體 過度活化是多種 ckd 進展的共同路徑；finerenone 已在 type 2 diabetes 相關 ckd 顯示腎臟與心血管效益，但不同病因與不同 egfr、albuminuria 層級的整體證據仍需整合。 研究方法：infinity 為 個別參與者資料統合分析，納入 fidelio-dkd、figaro-dkd 與 find-ckd 三項隨機、雙盲、安慰劑對照 試驗，共評估 ckd 患者使用 finerenone 的相對效果。主要腎臟結果為 kidney failure 或 sustained ≥57% egfr decline；主要心血管結果為 心衰竭 住院 或 心血管 死亡。 主要結果：三項研究共 14,574 人；finerenone 降低 複合 kidney 結果指標（22.3 vs 28.8 事件 per 1000 patient-years；hr 0.76，95% ci 0.68-0.86）與 kidney failure 單用（hr 0.85，95% ci 0.74-0.99）。複合 心血管 結果指標 亦下降（hr 0.80，95% ci 0.70-0.91）；hyperkalaemia 較 安慰劑 常見，但導致住院的絕對發生率低。 藥師重點：此 pooled 分析 支持 finerenone 在較廣 ckd 族群可能兼具腎臟與心血管保護；處方審查需把 egfr、albuminuria、raas blockade、sglt2 抑制劑 併用與 serum potassium 監測列為重點。"},{"id":"pmid-42223072","kind":"article","issueId":"2026-week23","year":2026,"week":23,"weekLabel":"第 23 週","dateRange":"2026/06/01 – 06/07","href":"2026-week23.html","title":"Daraxonrasib or Chemotherapy in Previously Treated Metastatic Pancreatic Cancer","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"O'Reilly","doi":"10.1056/NEJMoa2605555","url":"https://doi.org/10.1056/NEJMoa2605555","summary":"藥師重點：Daraxonrasib 在先前治療過 mPDAC 顯示較化療延長存活，尤其需依 RAS mutation profile 判讀；藥師需留意口服標靶治療的給藥順從性、毒性型態與與傳統化療不同的停藥/調整標準。","pubDate":"2026-05-31","terms":["daraxonrasib","chemotherapy","previously","treated","metastatic","pancreatic","cancer","nejm","reilly","nejmoa2605555"],"drugTerms":[],"searchText":"daraxonrasib or chemotherapy in previously treated metastatic pancreatic cancer nejm original article o'reilly 10.1056/nejmoa2605555 研究背景：先前治療過的 轉移性 pancreatic ductal adenocarcinoma（mpdac）治療選擇有限，且 ras pathway 活化是 pdac 重要驅動因子；daraxonrasib 為 口服 ras(on) multiselective 抑制劑。 研究方法：rasolute 302 為 第 3 期、international、開放標籤、隨機試驗，將先前治療過的 mpdac 患者分配至 daraxonrasib 或 investigator's choice chemotherapy。dual 主要終點s 為 ras g12 族群 的 整體存活期 與 無惡化存活期，並評估 overall 族群 與安全性。 主要結果：500 人隨機分組，其中 91.8% 有 ras g12 mutations；ras g12 族群 中位數 整體存活期 為 13.2 vs 6.6 個月，overall 族群 為 13.2 vs 6.7 個月，兩者 hr 均為 0.40（p<0.001）。ras g12 族群 中位數 無惡化存活期 為 7.3 vs 3.5 個月；等級 3 以上 不良事件 為 61.8% vs 69.6%，治療-related discontinuation 為 1.2% vs 11.2%。 藥師重點：daraxonrasib 在先前治療過 mpdac 顯示較化療延長存活，尤其需依 ras mutation profile 判讀；藥師需留意口服標靶治療的給藥順從性、毒性型態與與傳統化療不同的停藥/調整標準。"},{"id":"pmid-42242268","kind":"article","issueId":"2026-week23","year":2026,"week":23,"weekLabel":"第 23 週","dateRange":"2026/06/01 – 06/07","href":"2026-week23.html","title":"Atrasentan in patients with IgA nephropathy (ALIGN): final 2·5-year results from a randomised, double-blind, placebo-controlled, phase 3 trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Heerspink","doi":"10.1016/S0140-6736(26)00960-8","url":"https://doi.org/10.1016/S0140-6736(26)00960-8","summary":"藥師重點：結果支持 atrasentan 在標準 RAAS blockade 背景下可能延緩 IgA nephropathy 腎功能惡化；藥師需追蹤水腫、體液滯留、血壓、腎功能與是否併用 SGLT2 抑制劑。","pubDate":"2026-06-13","terms":["atrasentan","nephropathy","align","final","year","from","randomised","double-blind","placebo-controlled","phase"],"drugTerms":["atrasentan"],"searchText":"atrasentan in patients with iga nephropathy (align): final 2·5-year results from a randomised, double-blind, placebo-controlled, phase 3 trial lancet rct heerspink 10.1016/s0140-6736(26)00960-8 研究背景：atrasentan 為 selective endothelin a 受體 拮抗劑，先前 align interim 分析 已顯示可降低 iga nephropathy 蛋白尿；本研究進一步評估 2.5 年治療後是否能減緩 egfr 下降。 研究方法：align 為 133 個中心、20 國參與的 第 3 期、隨機、雙盲、安慰劑對照試驗，收錄 biopsy-proven iga nephropathy、egfr ≥30 ml/min per 1.73 m2、且在 renin-angiotensin system inhibition 下尿蛋白 ≥1.0 g/day 的成人。受試者接受 口服 atrasentan 0.75 mg 每日一次 或 安慰劑 132 週，主要分析 main stratum week 136 egfr 變化。 主要結果：404 人隨機分組；main stratum week 136 egfr 變化為 atrasentan -7.5 vs 安慰劑 -9.9 ml/min per 1.73 m2，組間差 2.4 ml/min per 1.73 m2（95% ci -0.1 to 4.8；p=0.057）。week 132 組間差為 2.6 ml/min per 1.73 m2（95% ci 0.1-5.0），total egfr slope 差為 1.4 ml/min per 1.73 m2 per year；fluid retention 不良事件 為 14% vs 12%。 藥師重點：結果支持 atrasentan 在標準 raas blockade 背景下可能延緩 iga nephropathy 腎功能惡化；藥師需追蹤水腫、體液滯留、血壓、腎功能與是否併用 sglt2 抑制劑。"},{"id":"pmid-42235013","kind":"article","issueId":"2026-week23","year":2026,"week":23,"weekLabel":"第 23 週","dateRange":"2026/06/01 – 06/07","href":"2026-week23.html","title":"All-Oral Treatment of Newly Diagnosed Acute Myeloid Leukemia","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Roboz","doi":"10.1056/NEJMoa2510223","url":"https://doi.org/10.1056/NEJMoa2510223","summary":"藥師重點：全口服 decitabine-cedazuridine 加 venetoclax 可能降低不適合 intensive chemotherapy 之 AML 患者的給藥負擔；藥師需強化服藥時程、骨髓抑制監測、感染預防與 venetoclax 相關交互作用管理。","pubDate":"2026-06-04","terms":["all-oral","newly","diagnosed","acute","myeloid","leukemia","nejm","roboz","nejmoa2510223","intensive"],"drugTerms":["azacitidine"],"searchText":"all-oral treatment of newly diagnosed acute myeloid leukemia nejm original article roboz 10.1056/nejmoa2510223 研究背景：75 歲以上或不適合 intensive induction chemotherapy 的新診斷 aml 患者，常用 azacitidine 或 decitabine 加 venetoclax，但注射給藥造成病人與照護端負擔；口服 decitabine-cedazuridine 提供口服替代可能。 研究方法：ascertain-v 為 第 1 期-2、開放標籤、多中心、non隨機試驗，收錄新診斷 aml 且 ≥75 歲或不適合 intensive chemotherapy 的患者，給予 口服 decitabine-cedazuridine 加 口服 venetoclax。主要終點包括 venetoclax pharmacokinetic interaction 指標與 完全反應；第 2b 期 在 blast clearance 後鼓勵 schedule adjustments 以降低 myelosuppression。 主要結果：共 189 人納入；未觀察到 decitabine-cedazuridine 與 venetoclax 的 drug-drug interactions。pivotal 第 2b 期 完全反應 為 47%（95% ci 36 to 57），完全反應 或 incomplete hematologic recovery 為 63%（95% ci 53 to 73），中位數 整體存活期 為 15.5 個月；等級 3 以上常見事件為 anemia 30%、neutropenia 26%、febrile neutropenia 25%。 藥師重點：全口服 decitabine-cedazuridine 加 venetoclax 可能降低不適合 intensive chemotherapy 之 aml 患者的給藥負擔；藥師需強化服藥時程、骨髓抑制監測、感染預防與 venetoclax 相關交互作用管理。"},{"id":"fda-2026-week23-1","kind":"fda","issueId":"2026-week23","year":2026,"week":23,"weekLabel":"第 23 週","dateRange":"2026/06/01 – 06/07","href":"2026-week23.html","title":"FDA’s Concerns with Unapproved GLP-1 Drugs Used for Weight Loss","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss","summary":"FDA 提醒未經核准的 GLP-1 減重產品可能涉及成分、品質、劑量與安全性風險。藥師應確認病人取得的是 FDA 核准產品，避免使用來源不明或複方調製的 semaglutide/tirzepatide 類產品，並加強低血糖、胃腸道不良反應與劑量錯誤衛教。","terms":["concerns","unapproved","glp-1","drugs","used","weight","loss","semaglutide","tirzepatide","https"],"drugTerms":["glp-1","semaglutide","tirzepatide"],"searchText":"fda’s concerns with unapproved glp-1 drugs used for weight loss fda drug safety 2026-06-15 fda 提醒未經核准的 glp-1 減重產品可能涉及成分、品質、劑量與安全性風險。藥師應確認病人取得的是 fda 核准產品，避免使用來源不明或複方調製的 semaglutide/tirzepatide 類產品，並加強低血糖、胃腸道不良反應與劑量錯誤衛教。 https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"},{"id":"fda-2026-week23-3","kind":"fda","issueId":"2026-week23","year":2026,"week":23,"weekLabel":"第 23 週","dateRange":"2026/06/01 – 06/07","href":"2026-week23.html","title":"FDA issues final decision to withdraw approval of Pepaxto (melphalan flufenamide)","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/398713","summary":"FDA 已作成撤回 Pepaxto (melphalan flufenamide) 核准的最終決定。藥師應確認院內與病人用藥清單是否仍有相關品項，避免新開立或續用，並協助腫瘤團隊轉換替代治療。","terms":["issues","final","decision","withdraw","approval","pepaxto","melphalan","flufenamide","https","node"],"drugTerms":[],"searchText":"fda issues final decision to withdraw approval of pepaxto (melphalan flufenamide) fda drug safety  fda 已作成撤回 pepaxto (melphalan flufenamide) 核准的最終決定。藥師應確認院內與病人用藥清單是否仍有相關品項，避免新開立或續用，並協助腫瘤團隊轉換替代治療。 https://www.fda.gov/node/398713"},{"id":"fda-2026-week23-2","kind":"fda","issueId":"2026-week23","year":2026,"week":23,"weekLabel":"第 23 週","dateRange":"2026/06/01 – 06/07","href":"2026-week23.html","title":"FDA alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/403159","summary":"FDA 提醒 glatiramer acetate injection 的選配 autoinjector device 可能有交叉相容性問題。藥師調劑或衛教時應確認藥品廠牌、注射器與 autoinjector 是否相容，避免病人沿用不適配裝置造成注射失敗或劑量問題。","terms":["alerts","caregivers","providers","cross-compatibility","issues","autoinjector","devices","that","optional","glatiramer"],"drugTerms":[],"searchText":"fda alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection fda drug safety  fda 提醒 glatiramer acetate injection 的選配 autoinjector device 可能有交叉相容性問題。藥師調劑或衛教時應確認藥品廠牌、注射器與 autoinjector 是否相容，避免病人沿用不適配裝置造成注射失敗或劑量問題。 https://www.fda.gov/node/403159"},{"id":"fda-2026-week23-4","kind":"fda","issueId":"2026-week23","year":2026,"week":23,"weekLabel":"第 23 週","dateRange":"2026/06/01 – 06/07","href":"2026-week23.html","title":"FDA Accepts First In Silico Drug Development Tool Under ISTAND Program to Help Predict Drug-Induced Liver Injury","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver","summary":"FDA 接受第一個 ISTAND program 下的 in silico drug development tool，用於協助預測 drug-induced liver injury。此為藥物研發與安全評估工具訊息，藥師可關注 DILI 風險預測方法進展，但臨床用藥仍需依仿單、肝功能監測與病人風險因子判讀。","terms":["accepts","first","silico","development","tool","under","istand","program","help","predict"],"drugTerms":[],"searchText":"fda accepts first in silico drug development tool under istand program to help predict drug-induced liver injury fda drug safety 2026-06-03 fda 接受第一個 istand program 下的 in silico drug development tool，用於協助預測 drug-induced liver injury。此為藥物研發與安全評估工具訊息，藥師可關注 dili 風險預測方法進展，但臨床用藥仍需依仿單、肝功能監測與病人風險因子判讀。 https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver"},{"id":"pmid-42202319","kind":"article","issueId":"2026-week22","year":2026,"week":22,"weekLabel":"第 22 週","dateRange":"2026/05/25 – 05/31","href":"2026-week22.html","title":"Zanidatamab with and without Tislelizumab in HER2-Positive Gastroesophageal Cancer","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Shitara","doi":"10.1056/NEJMoa2517729","url":"https://doi.org/10.1056/NEJMoa2517729","summary":"藥師重點：Zanidatamab 合併化療可延長 無惡化存活期，加入 tislelizumab 於期中分析亦顯示 整體存活期 優勢；臨床評估時需確認 HER2 狀態、免疫治療適用性，並主動監測 diarrhea 與高等級不良事件。","pubDate":"2026-05-28","terms":["zanidatamab","tislelizumab","her2-positive","gastroesophageal","cancer","nejm","shitara","nejmoa2517729","dual","her2-targeted"],"drugTerms":["zanidatamab","tislelizumab","anti-programmed","trastuzumab"],"searchText":"zanidatamab with and without tislelizumab in her2-positive gastroesophageal cancer nejm rct shitara 10.1056/nejmoa2517729 研究背景：zanidatamab 為 dual her2-targeted bispecific 抗體，先前 第 2 期 研究顯示其合併化療、可加或不加 tislelizumab，作為 her2-陽性 gastroesophageal adenocarcinoma 第一線治療具潛在療效與可接受安全性。 研究方法：此 開放標籤 第 3 期試驗 以 1:1:1 隨機分派未治療且 centrally confirmed her2-陽性 advanced gastroesophageal adenocarcinoma 患者，接受 zanidatamab-tislelizumab-chemotherapy、zanidatamab-chemotherapy 或 trastuzumab-chemotherapy。兩項主要終點為 無惡化存活期 與 整體存活期。 主要結果：中位追蹤 25.9 個月，無惡化存活期 於 zanidatamab-tislelizumab-chemotherapy 與 zanidatamab-chemotherapy 均較 trastuzumab-chemotherapy 延長（12.4 個月、12.4 個月 vs 8.1 個月；hr 0.63，95% ci 0.51-0.78；hr 0.65，95% ci 0.52-0.81；兩者 p<0.001）。整體存活期 於 zanidatamab-tislelizumab-chemotherapy 較長（26.4 vs 19.2 個月；hr 0.72，95% ci 0.57-0.90；p=0.004），等級 3 以上不良事件為 83.3%、73.8%、74.5%，最常見為 diarrhea。 藥師重點：zanidatamab 合併化療可延長 無惡化存活期，加入 tislelizumab 於期中分析亦顯示 整體存活期 優勢；臨床評估時需確認 her2 狀態、免疫治療適用性，並主動監測 diarrhea 與高等級不良事件。"},{"id":"pmid-42212933","kind":"article","issueId":"2026-week22","year":2026,"week":22,"weekLabel":"第 22 週","dateRange":"2026/05/25 – 05/31","href":"2026-week22.html","title":"Teclistamab in Multiple Myeloma with One to Three Previous Lines of Therapy","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Touzeau","doi":"10.1056/NEJMoa2603870","url":"https://doi.org/10.1056/NEJMoa2603870","summary":"藥師重點：Teclistamab 在 1-3 線後 multiple myeloma 顯示 無惡化存活期 與 整體存活期 優勢，但感染、CRS 與 ICANS 是用藥照護核心；藥師需確認預防性抗感染、免疫球蛋白補充、住院或門診監測流程與病人衛教。","pubDate":"2026-05-29","terms":["teclistamab","multiple","myeloma","three","previous","lines","nejm","touzeau","nejmoa2603870","targeting"],"drugTerms":["teclistamab","anti-cd38"],"searchText":"teclistamab in multiple myeloma with one to three previous lines of therapy nejm original article touzeau 10.1056/nejmoa2603870 研究背景：teclistamab 為 targeting b-cell maturation antigen 與 cd3 的 bispecific 抗體，其作為 復發或難治性 multiple myeloma 較早線單藥治療的療效仍需確認。 研究方法：研究將曾接受 1-3 線治療且包含 anti-cd38 monoclonal 抗體 與 lenalidomide 的 復發或難治性 multiple myeloma 患者，隨機分派接受 teclistamab 或醫師選擇的 pvd（pomalidomide、bortezomib、dexamethasone）或 kd（carfilzomib、dexamethasone）。建議使用 antimicrobial prophylaxis 與 immune globulin replacement；主要終點為 independent review committee 評估的 無惡化存活期。 主要結果：teclistamab 296 人、pvd 或 kd 297 人；中位追蹤 17.3 個月期中分析顯示，18 個月 無惡化存活期 為 69.8% vs 26.9%（hr for 疾病 progression or 死亡 0.29，95% ci 0.23-0.38；p<0.001）。完全反應 or better 為 65.9% vs 16.8%（p<0.001），18 個月 整體存活期 為 79.2% vs 68.6%（hr for 死亡 0.60，95% ci 0.43-0.83；p=0.002）；等級 3 或 4 不良事件 為 84.9% vs 76.3%，等級 3 或 4 infection 為 41.6% vs 29.0%，crs 66.0%，icans 4.1%。 藥師重點：teclistamab 在 1-3 線後 multiple myeloma 顯示 無惡化存活期 與 整體存活期 優勢，但感染、crs 與 icans 是用藥照護核心；藥師需確認預防性抗感染、免疫球蛋白補充、住院或門診監測流程與病人衛教。"},{"id":"pmid-42217458","kind":"article","issueId":"2026-week22","year":2026,"week":22,"weekLabel":"第 22 週","dateRange":"2026/05/25 – 05/31","href":"2026-week22.html","title":"Tafasitamab plus lenalidomide and R-CHOP versus R-CHOP for first-line treatment of patients with high-risk diffuse large B-cell lymphoma (frontMIND): a global, phase 3, randomised, double-blind, placebo-controlled trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Lenz","doi":"10.1016/S0140-6736(26)00866-4","url":"https://doi.org/10.1016/S0140-6736(26)00866-4","summary":"藥師重點：Tafa-len-R-CHOP 帶來 無惡化存活期 優勢，但 整體存活期 尚未成熟且高等級與致死性不良事件增加；若作為第一線候選策略，需特別評估感染、血球抑制、lenalidomide 相關風險與病人高風險定義是否符合。","pubDate":"2026-06-20","terms":["tafasitamab","plus","lenalidomide","r-chop","first-line","high-risk","diffuse","large","b-cell","lymphoma"],"drugTerms":["tafasitamab","rituximab","anti-cd19"],"searchText":"tafasitamab plus lenalidomide and r-chop versus r-chop for first-line treatment of patients with high-risk diffuse large b-cell lymphoma (frontmind): a global, phase 3, randomised, double-blind, placebo-controlled trial lancet rct lenz 10.1016/s0140-6736(26)00866-4 研究背景：約 40% high-risk dlbcl 患者無法以第一線 r-chop 治癒，frontmind 評估在 r-chop 加入 tafasitamab 與 lenalidomide（tafa-len-r-chop）是否可改善高風險 aggressive b-cell 淋巴瘤 預後。 研究方法：frontmind 為 global 第 3 期、隨機、雙盲、安慰劑對照 研究，於 298 個中心收錄 18-80 歲、初治 high-intermediate-risk 或 high-risk dlbcl 或 hgbl 患者。899 人以 1:1 分派接受 6 個 21 天療程 tafa-len-r-chop 或 r-chop；主要終點為 investigator-assessed 無惡化存活期，安全性為次要終點。 主要結果：中位追蹤 35.2 個月，tafa-len-r-chop 相較 r-chop 改善 無惡化存活期（hr 0.75，95% ci 0.59-0.96；p=0.0194），2 年 無惡化存活期 為 71.1% vs 62.9%。整體存活期 期中 hr 為 0.85（95% ci 0.63-1.14）；等級 3 以上 治療期間出現的不良事件 較高（87% vs 76%），fatal 治療期間出現的不良事件 為 6% vs 4%，但整體死亡數為 19% vs 22%。 藥師重點：tafa-len-r-chop 帶來 無惡化存活期 優勢，但 整體存活期 尚未成熟且高等級與致死性不良事件增加；若作為第一線候選策略，需特別評估感染、血球抑制、lenalidomide 相關風險與病人高風險定義是否符合。"},{"id":"pmid-42202318","kind":"article","issueId":"2026-week22","year":2026,"week":22,"weekLabel":"第 22 週","dateRange":"2026/05/25 – 05/31","href":"2026-week22.html","title":"Stem-Cell-Derived Biologic Ventricular Assist Tissue in Heart Failure","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Zimmermann","doi":"10.1056/NEJMoa2513525","url":"https://doi.org/10.1056/NEJMoa2513525","summary":"藥師重點：BioVAT 為早期探索性心臟再肌化治療，3 個月指標改善需放在 開放標籤、小樣本與高事件負擔下解讀；若進入臨床研究照護，藥師需特別關注 immunosuppression、感染、腎功能與裝置或移植相關用藥銜接。","pubDate":"2026-05-28","terms":["stem-cell-derived","biologic","ventricular","assist","tissue","heart","failure","nejm","zimmermann","nejmoa2513525"],"drugTerms":[],"searchText":"stem-cell-derived biologic ventricular assist tissue in heart failure nejm original article zimmermann 10.1056/nejmoa2513525 研究背景：biologic ventricular assist tissue (biovat) 由 allogeneic induced pluripotent stem cells 分化的 cardiomyocytes 與 stromal cells 製成，用於 reduced left ventricular ejection fraction 心衰竭 的 cardiac remuscularization。 研究方法：此 開放標籤 第 1 期-2 研究 評估 biovat transplantation 用於 left ventricular ejection fraction ≤35% 且至少一處左心室 hypokinetic 或 dyskinetic segment 的心衰竭患者。20 人接受 5、10 或 20 engineered-heart-muscle units，所有患者均接受 immunosuppression；安全性以 procedure-related 不良事件 評估，主要療效終點包括 target heart-wall thickness、left ventricular ejection fraction 與 kccq-oss 變化。 主要結果：20 人接受治療，研究期間 3 人死亡（vasoplegia、covid-19、aortic dissection 各 1 人），1 人接受 heart transplantation，4 人因 lvad、renal failure 或 urothelial carcinoma 停用 immunosuppression。在 16 名接受安全最高劑量 20 units 的患者中，12 人完成 3 個月 interim 追蹤；target-wall thickness 增加 4.5 mm（90% ci 3.7-5.4；p<0.001），left ventricular ejection fraction 增加 3.9 百分點（90% ci 0.9-6.8；p=0.04），kccq-oss 增加 6.7 分（90% ci 1.0-12.5；p=0.06），所有患者至少有 1 件 不良事件。 藥師重點：biovat 為早期探索性心臟再肌化治療，3 個月指標改善需放在 開放標籤、小樣本與高事件負擔下解讀；若進入臨床研究照護，藥師需特別關注 immunosuppression、感染、腎功能與裝置或移植相關用藥銜接。"},{"id":"pmid-42214392","kind":"article","issueId":"2026-week22","year":2026,"week":22,"weekLabel":"第 22 週","dateRange":"2026/05/25 – 05/31","href":"2026-week22.html","title":"Sacituzumab tirumotecan plus pembrolizumab versus pembrolizumab in PD-L1-positive advanced non-small-cell lung cancer (OptiTROP-Lung05): interim analysis of a randomised, open-label, phase 3 trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Xiong","doi":"10.1016/S0140-6736(26)00968-2","url":"https://doi.org/10.1016/S0140-6736(26)00968-2","summary":"藥師重點：Sac-TMT 加 pembrolizumab 在 PD-L1 陽性、無 targetable genomic alterations 的 advanced NSCLC 期中分析顯示明顯 無惡化存活期 優勢，但毒性較高且試驗仍在進行；用藥評估需確認 PD-L1 TPS、驅動基因狀態與 ADC 相關不良事件監測。","pubDate":"2026-06-27","terms":["sacituzumab","tirumotecan","plus","pembrolizumab","pd-l1-positive","advanced","non-small-cell","lung","cancer","optitrop-lung05"],"drugTerms":["sacituzumab","pembrolizumab"],"searchText":"sacituzumab tirumotecan plus pembrolizumab versus pembrolizumab in pd-l1-positive advanced non-small-cell lung cancer (optitrop-lung05): interim analysis of a randomised, open-label, phase 3 trial lancet rct xiong 10.1016/s0140-6736(26)00968-2 研究背景：sacituzumab tirumotecan (sac-tmt) 為 trop2-targeting 抗體-drug conjugate，早期研究顯示合併 pd-1/pd-l1 抑制劑 作為 nsclc 第一線治療具抗腫瘤活性。 研究方法：optitrop-lung05 為中國 68 家醫院進行的 隨機、開放標籤 第 3 期試驗，收錄 locally advanced 或 轉移性 nsclc、無 targetable genomic alterations 且 pd-l1 tps ≥1% 的患者。413 人以 1:1 分派接受 sac-tmt 4 mg/kg（天 1, 15, 29）加 pembrolizumab 400 mg（第 1 天）或 pembrolizumab 單用，每 6 週靜脈給藥；主要終點為 盲性獨立中央審查 評估的 無惡化存活期。 主要結果：中位追蹤 10.5 個月時，sac-tmt 加上 pembrolizumab 的 中位數 無惡化存活期 尚未達到，pembrolizumab 單用 為 5.7 個月（stratified hr 0.35，95% ci 0.26-0.47；p<0.0001）。無惡化存活期 效益在 pd-l1 tps 1-49%（hr 0.28，95% ci 0.19-0.41）與 tps ≥50%（hr 0.47，95% ci 0.29-0.77）均一致；等級 3 以上 治療期間出現的不良事件 為 55% vs 31%。 藥師重點：sac-tmt 加 pembrolizumab 在 pd-l1 陽性、無 targetable genomic alterations 的 advanced nsclc 期中分析顯示明顯 無惡化存活期 優勢，但毒性較高且試驗仍在進行；用藥評估需確認 pd-l1 tps、驅動基因狀態與 adc 相關不良事件監測。"},{"id":"pmid-42206582","kind":"article","issueId":"2026-week22","year":2026,"week":22,"weekLabel":"第 22 週","dateRange":"2026/05/25 – 05/31","href":"2026-week22.html","title":"Phase 3 Results of Bepirovirsen Treatment for Chronic Hepatitis B Virus Infection","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Hou","doi":"10.1056/NEJMoa2515131","url":"https://doi.org/10.1056/NEJMoa2515131","summary":"藥師重點：Bepirovirsen 在特定 noncirrhotic HBV 且 HBsAg 範圍受限族群中提高 functional cure 率；實務上需嚴格確認 NA 停藥條件，並監測 ALT 上升、HBV DNA 與 HBsAg 變化。","pubDate":"2026-06-25","terms":["phase","bepirovirsen","chronic","hepatitis","virus","infection","nejm","nejmoa2515131","targeting","transcripts"],"drugTerms":[],"searchText":"phase 3 results of bepirovirsen treatment for chronic hepatitis b virus infection nejm rct hou 10.1056/nejmoa2515131 研究背景：bepirovirsen 為 targeting hbv transcripts 的 antisense oligonucleotide，固定療程後若能維持 hbv dna 低於 lloq 且 hbsag loss，可達 functional cure 的治療目標。 研究方法：b-well 1 與 b-well 2 為兩項 replicate、雙盲 第 3 期試驗s，收錄 noncirrhotic chronic hbv infection 且正在穩定使用 nucleoside or nucleotide analogue (na) 治療、hbsag >100 至 3000 iu/ml 的成人。患者以 2:1 分派接受 subcutaneous bepirovirsen 300 mg 每週 或 安慰劑 24 週，符合條件者於 48 週停用 na；主要終點為 week 72 functional cure。 主要結果：week 72 functional cure 在 b-well 1 為 20%（127/650）vs 0%（0/328），b-well 2 為 19%（106/570）vs 0%（0/286）。pooled 分析 顯示 不良事件 為 91% vs 73%，嚴重不良事件 為 7% vs 4%；治療期間 等級 3 以上 不良事件 為 16% vs 3%，bepirovirsen 組最常見 等級 3 event 為 alanine aminotransferase 上升（6%）。 藥師重點：bepirovirsen 在特定 noncirrhotic hbv 且 hbsag 範圍受限族群中提高 functional cure 率；實務上需嚴格確認 na 停藥條件，並監測 alt 上升、hbv dna 與 hbsag 變化。"},{"id":"pmid-42203255","kind":"article","issueId":"2026-week22","year":2026,"week":22,"weekLabel":"第 22 週","dateRange":"2026/05/25 – 05/31","href":"2026-week22.html","title":"Outcome switching in cohort studies of interventions: meta-epidemiological study","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"Song","doi":"10.1136/bmj-2025-087975","url":"https://doi.org/10.1136/bmj-2025-087975","summary":"藥師重點：閱讀介入性 世代研究 時，不能只看發表論文的主要結果，應回查登錄紀錄與預設終點；此研究提醒藥物效果與安全性證據解讀需留意 selective reporting 風險。","pubDate":"2026-05-27","terms":["switching","studies","interventions","meta-epidemiological","song","bmj-2025-087975","prespecification","longitudinal","clinicaltrials","measurement"],"drugTerms":[],"searchText":"outcome switching in cohort studies of interventions: meta-epidemiological study bmj original article song 10.1136/bmj-2025-087975 研究背景：觀察性 世代 研究 常被用來評估介入效果，但 結果指標 switching 與 結果指標 prespecification 不完整可能造成選擇性報告偏差。 研究方法：此 longitudinal meta-epidemiological 研究 比對 clinicaltrials.gov 登錄資料與期刊發表結果，納入 2014-2016 年起始、於 2024 年前發表結果的 controlled 世代 研究 of interventions。主要評估 結果指標 switching 比例與 主要 結果指標 是否完整預先指定，包括 measurement variable、分析 metric、aggregation method 與 time point。 主要結果：9965 筆登錄資料中納入 124 篇研究，僅 30 篇（24%）完整預先指定 主要 結果指標。結果指標 switching 發生於 60 篇（48%），僅 2 篇提供解釋；常見型態包括 omission（n=32，26%）、downgrading（n=32，26%）與 introduction of new 主要 結果指標（n=25，20%）。在有 結果指標 switching 且結果被報告的 57 篇中，77%（44/57）偏向 statistically significant results。 藥師重點：閱讀介入性 世代研究 時，不能只看發表論文的主要結果，應回查登錄紀錄與預設終點；此研究提醒藥物效果與安全性證據解讀需留意 selective reporting 風險。"},{"id":"pmid-42187087","kind":"article","issueId":"2026-week22","year":2026,"week":22,"weekLabel":"第 22 週","dateRange":"2026/05/25 – 05/31","href":"2026-week22.html","title":"In Vivo Base Editing of PCSK9 with VERVE-102 for Hypercholesterolemia","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Vafai","doi":"10.1056/NEJMoa2601283","url":"https://doi.org/10.1056/NEJMoa2601283","summary":"藥師重點：VERVE-102 單次給藥可降低 PCSK9 與 LDL 膽固醇，但目前僅為小型 第 1 期 劑量遞增研究；臨床採用前仍需確認長期安全性，並特別留意輸注反應與肝功能變化。","pubDate":"2026-05-25","terms":["vivo","base","editing","pcsk9","verve-102","hypercholesterolemia","nejm","vafai","nejmoa2601283","loss-of-function"],"drugTerms":[],"searchText":"in vivo base editing of pcsk9 with verve-102 for hypercholesterolemia nejm original article vafai 10.1056/nejmoa2601283 研究背景：pcsk9 loss-of-function variants 與較低 ldl 膽固醇 及較少 ascvd 事件 相關；verve-102 是設計用於肝臟持久 inactivate pcsk9 的 investigational base-editing 治療。 研究方法：此 第 1 期、開放標籤、single-ascending-dose 研究 對 heterozygous familial hyper膽固醇emia 或 premature 冠狀動脈 動脈 疾病 成人給予單次 intravenous verve-102，劑量為 0.3-1.0 mg total rna/kg。verve-102 含 adenine base-editor mrna 與 targeting pcsk9 的 guide rna，封裝於含 n-acetylgalactosamine 的 lipid nanoparticle；主要評估安全性與 pcsk9、ldl 膽固醇 變化。 主要結果：35 人接受 verve-102 且至少追蹤 28 天，未發生 dose-limiting toxic effects；觀察到 mild-to-moderate 輸注相關反應 與暫時性 alanine aminotransferase 上升，1 名胃食道逆流患者發生 aspiration pneumonitis。pcsk9 平均下降呈劑量相關，從 0.3 mg/kg 的 51% 至 1.0 mg/kg 的 88%；ldl 膽固醇 對應下降 9% 至 62%，最高劑量絕對下降 78 mg/dl，15 人追蹤至少 1 年仍維持下降。 藥師重點：verve-102 單次給藥可降低 pcsk9 與 ldl 膽固醇，但目前僅為小型 第 1 期 劑量遞增研究；臨床採用前仍需確認長期安全性，並特別留意輸注反應與肝功能變化。"},{"id":"pmid-42212913","kind":"article","issueId":"2026-week22","year":2026,"week":22,"weekLabel":"第 22 週","dateRange":"2026/05/25 – 05/31","href":"2026-week22.html","title":"First-Line Sunvozertinib in NSCLC with EGFR Exon 20 Insertion Mutations","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Zhou","doi":"10.1056/NEJMoa2604461","url":"https://doi.org/10.1056/NEJMoa2604461","summary":"藥師重點：Sunvozertinib 作為 EGFR exon 20 insertion advanced nonsquamous NSCLC 第一線治療可延長 無惡化存活期；用藥前需確認分子檢測結果，治療中監測 creatine kinase、diarrhea、anemia 與整體高等級不良事件。","pubDate":"2026-05-29","terms":["first-line","sunvozertinib","nsclc","egfr","exon","insertion","mutations","nejm","zhou","nejmoa2604461"],"drugTerms":["sunvozertinib"],"searchText":"first-line sunvozertinib in nsclc with egfr exon 20 insertion mutations nejm original article zhou 10.1056/nejmoa2604461 研究背景：sunvozertinib 已獲加速核准用於 advanced nsclc with egfr exon 20 insertion mutations 後線治療，但作為第一線治療的療效與安全性仍需資料支持。 研究方法：此 international 第 3 期試驗 以 1:1 將 advanced nonsquamous nsclc 且具 egfr exon 20 insertions 的患者分派至 sunvozertinib 或 chemotherapy（carboplatin-pemetrexed）。主要終點為 盲性獨立中央審查 評估的 無惡化存活期，疾病進展後允許 crossover 至 sunvozertinib。 主要結果：共 324 人隨機分派，sunvozertinib 163 人、chemotherapy 161 人；中位數 無惡化存活期 為 10.3 vs 7.5 個月（hr for 疾病 progression or 死亡 0.65，95% ci 0.50-0.85；p<0.001），12 個月 無惡化存活期 為 46.1% vs 26.7%，整體存活期 資料尚未成熟（38.9% maturity）。objective 反應 為 58.9% vs 31.1%，中位數 duration of 反應 為 11.2 vs 7.1 個月；等級 3 以上 不良事件 為 75.5% vs 56.7%，sunvozertinib 常見為 serum creatine kinase 上升、diarrhea 與 anemia，未有研究者認定與 sunvozertinib 相關死亡。 藥師重點：sunvozertinib 作為 egfr exon 20 insertion advanced nonsquamous nsclc 第一線治療可延長 無惡化存活期；用藥前需確認分子檢測結果，治療中監測 creatine kinase、diarrhea、anemia 與整體高等級不良事件。"},{"id":"pmid-42214397","kind":"article","issueId":"2026-week22","year":2026,"week":22,"weekLabel":"第 22 週","dateRange":"2026/05/25 – 05/31","href":"2026-week22.html","title":"Efficacy and safety of the CD40 ligand inhibitor dapirolizumab pegol in systemic lupus erythematosus (PHOENYCS GO): a randomised, double-blind, placebo-controlled, phase 3 trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Clowse","doi":"10.1016/S0140-6736(26)00691-4","url":"https://doi.org/10.1016/S0140-6736(26)00691-4","summary":"藥師重點：Dapirolizumab pegol 在標準治療外可改善 SLE 疾病活動度，但仍屬需進一步定位的治療選項；若未來使用，需留意輸注過敏、感染風險與血栓栓塞相關事件。","pubDate":"2026-06-06","terms":["efficacy","cd40","ligand","inhibitor","dapirolizumab","pegol","systemic","lupus","erythematosus","phoenycs"],"drugTerms":["dapirolizumab"],"searchText":"efficacy and safety of the cd40 ligand inhibitor dapirolizumab pegol in systemic lupus erythematosus (phoenycs go): a randomised, double-blind, placebo-controlled, phase 3 trial lancet rct clowse 10.1016/s0140-6736(26)00691-4 研究背景：dapirolizumab pegol 為 cd40 ligand 抑制劑，本 第 3 期試驗 評估其用於 systemic lupus erythematosus (sle) 患者的疾病活動度改善與安全性。 研究方法：phoenycs go 為 48 週、隨機、雙盲、安慰劑對照 第 3 期試驗，於 25 國 177 個中心收錄 16 歲以上、使用 standard-of-care 後仍為 moderate-to-重度 active sle 的患者。患者以 2:1 分派接受 intravenous dapirolizumab pegol 24 mg/kg 或 安慰劑，每 4 週一次並併用 standard of care；主要終點為 week 48 bicla 反應。 主要結果：full-分析 set 為 315 人；week 48 bicla 反應 為 dapirolizumab pegol 50%（103/208）vs 安慰劑 35%（37/107）（p=0.011；差異 14.6，95% ci 3.3-25.8）。治療期間出現的不良事件 為 83% vs 75%，serious 治療期間出現的不良事件 為 10% vs 15%；dapirolizumab pegol 組 infusion hypersensitivity 3%，serious infections 4%，另有 1 件 myocardial infarction 與 1 件 gangrene-related sepsis 死亡。 藥師重點：dapirolizumab pegol 在標準治療外可改善 sle 疾病活動度，但仍屬需進一步定位的治療選項；若未來使用，需留意輸注過敏、感染風險與血栓栓塞相關事件。"},{"id":"pmid-42208561","kind":"article","issueId":"2026-week22","year":2026,"week":22,"weekLabel":"第 22 週","dateRange":"2026/05/25 – 05/31","href":"2026-week22.html","title":"Efficacy and safety of ocrelizumab in primary progressive multiple sclerosis, including older patients and those with more advanced disease (ORATORIO-HAND): a multicentre, double-blind, randomised, placebo-controlled, phase 3b study","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Giovannoni","doi":"10.1016/S0140-6736(26)00617-3","url":"https://doi.org/10.1016/S0140-6736(26)00617-3","summary":"藥師重點：結果支持 ocrelizumab 可延緩較廣泛 PPMS 族群的失能進展，且對手部功能有臨床意義；用藥時仍需依 B-cell depletion 治療常規監測感染、疫苗接種時機與輸注相關反應。","pubDate":"2026-05-30","terms":["efficacy","ocrelizumab","progressive","multiple","sclerosis","including","older","those","more","advanced"],"drugTerms":["ocrelizumab"],"searchText":"efficacy and safety of ocrelizumab in primary progressive multiple sclerosis, including older patients and those with more advanced disease (oratorio-hand): a multicentre, double-blind, randomised, placebo-controlled, phase 3b study lancet rct giovannoni 10.1016/s0140-6736(26)00617-3 研究背景：oratorio 已顯示 ocrelizumab 可降低 主要 progressive multiple sclerosis (ppms) 失能惡化風險，本研究進一步評估較年長、失能較重 ppms 患者，特別是手部功能保存的效果。 研究方法：oratorio-hand 為 多中心、雙盲、隨機、安慰劑對照 第 3 期b 研究，於 22 國 138 個中心收錄 18-65 歲、edss 3.0-8.0 的 ppms 患者。1013 人以 1:1 分派接受 intravenous ocrelizumab 600 mg 或 安慰劑，每 6 個月一次至 144 週；共同主要評估為 12-week 複合 confirmed disability progression (12w-ccdp)，包含 9-hole peg test 或 edss。 主要結果：12w-ccdp 發生率為 ocrelizumab 33%（165/505）vs 安慰劑 40%（205/508）（hr 0.70，95% ci 0.57-0.86；相對風險 reduction=30%；p=0.0007）。mri-active 次族群 亦有顯著風險降低（risk reduction=55%；p<0.0001）；整體安全性相近，ocrelizumab 感染較多（48% vs 45%），排除 covid-19 後為 38% vs 37%，嚴重不良事件 與 serious infections 相近。 藥師重點：結果支持 ocrelizumab 可延緩較廣泛 ppms 族群的失能進展，且對手部功能有臨床意義；用藥時仍需依 b-cell depletion 治療常規監測感染、疫苗接種時機與輸注相關反應。"},{"id":"pmid-42208564","kind":"article","issueId":"2026-week22","year":2026,"week":22,"weekLabel":"第 22 週","dateRange":"2026/05/25 – 05/31","href":"2026-week22.html","title":"Efficacy and safety of intravenous prasinezumab in individuals with early-stage Parkinson's disease on stable symptomatic monotherapy (PADOVA): a phase 2b, multicentre, randomised, double-blind, placebo-controlled study","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Nikolcheva","doi":"10.1016/S0140-6736(26)00865-2","url":"https://doi.org/10.1016/S0140-6736(26)00865-2","summary":"藥師重點：PADOVA 未達主要療效終點，prasinezumab 目前仍屬需進一步驗證的疾病修飾治療候選；若納入試驗或後續使用，應與既有 levodopa 或 MAO-B 抑制劑 治療目標區分，避免把探索性訊號解讀為已確立療效。","pubDate":"2026-05-30","terms":["efficacy","intravenous","prasinezumab","individuals","early-stage","parkinson","stable","symptomatic","monotherapy","padova"],"drugTerms":["prasinezumab"],"searchText":"efficacy and safety of intravenous prasinezumab in individuals with early-stage parkinson's disease on stable symptomatic monotherapy (padova): a phase 2b, multicentre, randomised, double-blind, placebo-controlled study lancet rct nikolcheva 10.1016/s0140-6736(26)00865-2 研究背景：prasinezumab 先前在 early-stage parkinson's 疾病 顯示可能延緩 mds-updrs part iii 運動惡化，本研究評估其在已穩定使用 有症狀 medication 族群中的療效與安全性。 研究方法：padova 為 第 2b 期、多中心、雙盲、安慰劑對照 隨機試驗，收錄 50-85 歲、診斷 3 個月至 3 年、hoehn and yahr stage 1 或 2 且穩定用藥的 early-stage parkinson's 疾病 患者。586 人以 1:1 分派接受 intravenous prasinezumab 1500 mg 或 安慰劑，每 4 週一次至少 76 週；主要終點為 confirmed motor progression event（off-medication mds-updrs part iii 增加 ≥5 分）的時間。 主要結果：主要終點未達顯著差異，prasinezumab 相較 安慰劑 的 motor progression hr 為 0.84（95% ci 0.69-1.01；p=0.066），中位時間為 61.1 週 vs 49.7 週。嚴重不良事件 發生率相近（12% vs 12%），3 件死亡均判定與 研究 drug 無關。 藥師重點：padova 未達主要療效終點，prasinezumab 目前仍屬需進一步驗證的疾病修飾治療候選；若納入試驗或後續使用，應與既有 levodopa 或 mao-b 抑制劑 治療目標區分，避免把探索性訊號解讀為已確立療效。"},{"id":"pmid-42208560","kind":"article","issueId":"2026-week22","year":2026,"week":22,"weekLabel":"第 22 週","dateRange":"2026/05/25 – 05/31","href":"2026-week22.html","title":"Efficacy and safety of a bodyweight-adjusted higher dose of ocrelizumab in relapsing (MUSETTE) and primary progressive (GAVOTTE) multiple sclerosis: two multicentre, randomised, double-blind, parallel-group phase 3b trials","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Hauser","doi":"10.1016/S0140-6736(26)00147-9","url":"https://doi.org/10.1016/S0140-6736(26)00147-9","summary":"藥師重點：高劑量 ocrelizumab 未進一步改善 RMS 或 PPMS 失能進展控制，摘要資料不支持單因體重或暴露量考量而升高劑量；臨床仍應以核准劑量與既有監測流程為主。","pubDate":"2026-05-30","terms":["efficacy","bodyweight-adjusted","higher","dose","ocrelizumab","relapsing","musette","progressive","gavotte","multiple"],"drugTerms":["ocrelizumab","anti-cd20"],"searchText":"efficacy and safety of a bodyweight-adjusted higher dose of ocrelizumab in relapsing (musette) and primary progressive (gavotte) multiple sclerosis: two multicentre, randomised, double-blind, parallel-group phase 3b trials lancet rct hauser 10.1016/s0140-6736(26)00147-9 研究背景：ocrelizumab 為 anti-cd20 monoclonal 抗體，600 mg 劑量已用於 rms 與 ppms；先前 post-hoc 分析提示較高 exposure 可能與較佳 b-cell depletion 和較低失能惡化相關，因此需前瞻性評估高劑量是否更有效。 研究方法：musette 與 gavotte 為兩項 多中心、雙盲 第 3 期 controlled 試驗，比較 bodyweight-校正 高劑量 ocrelizumab（<75 kg 為 1200 mg，≥75 kg 為 1800 mg）與 600 mg ocrelizumab。rms 與 ppms 患者以 2:1 隨機分派，每 24 週輸注一次；主要終點為 12-week 複合 confirmed disability progression (ccdp)。 主要結果：musette 納入 860 人，12-week ccdp 為 34% vs 37%（hr 0.93，95% ci 0.73-1.18；p=0.53）；gavotte 納入 753 人，12-week ccdp 為 47% vs 49%（hr 0.95，95% ci 0.76-1.18；p=0.64）。高劑量與 600 mg 的 不良事件、嚴重不良事件 與 fatalities 比率相近，未發現新的安全性訊號。 藥師重點：高劑量 ocrelizumab 未進一步改善 rms 或 ppms 失能進展控制，摘要資料不支持單因體重或暴露量考量而升高劑量；臨床仍應以核准劑量與既有監測流程為主。"},{"id":"pmid-42202320","kind":"article","issueId":"2026-week22","year":2026,"week":22,"weekLabel":"第 22 週","dateRange":"2026/05/25 – 05/31","href":"2026-week22.html","title":"Decompression with or without Duraplasty for Chiari I and Syringomyelia","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Limbrick","doi":"10.1056/NEJMoa2402821","url":"https://doi.org/10.1056/NEJMoa2402821","summary":"藥師重點：PFD-D 未顯著降低手術併發症，雖有較大的 syrinx 縮小與較少再次 decompression 訊號，但仍需更大型研究確認；圍手術照護時應依神經外科判斷監測併發症與追蹤影像變化。","pubDate":"2026-05-28","terms":["decompression","duraplasty","chiari","syringomyelia","nejm","limbrick","nejmoa2402821","type","malformation","posterior"],"drugTerms":[],"searchText":"decompression with or without duraplasty for chiari i and syringomyelia nejm rct limbrick 10.1056/nejmoa2402821 研究背景：兒童 chiari type i malformation 合併 syringomyelia 可透過 posterior fossa decompression (pfd) 改善症狀，但是否需加做 duraplasty 以改善預後仍不明確。 研究方法：此多中心、cluster-隨機對照試驗 於 38 個中心收錄 21 歲以下、cerebellar tonsillar ectopia 至少 5 mm 且 syrinx 直徑 3.0-9.9 mm 的患者，比較 pfd with duraplasty (pfd-d) 與 pfd 單用。主要終點為 6 個月內手術併發症，次要終點包括臨床改善、syrinx 縮小、再次 decompression 與生活品質變化。 主要結果：共 162 人納入分析，pfd-d 78 人、pfd 單用 84 人；6 個月內併發症為 14% vs 6%（校正 勝算比 2.59，95% ci 0.86-7.84；p=0.11）。24 個月時臨床改善為 58% vs 46%，syrinx 平均縮小 3.08±2.33 mm vs 1.22±1.79 mm，再次 decompression 為 3% vs 14%，健康相關生活品質變化相近。 藥師重點：pfd-d 未顯著降低手術併發症，雖有較大的 syrinx 縮小與較少再次 decompression 訊號，但仍需更大型研究確認；圍手術照護時應依神經外科判斷監測併發症與追蹤影像變化。"},{"id":"pmid-42208563","kind":"article","issueId":"2026-week22","year":2026,"week":22,"weekLabel":"第 22 週","dateRange":"2026/05/25 – 05/31","href":"2026-week22.html","title":"Comparison of [18F]flortaucipir and [18F]MK6240 for the detection of tau pathology in Alzheimer's disease (HEAD): a multicentre, prospective, cross-sectional, within-participant study","journal":"Lancet","type":"OA","typeLabel":"Original Article","author":"Povala","doi":"10.1016/S0140-6736(26)00417-4","url":"https://doi.org/10.1016/S0140-6736(26)00417-4","summary":"藥師重點：Tau PET tracer 選擇會影響 tau pathology 判讀與臨床試驗分層，進而影響 Alzheimer's 疾病 治療資格或監測決策；解讀影像報告時需確認使用的 tracer，避免將不同 tracer 結果直接互相比較。","pubDate":"2026-05-30","terms":["comparison","flortaucipir","mk6240","detection","pathology","alzheimer","head","multicentre","prospective","cross-sectional"],"drugTerms":[],"searchText":"comparison of [18f]flortaucipir and [18f]mk6240 for the detection of tau pathology in alzheimer's disease (head): a multicentre, prospective, cross-sectional, within-participant study lancet original article povala 10.1016/s0140-6736(26)00417-4 研究背景：tau pet imaging 是 alzheimer's 疾病 診斷、分期與治療選擇的重要 biomarker，本研究評估不同 pet tracer 是否會改變 tau pathology 偵測結果。 研究方法：head 為 prospective、多中心、non-隨機、within-participant comparison 研究，比較 [18f]flortaucipir (tauvid) 與 investigational [18f]mk6240。682 名完成流程者接受 tau pet、amyloid-β (aβ) pet 與認知評估，兩種 tau pet 於 45 天內完成；共同主要終點為區分 alzheimer's 疾病-related cognitive impairment 的準確度，以及 mtl 與 neocortical tau positivity 頻率。 主要結果：[18f]mk6240 區分 alzheimer's 疾病 與 non-alzheimer's 疾病 impairment 的 auc 高於 [18f]flortaucipir（0.93，95% ci 0.89-0.95 vs 0.86，0.75-0.91；p<0.0001）。認知正常者中，[18f]mk6240 偵測 mtl-陽性 較多（54 [15%] vs 23 [6%]）；aβ-陽性 次族群 prevalence 比值 2.43（95% ci 1.50-3.94；p=0.0003）。認知受損者 neocortical tau positivity 亦較高（80 [28%] vs 46 [16%]）。 藥師重點：tau pet tracer 選擇會影響 tau pathology 判讀與臨床試驗分層，進而影響 alzheimer's 疾病 治療資格或監測決策；解讀影像報告時需確認使用的 tracer，避免將不同 tracer 結果直接互相比較。"},{"id":"pmid-42217468","kind":"article","issueId":"2026-week22","year":2026,"week":22,"weekLabel":"第 22 週","dateRange":"2026/05/25 – 05/31","href":"2026-week22.html","title":"Cancer Diagnostic Delay Rates Associated With a Population-Based Screening Trial Evaluating a Cell-Free DNA Multicancer Early Detection Test","journal":"JAMA","type":"OA","typeLabel":"Original Article","author":"Mann","doi":"10.1001/jama.2026.6803","url":"https://doi.org/10.1001/jama.2026.6803","summary":"藥師重點：MCED screening 試驗 參與地區短期內出現 modest diagnostic delay 增加，提醒導入大型篩檢或早期偵測計畫時需同步監測診斷量能；此結果不太可能實質影響該 MCED 試驗 主要結果解讀，但可作為系統層級風險管理依據。","pubDate":"2026-05-30","terms":["cancer","diagnostic","delay","rates","population-based","screening","evaluating","cell-free","multicancer","early"],"drugTerms":[],"searchText":"cancer diagnostic delay rates associated with a population-based screening trial evaluating a cell-free dna multicancer early detection test jama original article mann 10.1001/jama.2026.6803 研究背景：人口層級 screening 試驗 可能增加有限醫療資源需求，但許多試驗未評估 intervention rollout 對既有照護流程的 spillover effects。 研究方法：此 橫斷面研究 分析英格蘭 21 個 癌症 alliance regions，其中 8 個參與 nhs-galleri cell-free dna-based multicancer early detection (mced) screening 試驗。研究以 差異-in-differences event 研究 比較 試驗 start 前 6 個月至後 3 年的 diagnostic delay rates，主要聚焦 head and neck、lung 與 upper gastrointestinal cancers。 主要結果：共記錄 1,875,236 筆疑似 head and neck、lung 或 upper gastrointestinal cancers 轉診。試驗 開始後前 6 個月，參與地區 diagnostic delay rates 由 28.6% 增至 29.6%，未參與地區由 28.9% 降至 26.3%，校正 差異-in-differences estimate 為 3.4 百分點（95% ci 1.9-5.0；p<.001）；第二個 6 個月仍增加 4.8 百分點（95% ci 1.9-7.7；p=.003），其後不再具統計顯著。前 6 個月疑似癌症轉診率亦較高（23.8 per 100,000 族群；95% ci 0.9-46.8；p=.04）。 藥師重點：mced screening 試驗 參與地區短期內出現 modest diagnostic delay 增加，提醒導入大型篩檢或早期偵測計畫時需同步監測診斷量能；此結果不太可能實質影響該 mced 試驗 主要結果解讀，但可作為系統層級風險管理依據。"},{"id":"pmid-42208562","kind":"article","issueId":"2026-week22","year":2026,"week":22,"weekLabel":"第 22 週","dateRange":"2026/05/25 – 05/31","href":"2026-week22.html","title":"Alzheimer's disease neuropathology plasma biomarkers and cognition in midlife: a community-based cohort study","journal":"Lancet","type":"OA","typeLabel":"Original Article","author":"Jiang","doi":"10.1016/S0140-6736(26)00515-5","url":"https://doi.org/10.1016/S0140-6736(26)00515-5","summary":"藥師重點：中年 plasma biomarkers 可提供早期 Alzheimer's 疾病 風險分層訊號，但陽性比例低且為關聯性資料；臨床解讀時不宜作為單一診斷依據，仍需結合認知評估、影像或其他 biomarker。","pubDate":"2026-05-30","terms":["alzheimer","neuropathology","plasma","biomarkers","cognition","midlife","community-based","lancet","jiang","s0140-6736"],"drugTerms":[],"searchText":"alzheimer's disease neuropathology plasma biomarkers and cognition in midlife: a community-based cohort study lancet original article jiang 10.1016/s0140-6736(26)00515-5 研究背景：alzheimer's 疾病 neuropathology 以 aβ 與 p-tau 累積為特徵，過去多在老年臨床樣本評估；中年社區族群中 plasma biomarkers 與認知結果的關聯仍較少資料。 研究方法：此 community-based 世代研究 分析 cardia 研究 year 35（2020-22）具 plasma biomarkers 的參與者，排除無認知測量與 probable dementia 者後納入 1350 人。研究測量 aβ42、aβ40、p-tau217，計算 p-tau217/aβ42 與 aβ42/40，並依 amyloid pet-validated cutpoints 定義 alzheimer's 疾病 neuropathology status，評估其與認知 z scores 及 accelerated decline 的關聯。 主要結果：平均年齡 61 歲，女性 58%，black 45%、white 55%。alzheimer's 疾病 neuropathology positivity 依 p-tau217/aβ42 為 6%、aβ42/40 為 15%、p-tau217 為 4%；陽性狀態與較差 processing speed（standardised cognitive 差異 -0.54 至 -0.25；p values 0.0001-0.0048）及 executive function（-0.42 至 -0.19；p values 0.0070-0.049）相關，並與 verbal memory 與 processing speed accelerated decline odds 增加相關（例如 aβ42/40 verbal memory or 4.31，95% ci 1.71-10.9；p-tau217 processing speed or 3.98，95% ci 1.71-9.3）。 藥師重點：中年 plasma biomarkers 可提供早期 alzheimer's 疾病 風險分層訊號，但陽性比例低且為關聯性資料；臨床解讀時不宜作為單一診斷依據，仍需結合認知評估、影像或其他 biomarker。"},{"id":"pmid-42202772","kind":"article","issueId":"2026-week22","year":2026,"week":22,"weekLabel":"第 22 週","dateRange":"2026/05/25 – 05/31","href":"2026-week22.html","title":"Adverse Pregnancy Outcomes and Sedentary Behavior, Light-Intensity Physical Activity, and Daily Steps","journal":"JAMA","type":"OA","typeLabel":"Original Article","author":"Barone Gibbs","doi":"10.1001/jama.2026.6986","url":"https://doi.org/10.1001/jama.2026.6986","summary":"藥師重點：孕期衛教可鼓勵減少久坐、增加低強度活動與步數，作為生活型態風險降低策略；但此為觀察性研究，不能直接證明介入效果，若有妊娠併發症或活動限制仍需回到產科評估。","pubDate":"2026-05-27","terms":["adverse","pregnancy","sedentary","behavior","light-intensity","physical","activity","daily","steps","jama"],"drugTerms":[],"searchText":"adverse pregnancy outcomes and sedentary behavior, light-intensity physical activity, and daily steps jama original article barone gibbs 10.1001/jama.2026.6986 研究背景：中高強度身體活動已被建議用於降低不良妊娠結果風險，但久坐、light-intensity physical activity (lpa) 與 每日 steps 的關聯仍未明確。 研究方法：此 世代研究 於 2021-2025 年收錄 470 名妊娠未滿 13 週的孕婦志願者，使用大腿配戴 accelerometer 於各孕期量測 sedentary behavior (sed)、lpa 與 每日 steps。主要結果包含 hypertensive 疾患 of pregnancy、gestational diabetes、preterm birth 與 small for gestational age，並以 multivariable logistic regression 估計 absolute risks (ars) 與 rr。 主要結果：174 人（37.0%）發生不良妊娠結果，86 人（18.3%）有 hypertensive 疾患 of pregnancy。相較 low sed（ar 19.0%），high sed（ar 42.3%；rr 2.22，95% ci 1.12-4.43）與 very high sed（ar 41.6%；rr 2.19，95% ci 1.09-4.40）風險較高；very high lpa 相較 low lpa 風險較低（ar 21.1%；rr 0.52，95% ci 0.30-0.93），moderate 與 high 每日 steps 亦較 low steps 低。 藥師重點：孕期衛教可鼓勵減少久坐、增加低強度活動與步數，作為生活型態風險降低策略；但此為觀察性研究，不能直接證明介入效果，若有妊娠併發症或活動限制仍需回到產科評估。"},{"id":"pmid-42207501","kind":"article","issueId":"2026-week22","year":2026,"week":22,"weekLabel":"第 22 週","dateRange":"2026/05/25 – 05/31","href":"2026-week22.html","title":"Adverse Effects and Treatment Discontinuation of Blood Pressure-Lowering Drugs and Combinations: A Network Meta-Analysis","journal":"JAMA","type":"MA","typeLabel":"Meta-analysis","author":"Wang","doi":"10.1001/jama.2026.6214","url":"https://doi.org/10.1001/jama.2026.6214","summary":"藥師重點：不同降血壓藥類與組合的耐受性差異可作為換藥或合併治療討論依據，特別是咳嗽、水腫、頭暈與停藥風險；但結果來自短期 試驗-level network 統合分析，不宜直接外推到個別病人的長期治療。","pubDate":"2026-06-23","terms":["adverse","discontinuation","blood","pressure-lowering","drugs","combinations","network","meta-analysis","jama","wang"],"drugTerms":[],"searchText":"adverse effects and treatment discontinuation of blood pressure-lowering drugs and combinations: a network meta-analysis jama meta-analysis wang 10.1001/jama.2026.6214 研究背景：降血壓藥物不良反應會影響治療持續性與血壓控制，本研究比較 5 大類降壓藥與組合療法在短期臨床試驗中的停藥與常見不良反應。 研究方法：此 network 統合分析 納入自資料庫建立至 2024-12-31 的 雙盲 隨機臨床試驗s，評估 ace 抑制劑、arbs、β-blockers、ccbs、thiazide 或 thiazide-like diuretics 及其組合，追蹤 4-26 週。主要結果為因 不良事件 (aes) 停用隨機治療，並以 ors 與 95% 可信區間s (cris) 彙整。 主要結果：共納入 716 試驗、159,362 人，平均追蹤 8.6 週。相較 安慰劑，因 aes 停藥增加於 ccbs（or 1.43，95% cri 1.23-1.67；rd 1.2%）、ace 抑制劑 加上 ccbs（or 1.46，95% cri 1.13-1.87；rd 1.1%）與 β-blockers 加上 thiazide diuretics（or 1.58，95% cri 1.04-2.47；rd 1.7%）；arb monotherapy（or 0.73，95% cri 0.61-0.86）與 arbs 加上 ccbs（or 0.61，95% cri 0.47-0.79）停藥較 安慰劑 少。 藥師重點：不同降血壓藥類與組合的耐受性差異可作為換藥或合併治療討論依據，特別是咳嗽、水腫、頭暈與停藥風險；但結果來自短期 試驗-level network 統合分析，不宜直接外推到個別病人的長期治療。"},{"id":"fda-2026-week22-1","kind":"fda","issueId":"2026-week22","year":2026,"week":22,"weekLabel":"第 22 週","dateRange":"2026/05/25 – 05/31","href":"2026-week22.html","title":"FDA’s Concerns with Unapproved GLP-1 Drugs Used for Weight Loss","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["concerns","unapproved","glp-1","drugs","used","weight","loss","https","drug-alerts-and-statements","fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"],"drugTerms":["glp-1"],"searchText":"fda’s concerns with unapproved glp-1 drugs used for weight loss fda drug safety 2026-06-15 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"},{"id":"fda-2026-week22-3","kind":"fda","issueId":"2026-week22","year":2026,"week":22,"weekLabel":"第 22 週","dateRange":"2026/05/25 – 05/31","href":"2026-week22.html","title":"FDA issues final decision to withdraw approval of Pepaxto (melphalan flufenamide)","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/398713","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["issues","final","decision","withdraw","approval","pepaxto","melphalan","flufenamide","https","node"],"drugTerms":[],"searchText":"fda issues final decision to withdraw approval of pepaxto (melphalan flufenamide) fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/398713"},{"id":"fda-2026-week22-2","kind":"fda","issueId":"2026-week22","year":2026,"week":22,"weekLabel":"第 22 週","dateRange":"2026/05/25 – 05/31","href":"2026-week22.html","title":"FDA alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/403159","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["alerts","caregivers","providers","cross-compatibility","issues","autoinjector","devices","that","optional","glatiramer"],"drugTerms":[],"searchText":"fda alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/403159"},{"id":"fda-2026-week22-4","kind":"fda","issueId":"2026-week22","year":2026,"week":22,"weekLabel":"第 22 週","dateRange":"2026/05/25 – 05/31","href":"2026-week22.html","title":"FDA Accepts First In Silico Drug Development Tool Under ISTAND Program to Help Predict Drug-Induced Liver Injury","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["accepts","first","silico","development","tool","under","istand","program","help","predict"],"drugTerms":[],"searchText":"fda accepts first in silico drug development tool under istand program to help predict drug-induced liver injury fda drug safety 2026-06-03 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver"},{"id":"pmid-42167272","kind":"article","issueId":"2026-week21","year":2026,"week":21,"weekLabel":"第 21 週","dateRange":"2026/05/18 – 05/24","href":"2026-week21.html","title":"Updated trends in the global prevalence and burden of mental disorders, 1990-2023: a systematic analysis for the Global Burden of Disease Study 2023","journal":"Lancet","type":"SR","typeLabel":"Systematic Review","author":"N/A","doi":"10.1016/S0140-6736(26)00519-2","url":"https://doi.org/10.1016/S0140-6736(26)00519-2","summary":"藥師重點：此研究凸顯精神疾病負擔持續增加且分布不均，對藥師的意義在於慢性用藥追蹤、可近性、轉介與族群照護規劃；其資料不應直接外推為個別精神科藥物療效比較。","pubDate":"2026-05-23","terms":["updated","trends","global","prevalence","burden","mental","disorders","lancet","s0140-6736","anxiety"],"drugTerms":[],"searchText":"updated trends in the global prevalence and burden of mental disorders, 1990-2023: a systematic analysis for the global burden of disease study 2023 lancet systematic review  10.1016/s0140-6736(26)00519-2 研究背景：gbd 2023 估計 375 種疾病與傷害的盛行率、發生率與健康負擔，其中包含 12 類 mental 疾患；本研究評估 1990-2023 年不同性別、年齡、地區與 sdi 分層的趨勢。 研究方法：研究納入 anxiety 疾患、重大 depressive 疾患、dysthymia、bipolar 疾患、schizophrenia、autism spectrum 疾患、conduct 疾患、adhd、anorexia nervosa、bulimia nervosa、idiopathic developmental intellectual disability 與 other mental 疾患。作者以文獻資料與 bayesian meta-regression 估計 prevalence，並以 disability weights 計算 ylds；anorexia nervosa 另估計 deaths、ylls 與 dalys。 主要結果：2023 年全球 mental 疾患 prevalent cases 估計為 1.17 billion（95% uncertainty 區間 1.06-1.31），age-standardised prevalence 比率 為 14210.7 per 100000 族群，較 1990 年 prevalent cases 增加 95.5%（75.0-121.2），age-standardised prevalence 比率 增加 24.2%（11.4-41.4）。2023 年 mental 疾患 造成 171 百萬（127-228）dalys，占全因 dalys 的 6.1%（4.8-7.6），並為全球 ylds 第一大原因（17.3%）。 藥師重點：此研究凸顯精神疾病負擔持續增加且分布不均，對藥師的意義在於慢性用藥追蹤、可近性、轉介與族群照護規劃；其資料不應直接外推為個別精神科藥物療效比較。"},{"id":"pmid-42150581","kind":"article","issueId":"2026-week21","year":2026,"week":21,"weekLabel":"第 21 週","dateRange":"2026/05/18 – 05/24","href":"2026-week21.html","title":"Safety and efficacy of astegolimab for COPD with frequent exacerbations regardless of baseline blood eosinophil counts (ALIENTO and ARNASA): randomised, double-blind, placebo-controlled, phase 2b and 3 trials","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Papi","doi":"10.1016/S0140-6736(26)00637-9","url":"https://doi.org/10.1016/S0140-6736(26)00637-9","summary":"藥師重點：研究結果支持 ST2/IL-33 pathway 可能成為頻繁急性惡化 COPD 的治療標的，但兩個試驗與給藥間隔的結果不完全一致；若未來進入臨床使用，藥師需特別確認適用族群、與吸入維持治療併用情境及感染或呼吸道不良事件監測。","pubDate":"2026-05-23","terms":["efficacy","astegolimab","copd","frequent","exacerbations","regardless","baseline","blood","eosinophil","counts"],"drugTerms":["astegolimab","anti-st2"],"searchText":"safety and efficacy of astegolimab for copd with frequent exacerbations regardless of baseline blood eosinophil counts (aliento and arnasa): randomised, double-blind, placebo-controlled, phase 2b and 3 trials lancet rct papi 10.1016/s0140-6736(26)00637-9 研究背景：il-33/st2 pathway 與 copd 急性惡化時的 neutrophilic 與 eosinophilic inflammation 有關；astegolimab 為 anti-st2 human igg2 monoclonal 抗體，本研究評估其用於頻繁急性惡化 copd 患者的療效與安全性。 研究方法：aliento 為 第 2b 期、arnasa 為 第 3 期，皆為隨機、雙盲、安慰劑對照試驗，納入目前或曾吸菸且有頻繁急性惡化病史的 copd 患者，不依 基準值 blood eosinophils 分層排除。受試者以 1:1:1 分配接受 subcutaneous astegolimab 476 mg 每 2 週、每 4 週 或 安慰劑，並持續使用最佳化吸入維持治療 52 週，主要終點為中重度急性惡化年化發生率。 主要結果：aliento 納入 1301 人，arnasa 納入 1375 人；相較 安慰劑，aliento 中 astegolimab 每 2 週 的 校正 比率 比值 為 0.85（95% ci 0.72-1.00；p=0.049），每 4 週 為 0.93（95% ci 0.79-1.10；p=0.38）。arnasa 中 每 2 週 為 0.85（95% ci 0.72-1.01；p=0.068），每 4 週 為 0.82（95% ci 0.70-0.98；p=0.024）；不良事件與死亡在各組大致平衡，兩試驗合計 3 例死亡（0.1%）被研究者認為與治療相關。 藥師重點：研究結果支持 st2/il-33 pathway 可能成為頻繁急性惡化 copd 的治療標的，但兩個試驗與給藥間隔的結果不完全一致；若未來進入臨床使用，藥師需特別確認適用族群、與吸入維持治療併用情境及感染或呼吸道不良事件監測。"},{"id":"pmid-42150044","kind":"article","issueId":"2026-week21","year":2026,"week":21,"weekLabel":"第 21 週","dateRange":"2026/05/18 – 05/24","href":"2026-week21.html","title":"Prehospital Resuscitation with Type O Whole Blood for Trauma and Hemorrhage","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Sperry","doi":"10.1056/NEJMoa2602167","url":"https://doi.org/10.1056/NEJMoa2602167","summary":"藥師重點：結果未顯示到院前 Type O whole blood 較 blood components 降低 30 天死亡率；急救與大量輸血流程仍需依院內血品供應、輸血反應監測、凝血狀態與創傷團隊決策執行。","pubDate":"2026-06-18","terms":["prehospital","resuscitation","type","whole","blood","trauma","hemorrhage","nejm","sperry","nejmoa2602167"],"drugTerms":[],"searchText":"prehospital resuscitation with type o whole blood for trauma and hemorrhage nejm rct sperry 10.1056/nejmoa2602167 研究背景：創傷性出血與休克患者在到院前輸血可降低死亡風險，但 whole blood 是否優於血液成分輸注，以及血品儲存時間是否影響結果仍不確定。 研究方法：towar 為 實務型、多中心、第 3 期、cluster-隨機試驗，將 44 個 air medical bases 以 2:1 分配至到院前使用最多 2 units type o whole blood，或依臨床需要使用 blood components（plasma、red cells 或兩者）。主要終點為隨機分派後 30 天全因死亡，另以觀察性子研究評估 whole blood 儲存天數與預後關係。 主要結果：符合資格者 1020 人，其中 whole blood 組 715 人、component 組 305 人；主要分析分別納入 695 與 298 人。30 天死亡率 whole blood 組為 25.9%，component 組為 20.5%（校正 勝算比 1.24；95% ci 0.87-1.76；p=0.24），兩組不良事件無明顯差異；whole blood 儲存 15-21 天與 1-14 天的 30 天死亡率相近（校正 勝算比 0.99；95% ci 0.74-1.32）。 藥師重點：結果未顯示到院前 type o whole blood 較 blood components 降低 30 天死亡率；急救與大量輸血流程仍需依院內血品供應、輸血反應監測、凝血狀態與創傷團隊決策執行。"},{"id":"pmid-42149993","kind":"article","issueId":"2026-week21","year":2026,"week":21,"weekLabel":"第 21 週","dateRange":"2026/05/18 – 05/24","href":"2026-week21.html","title":"Phase 3 Trials of Inhaled Treprostinil for Idiopathic Pulmonary Fibrosis","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Nathan","doi":"10.1056/NEJMoa2501488","url":"https://doi.org/10.1056/NEJMoa2501488","summary":"藥師重點：inhaled treprostinil 在 IPF 患者可減緩 FVC 下降並降低 臨床 worsening，但咳嗽與停藥比例需納入給藥衛教與追蹤；使用時也應確認吸入技巧、給藥頻次負擔、背景 antifibrotic 治療 與病人可耐受性。","pubDate":"2026-05-18","terms":["phase","trials","inhaled","treprostinil","idiopathic","pulmonary","fibrosis","nejm","nathan","nejmoa2501488"],"drugTerms":[],"searchText":"phase 3 trials of inhaled treprostinil for idiopathic pulmonary fibrosis nejm original article nathan 10.1056/nejmoa2501488 研究背景：inhaled treprostinil 用於 特發性肺纖維化（ipf）的兩項 第 3 期 隨機試驗，是基於其可能具 antifibrotic mechanism 的臨床與臨床前證據；本文報告 teton-1 與合併試驗資料。 研究方法：teton-1 為 雙盲 試驗，將 ipf 患者隨機分配至 inhaled treprostinil 或 安慰劑（12 breaths four times 每日）。主要終點為 week 52 forced vital capacity（fvc）變化；次要終點依序包括 臨床 worsening、急性 exacerbation of ipf、存活期、percentage of predicted fvc、quality of life 與 diffusion capacity of the lungs for carbon monoxide。 主要結果：598 人接受至少一劑 treprostinil（n=299）或 安慰劑（n=299），其中 434 人完成 week 52 評估；77.6% 併用 background antifibrotic 治療。week 52 fvc 中位數 change 為 -43.3 ml vs -196.2 ml（差異 130.1 ml；95% ci 82.2-178.1；p<0.001）；臨床 worsening 為 31.8% vs 44.5%（風險比 0.67；95% ci 0.52-0.88；p=0.003）。最常見不良事件為 cough（54.8% vs 33.1%），停藥率為 40.5% vs 32.8%。 藥師重點：inhaled treprostinil 在 ipf 患者可減緩 fvc 下降並降低 臨床 worsening，但咳嗽與停藥比例需納入給藥衛教與追蹤；使用時也應確認吸入技巧、給藥頻次負擔、背景 antifibrotic 治療 與病人可耐受性。"},{"id":"pmid-42155503","kind":"article","issueId":"2026-week21","year":2026,"week":21,"weekLabel":"第 21 週","dateRange":"2026/05/18 – 05/24","href":"2026-week21.html","title":"Johns Hopkins Center for Humanitarian Health-Lancet Commission on health, conflict, and forced displacement: health in a world of crises and impunity","journal":"Lancet","type":"OA","typeLabel":"Original Article","author":"Spiegel","doi":"10.1016/S0140-6736(26)00564-7","url":"https://doi.org/10.1016/S0140-6736(26)00564-7","summary":"藥師重點：此篇目前只能確認主題與文章類型，不能外推為具體藥品可近性、疫苗或慢性病照護建議；若要用於院內藥訊，建議人工讀全文後再補上可執行的藥事照護重點。","pubDate":"2026-05-23","terms":["johns","hopkins","center","humanitarian","health-lancet","commission","conflict","forced","displacement","world"],"drugTerms":[],"searchText":"johns hopkins center for humanitarian health-lancet commission on health, conflict, and forced displacement: health in a world of crises and impunity lancet original article spiegel 10.1016/s0140-6736(26)00564-7 研究背景：此文題名指向 健康、conflict 與 forced displacement 的 lancet commission 報告，但 pubmed abstract 僅註明可於 supplementary materials 查看 french、spanish 與 arabic 版本。 研究方法：摘要未提供研究方法、資料來源、委員會流程或分析架構，無法僅依摘要判斷其證據整理方式。 主要結果：摘要未提供主要結果、數據或政策建議內容，需回到全文或 supplementary materials 才能確認重點。 藥師重點：此篇目前只能確認主題與文章類型，不能外推為具體藥品可近性、疫苗或慢性病照護建議；若要用於院內藥訊，建議人工讀全文後再補上可執行的藥事照護重點。"},{"id":"pmid-42149700","kind":"article","issueId":"2026-week21","year":2026,"week":21,"weekLabel":"第 21 週","dateRange":"2026/05/18 – 05/24","href":"2026-week21.html","title":"Cryobiopsy vs Forceps for Bronchoscopic Lung Biopsy: The FROSTBITE-2 Randomized Clinical Trial","journal":"JAMA","type":"RCT","typeLabel":"RCT","author":"Thiboutot","doi":"10.1001/jama.2026.7908","url":"https://doi.org/10.1001/jama.2026.7908","summary":"藥師重點：此研究與用藥療效無直接關聯，但會影響肺部疾病診斷品質與後續治療決策；藥師參與跨團隊討論時，可留意病人抗凝血或抗血小板用藥、切片後出血風險與檢體診斷成功率對用藥選擇的影響。","pubDate":"2026-06-16","terms":["cryobiopsy","forceps","bronchoscopic","lung","biopsy","frostbite-2","jama","thiboutot","crush","artifact"],"drugTerms":[],"searchText":"cryobiopsy vs forceps for bronchoscopic lung biopsy: the frostbite-2 randomized clinical trial jama rct thiboutot 10.1001/jama.2026.7908 研究背景：傳統 bronchoscopic biopsy 多使用 forceps，但檢體可能較小且受 crush artifact 影響；1.1-mm cryoprobe 可取得較大且較完整的經支氣管切片檢體。 研究方法：frostbite-2 為開放標示、結果評估者遮蔽、多中心隨機臨床試驗，於美國 9 個醫學中心納入 500 名 18 歲以上、因肺結節或腫塊、肺移植或 diffuse parenchymal lung 疾病 預定接受 transbronchial biopsy 的患者。受試者以 1:1 分配至 1.1-mm cryoprobe（n=250）或 2.0-mm forceps（n=250），主要終點為組織學檢體可產生特定診斷的 diagnostic yield。 主要結果：主要分析納入 490 人；cryoprobe 組 diagnostic yield 高於 forceps 組（217/245 [88.6%] vs 193/245 [78.8%]；absolute 差異 9.8%；95% ci 3.3%-16.3%；p=.003）。肺結節或腫塊與肺移植族群亦較高，但 diffuse parenchymal lung 疾病 未達顯著差異；forceps 組有 4 例需 chest tube 的 pneumothorax（1.6%），cryoprobe 組無此事件，兩組皆無 significant 出血 或 respiratory failure。 藥師重點：此研究與用藥療效無直接關聯，但會影響肺部疾病診斷品質與後續治療決策；藥師參與跨團隊討論時，可留意病人抗凝血或抗血小板用藥、切片後出血風險與檢體診斷成功率對用藥選擇的影響。"},{"id":"pmid-42167298","kind":"article","issueId":"2026-week21","year":2026,"week":21,"weekLabel":"第 21 週","dateRange":"2026/05/18 – 05/24","href":"2026-week21.html","title":"Coronary microvascular dysfunction and cardiovascular outcomes (Multicenter FLOW-CMD Registry): a prospective, multicentre cohort study in South Korea","journal":"Lancet","type":"OA","typeLabel":"Original Article","author":"Lee","doi":"10.1016/S0140-6736(26)00666-5","url":"https://doi.org/10.1016/S0140-6736(26)00666-5","summary":"藥師重點：冠狀動脈 microvascular 功能障礙 與較高心血管事件風險相關，可提醒藥師在疑似缺血性心臟病患者中重視整體風險控制；實務上仍需依原文族群與診斷條件，配合血壓、血脂、抗血小板或抗缺血用藥的個別化評估。","pubDate":"2026-06-06","terms":["coronary","microvascular","dysfunction","cardiovascular","multicenter","flow-cmd","registry","prospective","multicentre","south"],"drugTerms":[],"searchText":"coronary microvascular dysfunction and cardiovascular outcomes (multicenter flow-cmd registry): a prospective, multicentre cohort study in south korea lancet original article lee 10.1016/s0140-6736(26)00666-5 研究背景：冠狀動脈 microvascular 功能障礙 常與 epicardial 冠狀動脈 動脈 疾病 共存，但在接受 invasive 冠狀動脈 angiography 患者中的盛行率與預後資料仍有限。 研究方法：多中心 flow-cmd registry 為南韓 7 家 tertiary hospitals 的前瞻性多中心 世代研究，納入 18 歲以上、因臨床需要接受 invasive 冠狀動脈 angiography 的連續患者，並以 冠狀動脈 physiological assessment 系統性評估。obstructive epicardial 冠狀動脈 動脈 疾病 依 stenosis 與 fractional flow reserve 定義；冠狀動脈 microvascular 功能障礙 定義為 冠狀動脈 flow reserve below 2.0 且 index of microcirculatory resistance ≥25，主要終點為 all-cause 死亡、myocardial infarction、clinically driven repeat revascularisation 或 hospitalisation for 心衰竭 的 複合。 主要結果：5764 人接受篩選，1003 人納入；冠狀動脈 microvascular 功能障礙 見於 obstructive epicardial 冠狀動脈 動脈 疾病 患者 123/573（21.5%），以及無 obstructive epicardial 冠狀動脈 動脈 疾病 患者 40/430（9.3%）。中位追蹤 1.9 年，主要終點在 microvascular 功能障礙 組 26 人發生（2-year kaplan-meier estimate 18.8%），preserved microvascular function 組 70 人發生（10.5%）；風險比 1.91（95% ci 1.22-2.99；p=0.0047）。 藥師重點：冠狀動脈 microvascular 功能障礙 與較高心血管事件風險相關，可提醒藥師在疑似缺血性心臟病患者中重視整體風險控制；實務上仍需依原文族群與診斷條件，配合血壓、血脂、抗血小板或抗缺血用藥的個別化評估。"},{"id":"pmid-42156120","kind":"article","issueId":"2026-week21","year":2026,"week":21,"weekLabel":"第 21 週","dateRange":"2026/05/18 – 05/24","href":"2026-week21.html","title":"Concordance between target trial emulation and randomised controlled trials: systematic review and meta-analysis","journal":"BMJ","type":"MA","typeLabel":"Meta-analysis","author":"Wang","doi":"10.1136/bmj-2025-086810","url":"https://doi.org/10.1136/bmj-2025-086810","summary"
