dults","network","meta-analysis","randomised"],"drugTerms":["olanzapine"],"searchText":"effectiveness of drug interventions to prevent delirium after surgery for older adults: systematic review and network meta-analysis of randomised controlled trials bmj meta-analysis luney 10.1136/bmj-2025-085539 研究背景：術後 delirium 會增加高齡手術患者照護負擔，但哪些藥物能有效預防 delirium，以及對死亡率與其他臨床結果的影響仍不一致。 研究方法：研究為 systematic review 與 network 統合分析，搜尋 embase、medline 與 cochrane library 至 2024 年 3 月 4 日。納入接受全身或區域麻醉、年齡至少 60 歲、使用藥物預防術後 delirium 且以 validated delirium assessment tool 評估結果的隨機試驗。 主要結果：共納入 158 項試驗、41,084 名參與者與 52 種藥物介入，術後 delirium 整體風險為 14.5%。在非高風險偏差試驗中，dexmedetomidine（or 0.46，95% 可信區間 0.36-0.57）、corticosteroids（0.53，0.31-0.87）、melatonin 受體 agonists（0.54，0.34-0.85）、parecoxib（0.34，0.16-0.74）、olanzapine（0.27，0.07-0.94）與 intranasal insulin（0.13，0.04-0.34）較可能降低 delirium；dexmedetomidine 較常見 hypotension 與 bradycardia。 藥師重點：研究結果支持 dexmedetomidine 可預防術後 delirium，其他藥物雖有潛在效益但證據品質從中等到極低不等；藥師參與圍手術期用藥時，應同時評估鎮靜深度、低血壓、心搏過緩與納入研究異質性。"},{"id":"pmid-41671481","kind":"article","issueId":"2026-week07","year":2026,"week":7,"weekLabel":"第 7 週","dateRange":"2026/02/09 – 02/15","href":"2026-week07.html","title":"Dengue Suppression by Male Wolbachia-Infected Mosquitoes","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Lim","doi":"10.1056/NEJMoa2503304","url":"https://doi.org/10.1056/NEJMoa2503304","summary":"藥師重點：研究結果說明釋放 sterile wolbachia-infected male A. aegypti 可降低病媒蚊族群與新加坡登革熱感染風險；此屬公共衛生病媒控制證據，藥師可用於社區衛教與登革熱防治溝通，但不等同個別病人的藥物治療介入。","pubDate":"2026-03-26","terms":["dengue","suppression","male","wolbachia-infected","mosquitoes","nejm","nejmoa2503304","walbb","strain","wolbachia"],"drugTerms":[],"searchText":"dengue suppression by male wolbachia-infected mosquitoes nejm rct lim 10.1056/nejmoa2503304 研究背景：帶有 walbb strain wolbachia pipientis 的雄性 aedes aegypti 與野生型雌蚊交配後可產生不具存活力的後代，重複釋放此類雄蚊可能抑制病媒蚊族群並降低登革熱感染風險。 研究方法：研究在新加坡進行，採 cluster-隨機試驗 並搭配 test-negative controls，將 15 個地理人口群聚分為 8 個釋放 wolbachia-infected male mosquitoes 的介入群與 7 個未釋放的對照群。主要終點為任一血清型、任一嚴重度的有症狀且實驗室確認登革熱感染。 主要結果：介入群與對照群居民分別為 393,236 人與 331,192 人；介入後第 3 個月至 24 個月期間，成蚊平均豐度為 0.041 vs 0.277。意向治療分析中，介入群登革熱陽性比例低於對照群（354/5722，6% vs 1519/7080，21%），3 至 12 個月以上 wolbachia exposure 的 protective efficacy 約 71-72%（or 0.28-0.29）。 藥師重點：研究結果說明釋放 sterile wolbachia-infected male a. aegypti 可降低病媒蚊族群與新加坡登革熱感染風險；此屬公共衛生病媒控制證據，藥師可用於社區衛教與登革熱防治溝通，但不等同個別病人的藥物治療介入。"},{"id":"pmid-41661604","kind":"article","issueId":"2026-week07","year":2026,"week":7,"weekLabel":"第 7 週","dateRange":"2026/02/09 – 02/15","href":"2026-week07.html","title":"Coffee and Tea Intake, Dementia Risk, and Cognitive Function","journal":"JAMA","type":"OA","typeLabel":"Original Article","author":"Zhang","doi":"10.1001/jama.2025.27259","url":"https://doi.org/10.1001/jama.2025.27259","summary":"藥師重點：結論顯示含咖啡因咖啡與茶的適量攝取和較低 dementia 風險及些微較佳認知表現相關，但 世代 結果不能視為預防 dementia 的治療建議；藥師衛教時仍需考量睡眠、焦慮、心悸、胃食道逆流與藥物交互作用。","pubDate":"2026-03-17","terms":["coffee","intake","dementia","cognitive","function","jama","zhang","nurses","professionals","parkinson"],"drugTerms":[],"searchText":"coffee and tea intake, dementia risk, and cognitive function jama original article zhang 10.1001/jama.2025.27259 研究背景：咖啡與茶攝取和認知健康的關係仍未定論，過去研究也常未區分含咖啡因與不含咖啡因咖啡。本研究評估咖啡與茶攝取和 dementia 風險、主觀認知下降及客觀認知表現的關聯。 研究方法：研究為美國 nurses' 健康 研究 與 健康 professionals 追蹤 研究 的前瞻性 世代，納入基線無癌症、parkinson 疾病 或 dementia 的 131,821 名參與者。主要暴露為 caffeinated coffee、decaffeinated coffee 與 tea 攝取量，每 2-4 年以 validated food frequency questionnaires 收集；主要結果為 dementia。 主要結果：最長追蹤 43 年期間共發生 11,033 例 incident dementia；調整潛在干擾因子後，caffeinated coffee 攝取最高四分位相較最低四分位與較低 dementia 風險相關（141 vs 330 cases per 100,000 person-years；hr 0.82，95% ci 0.76-0.89），主觀認知下降盛行率也較低（7.8% vs 9.5%；prevalence 比值 0.85，95% ci 0.78-0.93）。tea 呈現類似關聯，decaffeinated coffee 則未與較低 dementia 風險或較佳認知表現相關；最明顯差異約見於每日 2-3 杯 caffeinated coffee 或 1-2 杯 tea。 藥師重點：結論顯示含咖啡因咖啡與茶的適量攝取和較低 dementia 風險及些微較佳認知表現相關，但 世代 結果不能視為預防 dementia 的治療建議；藥師衛教時仍需考量睡眠、焦慮、心悸、胃食道逆流與藥物交互作用。"},{"id":"pmid-41655587","kind":"article","issueId":"2026-week07","year":2026,"week":7,"weekLabel":"第 7 週","dateRange":"2026/02/09 – 02/15","href":"2026-week07.html","title":"Assessment of adverse effects attributed to statin therapy in product labels: a meta-analysis of double-blind randomised controlled trials","journal":"Lancet","type":"MA","typeLabel":"Meta-analysis","author":"N/A","doi":"10.1016/S0140-6736(25)01578-8","url":"https://doi.org/10.1016/S0140-6736(25)01578-8","summary":"藥師重點：結論顯示雙盲隨機試驗資料不支持 statin 與多數仿單列載症狀之間存在因果關係，包括 cognitive impairment、depression、sleep disturbance 與 peripheral neuropathy；藥師可用於風險溝通與提升用藥持續性，同時仍需依臨床狀況監測肝功能與肌肉相關症狀。","pubDate":"2026-02-14","terms":["assessment","adverse","attributed","statin","product","labels","meta-analysis","double-blind","randomised","trials"],"drugTerms":["statin","atorvastatin","fluvastatin","pravastatin","rosuvastatin","simvastatin"],"searchText":"assessment of adverse effects attributed to statin therapy in product labels: a meta-analysis of double-blind randomised controlled trials lancet meta-analysis  10.1016/s0140-6736(25)01578-8 研究背景：statin 仿單常列出多種可能不良反應，但部分資料主要來自非隨機或非盲性研究，可能受到偏差影響。本研究以大型雙盲隨機試驗的 individual participant 資料 重新評估這些不良事件與 statin 的關聯。 研究方法：研究為個別受試者資料 統合分析，先從電子藥品彙編整理 atorvastatin、fluvastatin、pravastatin、rosuvastatin 與 simvastatin 仿單列出的 undesirable effect terms。納入至少 1000 人、預定治療至少 2 年，且為 statin vs 安慰劑 或較高強度 vs 較低強度 statin 的雙盲隨機試驗，並以 fdr 5% 控制多重檢定。 主要結果：19 項 statin vs 安慰劑 試驗共 123,940 人，中位追蹤 4.5 年；除既知肌肉事件與糖尿病外，66 項額外被歸因於 statin 的不良結果中僅 4 項達 fdr 顯著：abnormal liver transaminases（rr 1.41，95% ci 1.26-1.57）、其他 liver function test abnormalities（rr 1.26，1.12-1.41；combined liver function test abnormality 年絕對增加 0.13%）、urinary composition alteration（rr 1.18，1.04-1.33）與 oedema（rr 1.07，1.02-1.12）。 藥師重點：結論顯示雙盲隨機試驗資料不支持 statin 與多數仿單列載症狀之間存在因果關係，包括 cognitive impairment、depression、sleep disturbance 與 peripheral neuropathy；藥師可用於風險溝通與提升用藥持續性，同時仍需依臨床狀況監測肝功能與肌肉相關症狀。"},{"id":"pmid-41679324","kind":"article","issueId":"2026-week07","year":2026,"week":7,"weekLabel":"第 7 週","dateRange":"2026/02/09 – 02/15","href":"2026-week07.html","title":"Adult obesity and risk of severe infections: a multicohort study with global burden estimates","journal":"Lancet","type":"OA","typeLabel":"Original Article","author":"Nyberg","doi":"10.1016/S0140-6736(25)02474-2","url":"https://doi.org/10.1016/S0140-6736(25)02474-2","summary":"藥師重點：研究結果說明成人肥胖與多類病原造成的感染住院與死亡風險增加有關；藥師可在慢病照護、疫苗接種與感染風險衛教中納入體重管理觀點，但因屬 世代 與 burden modelling，仍需避免解讀為單一因果證據。","pubDate":"2026-03-07","terms":["adult","obesity","severe","infections","multicohort","global","burden","estimates","lancet","nyberg"],"drugTerms":[],"searchText":"adult obesity and risk of severe infections: a multicohort study with global burden estimates lancet original article nyberg 10.1016/s0140-6736(25)02474-2 研究背景：成人肥胖已被認為與部分感染有關，但跨越多種細菌、病毒、寄生蟲與黴菌感染的整體證據仍有限。本研究評估肥胖與 925 種感染性疾病之發生、住院與死亡的關聯，並估算全球與區域可歸因影響。 研究方法：研究整合兩個芬蘭 世代 並以 uk biobank 重複分析，依基線 bmi 分為 healthy weight、overweight 與 obesity class i-iii。研究透過國家住院與死亡登錄追蹤感染相關住院與死亡，並結合 global burden of diseases 資料估算 2018、2021 與 2023 年肥胖可歸因的感染死亡比例。 主要結果：芬蘭 世代 納入 67,766 人，uk biobank 納入 479,498 人；與健康體重者相比，class iii obesity 的感染相關住院風險約增加 3 倍（芬蘭 hr 2.75，95% ci 2.24-3.37；uk biobank hr 3.07，2.95-3.19），死亡風險亦較高（hr 3.06，1.25-7.49；hr 3.54，3.15-3.98）。任一 obesity class 對嚴重感染的 pooled hr 為 1.7（1.7-1.8），全球感染相關死亡中肥胖可歸因比例估計為 2018 年 8.6%、2021 年 15.0%、2023 年 10.8%。 藥師重點：研究結果說明成人肥胖與多類病原造成的感染住院與死亡風險增加有關；藥師可在慢病照護、疫苗接種與感染風險衛教中納入體重管理觀點，但因屬 世代 與 burden modelling，仍需避免解讀為單一因果證據。"},{"id":"pmid-41671482","kind":"article","issueId":"2026-week07","year":2026,"week":7,"weekLabel":"第 7 週","dateRange":"2026/02/09 – 02/15","href":"2026-week07.html","title":"Adenoviral Inciting Antigen and Somatic Hypermutation in VITT","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Wang","doi":"10.1056/NEJMoa2514824","url":"https://doi.org/10.1056/NEJMoa2514824","summary":"藥師重點：研究結果說明 VITT 可能源於具特定 IGLV3-21 allele 者產生 K31E somatic hypermutation，使原本辨識 adenovirus pVII epitope 的抗體轉向 PF4；此證據主要用於理解機轉與風險辨識，臨床仍需依血小板、血栓表現與 anti-PF4 檢測處理疑似個案。","pubDate":"2026-02-12","terms":["adenoviral","inciting","antigen","somatic","hypermutation","vitt","nejm","wang","nejmoa2514824","induced"],"drugTerms":["anti-pf4","anti-adenovirus"],"searchText":"adenoviral inciting antigen and somatic hypermutation in vitt nejm original article wang 10.1056/nejmoa2514824 研究背景：疫苗-induced immune thrombocytopenia and thrombosis（vitt）是腺病毒載體 covid-19 疫苗後罕見但具血栓風險的併發症，少數也可發生於自然腺病毒感染後；其與活化血小板的 anti-pf4 抗體 有關，但觸發抗原與免疫病理機轉仍不清楚。 研究方法：研究以 抗體 proteomics 分析 21 名 vitt 患者的 anti-pf4 抗體 胺基酸序列，並定序 100 名 vitt 患者的 immunoglobulin light-chain hypervariable region 基因。研究者再以 anti-pf4 與 anti-adenovirus protein 抗體 的 antigen-binding fingerprints 尋找共同 serum clonotype，並用 adenovirus protein peptides 與 recombinant anti-pf4 vitt 抗體 定位 mimic linear epitope。 主要結果：vitt 抗體 的基因體與蛋白質體分析顯示共同 immunoglobulin light-chain allele iglv3-21*02 或 *03，且帶有關鍵 somatic hypermutation k31e。只有針對 adenoviral core protein vii（pvii）純化的抗體含有符合 vitt fingerprint 的 anti-pf4 species；將 pathogenic anti-pf4 vitt 抗體 回復為 germline k31 後，體內外 prothrombotic activity 消失並較偏向結合 pvii。 藥師重點：研究結果說明 vitt 可能源於具特定 iglv3-21 allele 者產生 k31e somatic hypermutation，使原本辨識 adenovirus pvii epitope 的抗體轉向 pf4；此證據主要用於理解機轉與風險辨識，臨床仍需依血小板、血栓表現與 anti-pf4 檢測處理疑似個案。"},{"id":"pmid-41665410","kind":"article","issueId":"2026-week07","year":2026,"week":7,"weekLabel":"第 7 週","dateRange":"2026/02/09 – 02/15","href":"2026-week07.html","title":"AAV9 Gene Therapy in Type II GM1 Gangliosidosis - A Phase 1-2 Trial","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Lewis","doi":"10.1056/NEJMoa2510935","url":"https://doi.org/10.1056/NEJMoa2510935","summary":"藥師重點：結論顯示單次 AAV9 encoding β-galactosidase 輸注在 9 名 type II GM1 gangliosidosis 兒童中伴隨肝酵素上升、嚴重嘔吐等安全性事件，同時出現生化與影像改善訊號；此仍屬早期小型試驗，藥師需關注免疫抑制、肝功能與長期神經發展追蹤。","pubDate":"2026-03-26","terms":["aav9","gene","type","gangliosidosis","phase","nejm","lewis","nejmoa2510935","glb1","lysosomal"],"drugTerms":[],"searchText":"aav9 gene therapy in type ii gm1 gangliosidosis - a phase 1-2 trial nejm original article lewis 10.1056/nejmoa2510935 研究背景：type ii gm1 gangliosidosis 由 glb1 雙等位基因變異造成 lysosomal β-galactosidase 缺乏，導致 gm1 ganglioside 無法正常分解，是目前缺乏有效治療的致命神經退化疾病。 研究方法：研究為 第 1 期-2、開放標籤、劑量遞增試驗，評估免疫抑制後單次靜脈輸注 adeno-associated virus serotype 9（aav9）encoding β-galactosidase，用於 late-infantile 或 juvenile onset 的 type ii gm1 gangliosidosis 兒童。主要終點為安全性，次要終點包括 csf gm1 ganglioside、β-galactosidase activity、臨床 global impression-improvement（cgi-i）與神經影像變化。 主要結果：共 9 名受試者納入，3 年期間發生 124 件不良事件，其中 30 件被判定可能、很可能或確定與 gene 治療 相關；5 件 嚴重不良事件 中，1 件因嘔吐住院被歸因於治療。所有受試者 ast/alt 皆上升並於 18 個月回到基線；csf β-galactosidase 上升、csf gm1 ganglioside 下降，部分發展量表與神經影像呈現穩定或改善訊號。 藥師重點：結論顯示單次 aav9 encoding β-galactosidase 輸注在 9 名 type ii gm1 gangliosidosis 兒童中伴隨肝酵素上升、嚴重嘔吐等安全性事件，同時出現生化與影像改善訊號；此仍屬早期小型試驗，藥師需關注免疫抑制、肝功能與長期神經發展追蹤。"},{"id":"fda-2026-week07-1","kind":"fda","issueId":"2026-week07","year":2026,"week":7,"weekLabel":"第 7 週","dateRange":"2026/02/09 – 02/15","href":"2026-week07.html","title":"FDA’s Concerns with Unapproved GLP-1 Drugs Used for Weight Loss","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["concerns","unapproved","glp-1","drugs","used","weight","loss","https","drug-alerts-and-statements","fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"],"drugTerms":["glp-1"],"searchText":"fda’s concerns with unapproved glp-1 drugs used for weight loss fda drug safety 2026-06-15 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"},{"id":"fda-2026-week07-3","kind":"fda","issueId":"2026-week07","year":2026,"week":7,"weekLabel":"第 7 週","dateRange":"2026/02/09 – 02/15","href":"2026-week07.html","title":"FDA issues final decision to withdraw approval of Pepaxto (melphalan flufenamide)","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/398713","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["issues","final","decision","withdraw","approval","pepaxto","melphalan","flufenamide","https","node"],"drugTerms":[],"searchText":"fda issues final decision to withdraw approval of pepaxto (melphalan flufenamide) fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/398713"},{"id":"fda-2026-week07-2","kind":"fda","issueId":"2026-week07","year":2026,"week":7,"weekLabel":"第 7 週","dateRange":"2026/02/09 – 02/15","href":"2026-week07.html","title":"FDA alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/403159","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["alerts","caregivers","providers","cross-compatibility","issues","autoinjector","devices","that","optional","glatiramer"],"drugTerms":[],"searchText":"fda alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/403159"},{"id":"fda-2026-week07-4","kind":"fda","issueId":"2026-week07","year":2026,"week":7,"weekLabel":"第 7 週","dateRange":"2026/02/09 – 02/15","href":"2026-week07.html","title":"FDA Accepts First In Silico Drug Development Tool Under ISTAND Program to Help Predict Drug-Induced Liver Injury","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["accepts","first","silico","development","tool","under","istand","program","help","predict"],"drugTerms":[],"searchText":"fda accepts first in silico drug development tool under istand program to help predict drug-induced liver injury fda drug safety 2026-06-03 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver"},{"id":"pmid-41638711","kind":"article","issueId":"2026-week06","year":2026,"week":6,"weekLabel":"第 6 週","dateRange":"2026/02/02 – 02/08","href":"2026-week06.html","title":"Time trends in the male to female ratio for autism incidence: population based, prospectively collected, birth cohort study","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"Fyfe","doi":"10.1136/bmj-2025-084164","url":"https://doi.org/10.1136/bmj-2025-084164","summary":"藥師重點：研究結果說明 ASD 男女診斷比例會受年齡與時間趨勢影響，女性可能較晚被診斷且過去負擔可能被低估；此研究屬流行病學證據，較適合作為照護可近性、篩檢與衛教討論背景，而非藥物治療決策依據。","pubDate":"2026-02-04","terms":["time","trends","male","female","ratio","autism","incidence","population","prospectively","collected"],"drugTerms":[],"searchText":"time trends in the male to female ratio for autism incidence: population based, prospectively collected, birth cohort study bmj original article fyfe 10.1136/bmj-2025-084164 研究背景：自閉症類群障礙（asd）的男女診斷比例過去常被認為男性較高，但診斷年齡與世代變化可能影響此比例，需以長期族群資料重新評估。 研究方法：此瑞典 族群-based、prospectively collected birth 世代研究 納入 1985-2020 年出生於瑞典醫療出生登記的 2,756,779 名兒童。研究以 age-period 世代 分析 評估 asd 與診斷年齡、曆年期間、出生世代與性別的關聯，並估算 發生率比 與 cumulative male to female 比值（cmfr）。 主要結果：截至 2022 年追蹤結束，78,522 人（2.8%）診斷 asd。asd incidence 比率 隨兒童期每 5 歲年齡區間增加，2020-2022 年男性於 10-14 歲達 645.5 per 100,000 person-years，女性於 15-19 歲達 602.6 per 100,000 person-years；男性對女性比例隨診斷年齡增加而下降，2022 年追蹤時 20 歲 cmfr 為 1.2，趨勢推估 2024 年 20 歲時可能接近平衡。 藥師重點：研究結果說明 asd 男女診斷比例會受年齡與時間趨勢影響，女性可能較晚被診斷且過去負擔可能被低估；此研究屬流行病學證據，較適合作為照護可近性、篩檢與衛教討論背景，而非藥物治療決策依據。"},{"id":"pmid-41638692","kind":"article","issueId":"2026-week06","year":2026,"week":6,"weekLabel":"第 6 週","dateRange":"2026/02/02 – 02/08","href":"2026-week06.html","title":"Testing menstrual blood for human papillomavirus during cervical cancer screening in China: cross sectional population based study","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"Tian","doi":"10.1136/bmj-2025-084831","url":"https://doi.org/10.1136/bmj-2025-084831","summary":"藥師重點：結論顯示以 minipad 收集經血進行 HPV testing 對 CIN2+/CIN3+ 的診斷準確度與臨床人員採集子宮頸檢體相近；若未來導入篩檢流程，需留意採檢說明、陽性後轉介追蹤，以及此研究族群與本地篩檢制度的差異。","pubDate":"2026-02-04","terms":["testing","menstrual","blood","human","papillomavirus","cervical","cancer","screening","china","cross"],"drugTerms":[],"searchText":"testing menstrual blood for human papillomavirus during cervical cancer screening in china: cross sectional population based study bmj original article tian 10.1136/bmj-2025-084831 研究背景：hpv 檢測是子宮頸癌篩檢的重要工具，若能以 minipad 收集經血進行檢測，可能提高採檢便利性；其對 cin2+/cin3+ 的診斷準確度需與臨床人員採集子宮頸檢體比較。 研究方法：此中國湖北省 4 個都市與 3 個鄉村社區進行的 族群-based 橫斷面研究，納入 3068 名 20-54 歲且月經規則女性。研究比較 以衛生棉收集的經血 hpv testing、clinician collected cervical hpv testing 與 thinprep cytology；任一 hpv 檢測陽性或 cytology 達 atypical squamous cells of undetermined significance 以上者接受 colposcopy-directed biopsy，以評估 cin2+ 與 cin3+ 診斷準確度。 主要結果：minipad hpv testing 偵測 cin2+ 的 sensitivity 為 94.7%（95% ci 80.9%-99.1%），與 clinician-based hpv testing 的 92.1%（95% ci 77.5%-97.9%；p=1.00）相近。minipad hpv testing specificity 較低（89.1% vs 90.0%；p=0.001），但 negative predictive value 相同（99.9% vs 99.9%；p=1.00），陽性 predictive value 與 screening efficiency 亦相近。 藥師重點：結論顯示以 minipad 收集經血進行 hpv testing 對 cin2+/cin3+ 的診斷準確度與臨床人員採集子宮頸檢體相近；若未來導入篩檢流程，需留意採檢說明、陽性後轉介追蹤，以及此研究族群與本地篩檢制度的差異。"},{"id":"pmid-41642827","kind":"article","issueId":"2026-week06","year":2026,"week":6,"weekLabel":"第 6 週","dateRange":"2026/02/02 – 02/08","href":"2026-week06.html","title":"Tenecteplase for Acute Non-Large Vessel Occlusion 4.5 to 24 Hours After Ischemic Stroke: The OPTION Randomized Clinical Trial","journal":"JAMA","type":"RCT","typeLabel":"RCT","author":"Ma","doi":"10.1001/jama.2026.0210","url":"https://doi.org/10.1001/jama.2026.0210","summary":"藥師重點：研究結果說明在影像篩選且非 大血管阻塞 的急性缺血性中風病人中，4.5-24 小時給予 tenecteplase 可增加 90 天良好功能結局機會，但會提高 有症狀 intracranial hemorrhage 風險；臨床應嚴格依影像條件、出血禁忌與劑量上限評估。","pubDate":"2026-04-07","terms":["tenecteplase","acute","non-large","vessel","occlusion","hours","ischemic","stroke","option","jama"],"drugTerms":[],"searchText":"tenecteplase for acute non-large vessel occlusion 4.5 to 24 hours after ischemic stroke: the option randomized clinical trial jama rct ma 10.1001/jama.2026.0210 研究背景：急性缺血性中風若超過 4.5 小時治療窗，且非 大血管阻塞，靜脈 tenecteplase 是否仍可改善功能結局並維持安全性仍不確定。 研究方法：option 為中國 48 個中心進行的隨機、開放標籤、blinded end-point 試驗，納入 非大血管阻塞 stroke 且 perfusion imaging 顯示仍有可挽救腦組織、最後正常時間後 4.5-24 小時內就醫的病人。受試者 1:1 接受 intravenous tenecteplase 0.25 mg/kg（maximum 25 mg）或 標準醫療治療；主要療效終點為 90 天 mrs 0-1 分，安全性包括 36 小時 有症狀 intracranial hemorrhage 與 90 天死亡率。 主要結果：570 人隨機分組，566 人納入主要分析。90 天 excellent functional 結果指標 為 tenecteplase 組 43.6% vs 對照組 34.2%（rr 1.28，95% ci 1.04-1.57；p=.02）；有症狀 intracranial hemorrhage 較 tenecteplase 組高（2.8% vs 0%；風險差 2.85%，95% ci 1.16%-5.54%；p=.004），90 天死亡率為 5.0% vs 3.2%（rr 1.57，95% ci 0.69-3.57；p=.28）。 藥師重點：研究結果說明在影像篩選且非 大血管阻塞 的急性缺血性中風病人中，4.5-24 小時給予 tenecteplase 可增加 90 天良好功能結局機會，但會提高 有症狀 intracranial hemorrhage 風險；臨床應嚴格依影像條件、出血禁忌與劑量上限評估。"},{"id":"pmid-41654374","kind":"article","issueId":"2026-week06","year":2026,"week":6,"weekLabel":"第 6 週","dateRange":"2026/02/02 – 02/08","href":"2026-week06.html","title":"Switch to fixed-dose doravirine (100 mg) and islatravir (0·25 mg) once daily in virologically suppressed adults with HIV-1 on oral antiretroviral therapy: 48-week results of a phase 3, multicentre, randomised, open-label, non-inferiority trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Orkin","doi":"10.1016/S0140-6736(25)01945-2","url":"https://doi.org/10.1016/S0140-6736(25)01945-2","summary":"藥師重點：研究結果說明 doravirine/islatravir 作為轉換治療可維持 48 週病毒控制，並提供非 INSTI-based 雙藥單錠的潛在選項；臨床評估時需確認 hepatitis B 狀態、既往 ART 與抗藥性紀錄，並追蹤不良事件與病毒量。","pubDate":"2026-02-07","terms":["switch","fixed-dose","doravirine","islatravir","once","daily","virologically","suppressed","adults","hiv-1"],"drugTerms":["islatravir"],"searchText":"switch to fixed-dose doravirine (100 mg) and islatravir (0·25 mg) once daily in virologically suppressed adults with hiv-1 on oral antiretroviral therapy: 48-week results of a phase 3, multicentre, randomised, open-label, non-inferiority trial lancet rct orkin 10.1016/s0140-6736(25)01945-2 研究背景：doravirine/islatravir 為 investigational 每日一次 single-tablet 處方，可能提供非 insti-based 的雙藥 hiv-1 治療選項；其由穩定口服 art 轉換後的療效與安全性仍需大型試驗確認。 研究方法：此 第 3 期、隨機、活性對照、開放標籤、不劣性 試驗 於 8 國 53 個據點進行。納入 18 歲以上、任何口服雙藥或三藥 art 下 hiv-1 rna <50 copies per ml 至少 3 個月、無治療失敗史、無已知 doravirine 抗藥性且無活動性 hepatitis b 的成人，依 2:1 分配至 doravirine 100 mg/islatravir 0.25 mg 每日一次 或續用 基準值 art 48 週；主要終點為第 48 週 hiv-1 rna ≥50 copies per ml。 主要結果：共 553 人隨機分組，551 人接受至少一劑研究治療。第 48 週 hiv-1 rna ≥50 copies per ml 為 doravirine/islatravir 組 1.4% vs 基準值 art 組 4.9%，差異 -3.6%（multiplicity-校正 95% ci -7.8 to -0.8），符合 不劣性；治療相關不良事件 較常見於 doravirine/islatravir 組（12.0% vs 4.9%），但任何 不良事件、嚴重不良事件 與因不良事件停藥比例相近。 藥師重點：研究結果說明 doravirine/islatravir 作為轉換治療可維持 48 週病毒控制，並提供非 insti-based 雙藥單錠的潛在選項；臨床評估時需確認 hepatitis b 狀態、既往 art 與抗藥性紀錄，並追蹤不良事件與病毒量。"},{"id":"pmid-41654375","kind":"article","issueId":"2026-week06","year":2026,"week":6,"weekLabel":"第 6 週","dateRange":"2026/02/02 – 02/08","href":"2026-week06.html","title":"Switch to fixed-dose doravirine (100 mg) and islatravir (0·25 mg) once daily in virologically suppressed adults with HIV-1 on bictegravir, emtricitabine, and tenofovir alafenamide: 48-week results of a phase 3, multicentre, randomised, controlled, double-blind, non-inferiority trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Colson","doi":"10.1016/S0140-6736(25)01948-8","url":"https://doi.org/10.1016/S0140-6736(25)01948-8","summary":"藥師重點：結論顯示 doravirine 100 mg/islatravir 0.25 mg 每日一次 在病毒已控制且適合轉換治療的成人中，48 週病毒控制與安全性與 bictegravir/emtricitabine/tenofovir alafenamide 相近；藥師需留意既往治療失敗、抗藥性資料與轉換後病毒量追蹤。","pubDate":"2026-02-07","terms":["switch","fixed-dose","doravirine","islatravir","once","daily","virologically","suppressed","adults","hiv-1"],"drugTerms":["islatravir","bictegravir","tenofovir"],"searchText":"switch to fixed-dose doravirine (100 mg) and islatravir (0·25 mg) once daily in virologically suppressed adults with hiv-1 on bictegravir, emtricitabine, and tenofovir alafenamide: 48-week results of a phase 3, multicentre, randomised, controlled, double-blind, non-inferiority trial lancet rct colson 10.1016/s0140-6736(25)01948-8 研究背景：doravirine 與 islatravir 固定劑量單錠複方正被評估作為 hiv-1 治療選項，本研究探討病毒已受控制者由 bictegravir、emtricitabine、tenofovir alafenamide 轉換至 doravirine/islatravir 的療效與安全性。 研究方法：此 第 3 期、隨機、雙盲、活性對照、不劣性 試驗 於 6 國 49 個研究、社區與醫院據點進行。納入 18 歲以上、使用 bictegravir/emtricitabine/tenofovir alafenamide 且 hiv-1 rna <50 copies per ml 至少 3 個月的成人，依 2:1 分配轉換至 doravirine 100 mg/islatravir 0.25 mg 每日一次 或續用原療法；主要終點為第 48 週 hiv-1 rna ≥50 copies per ml 的比例。 主要結果：共 514 人隨機分組、513 人接受治療，其中 342 人轉換至 doravirine/islatravir，171 人續用 bictegravir/emtricitabine/tenofovir alafenamide。第 48 週 hiv-1 rna ≥50 copies per ml 為 1.5% vs 0.6%，治療差異 0.9%（multiplicity-校正 95% ci -1.9 to 2.9），符合 不劣性；任何 不良事件、治療相關不良事件、嚴重不良事件 與因不良事件停藥比例相近，且未通報死亡。 藥師重點：結論顯示 doravirine 100 mg/islatravir 0.25 mg 每日一次 在病毒已控制且適合轉換治療的成人中，48 週病毒控制與安全性與 bictegravir/emtricitabine/tenofovir alafenamide 相近；藥師需留意既往治療失敗、抗藥性資料與轉換後病毒量追蹤。"},{"id":"pmid-41653933","kind":"article","issueId":"2026-week06","year":2026,"week":6,"weekLabel":"第 6 週","dateRange":"2026/02/02 – 02/08","href":"2026-week06.html","title":"Recombinant factor VIIa versus placebo for spontaneous intracerebral haemorrhage within 2 h of symptom onset (FASTEST): a multicentre, double-blind, randomised, placebo-controlled, phase 3 trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Broderick","doi":"10.1016/S0140-6736(26)00097-8","url":"https://doi.org/10.1016/S0140-6736(26)00097-8","summary":"藥師重點：結論顯示 recombinant factor VIIa 於 ICH 發生 2 小時內給藥可減緩血腫成長，但未改善 180 天功能結局且增加嚴重血栓栓塞風險；藥師解讀時需把影像學止血效果與病人功能結局、安全性分開評估。","pubDate":"2026-02-21","terms":["recombinant","factor","viia","placebo","spontaneous","intracerebral","haemorrhage","within","symptom","onset"],"drugTerms":[],"searchText":"recombinant factor viia versus placebo for spontaneous intracerebral haemorrhage within 2 h of symptom onset (fastest): a multicentre, double-blind, randomised, placebo-controlled, phase 3 trial lancet rct broderick 10.1016/s0140-6736(26)00097-8 研究背景：recombinant factor viia 可減緩腦內出血擴大，但過去止血藥物尚未明確改善臨床功能結局；fastest 評估其於急性自發性腦內出血早期給藥的療效與安全性。 研究方法：fastest 為多國 93 個據點進行的多中心、前瞻性、雙盲、隨機、安慰劑對照、adaptive 第 3 期試驗。納入 18-80 歲、spontaneous ich 2-60 ml、符合 ivh 與 gcs 條件且可於發病或最後正常時間 2 小時內給藥者，隨機接受 recombinant factor viia 80 μg/kg 靜脈注射或 安慰劑；主要終點為 180 天 mrs 功能結局，主要安全性終點為前 4 天 危及生命的血栓栓塞 事件。 主要結果：共 626 人納入 意向治療分析，安慰劑 組 298 人、intervention 組 328 人；平均發病至給藥時間為 100 分鐘。試驗於第二次 interim 分析 因 futility 達停止標準；180 天 mrs 主要臨床結局無顯著差異（校正 common 勝算比 1.09，95% ci 0.79-1.51；p=0.61），但前 4 天 危及生命的血栓栓塞 complications 較高（<5% vs 1%；rr 3.41，95% ci 1.14-10.15；p=0.020），24 小時 ich 與 ich 加上 ivh 體積成長則較少。 藥師重點：結論顯示 recombinant factor viia 於 ich 發生 2 小時內給藥可減緩血腫成長，但未改善 180 天功能結局且增加嚴重血栓栓塞風險；藥師解讀時需把影像學止血效果與病人功能結局、安全性分開評估。"},{"id":"pmid-41628627","kind":"article","issueId":"2026-week06","year":2026,"week":6,"weekLabel":"第 6 週","dateRange":"2026/02/02 – 02/08","href":"2026-week06.html","title":"Efficacy and safety of minocycline in patients with acute ischaemic stroke (EMPHASIS): a multicentre, double-blind, randomised controlled trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Lu","doi":"10.1016/S0140-6736(25)01862-8","url":"https://doi.org/10.1016/S0140-6736(25)01862-8","summary":"藥師重點：結論顯示急性缺血性中風 72 小時內加用短療程 minocycline 可能改善 90 天功能結局，且本研究未觀察到明確安全性疑慮；實務應留意此證據仍需外部確認，並評估病人中風嚴重度、吞服能力、抗生素相關不良反應與交互作用。","pubDate":"2026-02-14","terms":["efficacy","minocycline","acute","ischaemic","stroke","emphasis","multicentre","double-blind","randomised","lancet"],"drugTerms":["minocycline","anti-neuroinflammatory"],"searchText":"efficacy and safety of minocycline in patients with acute ischaemic stroke (emphasis): a multicentre, double-blind, randomised controlled trial lancet rct lu 10.1016/s0140-6736(25)01862-8 研究背景：minocycline 在前臨床與小型臨床研究中被認為具有抗神經發炎等多重作用，對急性缺血性中風的功能恢復效益仍需較大型隨機試驗驗證。 研究方法：emphasis 為中國 58 家醫院進行的多中心、雙盲、隨機、安慰劑對照試驗，納入 72 小時內發生缺血性中風、nihss 4-25 分且意識量表符合條件的病人。受試者 1:1 接受 routine 治療 加口服 minocycline（loading dose 200 mg，之後 100 mg every 12 h 共 4 天）或 安慰劑；主要終點為 90 天 modified rankin scale（mrs）0-1 分。 主要結果：共 1724 人隨機分配至 minocycline 或 安慰劑，各 862 人。90 天 mrs 0-1 分為 52.6% vs 47.4%（校正 風險比 1.11，95% ci 1.03-1.20；p=0.0061），mrs 全範圍 ordinal 分析 亦有利於 minocycline（校正 common 勝算比 1.19，95% ci 1.03-1.38；p=0.018）；24 小時與 6 天 有症狀 顱內出血 以及 嚴重不良事件 未見顯著差異。 藥師重點：結論顯示急性缺血性中風 72 小時內加用短療程 minocycline 可能改善 90 天功能結局，且本研究未觀察到明確安全性疑慮；實務應留意此證據仍需外部確認，並評估病人中風嚴重度、吞服能力、抗生素相關不良反應與交互作用。"},{"id":"pmid-41631724","kind":"article","issueId":"2026-week06","year":2026,"week":6,"weekLabel":"第 6 週","dateRange":"2026/02/02 – 02/08","href":"2026-week06.html","title":"Dual antiplatelet therapy after percutaneous coronary intervention according to bleeding risk (HOST-BR): an open-label, multicentre, randomised clinical trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Kang","doi":"10.1016/S0140-6736(25)01571-5","url":"https://doi.org/10.1016/S0140-6736(25)01571-5","summary":"藥師重點：結論顯示東亞 HBR 病人支架後 1 個月 DAPT 不能取代 3 個月 DAPT；非 HBR 病人使用 3 個月 DAPT 可維持主要缺血事件控制並降低出血，藥師需依病人出血風險、支架後缺血風險與抗血小板療程計畫協助評估。","pubDate":"2025-11-08","terms":["dual","antiplatelet","percutaneous","coronary","intervention","according","bleeding","host-br","open-label","multicentre"],"drugTerms":[],"searchText":"dual antiplatelet therapy after percutaneous coronary intervention according to bleeding risk (host-br): an open-label, multicentre, randomised clinical trial lancet rct kang 10.1016/s0140-6736(25)01571-5 研究背景：冠狀動脈支架置放後 雙重抗血小板治療（dapt）的最佳療程需兼顧缺血與出血風險，依 高出血風險（hbr）分層調整療程仍缺乏明確證據。 研究方法：host-br 為韓國 50 個心臟中心進行的 開放標籤、多中心、隨機臨床試驗，納入 19 歲以上接受 drug-eluting stent pci 的病人。hbr 族群隨機接受 1 個月或 3 個月 dapt，非 hbr 族群隨機接受 3 個月或 12 個月 dapt；共同主要終點包括 淨不良臨床事件、重大 adverse cardiac or cerebral 事件 與需處置的非手術出血。 主要結果：共 4897 人納入研究，hbr 族群 1598 人、非 hbr 族群 3299 人。hbr 族群中，1 個月 dapt 對 淨不良臨床事件 未達 3 個月 dapt 的 不劣性（18.4% vs 14.0%；hr 1.337，95% ci 1.043-1.713；p=0.82 for 不劣性）；非 hbr 族群中，3 個月 dapt 對 淨不良臨床事件 不劣於 12 個月 dapt（2.9% vs 4.4%；hr 0.657，95% ci 0.455-0.949），且出血較少（7.4% vs 11.7%；hr 0.631，95% ci 0.502-0.793；p<0.0001）。 藥師重點：結論顯示東亞 hbr 病人支架後 1 個月 dapt 不能取代 3 個月 dapt；非 hbr 病人使用 3 個月 dapt 可維持主要缺血事件控制並降低出血，藥師需依病人出血風險、支架後缺血風險與抗血小板療程計畫協助評估。"},{"id":"fda-2026-week06-1","kind":"fda","issueId":"2026-week06","year":2026,"week":6,"weekLabel":"第 6 週","dateRange":"2026/02/02 – 02/08","href":"2026-week06.html","title":"FDA’s Concerns with Unapproved GLP-1 Drugs Used for Weight Loss","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["concerns","unapproved","glp-1","drugs","used","weight","loss","https","drug-alerts-and-statements","fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"],"drugTerms":["glp-1"],"searchText":"fda’s concerns with unapproved glp-1 drugs used for weight loss fda drug safety 2026-06-15 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"},{"id":"fda-2026-week06-3","kind":"fda","issueId":"2026-week06","year":2026,"week":6,"weekLabel":"第 6 週","dateRange":"2026/02/02 – 02/08","href":"2026-week06.html","title":"FDA issues final decision to withdraw approval of Pepaxto (melphalan flufenamide)","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/398713","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["issues","final","decision","withdraw","approval","pepaxto","melphalan","flufenamide","https","node"],"drugTerms":[],"searchText":"fda issues final decision to withdraw approval of pepaxto (melphalan flufenamide) fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/398713"},{"id":"fda-2026-week06-2","kind":"fda","issueId":"2026-week06","year":2026,"week":6,"weekLabel":"第 6 週","dateRange":"2026/02/02 – 02/08","href":"2026-week06.html","title":"FDA alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/403159","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["alerts","caregivers","providers","cross-compatibility","issues","autoinjector","devices","that","optional","glatiramer"],"drugTerms":[],"searchText":"fda alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/403159"},{"id":"fda-2026-week06-4","kind":"fda","issueId":"2026-week06","year":2026,"week":6,"weekLabel":"第 6 週","dateRange":"2026/02/02 – 02/08","href":"2026-week06.html","title":"FDA Accepts First In Silico Drug Development Tool Under ISTAND Program to Help Predict Drug-Induced Liver Injury","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["accepts","first","silico","development","tool","under","istand","program","help","predict"],"drugTerms":[],"searchText":"fda accepts first in silico drug development tool under istand program to help predict drug-induced liver injury fda drug safety 2026-06-03 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver"},{"id":"pmid-41604179","kind":"article","issueId":"2026-week05","year":2026,"week":5,"weekLabel":"第 5 週","dateRange":"2026/01/26 – 02/01","href":"2026-week05.html","title":"US State-Level Prevalence of Adult Obesity by Race and Ethnicity From 1990 to 2022 and Forecasted to 2035","journal":"JAMA","type":"OA","typeLabel":"Original Article","author":"DeCleene","doi":"10.1001/jama.2025.26817","url":"https://doi.org/10.1001/jama.2025.26817","summary":"藥師重點：研究結果顯示美國成人肥胖負擔高且預期持續增加，並存在明顯族群、性別、年齡與州別差異；藥師在體重管理、慢性病用藥與 GLP-1 類藥物衛教時，需將個別風險與照護可近性納入討論。","pubDate":"2026-03-17","terms":["state-level","prevalence","adult","obesity","race","ethnicity","from","forecasted","jama","decleene"],"drugTerms":["glp-1"],"searchText":"us state-level prevalence of adult obesity by race and ethnicity from 1990 to 2022 and forecasted to 2035 jama original article decleene 10.1001/jama.2025.26817 研究背景：美國成人肥胖盛行率長期上升且族群與地區差異明顯，需更細緻的人口層級估計與預測以支援公共衛生與資源配置。 研究方法：研究整合 national 健康 and nutrition examination survey 的實測 bmi，以及 behavioral risk factor surveillance system 與 gallup 每日 survey 經偏差校正的自陳身高體重資料。分析以 spatiotemporal gaussian process regression、annualized 比率 of change 與 meta-regression bayesian spline models，估計 1990-2022 年並預測至 2035 年，主要結果為 obesity prevalence（bmi ≥30）。 主要結果：2022 年美國估計有 107 百萬 成人肥胖（95% ui 101-113），占成人 42.5%（95% ui 40.2%-45.0%），高於 1990 年的 34.7 百萬（19.3%）。預測至 2035 年將增至 126 百萬（46.9%，95% ui 43.9%-49.9%）；2022 年年齡標準化盛行率由 non-hispanic white males 40.1% 至 non-hispanic black females 56.9% 不等，且州別與族群差異明顯。 藥師重點：研究結果顯示美國成人肥胖負擔高且預期持續增加，並存在明顯族群、性別、年齡與州別差異；藥師在體重管理、慢性病用藥與 glp-1 類藥物衛教時，需將個別風險與照護可近性納入討論。"},{"id":"pmid-41619752","kind":"article","issueId":"2026-week05","year":2026,"week":5,"weekLabel":"第 5 週","dateRange":"2026/01/26 – 02/01","href":"2026-week05.html","title":"Triple cardiovascular disease detection with an artificial intelligence-enabled stethoscope (TRICORDER) in the UK: a cluster-randomised controlled implementation trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Kelshiker","doi":"10.1016/S0140-6736(25)02156-7","url":"https://doi.org/10.1016/S0140-6736(25)02156-7","summary":"藥師重點：結論顯示將 AI-stethoscope 納入例行基層照護 12 個月，整體並未顯著增加心衰竭診斷；此結果提醒新型偵測工具的效益取決於導入流程、使用率與後續轉介，不能只依工具本身性能推論臨床成效。","pubDate":"2026-02-14","terms":["triple","cardiovascular","detection","artificial","intelligence-enabled","stethoscope","tricorder","cluster-randomised","implementation","lancet"],"drugTerms":[],"searchText":"triple cardiovascular disease detection with an artificial intelligence-enabled stethoscope (tricorder) in the uk: a cluster-randomised controlled implementation trial lancet rct kelshiker 10.1016/s0140-6736(25)02156-7 研究背景：心衰竭、心房顫動與瓣膜性心臟病早期偵測是基層照護的重要議題；ai-enabled stethoscope 在實際例行照護導入後是否能提高診斷率仍需 實務型 試驗 評估。 研究方法：tricorder 為英國 基層照護 cluster-隨機 controlled implementation 試驗，205 個診所 1:1 分配至導入 ai-stethoscope 或 routine care。ai 聽診器在心臟檢查時記錄 15 秒 single-lead electrocardiogram 與 phonocardiogram，主要終點為每 1000 patient-years 新編碼心衰竭診斷率（irr）。 主要結果：介入診所共記錄 12,725 次 ai-stethoscope 檢查；意向治療分析顯示心衰竭偵測率未較對照組增加（irr 0.94，95% ci 0.86-1.02），社區或住院診斷分層亦無差異。ai-stethoscope 實際使用與較高的心衰竭、atrial fibrillation 與 vhd 偵測率獨立相關。 藥師重點：結論顯示將 ai-stethoscope 納入例行基層照護 12 個月，整體並未顯著增加心衰竭診斷；此結果提醒新型偵測工具的效益取決於導入流程、使用率與後續轉介，不能只依工具本身性能推論臨床成效。"},{"id":"pmid-41616795","kind":"article","issueId":"2026-week05","year":2026,"week":5,"weekLabel":"第 5 週","dateRange":"2026/01/26 – 02/01","href":"2026-week05.html","title":"TRPC6 inhibition for the treatment of focal segmental glomerulosclerosis: a randomised, placebo-controlled, phase 2 trial of BI 764198","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Trachtman","doi":"10.1016/S0140-6736(25)02255-X","url":"https://doi.org/10.1016/S0140-6736(25)02255-X","summary":"藥師重點：結論顯示 BI 764198 在 FSGS 可降低蛋白尿且短期耐受性尚可，但樣本數小、療程僅 12 週且劑量反應不一致；藥師解讀時應視為早期 podocyte-targeted 治療 訊號，仍需等待較大型與較長期試驗確認腎臟結局。","pubDate":"2026-02-07","terms":["trpc6","inhibition","focal","segmental","glomerulosclerosis","randomised","placebo-controlled","phase","lancet","trachtman"],"drugTerms":[],"searchText":"trpc6 inhibition for the treatment of focal segmental glomerulosclerosis: a randomised, placebo-controlled, phase 2 trial of bi 764198 lancet rct trachtman 10.1016/s0140-6736(25)02255-x 研究背景：局部節段性腎絲球硬化症（fsgs）中，trpc6 過度活化可能造成 podocyte loss 與腎功能惡化；口服 selective trpc6 抑制劑 bi 764198 的療效與安全性仍屬早期探索。 研究方法：此多中心 第 2 期、雙盲、安慰劑對照、隨機試驗，納入 18-75 歲、切片確認 主要 fsgs 或帶有致病性 trpc6 variant 的病人。受試者以 1:1:1:1 分配接受 bi 764198 20 mg、40 mg、80 mg 每日一次 或 安慰劑 12 週；主要終點為第 12 週 proteinuria 反應（upcr 較基準下降 ≥25%）。 主要結果：62 人接受治療，bi 764198 20 mg、40 mg、80 mg 組與 安慰劑 組 proteinuria 反應 分別為 44%、14%、43% 與 7%；所有 bi 764198 劑量合併相對 安慰劑 的 or 為 4.9（95% ci 1.0-48.8）。治療期間出現的不良事件 發生率在 安慰劑 與 bi 764198 組皆約 71%，未見明顯組間差異。 藥師重點：結論顯示 bi 764198 在 fsgs 可降低蛋白尿且短期耐受性尚可，但樣本數小、療程僅 12 週且劑量反應不一致；藥師解讀時應視為早期 podocyte-targeted 治療 訊號，仍需等待較大型與較長期試驗確認腎臟結局。"},{"id":"pmid-41605542","kind":"article","issueId":"2026-week05","year":2026,"week":5,"weekLabel":"第 5 週","dateRange":"2026/01/26 – 02/01","href":"2026-week05.html","title":"Reliability of urological telesurgery compared with local surgery: multicentre randomised controlled trial","journal":"BMJ","type":"RCT","typeLabel":"RCT","author":"Wang","doi":"10.1136/bmj-2024-083588","url":"https://doi.org/10.1136/bmj-2024-083588","summary":"藥師重點：研究結果說明在特定泌尿科機器人手術與穩定網路條件下，telesurgery 的短期可靠度可達不劣於現場手術；此研究非藥物介入，解讀時應注意中心經驗、設備條件與術後追蹤時間限制。","pubDate":"2026-01-28","terms":["reliability","urological","telesurgery","local","surgery","multicentre","randomised","wang","bmj-2024-083588","margin"],"drugTerms":[],"searchText":"reliability of urological telesurgery compared with local surgery: multicentre randomised controlled trial bmj rct wang 10.1136/bmj-2024-083588 研究背景：遠距手術可擴大機器人手術資源可近性，但其可靠度是否不劣於現場泌尿科機器人手術仍需臨床試驗資料支持。 研究方法：此中國五家醫院多中心、不劣性、隨機對照試驗，納入預定接受根除性攝護腺切除或部分腎切除的病人。受試者 1:1 分配至 telesurgery 或 local surgery，主要終點為依預先標準判定的手術成功機率，不劣性 margin 為成功機率絕對下降 0.1。 主要結果：共 72 名受試者進入 意向治療分析；telesurgery 在手術成功機率上不劣於 local surgery（success probability 差異 0.02，95% 可信區間 -0.03 to 0.15；不劣性 posterior probability 0.99）。1000-2800 km 距離下系統穩定，平均 round trip network latency 為 20.1-47.5 ms，臨床次要結果與醫療團隊工作負荷未見明顯差異。 藥師重點：研究結果說明在特定泌尿科機器人手術與穩定網路條件下，telesurgery 的短期可靠度可達不劣於現場手術；此研究非藥物介入，解讀時應注意中心經驗、設備條件與術後追蹤時間限制。"},{"id":"pmid-41587822","kind":"article","issueId":"2026-week05","year":2026,"week":5,"weekLabel":"第 5 週","dateRange":"2026/01/26 – 02/01","href":"2026-week05.html","title":"Provision of knee bracing for knee osteoarthritis (PROP OA): multicentre, parallel group, superiority, statistician blinded, randomised controlled trial","journal":"BMJ","type":"RCT","typeLabel":"RCT","author":"Holden","doi":"10.1136/bmj-2025-086005","url":"https://doi.org/10.1136/bmj-2025-086005","summary":"藥師重點：結論顯示 compartment specific knee bracing 加上依從性介入可為膝關節退化性關節炎帶來小幅病人自評改善；臨床應將其視為非藥物輔助選項，並留意病人疼痛目標、配戴意願與長期依從性。","pubDate":"2026-01-26","terms":["provision","knee","bracing","osteoarthritis","prop","multicentre","parallel","superiority","statistician","blinded"],"drugTerms":[],"searchText":"provision of knee bracing for knee osteoarthritis (prop oa): multicentre, parallel group, superiority, statistician blinded, randomised controlled trial bmj rct holden 10.1136/bmj-2025-086005 研究背景：膝關節退化性關節炎常以衛教、書面資訊與運動指導作為初始處置，但加上依病灶區室選擇的 knee brace 與依從性介入，是否能進一步改善病人自評結果仍需驗證。 研究方法：此英國多中心、平行組、superiority、評估統計人員盲性隨機試驗，納入 466 名 45 歲以上且有膝關節退化性關節炎症狀的成人。受試者 1:1 分配接受 advice、written information、exercise instruction（aie），或 aie 加上 compartment specific knee bracing、兩週追蹤與依從性支持；主要終點為 6 個月 koos-5。 主要結果：6 個月時 aie+b 組 koos-5 改善幅度高於 aie 組（校正 平均差 3.39，95% ci 0.96 to 5.82；effect size 0.24），疼痛分項差異較明顯（koos pain 校正 平均差 6.13，95% ci 3.36 to 8.91；effect size 0.39）。次要結果顯示效益隨時間減弱，不良事件多為輕微且符合預期。 藥師重點：結論顯示 compartment specific knee bracing 加上依從性介入可為膝關節退化性關節炎帶來小幅病人自評改善；臨床應將其視為非藥物輔助選項，並留意病人疼痛目標、配戴意願與長期依從性。"},{"id":"pmid-41620233","kind":"article","issueId":"2026-week05","year":2026,"week":5,"weekLabel":"第 5 週","dateRange":"2026/01/26 – 02/01","href":"2026-week05.html","title":"Prediction of mortality, bleeding, and ischaemic events in patients with cancer and acute coronary syndrome: a model development and validation study","journal":"Lancet","type":"OA","typeLabel":"Original Article","author":"Wenzl","doi":"10.1016/S0140-6736(25)02020-3","url":"https://doi.org/10.1016/S0140-6736(25)02020-3","summary":"藥師重點：結論顯示 ONCO-ACS score 可協助癌症合併急性冠心症患者同時評估死亡、出血與缺血風險；藥師在抗血小板療程、clopidogrel 使用與出血監測建議上，可將其視為輔助工具，但仍需結合腫瘤狀態、腎功能與治療目標。","pubDate":"2026-01-31","terms":["prediction","mortality","bleeding","ischaemic","events","cancer","acute","coronary","syndrome","model"],"drugTerms":["clopidogrel"],"searchText":"prediction of mortality, bleeding, and ischaemic events in patients with cancer and acute coronary syndrome: a model development and validation study lancet original article wenzl 10.1016/s0140-6736(25)02020-3 研究背景：癌症合併急性冠心症患者同時面臨死亡、出血與缺血事件風險，但目前缺乏可同時評估這些 competing risks 的標準化工具。 研究方法：此 model development and validation 研究 整合英格蘭、瑞典與瑞士 2004 年至 2023 年急性冠心症資料，共 1,017,759 名病人，其中英格蘭資料含 36,771 名癌症患者。研究以 machine learning 建立 onco-acs score，預測 6 個月 全因死亡率、重大出血 事件 與 ischaemic 事件，並於地理上獨立資料集外部驗證。 主要結果：癌症合併急性冠心症患者 6 個月累積死亡率為 27.8%（95% ci 27.3-28.3）、重大出血 為 7.3%（7.0-7.5）、ischaemic 事件 為 16.1%（15.7-16.4）。onco-acs 在內部驗證的 6 個月 tauc 分別為 全因死亡率 0.84、重大出血 0.70、ischaemic 事件 0.79，外部驗證表現相近且校準良好。 藥師重點：結論顯示 onco-acs score 可協助癌症合併急性冠心症患者同時評估死亡、出血與缺血風險；藥師在抗血小板療程、clopidogrel 使用與出血監測建議上，可將其視為輔助工具，但仍需結合腫瘤狀態、腎功能與治療目標。"},{"id":"pmid-41604639","kind":"article","issueId":"2026-week05","year":2026,"week":5,"weekLabel":"第 5 週","dateRange":"2026/01/26 – 02/01","href":"2026-week05.html","title":"Palbociclib for Hormone-Receptor-Positive, HER2-Positive Advanced Breast Cancer","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Metzger","doi":"10.1056/NEJMoa2511218","url":"https://doi.org/10.1056/NEJMoa2511218","summary":"藥師重點：結論顯示 palbociclib 加入維持 anti-HER2 與內分泌治療可延長此族群 無惡化存活期，但毒性尤其 neutropenia 明顯增加；藥師需協助監測血球、感染風險、劑量調整與病人對長期維持治療的耐受性。","pubDate":"2026-01-29","terms":["palbociclib","hormone-receptor-positive","her2-positive","advanced","breast","cancer","nejm","metzger","nejmoa2511218","her2"],"drugTerms":["anti-human","anti-her2"],"searchText":"palbociclib for hormone-receptor-positive, her2-positive advanced breast cancer nejm rct metzger 10.1056/nejmoa2511218 研究背景：荷爾蒙受體陽性、her2 陽性轉移性乳癌第一線治療常以雙重 anti-her2 治療加化療後接續 anti-her2 與內分泌維持治療；加入 cdk4/6 抑制劑 palbociclib 是否能延緩抗藥性仍需第三期證據。 研究方法：patina 為 第 3 期、開放標籤、隨機試驗，納入接受 4-8 個週期化療加 her2-targeted 治療 後未惡化的 hormone-受體-陽性、her2-陽性 轉移性 breast 癌症 病人。受試者 1:1 分配接受維持 her2-targeted 與 endocrine therapies，或加用 palbociclib；主要終點為 investigator-assessed 無惡化存活期。 主要結果：共 518 人隨機分組，中位追蹤 53.5 個月時，palbociclib 組 無惡化存活期 較長（44.3 vs 29.1 個月；hr 0.75，95% ci 0.59 to 0.96；p=0.02）。palbociclib 組 等級 3 與 等級 4 不良事件 分別為 79.7% 與 10.0%，標準治療組為 30.6% 與 3.6%，主要增加為 neutropenia。 藥師重點：結論顯示 palbociclib 加入維持 anti-her2 與內分泌治療可延長此族群 無惡化存活期，但毒性尤其 neutropenia 明顯增加；藥師需協助監測血球、感染風險、劑量調整與病人對長期維持治療的耐受性。"},{"id":"pmid-41604640","kind":"article","issueId":"2026-week05","year":2026,"week":5,"weekLabel":"第 5 週","dateRange":"2026/01/26 – 02/01","href":"2026-week05.html","title":"Mental Health Outcomes in Children after Parental Firearm Injury","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Karandinos","doi":"10.1056/NEJMsa2502702","url":"https://doi.org/10.1056/NEJMsa2502702","summary":"藥師重點：研究結果說明父母 firearm injury 後，兒少心理健康診斷與就診率可能上升；藥師與醫療團隊在照護受影響家庭時，可留意兒少創傷、睡眠、焦慮與精神科藥物使用訊號，並及早連結心理支持資源。","pubDate":"2026-01-29","terms":["mental","children","parental","firearm","injury","nejm","karandinos","nejmsa2502702","in-differences","post-traumatic"],"drugTerms":[],"searchText":"mental health outcomes in children after parental firearm injury nejm original article karandinos 10.1056/nejmsa2502702 研究背景：美國每年有許多兒少因父母 firearm injury 而失去照顧者或暴露於創傷事件，但父母受傷對兒少心理健康與醫療利用的影響仍不清楚。 研究方法：研究使用 2007-2022 年美國商業健康保險理賠資料，辨識 1-19 歲且父母曾因 firearm injury 接受治療的兒少，並以最多 1:5 配對對照組。主要終點為精神疾病診斷率，並以 差異-in-differences 模型比較父母受傷前後 12 個月的變化。 主要結果：分析 3790 名暴露兒少與 18,535 名配對對照，父母 firearm injury 與每 1000 名兒少增加 8.4 件精神科診斷（95% ci 4.8 to 12.0）及 23.1 次心理健康就診（95% ci 8.2 to 38.1）相關。增加幅度最大者為創傷相關疾患，包括 post-traumatic stress 疾患，每 1000 名兒少增加 8.5 件診斷（95% ci 6.0 to 10.9）。 藥師重點：研究結果說明父母 firearm injury 後，兒少心理健康診斷與就診率可能上升；藥師與醫療團隊在照護受影響家庭時，可留意兒少創傷、睡眠、焦慮與精神科藥物使用訊號，並及早連結心理支持資源。"},{"id":"pmid-41611528","kind":"article","issueId":"2026-week05","year":2026,"week":5,"weekLabel":"第 5 週","dateRange":"2026/01/26 – 02/01","href":"2026-week05.html","title":"Machine learning based screening of potential paper mill publications in cancer research: methodological and cross sectional study","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"Scancar","doi":"10.1136/bmj-2025-087581","url":"https://doi.org/10.1136/bmj-2025-087581","summary":"藥師重點：研究結果提醒癌症文獻中可能存在大量 paper mill 相似文章，閱讀單篇研究或系統性回顧時需更重視撤稿紀錄、影像完整性、研究可重現性與期刊審查品質；此模型結果本身仍不等同於判定單篇文章造假。","pubDate":"2026-01-29","terms":["machine","learning","screening","potential","paper","mill","publications","cancer","research","methodological"],"drugTerms":[],"searchText":"machine learning based screening of potential paper mill publications in cancer research: methodological and cross sectional study bmj original article scancar 10.1136/bmj-2025-087581 研究背景：paper mill publications 可能污染癌症研究文獻並影響臨床與研究判讀；以機器學習大規模篩檢可協助估計其盛行程度。 研究方法：此 methodological and cross sectional 研究 使用以 bert 為基礎的文字分類模型，依文章標題與摘要區分 retracted paper mill publications 與 genuine 癌症 research articles。模型以 2202 篇已撤回 paper mill papers 訓練，並套用於 1999-2024 年 pubmed 中 2.6 百萬 篇 original 癌症 research papers。 主要結果：模型 accuracy 為 0.91；套用於癌症研究文獻後，2,647,471 篇中有 261,245 篇被標記為與 paper mill papers 相似（9.87%，95% ci 9.83 to 9.90）。1999 至 2024 年被標記文獻明顯增加，且不侷限於低 impact journals；基礎研究與胃癌、骨癌、肝癌領域比例較高。 藥師重點：研究結果提醒癌症文獻中可能存在大量 paper mill 相似文章，閱讀單篇研究或系統性回顧時需更重視撤稿紀錄、影像完整性、研究可重現性與期刊審查品質；此模型結果本身仍不等同於判定單篇文章造假。"},{"id":"pmid-41620232","kind":"article","issueId":"2026-week05","year":2026,"week":5,"weekLabel":"第 5 週","dateRange":"2026/01/26 – 02/01","href":"2026-week05.html","title":"Interval cancer, sensitivity, and specificity comparing AI-supported mammography screening with standard double reading without AI in the MASAI study: a randomised, controlled, non-inferiority, single-blinded, population-based, screening-accuracy trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Gommers","doi":"10.1016/S0140-6736(25)02464-X","url":"https://doi.org/10.1016/S0140-6736(25)02464-X","summary":"藥師重點：研究結果說明 AI-supported mammography screening 可在不增加 區間 癌症 比率 的情況下提高敏感度並維持特異度；此為篩檢流程證據，臨床導入仍需考量影像判讀人力、品質管制與不同族群外推性。","pubDate":"2026-01-31","terms":["interval","cancer","sensitivity","specificity","comparing","ai-supported","mammography","screening","standard","double"],"drugTerms":[],"searchText":"interval cancer, sensitivity, and specificity comparing ai-supported mammography screening with standard double reading without ai in the masai study: a randomised, controlled, non-inferiority, single-blinded, population-based, screening-accuracy trial lancet rct gommers 10.1016/s0140-6736(25)02464-x 研究背景：ai 支援乳房攝影篩檢可提高癌症偵測並降低判讀工作量，但對 區間 癌症 的影響較少有隨機試驗資料。 研究方法：masai 為瑞典 族群-based、single-blinded、隨機 controlled 不劣性 screening-accuracy 試驗，受試者 1:1 分配至 ai-supported mammography screening 或標準雙人判讀。此預先定義分析以 區間 癌症 比率 為主要終點，不劣性 margin 為 20%，並評估 區間 癌症 特徵、sensitivity 與 specificity。 主要結果：105,934 名女性隨機分組，區間 癌症 比率 於 ai 組與對照組分別為每 1000 人 1.55（95% ci 1.23-1.92）與 1.76（1.42-2.15），proportion 比值 0.88（95% ci 0.65-1.18；p=0.41），符合 不劣性。ai 組 sensitivity 較高（80.5% vs 73.8%；p=0.031），specificity 兩組皆為 98.5%。 藥師重點：研究結果說明 ai-supported mammography screening 可在不增加 區間 癌症 比率 的情況下提高敏感度並維持特異度；此為篩檢流程證據，臨床導入仍需考量影像判讀人力、品質管制與不同族群外推性。"},{"id":"pmid-41609788","kind":"article","issueId":"2026-week05","year":2026,"week":5,"weekLabel":"第 5 週","dateRange":"2026/01/26 – 02/01","href":"2026-week05.html","title":"Electronic Health Record Intervention and Deprescribing for Older Adults: A Randomized Clinical Trial","journal":"JAMA","type":"RCT","typeLabel":"RCT","author":"Lauffenburger","doi":"10.1001/jama.2025.26967","url":"https://doi.org/10.1001/jama.2025.26967","summary":"藥師重點：研究結果說明運用行為科學設計的 EHR 提醒可提高高齡者潛在不適當用藥 deprescribing；藥師可將其視為減藥討論輔助工具，實務仍需個別評估戒斷、症狀復發與病人偏好。","pubDate":"2026-03-24","terms":["electronic","record","intervention","deprescribing","older","adults","jama","lauffenburger","potentially","inappropriate"],"drugTerms":["nonbenzodiazepine"],"searchText":"electronic health record intervention and deprescribing for older adults: a randomized clinical trial jama rct lauffenburger 10.1001/jama.2025.26967 研究背景：高齡者常被處方 potentially inappropriate medications，包括 benzodiazepines、nonbenzodiazepine sedative hypnotics 與 anticholinergic medications；ehr 行為科學介入是否能促進 deprescribing 仍需驗證。 研究方法：此三組平行 cluster-隨機臨床試驗 於美國麻州一所學術醫療中心進行，201 名 基層照護 physicians 被分配至 常規照護、precommitment intervention 或 boostering intervention。介入對象為 65 歲以上且近期使用目標潛在不適當藥物的病人，主要終點為追蹤期間至少停用或 tapering 一項藥物。 主要結果：共 1146 名病人納入分析，至少一項藥物 deprescribed 的比例為 precommitment 36.8%、boostering 34.3%、常規照護 26.8%。相較 常規照護，precommitment 組 deprescribing 較可能發生（rr 1.40，95% ci 1.14-1.73；absolute 差異 10.4%），boostering 組亦較高（rr 1.26，95% ci 1.01-1.57；absolute 差異 6.5%）；未通報 嚴重不良事件。 藥師重點：研究結果說明運用行為科學設計的 ehr 提醒可提高高齡者潛在不適當用藥 deprescribing；藥師可將其視為減藥討論輔助工具，實務仍需個別評估戒斷、症狀復發與病人偏好。"},{"id":"pmid-41587047","kind":"article","issueId":"2026-week05","year":2026,"week":5,"weekLabel":"第 5 週","dateRange":"2026/01/26 – 02/01","href":"2026-week05.html","title":"Donation After Circulatory Death Heart Transplant Without Preimplant Reanimation Using Rapid Ultraoxygenated Recovery","journal":"JAMA","type":"OA","typeLabel":"Original Article","author":"Williams","doi":"10.1001/jama.2025.25169","url":"https://doi.org/10.1001/jama.2025.25169","summary":"藥師重點：研究結果說明 REUP 在此單中心 DCD 心臟移植經驗中具可行性且短期結果良好；由於為 24 例 case series，仍需較大規模研究確認長期存活、排斥風險與不同中心導入條件。","pubDate":"2026-03-10","terms":["donation","circulatory","death","heart","transplant","preimplant","reanimation","rapid","ultraoxygenated","recovery"],"drugTerms":[],"searchText":"donation after circulatory death heart transplant without preimplant reanimation using rapid ultraoxygenated recovery jama original article williams 10.1001/jama.2025.25169 研究背景：donation after circulatory 死亡（dcd）心臟移植可增加供心來源，但傳統回收策略成本與複雜度高；rapid recovery with extended ultraoxygenated preservation（reup）在較年輕捐贈者或較短缺血時間下已有初步經驗。 研究方法：此美國單一高量心臟移植中心 case series，納入 2024 年 11 月至 2025 年 7 月接受 reup-recovered dcd 成人心臟移植的 24 名病人。reup 用於 dcd cardiac allograft recovery，未進行 preimplant donor heart reanimation 或 machine perfusion；主要觀察 重度 主要 graft 功能障礙、30-day 存活期 與首次 endomyocardial biopsy 急性排斥。 主要結果：24 顆 reup-recovered dcd hearts 完成移植，捐贈者平均年齡 32 歲，38% 超過 40 歲；60% donor hearts total ischemic time 超過 4 小時。接受者 30-day 存活期 為 96%，重度 主要 graft 功能障礙 為 1 例（4%），次要 graft 功能障礙 為 1 例（4%）；首次切片 1 例（4%）為 急性 cellular rejection 等級 2r，未見 抗體-mediated rejection。 藥師重點：研究結果說明 reup 在此單中心 dcd 心臟移植經驗中具可行性且短期結果良好；由於為 24 例 case series，仍需較大規模研究確認長期存活、排斥風險與不同中心導入條件。"},{"id":"pmid-41605528","kind":"article","issueId":"2026-week05","year":2026,"week":5,"weekLabel":"第 5 週","dateRange":"2026/01/26 – 02/01","href":"2026-week05.html","title":"Diagnostic tests for ovarian cancer in premenopausal women with non-specific symptoms (ROCkeTS): prospective, multicentre, cohort study","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"Sundar","doi":"10.1136/bmj-2024-083912","url":"https://doi.org/10.1136/bmj-2024-083912","summary":"藥師重點：結論顯示多數測試可提高卵巢癌偵測敏感度但會降低特異度，其中 ultrasound triage 搭配 IOTA ADNEX 10% 有最高敏感度增益；臨床採用需同步考量假陽性、轉診負荷、人員訓練與品質保證。","pubDate":"2026-01-28","terms":["diagnostic","tests","ovarian","cancer","premenopausal","women","non-specific","symptoms","rockets","prospective"],"drugTerms":[],"searchText":"diagnostic tests for ovarian cancer in premenopausal women with non-specific symptoms (rockets): prospective, multicentre, cohort study bmj original article sundar 10.1136/bmj-2024-083912 研究背景：停經前女性出現非特異症狀且檢查異常時，如何準確分流卵巢癌風險會影響轉診與後續處置；多種 risk prediction models 與分數的診斷表現需要 head-to-head 比較。 研究方法：rockets 為英國 23 家 次要 care 醫院的前瞻性多中心 世代研究，納入 1211 名停經前女性，並比較 risk of malignancy index 1、risk of malignancy algorithm、iota adnex、iota simple rules、iota simple rules risk model 與 ca 125。主要評估為預測 主要 invasive ovarian 癌症 對良性或正常病理的 sensitivity、specificity 與相關診斷指標。 主要結果：1211 人中 88 人診斷為 主要 ovarian 癌症。risk of malignancy index 1 threshold 250 的 sensitivity 為 42.6%（95% ci 28.3 to 57.8）、specificity 為 96.5%（94.7 to 97.8）；相較之下，iota adnex threshold 10% sensitivity 最高（89.1%，95% ci 76.4 to 96.4；p<0.001），但 specificity 較低（75.1%，71.4 to 78.6；p<0.001）。 藥師重點：結論顯示多數測試可提高卵巢癌偵測敏感度但會降低特異度，其中 ultrasound triage 搭配 iota adnex 10% 有最高敏感度增益；臨床採用需同步考量假陽性、轉診負荷、人員訓練與品質保證。"},{"id":"pmid-41604638","kind":"article","issueId":"2026-week05","year":2026,"week":5,"weekLabel":"第 5 週","dateRange":"2026/01/26 – 02/01","href":"2026-week05.html","title":"A Randomized Trial of Tenecteplase in Acute Central Retinal Artery Occlusion","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Ryan","doi":"10.1056/NEJMoa2508515","url":"https://doi.org/10.1056/NEJMoa2508515","summary":"藥師重點：結論顯示急性中央視網膜動脈阻塞發作 4.5 小時內使用 IV tenecteplase 未優於 aspirin 改善 30 天視力恢復，且有嚴重安全性疑慮；藥師應特別留意溶栓相關出血風險與適用情境限制。","pubDate":"2026-01-29","terms":["tenecteplase","acute","central","retinal","artery","occlusion","nejm","ryan","nejmoa2508515","tencraos"],"drugTerms":[],"searchText":"a randomized trial of tenecteplase in acute central retinal artery occlusion nejm rct ryan 10.1056/nejmoa2508515 研究背景：急性中央視網膜動脈阻塞可能造成永久視力喪失，目前有效治療有限；tenecteplase 於症狀發生 4.5 小時內使用是否能改善視力恢復仍不確定。 研究方法：tencraos 為 第 3 期、雙盲、double-dummy、隨機對照試驗，納入症狀發生 4.5 小時內的急性非動脈炎性中央視網膜動脈阻塞成人。病人 1:1 分配接受 iv tenecteplase 0.25 mg/kg 加口服 安慰劑，或 iv 安慰劑 加 aspirin 300 mg；主要終點為 30 天受影響眼 bcva 恢復至 ≤0.7 logmar。 主要結果：共 78 人隨機分組，30 天視力恢復率 tenecteplase 組與 aspirin 組為 20% vs 24%（風險差 -3.7 百分點，95% ci -22.0 to 14.7；p=0.69）。次要視覺終點未見明顯差異，tenecteplase 組不良事件較多，包含 1 例致死性顱內出血。 藥師重點：結論顯示急性中央視網膜動脈阻塞發作 4.5 小時內使用 iv tenecteplase 未優於 aspirin 改善 30 天視力恢復，且有嚴重安全性疑慮；藥師應特別留意溶栓相關出血風險與適用情境限制。"},{"id":"fda-2026-week05-1","kind":"fda","issueId":"2026-week05","year":2026,"week":5,"weekLabel":"第 5 週","dateRange":"2026/01/26 – 02/01","href":"2026-week05.html","title":"FDA’s Concerns with Unapproved GLP-1 Drugs Used for Weight Loss","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["concerns","unapproved","glp-1","drugs","used","weight","loss","https","drug-alerts-and-statements","fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"],"drugTerms":["glp-1"],"searchText":"fda’s concerns with unapproved glp-1 drugs used for weight loss fda drug safety 2026-06-15 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"},{"id":"fda-2026-week05-3","kind":"fda","issueId":"2026-week05","year":2026,"week":5,"weekLabel":"第 5 週","dateRange":"2026/01/26 – 02/01","href":"2026-week05.html","title":"FDA issues final decision to withdraw approval of Pepaxto (melphalan flufenamide)","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/398713","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["issues","final","decision","withdraw","approval","pepaxto","melphalan","flufenamide","https","node"],"drugTerms":[],"searchText":"fda issues final decision to withdraw approval of pepaxto (melphalan flufenamide) fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/398713"},{"id":"fda-2026-week05-2","kind":"fda","issueId":"2026-week05","year":2026,"week":5,"weekLabel":"第 5 週","dateRange":"2026/01/26 – 02/01","href":"2026-week05.html","title":"FDA alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/403159","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["alerts","caregivers","providers","cross-compatibility","issues","autoinjector","devices","that","optional","glatiramer"],"drugTerms":[],"searchText":"fda alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/403159"},{"id":"fda-2026-week05-4","kind":"fda","issueId":"2026-week05","year":2026,"week":5,"weekLabel":"第 5 週","dateRange":"2026/01/26 – 02/01","href":"2026-week05.html","title":"FDA Accepts First In Silico Drug Development Tool Under ISTAND Program to Help Predict Drug-Induced Liver Injury","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["accepts","first","silico","development","tool","under","istand","program","help","predict"],"drugTerms":[],"searchText":"fda accepts first in silico drug development tool under istand program to help predict drug-induced liver injury fda drug safety 2026-06-03 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver"},{"id":"pmid-41565343","kind":"article","issueId":"2026-week04","year":2026,"week":4,"weekLabel":"第 4 週","dateRange":"2026/01/19 – 01/25","href":"2026-week04.html","title":"Time trends in newly recorded diagnoses of 19 long term conditions before, during, and after the covid-19 pandemic: population based cohort study in England using OpenSAFELY","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"Russell","doi":"10.1136/bmj-2025-086393","url":"https://doi.org/10.1136/bmj-2025-086393","summary":"藥師重點：此研究提示疫情後慢性病診斷缺口仍可能影響用藥開始、追蹤與疾病控制；藥師在處方審查與慢病照護時，可特別留意 depression、asthma、COPD、osteoporosis 及 慢性腎臟病 的未診斷或追蹤延遲風險。","pubDate":"2026-01-21","terms":["time","trends","newly","recorded","diagnoses","long","term","conditions","covid-19","pandemic"],"drugTerms":[],"searchText":"time trends in newly recorded diagnoses of 19 long term conditions before, during, and after the covid-19 pandemic: population based cohort study in england using opensafely bmj original article russell 10.1136/bmj-2025-086393 研究背景：covid-19 pandemic 可能改變慢性病新診斷率與醫療可近性，本研究評估英格蘭 19 種 long term conditions 在疫情前、中、後的診斷趨勢與族群差異。 研究方法：此 族群 based 世代研究 使用 opensafely-tpp 平台的基層照護與住院資料，涵蓋 29,995,025 名英格蘭一般科登錄民眾。研究比較 2016 年 4 月 1 日至 2024 年 11 月 30 日的年齡與性別標準化 incident 與 prevalent diagnosis rates，並以疫情前趨勢建立預期值。 主要結果：19 種疾病在疫情第一年新診斷皆明顯下降，之後恢復程度不一；截至 2024 年 11 月，depression 少 734,800 例（27.7%）、asthma 少 152,900 例（16.4%）、copd 少 90,100 例（15.8%）、osteoporosis 少 54,100 例（11.5%）。相對地，慢性腎臟病 診斷較預期增加 34.8%，約多 359,000 例。 藥師重點：此研究提示疫情後慢性病診斷缺口仍可能影響用藥開始、追蹤與疾病控制；藥師在處方審查與慢病照護時，可特別留意 depression、asthma、copd、osteoporosis 及 慢性腎臟病 的未診斷或追蹤延遲風險。"},{"id":"pmid-41576983","kind":"article","issueId":"2026-week04","year":2026,"week":4,"weekLabel":"第 4 週","dateRange":"2026/01/19 – 01/25","href":"2026-week04.html","title":"Surgical fixation versus non-surgical care for children with a displaced medial epicondyle fracture of the elbow (the SCIENCE study): a multicentre, randomised controlled, superiority trial and economic evaluation","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Perry","doi":"10.1016/S0140-6736(25)02098-7","url":"https://doi.org/10.1016/S0140-6736(25)02098-7","summary":"藥師重點：研究結果說明 surgical fixation 未帶來具臨床意義的功能改善，且增加手術相關風險與成本；照護團隊可優先考慮非手術策略，若進入手術流程仍需留意麻醉、術後止痛與併發症用藥管理。","pubDate":"2026-02-07","terms":["surgical","fixation","non-surgical","children","displaced","medial","epicondyle","fracture","elbow","science"],"drugTerms":[],"searchText":"surgical fixation versus non-surgical care for children with a displaced medial epicondyle fracture of the elbow (the science study): a multicentre, randomised controlled, superiority trial and economic evaluation lancet rct perry 10.1016/s0140-6736(25)02098-7 研究背景：兒童肘部 displaced medial epicondyle fracture 是否需手術固定長期存在爭議，臨床上手術使用增加，但支持其優於非手術照護的證據有限。 研究方法：science 為英國、澳洲與紐西蘭 59 家醫院進行的 實務型 多中心 隨機 優越性試驗，納入 7-15 歲 displaced medial epicondyle fracture 兒童，隨機接受 surgical fixation 或 non-surgical care。主要終點為 12 個月時以 promis upper extremity score for children 評估的上肢功能，並進行 12 個月成本效果評估。 主要結果：335 名兒童接受隨機分配，12 個月 promis 分數在非手術組與手術組分別為 53.1 與 54.3，平均差 1.57（95% ci -0.01 to 3.14；p=0.052），低於預設臨床重要差異 4 分。手術組額外手術較多（24 名 vs 3 名），平均每人照護成本高 £2435，且達 cost-effective 的機率為 0%。 藥師重點：研究結果說明 surgical fixation 未帶來具臨床意義的功能改善，且增加手術相關風險與成本；照護團隊可優先考慮非手術策略，若進入手術流程仍需留意麻醉、術後止痛與併發症用藥管理。"},{"id":"pmid-41564397","kind":"article","issueId":"2026-week04","year":2026,"week":4,"weekLabel":"第 4 週","dateRange":"2026/01/19 – 01/25","href":"2026-week04.html","title":"Sacituzumab Govitecan plus Pembrolizumab for Advanced Triple-Negative Breast Cancer","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Tolaney","doi":"10.1056/NEJMoa2508959","url":"https://doi.org/10.1056/NEJMoa2508959","summary":"藥師重點：結論顯示 sacituzumab govitecan 加上 pembrolizumab 可延長此族群第一線治療的 無惡化存活期；用藥評估需確認 PD-L1 狀態、ADC 相關不良反應風險、合併 pembrolizumab 的免疫相關監測，以及整體存活資料尚未成熟。","pubDate":"2026-01-22","terms":["sacituzumab","govitecan","plus","pembrolizumab","advanced","triple-negative","breast","cancer","nejm","tolaney"],"drugTerms":["sacituzumab","pembrolizumab"],"searchText":"sacituzumab govitecan plus pembrolizumab for advanced triple-negative breast cancer nejm rct tolaney 10.1056/nejmoa2508959 研究背景：triple-negative breast 癌症 侵襲性高，對於未治療過、pd-l1 陽性、局部晚期不可切除或轉移性患者，第一線治療仍需要提升疾病控制效果。 研究方法：此 第 3 期、開放標籤、國際多中心試驗將患者 1:1 隨機分配至 sacituzumab govitecan 加上 pembrolizumab，或 化療加上 pembrolizumab。主要終點為 盲性獨立中央審查 評估的 無惡化存活期，次要終點包含 整體存活期、objective 反應、duration of 反應 與安全性。 主要結果：共 443 名患者隨機分組；中位數 無惡化存活期 為 11.2 個月與 7.8 個月（hr 0.65，95% ci 0.51-0.84；p<0.001）。objective 反應 為 60% 與 53%，等級 3 以上不良事件為 71% 與 70%，因不良事件停藥為 12% 與 31%，整體存活期 資料仍未成熟。 藥師重點：結論顯示 sacituzumab govitecan 加上 pembrolizumab 可延長此族群第一線治療的 無惡化存活期；用藥評估需確認 pd-l1 狀態、adc 相關不良反應風險、合併 pembrolizumab 的免疫相關監測，以及整體存活資料尚未成熟。"},{"id":"pmid-41569557","kind":"article","issueId":"2026-week04","year":2026,"week":4,"weekLabel":"第 4 週","dateRange":"2026/01/19 – 01/25","href":"2026-week04.html","title":"Oral Nalbuphine in Idiopathic Pulmonary Fibrosis-Associated Cough: The CORAL Randomized Clinical Trial","journal":"JAMA","type":"RCT","typeLabel":"RCT","author":"Molyneaux","doi":"10.1001/jama.2025.26179","url":"https://doi.org/10.1001/jama.2025.26179","summary":"藥師重點：結論顯示 nalbuphine ER 在 6 週內可降低 IPF 相關慢性咳嗽，且較高劑量在病人自評症狀亦有改善；臨床應留意 opioid 相關耐受性、嗜睡或便祕等監測需求，並確認長期療效與安全性資料。","pubDate":"2026-03-24","terms":["oral","nalbuphine","idiopathic","pulmonary","fibrosis-associated","cough","coral","jama","molyneaux","opioid"],"drugTerms":[],"searchText":"oral nalbuphine in idiopathic pulmonary fibrosis-associated cough: the coral randomized clinical trial jama rct molyneaux 10.1001/jama.2025.26179 研究背景：特發性肺纖維化 (ipf) 相關慢性咳嗽會影響生活品質，目前仍缺乏效果明確的治療選項；nalbuphine er 具 κ opioid 受體 致效劑 與 μ-opioid 受體 拮抗劑 作用，可能降低咳嗽頻率。 研究方法：coral 為 10 國 52 個中心進行的 隨機、雙盲、安慰劑對照 第 2b 期 試驗，納入 ipf、慢性咳嗽至少 8 週且 cough severity numerical rating scale ≥4 分患者。患者隨機接受 nalbuphine er 27 mg、54 mg、108 mg 或 安慰劑 每日兩次 6 週，主要終點為 24 小時客觀咳嗽頻率相對變化。 主要結果：165 名患者隨機分組；nalbuphine er 27 mg、54 mg、108 mg 組客觀咳嗽頻率分別下降 47.9%、53.4%、60.2%，安慰劑 組下降 16.9%（p=0.008、p<0.001、p<0.001）。病人自評咳嗽頻率在 54 mg 與 108 mg 組也較 安慰劑 改善（p=0.004、p<0.005）。 藥師重點：結論顯示 nalbuphine er 在 6 週內可降低 ipf 相關慢性咳嗽，且較高劑量在病人自評症狀亦有改善；臨床應留意 opioid 相關耐受性、嗜睡或便祕等監測需求，並確認長期療效與安全性資料。"},{"id":"pmid-41565309","kind":"article","issueId":"2026-week04","year":2026,"week":4,"weekLabel":"第 4 週","dateRange":"2026/01/19 – 01/25","href":"2026-week04.html","title":"Natural ovulation versus programmed regimens before frozen embryo transfer in ovulatory women: multicentre, randomised clinical trial","journal":"BMJ","type":"RCT","typeLabel":"RCT","author":"Wei","doi":"10.1136/bmj-2025-087045","url":"https://doi.org/10.1136/bmj-2025-087045","summary":"藥師重點：結論顯示 自然排卵週期 的健康活產率與 人工準備週期 相近，且可能降低部分孕產婦併發症；臨床諮詢時需同時說明監測自然排卵、週期取消風險與個別不孕治療條件。","pubDate":"2026-01-21","terms":["natural","ovulation","programmed","regimens","frozen","embryo","transfer","ovulatory","women","multicentre"],"drugTerms":[],"searchText":"natural ovulation versus programmed regimens before frozen embryo transfer in ovulatory women: multicentre, randomised clinical trial bmj rct wei 10.1136/bmj-2025-087045 研究背景：排卵正常女性接受 frozen embryo transfer 前，子宮內膜準備可採自然排卵或 programmed hormone replacement 處方；兩者對健康活產與妊娠高血壓併發症的影響仍需大型試驗確認。 研究方法：研究為中國 24 個生殖醫學中心進行的多中心、隨機、平行分組、評估者盲法臨床試驗，共納入 4376 名 20-40 歲、預計接受 frozen single blastocyst transfer 的排卵正常女性，1:1 分配至 自然排卵週期 或 人工準備週期。主要終點為 healthy live birth，以及 frozen embryo transfer 後 pre-eclampsia 或 eclampsia。 主要結果：healthy live birth 在 自然排卵週期 與 人工準備週期 分別為 41.6% 與 40.6%（rr 1.03，95% ci 0.96-1.10；p=0.49）。達臨床懷孕者中，自然排卵週期 的 pre-eclampsia 較低（2.9% vs 4.6%；rr 0.63，95% ci 0.43-0.94；p=0.02），但週期取消率較高（16.2% vs 11.5%；p<0.001）。 藥師重點：結論顯示 自然排卵週期 的健康活產率與 人工準備週期 相近，且可能降低部分孕產婦併發症；臨床諮詢時需同時說明監測自然排卵、週期取消風險與個別不孕治療條件。"},{"id":"pmid-41565320","kind":"article","issueId":"2026-week04","year":2026,"week":4,"weekLabel":"第 4 週","dateRange":"2026/01/19 – 01/25","href":"2026-week04.html","title":"Long term use of proton pump inhibitors and risk of stomach cancer: population based case-control study in five Nordic countries","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"Duru","doi":"10.1136/bmj-2025-086384","url":"https://doi.org/10.1136/bmj-2025-086384","summary":"藥師重點：結論顯示在校正多項偏差後，長期 PPI 使用可能未增加 gastric adenocarcinoma 風險；藥師仍應依適應症定期檢視 PPI 必要性、療程長度、Helicobacter pylori 相關病史與長期用藥監測。","pubDate":"2026-01-21","terms":["long","term","proton","pump","inhibitors","stomach","cancer","population","case-control","five"],"drugTerms":["anti-inflammatory"],"searchText":"long term use of proton pump inhibitors and risk of stomach cancer: population based case-control study in five nordic countries bmj original article duru 10.1136/bmj-2025-086384 研究背景：proton pump 抑制劑 長期使用是否增加 gastric adenocarcinoma 風險仍有爭議，過去研究可能受到適應症偏差、短期暴露與診斷前使用等方法學問題影響。 研究方法：此 族群 based 病例對照研究 使用丹麥、芬蘭、冰島、挪威與瑞典全國登錄資料，納入 17,232 名 gastric non-cardia adenocarcinoma 個案與 172,297 名依年齡、性別、年份及國家配對的對照。暴露定義為長期（>1 年）ppi 使用，並排除診斷或納入前 12 個月使用，以降低反向因果與適應症偏差。 主要結果：長期 ppi 使用在個案與對照分別為 10.2% 與 9.5%，未觀察到與 gastric adenocarcinoma 的關聯（校正 or 1.01，95% ci 0.96-1.07）。histamine-2-受體 拮抗劑 的風險估計亦相近（校正 or 1.03，95% ci 0.86-1.23）。 藥師重點：結論顯示在校正多項偏差後，長期 ppi 使用可能未增加 gastric adenocarcinoma 風險；藥師仍應依適應症定期檢視 ppi 必要性、療程長度、helicobacter pylori 相關病史與長期用藥監測。"},{"id":"pmid-41565311","kind":"article","issueId":"2026-week04","year":2026,"week":4,"weekLabel":"第 4 週","dateRange":"2026/01/19 – 01/25","href":"2026-week04.html","title":"Impact of shifting blood donation policy from gift to honour model: staggered difference-in-differences analysis in China","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"Liu","doi":"10.1136/bmj-2025-084999","url":"https://doi.org/10.1136/bmj-2025-084999","summary":"藥師重點：研究結果說明以社會認可為核心的政策可增加捐血量，且未降低捐血者適格率；此證據較偏公共衛生與血品供應政策，臨床解讀時應避免直接外推至不同制度或文化情境。","pubDate":"2026-01-21","terms":["impact","shifting","blood","donation","policy","from","gift","honour","model","staggered"],"drugTerms":[],"searchText":"impact of shifting blood donation policy from gift to honour model: staggered difference-in-differences analysis in china bmj original article liu 10.1136/bmj-2025-084999 研究背景：血液供應穩定性仰賴持續捐血，單純禮品式誘因可能有侷限；中國導入以社會認可為主的 榮譽模式，以提升捐血數量並維持捐血品質。 研究方法：研究採 staggered 差異-in-differences 分析，分析 2012-2018 年中國 30 個省份的捐血政策、年度捐血資料與人口社經指標。介入為 honour card 等社會認可誘因，主要評估年度總捐血次數、全血捐血次數與 donor eligibility 比率。 主要結果：榮譽模式 實施第 2 年使捐血次數增加 3.55%（95% ci 1.30%-5.80%；p=0.003），第 5 年增加 7.70%（95% ci 2.42%-12.98%；p=0.006）。增加主要來自全血捐血，donor eligibility 比率 未見顯著改變，敏感度分析支持結果穩健。 藥師重點：研究結果說明以社會認可為核心的政策可增加捐血量，且未降低捐血者適格率；此證據較偏公共衛生與血品供應政策，臨床解讀時應避免直接外推至不同制度或文化情境。"},{"id":"pmid-41563747","kind":"article","issueId":"2026-week04","year":2026,"week":4,"weekLabel":"第 4 週","dateRange":"2026/01/19 – 01/25","href":"2026-week04.html","title":"Antibiotic Therapy for Uncomplicated Acute Appendicitis: Ten-Year Follow-Up of the APPAC Randomized Clinical Trial","journal":"JAMA","type":"RCT","typeLabel":"RCT","author":"Salminen","doi":"10.1001/jama.2025.25921","url":"https://doi.org/10.1001/jama.2025.25921","summary":"藥師重點：研究結果支持抗生素可作為成人 uncomplicated 急性 appendicitis 的治療選項之一；藥師需協助評估抗生素過敏、交互作用、不良反應與抗藥性風險，並提醒病人仍有長期復發與後續手術可能。","pubDate":"2026-03-24","terms":["antibiotic","uncomplicated","acute","appendicitis","ten-year","follow-up","appac","jama","salminen","appendectomy"],"drugTerms":["ertapenem","levofloxacin","metronidazole"],"searchText":"antibiotic therapy for uncomplicated acute appendicitis: ten-year follow-up of the appac randomized clinical trial jama rct salminen 10.1001/jama.2025.25921 研究背景：成人 uncomplicated 急性 appendicitis 可使用抗生素作為非手術選項，但超過 5 年的隨機試驗追蹤資料有限，復發與後續 appendectomy 風險是臨床決策重點。 研究方法：本研究為 appac 多中心 隨機臨床試驗 的 10 年觀察性追蹤，原試驗於芬蘭 6 家醫院納入 530 名 18-60 歲、ct 診斷 uncomplicated 急性 appendicitis 患者，隨機接受 appendectomy 或 antibiotics。抗生素組使用 ertapenem sodium 1 g/day 靜脈注射 3 天，接續 levofloxacin 500 mg 每日一次 與 metronidazole 500 mg 每日 3 次 共 7 天。 主要結果：抗生素組 253/257 名患者完成復發評估，10 年 true appendicitis recurrence 為 37.8%（95% ci 31.6%-44.1%），累積 appendectomy 比率 為 44.3%（95% ci 38.2%-50.4%）。10 年累積併發症率在 appendectomy 組與抗生素組分別為 27.4% 與 8.5%（p<0.001），生活品質未見顯著差異。 藥師重點：研究結果支持抗生素可作為成人 uncomplicated 急性 appendicitis 的治療選項之一；藥師需協助評估抗生素過敏、交互作用、不良反應與抗藥性風險，並提醒病人仍有長期復發與後續手術可能。"},{"id":"fda-2026-week04-1","kind":"fda","issueId":"2026-week04","year":2026,"week":4,"weekLabel":"第 4 週","dateRange":"2026/01/19 – 01/25","href":"2026-week04.html","title":"FDA’s Concerns with Unapproved GLP-1 Drugs Used for Weight Loss","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["concerns","unapproved","glp-1","drugs","used","weight","loss","https","drug-alerts-and-statements","fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"],"drugTerms":["glp-1"],"searchText":"fda’s concerns with unapproved glp-1 drugs used for weight loss fda drug safety 2026-06-15 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"},{"id":"fda-2026-week04-3","kind":"fda","issueId":"2026-week04","year":2026,"week":4,"weekLabel":"第 4 週","dateRange":"2026/01/19 – 01/25","href":"2026-week04.html","title":"FDA issues final decision to withdraw approval of Pepaxto (melphalan flufenamide)","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/398713","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["issues","final","decision","withdraw","approval","pepaxto","melphalan","flufenamide","https","node"],"drugTerms":[],"searchText":"fda issues final decision to withdraw approval of pepaxto (melphalan flufenamide) fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/398713"},{"id":"fda-2026-week04-2","kind":"fda","issueId":"2026-week04","year":2026,"week":4,"weekLabel":"第 4 週","dateRange":"2026/01/19 – 01/25","href":"2026-week04.html","title":"FDA alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/403159","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["alerts","caregivers","providers","cross-compatibility","issues","autoinjector","devices","that","optional","glatiramer"],"drugTerms":[],"searchText":"fda alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/403159"},{"id":"fda-2026-week04-4","kind":"fda","issueId":"2026-week04","year":2026,"week":4,"weekLabel":"第 4 週","dateRange":"2026/01/19 – 01/25","href":"2026-week04.html","title":"FDA Accepts First In Silico Drug Development Tool Under ISTAND Program to Help Predict Drug-Induced Liver Injury","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["accepts","first","silico","development","tool","under","istand","program","help","predict"],"drugTerms":[],"searchText":"fda accepts first in silico drug development tool under istand program to help predict drug-induced liver injury fda drug safety 2026-06-03 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver"},{"id":"pmid-41534914","kind":"article","issueId":"2026-week03","year":2026,"week":3,"weekLabel":"第 3 週","dateRange":"2026/01/12 – 01/18","href":"2026-week03.html","title":"The impact of skin tone on performance of pulse oximeters used by NHS England COVID Oximetry @home scheme: measurement and diagnostic accuracy study","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"Martin","doi":"10.1136/bmj-2025-085535","url":"https://doi.org/10.1136/bmj-2025-085535","summary":"藥師重點：結果顯示部分 pulse oximeter 在深膚色患者可能高估 SpO2，造成低血氧偵測的 false negative 風險；臨床與居家監測衛教應提醒若症狀與讀值不一致，需回到整體臨床評估並考慮 SaO2 等確認方式。","pubDate":"2026-01-14","terms":["impact","skin","tone","performance","pulse","oximeters","used","england","covid","oximetry"],"drugTerms":[],"searchText":"the impact of skin tone on performance of pulse oximeters used by nhs england covid oximetry @home scheme: measurement and diagnostic accuracy study bmj original article martin 10.1136/bmj-2025-085535 研究背景：covid oximetry @home 等居家監測方案仰賴指尖 pulse oximeter，但膚色是否影響 spo2 測量與低血氧診斷準確度，仍是重要安全議題。 研究方法：exakt 為 measurement and diagnostic accuracy 研究，於英格蘭 24 間加護病房納入 903 名重症成人，分析 5 種 nhs england covid oximetry @home 使用的指尖 pulse oximeters。研究比較 pulse oximetry derived spo2 與 co-oximetry 測得的 paired arterial oxygen saturation（sao2），並以 spectrophotometer 客觀測量膚色。 主要結果：共分析 11,018 組 paired spo2-sao2 測量。所有 pulse oximeters 在較低 sao2 時高估、較高 sao2 時低估；深膚色患者的 spo2 平均比淺膚色患者高 0.6-1.5 百分點。以 spo2 ≤92% 或 ≤94% 閾值判定時，深膚色者 false negative rates 較高；sao2 ≤92% 但 spo2 >94% 的比例差距為 5.3-35.3 百分點。 藥師重點：結果顯示部分 pulse oximeter 在深膚色患者可能高估 spo2，造成低血氧偵測的 false negative 風險；臨床與居家監測衛教應提醒若症狀與讀值不一致，需回到整體臨床評估並考慮 sao2 等確認方式。"},{"id":"pmid-41525083","kind":"article","issueId":"2026-week03","year":2026,"week":3,"weekLabel":"第 3 週","dateRange":"2026/01/12 – 01/18","href":"2026-week03.html","title":"The US Food and Drug Administration's Regulation of Mifepristone","journal":"JAMA","type":"OA","typeLabel":"Original Article","author":"Dilek","doi":"10.1001/jama.2025.23091","url":"https://doi.org/10.1001/jama.2025.23091","summary":"藥師重點：結論顯示 2011-2023 年 FDA 對 mifepristone 的監管主要受科學證據與審慎監管取向影響；此文屬監管政策分析，非療效或安全性試驗，藥師解讀時需回到當地法規、REMS 要求與臨床使用情境。","pubDate":"2026-02-17","terms":["food","administration","regulation","mifepristone","jama","dilek","misoprostol","rems","qualitative","freedom"],"drugTerms":[],"searchText":"the us food and drug administration's regulation of mifepristone jama original article dilek 10.1001/jama.2025.23091 研究背景：mifepristone 與 misoprostol 合併使用是美國常見藥物流產 處方，也因 fda 監管、rems 與法律爭議而成為生殖健康政策焦點。 研究方法：研究為 qualitative 分析，分析 freedom of information act 取得的 5239 頁 fda 文件，包括 sponsor rems assessment reports、fda reviews、internal memos 與 regulatory correspondence（2011-2023），並補充公開資料。分析重點為 fda 對上市後安全措施建立、維持或調整的理由與引用證據。 主要結果：研究辨識出 5 個 mifepristone 監管關鍵時點：2011 年 6 月轉入 rems framework、2013 年 10 月重新評估 rems 必要性、2015 年 5 月 sponsor-requested label change、2020-2021 年因應 covid-19 pandemic，以及 2021 年 11 月全面重新評估 rems。整體主題包括安全性結論一致、staff scientists 建議未見意識形態偏差，以及政治干預至今影響有限。 藥師重點：結論顯示 2011-2023 年 fda 對 mifepristone 的監管主要受科學證據與審慎監管取向影響；此文屬監管政策分析，非療效或安全性試驗，藥師解讀時需回到當地法規、rems 要求與臨床使用情境。"},{"id":"pmid-41544643","kind":"article","issueId":"2026-week03","year":2026,"week":3,"weekLabel":"第 3 週","dateRange":"2026/01/12 – 01/18","href":"2026-week03.html","title":"Savolitinib plus osimertinib versus chemotherapy for advanced, EGFR mutation-positive, MET-amplified non-small-cell lung cancer in China (SACHI): interim analysis of a multicentre, open-label, phase 3 randomised controlled trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Lu","doi":"10.1016/S0140-6736(25)01811-2","url":"https://doi.org/10.1016/S0140-6736(25)01811-2","summary":"藥師重點：結論顯示 savolitinib-osimertinib 可延長 EGFR 突變陽性、MET 擴增 NSCLC 經 EGFR TKI 後進展患者的 無惡化存活期；臨床應確認 EGFR/MET 檢測結果、既往 TKI 暴露與合併標靶治療相關不良反應監測。","pubDate":"2026-01-24","terms":["savolitinib","plus","osimertinib","chemotherapy","advanced","egfr","mutation-positive","met-amplified","non-small-cell","lung"],"drugTerms":["savolitinib","osimertinib","savolitinib-osimertinib","cisplatin","carboplatin"],"searchText":"savolitinib plus osimertinib versus chemotherapy for advanced, egfr mutation-positive, met-amplified non-small-cell lung cancer in china (sachi): interim analysis of a multicentre, open-label, phase 3 randomised controlled trial lancet rct lu 10.1016/s0140-6736(25)01811-2 研究背景：egfr 突變陽性 nsclc 在 egfr tki 治療後若出現 met amplification，後續治療選擇有限；savolitinib 合併 osimertinib 可能提供 biomarker-selected 族群的口服治療選項。 研究方法：sachi 為中國 68 家醫院進行的 多中心、隨機、活性對照、開放標籤 第 3 期試驗。局部晚期或轉移性 egfr 突變陽性、met 擴增 nsclc 且 egfr tki 治療失敗的成人，1:1 分配至每日口服 savolitinib-osimertinib 或 pemetrexed 加 cisplatin/carboplatin 化療，每 21 天一療程；主要終點為 investigator-assessed 無惡化存活期。 主要結果：共 211 人納入，106 人分配至 savolitinib-osimertinib、105 人分配至化療，所有受試者均為 asian。第三代 egfr tki-naive 族群 中位數 無惡化存活期 為 9.8 vs 5.4 個月（hr 0.34，95% ci 0.21-0.56；p<0.0001），itt 族群為 8.2 vs 4.5 個月（hr 0.34，95% ci 0.23-0.49；p<0.0001）。等級 3 或以上 治療期間出現的不良事件 兩組皆為 57%。 藥師重點：結論顯示 savolitinib-osimertinib 可延長 egfr 突變陽性、met 擴增 nsclc 經 egfr tki 後進展患者的 無惡化存活期；臨床應確認 egfr/met 檢測結果、既往 tki 暴露與合併標靶治療相關不良反應監測。"},{"id":"pmid-41539323","kind":"article","issueId":"2026-week03","year":2026,"week":3,"weekLabel":"第 3 週","dateRange":"2026/01/12 – 01/18","href":"2026-week03.html","title":"Profiling vaccine attitudes and subsequent uptake in 1·1 million people in England: a nationwide cohort study","journal":"Lancet","type":"OA","typeLabel":"Original Article","author":"Whitaker","doi":"10.1016/S0140-6736(25)01912-9","url":"https://doi.org/10.1016/S0140-6736(25)01912-9","summary":"藥師重點：研究結果說明多數 COVID-19 疫苗 hesitancy 來自可被資訊與時間處理的具體疑慮，但低信任與反疫苗態度較難改變；藥師進行疫苗諮詢時，應先辨識猶豫原因，再提供針對性的風險溝通。","pubDate":"2026-01-24","terms":["profiling","vaccine","attitudes","subsequent","uptake","million","people","england","nationwide","lancet"],"drugTerms":["anti-vaccine"],"searchText":"profiling vaccine attitudes and subsequent uptake in 1·1 million people in england: a nationwide cohort study lancet original article whitaker 10.1016/s0140-6736(25)01912-9 研究背景：即使 sars-cov-2 疫苗具高度保護力，英格蘭疫情期間仍有部分族群對 covid-19 疫苗 hesitancy；其比例與原因會隨人口特徵而不同，影響後續疫苗推廣策略。 研究方法：研究使用 real-time assessment of community transmission（react）資料，先進行 基準值 疫苗 hesitancy 的 cross-sectional 分析，再以 linked nhs vaccination records 對猶豫族群進行 longitudinal 分析。成人受試者自陳社會人口資料、接種狀態與疫苗態度，並以 logistic regression 與 consensus clustering 分析猶豫類型及後續接種。 主要結果：分析納入 1,137,927 名成人，37,982 人（3.3%）表示某種形式 疫苗 hesitancy；比例於 2021 年初達 8.0%，2022 年初降至 1.1%，之後回升至 2.2%。在 24,229 名表示猶豫且同意 nhs 資料 linkage 者中，15,744 人（65.0%）後續接種至少一劑。cluster 分析 辨識 8 類穩定猶豫原因，其中對效果與健康疑慮的猶豫較會隨時間下降
