；低信任、低風險感知與一般反疫苗態度則較持續。 藥師重點：研究結果說明多數 covid-19 疫苗 hesitancy 來自可被資訊與時間處理的具體疑慮，但低信任與反疫苗態度較難改變；藥師進行疫苗諮詢時，應先辨識猶豫原因，再提供針對性的風險溝通。"},{"id":"pmid-41533371","kind":"article","issueId":"2026-week03","year":2026,"week":3,"weekLabel":"第 3 週","dateRange":"2026/01/12 – 01/18","href":"2026-week03.html","title":"Minor Papillotomy for Treatment of Idiopathic Acute Pancreatitis With Pancreas Divisum: A Randomized Clinical Trial","journal":"JAMA","type":"RCT","typeLabel":"RCT","author":"Coté","doi":"10.1001/jama.2025.23988","url":"https://doi.org/10.1001/jama.2025.23988","summary":"藥師重點：結論顯示對 unexplained 急性 recurrent pancreatitis 合併 pancreas divisum 患者，ERCP 合併副乳頭切開術 未降低再發急性胰臟炎或相關後遺症；照護上需留意 ERCP 後急性胰臟炎風險與程序相關用藥管理。","pubDate":"2026-02-24","terms":["minor","papillotomy","idiopathic","acute","pancreatitis","pancreas","divisum","jama","ercp","sham"],"drugTerms":[],"searchText":"minor papillotomy for treatment of idiopathic acute pancreatitis with pancreas divisum: a randomized clinical trial jama rct coté 10.1001/jama.2025.23988 研究背景：pancreas divisum 可能造成胰液引流阻塞並與急性胰臟炎相關；ercp 合併 minor papillotomy 雖已在臨床使用，但過去多仰賴觀察性資料。 研究方法：此美國與加拿大 21 個轉診中心進行的 多中心、假治療對照、雙盲 隨機臨床試驗，納入有 2 次以上急性胰臟炎且合併 pancreas divisum 的成人，排除其他急性胰臟炎病因或慢性鈣化性胰臟炎。受試者 1:1 分配至 ercp 合併副乳頭切開術 或 sham ercp；主要終點為隨機分組 30 天後再發急性胰臟炎。 主要結果：共 148 人隨機分組，中位數 追蹤 34 個月。ercp 合併副乳頭切開術 組 26/75 人（34.7%）再發急性胰臟炎，sham ercp 組為 32/73 人（43.8%）（校正 hr 0.83，95% ci 0.49 to 1.41）；慢性鈣化性胰臟炎、糖尿病與外分泌胰臟功能不全皆無組間差異。隨機後 30 天內急性胰臟炎不良事件為 14.7% vs 8.2%。 藥師重點：結論顯示對 unexplained 急性 recurrent pancreatitis 合併 pancreas divisum 患者，ercp 合併副乳頭切開術 未降低再發急性胰臟炎或相關後遺症；照護上需留意 ercp 後急性胰臟炎風險與程序相關用藥管理。"},{"id":"pmid-41544642","kind":"article","issueId":"2026-week03","year":2026,"week":3,"weekLabel":"第 3 週","dateRange":"2026/01/12 – 01/18","href":"2026-week03.html","title":"Low-dose yellow fever vaccination in infants: a randomised, double-blind, non-inferiority trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Kimathi","doi":"10.1016/S0140-6736(25)02069-0","url":"https://doi.org/10.1016/S0140-6736(25)02069-0","summary":"藥師重點：結論顯示成人 分劑量 的最低劑量資料不能直接外推至嬰兒；常規 WHO Expanded Programme on Immunization 族群仍應使用標準黃熱病疫苗劑量，疫苗短缺時需特別區分 outbreak 應急策略與嬰兒常規接種。","pubDate":"2026-01-31","terms":["low-dose","yellow","fever","vaccination","infants","randomised","double-blind","non-inferiority","lancet","kimathi"],"drugTerms":[],"searchText":"low-dose yellow fever vaccination in infants: a randomised, double-blind, non-inferiority trial lancet rct kimathi 10.1016/s0140-6736(25)02069-0 研究背景：黃熱病疫苗短缺時，who 建議 outbreak 情境可使用 分劑量；成人已有 500 iu 劑量不劣於標準劑量的資料，但嬰兒最低有效劑量仍不清楚。 研究方法：此 kenya 與 uganda 兩中心、隨機、雙盲、不劣性 試驗 納入 9-12 個月、未曾接種或感染黃熱病的嬰兒。受試者 1:1 接受標準劑量（>13,000 iu）或 500 iu institut pasteur de dakar 17d-204 yellow fever 疫苗，並與 measles-rubella 疫苗 共同接種；主要終點為接種後第 28 天 seroconversion。 主要結果：共 420 名嬰兒隨機分組。per-protocol 族群 中，第 28 天 血清轉換率 為標準劑量 99%（95% ci 96-100；177/179）與 500 iu 93%（88-96；166/179），差異為 -6.15 百分點（95% ci -10.27 to -2.02），未達 不劣性。研究期間通報 12 件 嚴重不良事件，皆被判定與疫苗無關。 藥師重點：結論顯示成人 分劑量 的最低劑量資料不能直接外推至嬰兒；常規 who expanded programme on immunization 族群仍應使用標準黃熱病疫苗劑量，疫苗短缺時需特別區分 outbreak 應急策略與嬰兒常規接種。"},{"id":"pmid-41534042","kind":"article","issueId":"2026-week03","year":2026,"week":3,"weekLabel":"第 3 週","dateRange":"2026/01/12 – 01/18","href":"2026-week03.html","title":"Fremanezumab in Children and Adolescents with Episodic Migraine","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Hershey","doi":"10.1056/NEJMoa2504546","url":"https://doi.org/10.1056/NEJMoa2504546","summary":"藥師重點：結論顯示 fremanezumab 可降低兒童與青少年 episodic migraine 的偏頭痛與頭痛天數；用藥評估仍需留意體重分層劑量、注射部位反應，以及兒科族群長期療效與安全性資料仍有限。","pubDate":"2026-01-15","terms":["fremanezumab","children","adolescents","episodic","migraine","nejm","hershey","nejmoa2504546","calcitonin","gene-related"],"drugTerms":["fremanezumab"],"searchText":"fremanezumab in children and adolescents with episodic migraine nejm rct hershey 10.1056/nejmoa2504546 研究背景：fremanezumab 為選擇性作用於 calcitonin gene-related peptide 的 humanized monoclonal 抗體，成人偏頭痛預防已有適應資料，但兒童與青少年族群仍需隨機對照試驗證據。 研究方法：此試驗納入 6-17 歲、episodic migraine 至少 6 個月且每月頭痛日數不超過 14 天者，隨機接受每月皮下注射 fremanezumab（體重 <45 kg 為 120 mg，≥45 kg 為 225 mg）或 安慰劑，共 3 個月。主要終點為每月偏頭痛天數相對基準值的變化。 主要結果：237 人隨機分組，234 人納入 完整分析族群。fremanezumab 組每月偏頭痛天數減少 2.5 天，安慰劑 組減少 1.4 天（差異 1.1；p=0.02）；每月中重度頭痛天數亦較 安慰劑 多減少 1.1 天（p=0.02），達到偏頭痛天數減少 ≥50% 者為 47.2% vs 27.0%（p=0.002）。最常見不良事件為注射部位紅斑（9.8% vs 5.4%）。 藥師重點：結論顯示 fremanezumab 可降低兒童與青少年 episodic migraine 的偏頭痛與頭痛天數；用藥評估仍需留意體重分層劑量、注射部位反應，以及兒科族群長期療效與安全性資料仍有限。"},{"id":"pmid-41534904","kind":"article","issueId":"2026-week03","year":2026,"week":3,"weekLabel":"第 3 週","dateRange":"2026/01/12 – 01/18","href":"2026-week03.html","title":"Experiences of access to general practice in England: qualitative study and implications for the NHS 10 year plan","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"Sinnott","doi":"10.1136/bmj-2025-087367","url":"https://doi.org/10.1136/bmj-2025-087367","summary":"藥師重點：研究結果說明醫療可近性改革不能只以數位工具或服務重組取代人際連結與連續照護；藥師參與社區照護、慢病管理或數位分流時，需留意弱勢族群排除、照護片段化與跨專業工作量分配。","pubDate":"2026-01-14","terms":["experiences","access","general","practice","england","qualitative","implications","year","plan","sinnott"],"drugTerms":[],"searchText":"experiences of access to general practice in england: qualitative study and implications for the nhs 10 year plan bmj original article sinnott 10.1136/bmj-2025-087367 研究背景：英格蘭 nhs 10 year plan 擬透過數位化、轉向社區與預防導向改善 基層醫療 可近性，但病人、照顧者與基層醫療工作者的實際需求可能不同。 研究方法：研究為 質性訪談研究，訪談 devon、medway、blackpool、luton、lancashire 的病人與照顧者，以及英格蘭東部 基層醫療 工作人員，共 70 次訪談。分析使用 持續比較法，並將主題對應至 10 year plan 提出的 digital、community、prevention 三項轉向。 主要結果：受訪病人涵蓋 12 個族群與多元個人及醫療特徵。數位化可提升部分病人的便利性與行政效率，但未解決 gp 約診不足，也可能造成新的排除；轉向社區可能增加服務量能，但也有協調困難與削弱長期醫病關係的風險。預防導向雖被認為重要，卻可能造成照護片段化並增加 基層醫療 工作量。 藥師重點：研究結果說明醫療可近性改革不能只以數位工具或服務重組取代人際連結與連續照護；藥師參與社區照護、慢病管理或數位分流時，需留意弱勢族群排除、照護片段化與跨專業工作量分配。"},{"id":"pmid-41544645","kind":"article","issueId":"2026-week03","year":2026,"week":3,"weekLabel":"第 3 週","dateRange":"2026/01/12 – 01/18","href":"2026-week03.html","title":"Deaths potentially averted by small changes in physical activity and sedentary time: an individual participant data meta-analysis of prospective cohort studies","journal":"Lancet","type":"MA","typeLabel":"Meta-analysis","author":"Ekelund","doi":"10.1016/S0140-6736(25)02219-6","url":"https://doi.org/10.1016/S0140-6736(25)02219-6","summary":"藥師重點：研究結果說明很小幅度的 MVPA 增加也可能具公共衛生意義，減少久坐亦有較小但仍可觀的效益；藥師進行慢病與用藥衛教時可納入可達成的活動目標，但解讀需注意此為 世代 統合分析 與族群層級估計。","pubDate":"2026-01-24","terms":["deaths","potentially","averted","small","changes","physical","activity","sedentary","time","individual"],"drugTerms":[],"searchText":"deaths potentially averted by small changes in physical activity and sedentary time: an individual participant data meta-analysis of prospective cohort studies lancet meta-analysis ekelund 10.1016/s0140-6736(25)02219-6 研究背景：小幅增加中高強度身體活動或減少久坐時間，對族群層級死亡可避免比例的影響仍不明確；本研究估計每日增加 5-10 分鐘 mvpa 或減少 30-60 分鐘久坐的可能效益。 研究方法：研究為 prospective 世代 研究 的 個別參與者資料統合分析，納入以裝置測量身體活動與久坐時間的資料。分析分為約 20% 最不活躍者的 高風險策略，以及排除約 20% 最活躍者後全族群的 族群策略，並以 校正風險比 估算 potential impact fractions（pifs）。 主要結果：分析納入挪威、瑞典與美國 7 個 世代（n=40,327；4895 deaths），uk biobank（n=94,719；3487 deaths）另行分析。最不活躍者每日增加 5 分鐘 mvpa 可能避免 6.0%（95% ci 4.3-7.4）死亡；若應用於除最活躍者外的全族群，可能避免 10.0%（6.3-13.4）死亡。每日減少 30 分鐘久坐則估計可避免 3.0%（2.0-4.1）與 7.3%（4.8-9.6）死亡。 藥師重點：研究結果說明很小幅度的 mvpa 增加也可能具公共衛生意義，減少久坐亦有較小但仍可觀的效益；藥師進行慢病與用藥衛教時可納入可達成的活動目標，但解讀需注意此為 世代 統合分析 與族群層級估計。"},{"id":"pmid-41534905","kind":"article","issueId":"2026-week03","year":2026,"week":3,"weekLabel":"第 3 週","dateRange":"2026/01/12 – 01/18","href":"2026-week03.html","title":"Cast immobilisation versus surgery for unstable lateral malleolus fractures (SUPER-FIN): randomised non-inferiority clinical trial","journal":"BMJ","type":"RCT","typeLabel":"RCT","author":"Kortekangas","doi":"10.1136/bmj-2025-085295","url":"https://doi.org/10.1136/bmj-2025-085295","summary":"藥師重點：結果顯示此類外踝骨折以石膏固定治療不劣於手術，且治療相關傷害較少；臨床照護可將疼痛控制、活動功能追蹤與手術傷口感染風險納入共同決策。","pubDate":"2026-01-14","terms":["cast","immobilisation","surgery","unstable","lateral","malleolus","fractures","super-fin","randomised","non-inferiority"],"drugTerms":[],"searchText":"cast immobilisation versus surgery for unstable lateral malleolus fractures (super-fin): randomised non-inferiority clinical trial bmj rct kortekangas 10.1136/bmj-2025-085295 研究背景：初始 x 光顯示踝關節榫對位良好的單踝 weber b 外踝骨折，若外旋壓力測試判定不穩定，是否一定需要手術仍有臨床爭議。 研究方法：super-fin 為芬蘭單一創傷中心 實務型、隨機、不劣性 試驗，納入 126 名骨骼成熟且外旋壓力測試不穩定的單獨 weber b 腓骨骨折患者，分配至 6 週石膏固定或 開放復位內固定鋼板 後 6 週石膏固定。主要終點為 2 年 olerud-molander ankle score（omas），不劣性 margin 為 -8 分。 主要結果：121/126 名隨機分組者（96%）完成研究。2 年時石膏固定組與手術組平均 omas 為 89 vs 87，組間差 1.3 分（95% ci -4.8 to 7.3），次要終點亦未見顯著差異；手術組另有表淺傷口感染、傷口癒合延遲與 9 例移除內固定物手術。 藥師重點：結果顯示此類外踝骨折以石膏固定治療不劣於手術，且治療相關傷害較少；臨床照護可將疼痛控制、活動功能追蹤與手術傷口感染風險納入共同決策。"},{"id":"pmid-41534043","kind":"article","issueId":"2026-week03","year":2026,"week":3,"weekLabel":"第 3 週","dateRange":"2026/01/12 – 01/18","href":"2026-week03.html","title":"CD19 CAR T-Cell Therapy for Autoimmune Hemolytic Anemia","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Li","doi":"10.1056/NEJMoa2509820","url":"https://doi.org/10.1056/NEJMoa2509820","summary":"藥師重點：結果顯示 CD19 CAR T-cell 治療 在 multirefractory AIHA 可能帶來持續緩解，但資料來自 11 人早期研究與 compassionate 使用；臨床解讀需保守，並重視 CRS、ICANS、感染與 hematotoxicity 等 CAR T 相關毒性監測。","pubDate":"2026-01-15","terms":["cd19","t-cell","autoimmune","hemolytic","anemia","nejm","nejmoa2509820","aiha","autoreactive","b-cell"],"drugTerms":[],"searchText":"cd19 car t-cell therapy for autoimmune hemolytic anemia nejm original article li 10.1056/nejmoa2509820 研究背景：autoimmune hemolytic anemia（aiha）可能因持續存在的 autoreactive b-cell activity 而復發；對至少三線治療無效的 multirefractory aiha，cd19-directed car t-cell 治療 可能藉由深度 b 細胞耗竭達到免藥緩解。 研究方法：研究納入 恩慈使用 program 與 第 1 期 研究 中的 原發難治且多重難治 aiha 患者，每位接受單次 autologous cd19 car t cells 輸注。主要目標為安全性，包括 cytokine-release 症候群 與 immune effector cell-associated neurotoxicity 症候群；次要目標包含療效與 pharmacokinetic features。 主要結果：共 11 名患者接受 cd19 car t cells，中位數 追蹤 12.2 個月。所有患者皆達 完全反應，中位數 time to 完全反應 為 45 天，中位數 duration of drug-free 緩解 為 11.5 個月；等級 1 或 2 cytokine-release 症候群 發生於 9 人，等級 1 immune effector cell-associated neurotoxicity 症候群 發生於 1 人，7 人共發生 15 件感染，無 等級 4 或以上感染。 藥師重點：結果顯示 cd19 car t-cell 治療 在 multirefractory aiha 可能帶來持續緩解，但資料來自 11 人早期研究與 compassionate 使用；臨床解讀需保守，並重視 crs、icans、感染與 hematotoxicity 等 car t 相關毒性監測。"},{"id":"pmid-41520674","kind":"article","issueId":"2026-week03","year":2026,"week":3,"weekLabel":"第 3 週","dateRange":"2026/01/12 – 01/18","href":"2026-week03.html","title":"Abluminus DES+ sirolimus-eluting stent versus everolimus-eluting stent in patients with diabetes and coronary artery disease (ABILITY Diabetes Global): results from a multicentre, randomised controlled trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Abizaid","doi":"10.1016/S0140-6736(25)02157-9","url":"https://doi.org/10.1016/S0140-6736(25)02157-9","summary":"藥師重點：結果顯示糖尿病患者 PCI 使用 Abluminus DES+ SES 未能證明不劣於 XIENCE EES，且 12 個月 target-lesion 相關事件較高；藥師在照護此族群時仍需重視 殘餘缺血風險、雙重抗血小板治療 遵從性與出血風險平衡。","pubDate":"2026-01-17","terms":["abluminus","sirolimus-eluting","stent","everolimus-eluting","diabetes","coronary","artery","ability","global","from"],"drugTerms":[],"searchText":"abluminus des+ sirolimus-eluting stent versus everolimus-eluting stent in patients with diabetes and coronary artery disease (ability diabetes global): results from a multicentre, randomised controlled trial lancet rct abizaid 10.1016/s0140-6736(25)02157-9 研究背景：糖尿病會增加冠狀動脈疾病患者 pci 後再狹窄與心血管事件風險；abluminus des+ sirolimus-eluting stent 是否可優於或不劣於既有 xience everolimus-eluting stent 仍需大型試驗驗證。 研究方法：ability diabetes global 為 16 國 74 中心、prospective、開放標籤、隨機對照試驗，納入接受 pci 的第 1 型或第 2 型糖尿病成人，因慢性冠心症或 non-st-elevation 急性 冠狀動脈 症候群 治療至少一處 de novo 冠狀動脈 lesion。受試者 1:1 分配至 abluminus des+ ses 或 xience ees，主要假設為 12 個月 ischaemia-driven target-lesion revascularisation 與 目標病灶失敗 的 不劣性。 主要結果：共 3032 人隨機分組，2931 人完成死亡或 24 個月追蹤。12 個月 依計畫書分析 中，abluminus des+ ses 未達 不劣性：ischaemia-driven target-lesion revascularisation 為 4.8% vs 2.1%（absolute 風險差 2.7%，95% ci 1.3-4.1；p不劣性=0.44），目標病灶失敗 為 9.7% vs 6.2%（3.5%，95% ci 1.5-5.5；p不劣性=0.68）。target-vessel myocardial infarction 亦較高（5.2% vs 3.1%），但 心血管 死亡 與 all-cause 死亡 未見顯著差異。 藥師重點：結果顯示糖尿病患者 pci 使用 abluminus des+ ses 未能證明不劣於 xience ees，且 12 個月 target-lesion 相關事件較高；藥師在照護此族群時仍需重視 殘餘缺血風險、雙重抗血小板治療 遵從性與出血風險平衡。"},{"id":"fda-2026-week03-1","kind":"fda","issueId":"2026-week03","year":2026,"week":3,"weekLabel":"第 3 週","dateRange":"2026/01/12 – 01/18","href":"2026-week03.html","title":"FDA’s Concerns with Unapproved GLP-1 Drugs Used for Weight Loss","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["concerns","unapproved","glp-1","drugs","used","weight","loss","https","drug-alerts-and-statements","fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"],"drugTerms":["glp-1"],"searchText":"fda’s concerns with unapproved glp-1 drugs used for weight loss fda drug safety 2026-06-15 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"},{"id":"fda-2026-week03-3","kind":"fda","issueId":"2026-week03","year":2026,"week":3,"weekLabel":"第 3 週","dateRange":"2026/01/12 – 01/18","href":"2026-week03.html","title":"FDA issues final decision to withdraw approval of Pepaxto (melphalan flufenamide)","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/398713","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["issues","final","decision","withdraw","approval","pepaxto","melphalan","flufenamide","https","node"],"drugTerms":[],"searchText":"fda issues final decision to withdraw approval of pepaxto (melphalan flufenamide) fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/398713"},{"id":"fda-2026-week03-2","kind":"fda","issueId":"2026-week03","year":2026,"week":3,"weekLabel":"第 3 週","dateRange":"2026/01/12 – 01/18","href":"2026-week03.html","title":"FDA alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/403159","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["alerts","caregivers","providers","cross-compatibility","issues","autoinjector","devices","that","optional","glatiramer"],"drugTerms":[],"searchText":"fda alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/403159"},{"id":"fda-2026-week03-4","kind":"fda","issueId":"2026-week03","year":2026,"week":3,"weekLabel":"第 3 週","dateRange":"2026/01/12 – 01/18","href":"2026-week03.html","title":"FDA Accepts First In Silico Drug Development Tool Under ISTAND Program to Help Predict Drug-Induced Liver Injury","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["accepts","first","silico","development","tool","under","istand","program","help","predict"],"drugTerms":[],"searchText":"fda accepts first in silico drug development tool under istand program to help predict drug-induced liver injury fda drug safety 2026-06-03 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver"},{"id":"pmid-41513265","kind":"article","issueId":"2026-week02","year":2026,"week":2,"weekLabel":"第 2 週","dateRange":"2026/01/05 – 01/11","href":"2026-week02.html","title":"When I use a word . . . Medical anniversaries in 2026","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"Aronson","doi":"10.1136/bmj.s58","url":"https://doi.org/10.1136/bmj.s58","summary":"藥師重點：此文可作為藥學教育、醫學史或院內刊物延伸閱讀素材，但不屬於臨床試驗或治療建議；引用時應避免把歷史事件解讀為現行用藥決策證據。","pubDate":"2026-01-09","terms":["when","word","anniversaries","aronson","nobel","prizes","averroes","avogadro","laennec","pinel"],"drugTerms":[],"searchText":"when i use a word . . . medical anniversaries in 2026 bmj original article aronson 10.1136/bmj.s58 研究背景：此 bmj 專欄整理 2026 年與醫學、藥學及生物醫學相關的週年事件，重點在歷史脈絡與醫學文化，而非新的臨床治療證據。 研究方法：文章以年份尾數為 '26 與 '76 的事件為主，彙整出生、逝世、醫學文本出版、臨床療法、基礎科學觀察、機構成立、流行病與 nobel prizes 等項目。 主要結果：列舉內容包括 averroes、avogadro、laennec、pinel、golgi、kraepelin 等人物，以及 1926 年以肝臟治療 pernicious anaemia、1776 年腎結石中 uric acid 觀察、1876 年 anthrax bacillus、1726 年 edinburgh medical school 成立與 1976 年 伊波拉病毒感染 等醫學相關事件。 藥師重點：此文可作為藥學教育、醫學史或院內刊物延伸閱讀素材，但不屬於臨床試驗或治療建議；引用時應避免把歷史事件解讀為現行用藥決策證據。"},{"id":"pmid-41500720","kind":"article","issueId":"2026-week02","year":2026,"week":2,"weekLabel":"第 2 週","dateRange":"2026/01/05 – 01/11","href":"2026-week02.html","title":"Weight regain after cessation of medication for weight management: systematic review and meta-analysis","journal":"BMJ","type":"MA","typeLabel":"Meta-analysis","author":"West","doi":"10.1136/bmj-2025-085304","url":"https://doi.org/10.1136/bmj-2025-085304","summary":"藥師重點：研究結果說明 體重管理藥物 停用後常伴隨快速體重回升與心血管代謝效益消退；藥師應協助病人理解此類藥物不宜只作短期處方，並同步安排飲食、活動、共病監測與停藥後追蹤。","pubDate":"2026-01-07","terms":["weight","regain","cessation","medication","management","meta-analysis","west","bmj-2025-085304","cardiometabolic","markers"],"drugTerms":[],"searchText":"weight regain after cessation of medication for weight management: systematic review and meta-analysis bmj meta-analysis west 10.1136/bmj-2025-085304 研究背景：體重管理藥物可協助減重，但停藥後體重回升速度與心血管代謝指標是否反彈，是用藥規劃與病人期待管理的重要問題。 研究方法：此 系統性回顧與統合分析 搜尋資料庫與試驗登錄至 2025 年 2 月，納入成人過重或肥胖者使用 體重管理藥物（≥8 週）且停藥後追蹤 ≥4 週的 rct、非隨機試驗與觀察性研究。主要結果為停藥後體重回升速率，次要結果為 cardiometabolic markers 變化，並與 行為體重管理計畫（bwmps）停用後情形比較。 主要結果：9288 篇題名中納入 37 項研究、63 個介入組、9341 名參與者；平均治療 39 週、平均追蹤 32 週。停用 wmm 後平均每月體重回升 0.4 kg（95% ci 0.3 to 0.5），rct mixed model 顯示相較對照每月多 0.3 kg；所有 cardiometabolic markers 預估在停藥後 1.4 年內回到基線，且 wmm 後回升速度快於 bwmp。 藥師重點：研究結果說明 體重管理藥物 停用後常伴隨快速體重回升與心血管代謝效益消退；藥師應協助病人理解此類藥物不宜只作短期處方，並同步安排飲食、活動、共病監測與停藥後追蹤。"},{"id":"pmid-41499135","kind":"article","issueId":"2026-week02","year":2026,"week":2,"weekLabel":"第 2 週","dateRange":"2026/01/05 – 01/11","href":"2026-week02.html","title":"Prenatal Exposure to Acid-Suppressive Medications and Risk of Neuropsychiatric Disorders in Children","journal":"JAMA","type":"OA","typeLabel":"Original Article","author":"Hong","doi":"10.1001/jama.2025.23956","url":"https://doi.org/10.1001/jama.2025.23956","summary":"藥師重點：結論顯示控制手足共享因素後，孕期酸抑制藥物暴露未與子代 ADHD、ASD 或其他神經精神疾患風險增加相關；孕期用藥諮詢仍應避免不必要長期使用，但有適應症時不宜僅因初步觀察性關聯而自行停藥。","pubDate":"2026-02-17","terms":["prenatal","exposure","acid-suppressive","medications","neuropsychiatric","disorders","children","jama","hong","south"],"drugTerms":[],"searchText":"prenatal exposure to acid-suppressive medications and risk of neuropsychiatric disorders in children jama original article hong 10.1001/jama.2025.23956 研究背景：孕期常使用 ppi 或 h2 受體 拮抗劑 控制胃酸相關症狀，但其與子代神經精神疾患風險的關聯仍需大型資料與家族內比較釐清。 研究方法：此 south korean national 健康 insurance service 回溯性世代研究 納入 2010 年 1 月至 2017 年 12 月出生的母子配對，子代追蹤至 2023 年 12 月。暴露定義為孕期至少一次 ppi 或 h2 受體 拮抗劑 處方，分析採 propensity score-based overlap-weighted 世代 與 sibling-matched 世代，結果包括 adhd、asd、intellectual disability、重度 neuropsychiatric 疾患 與 obsessive-compulsive 疾患。 主要結果：共納入 2,777,119 對母子，其中 507,845 對有孕期酸抑制藥物暴露，平均追蹤 10.3 年。overlap-weighted 世代 顯示暴露組風險略高，如 adhd 校正 hr 1.14（95% ci 1.12-1.17）、asd 1.07（95% ci 1.03-1.11）；但 sibling-control 分析 未見顯著關聯，adhd hr 0.98（95% ci 0.95-1.02）、asd 0.98（95% ci 0.92-1.04）。 藥師重點：結論顯示控制手足共享因素後，孕期酸抑制藥物暴露未與子代 adhd、asd 或其他神經精神疾患風險增加相關；孕期用藥諮詢仍應避免不必要長期使用，但有適應症時不宜僅因初步觀察性關聯而自行停藥。"},{"id":"pmid-41494769","kind":"article","issueId":"2026-week02","year":2026,"week":2,"weekLabel":"第 2 週","dateRange":"2026/01/05 – 01/11","href":"2026-week02.html","title":"Oral ivermectin versus 5% permethrin cream to treat children and adults with classic scabies: multicentre, assessor blinded, cluster randomised clinical trial","journal":"BMJ","type":"RCT","typeLabel":"RCT","author":"Boralevi","doi":"10.1136/bmj-2025-086277","url":"https://doi.org/10.1136/bmj-2025-086277","summary":"藥師重點：結論顯示 口服 ivermectin 在此典型疥瘡家戶群聚試驗中未達 5% permethrin cream 的 不劣性，且 permethrin 統計上較佳；藥師衛教時仍需強調全家戶同步治療、外用藥正確塗抹與第二次療程完成。","pubDate":"2026-01-06","terms":["oral","ivermectin","permethrin","cream","treat","children","adults","classic","scabies","multicentre"],"drugTerms":[],"searchText":"oral ivermectin versus 5% permethrin cream to treat children and adults with classic scabies: multicentre, assessor blinded, cluster randomised clinical trial bmj rct boralevi 10.1136/bmj-2025-086277 研究背景：典型疥瘡治療需同時處理指標個案與家戶成員，口服 ivermectin 較方便，但相較 5% permethrin cream 是否能達到相近臨床治癒率仍不確定。 研究方法：此法國 28 家醫院進行的 多中心、評估者盲性、群集隨機試驗，納入經皮膚鏡確認疥瘡且體重 >15 kg 的成人與兒童指標個案，家戶成員原則上接受同組治療。介入為 口服 ivermectin 200 µg/kg 或 5% permethrin cream，皆於 第 0 天 與 第 10 天 使用；主要終點為 第 28 天 全家戶臨床治癒。 主要結果：ivermectin 組 142 戶、507 人，permethrin 組 147 戶、568 人；家戶層級治癒率為 71.8% vs 88.5%（percentage point 差異 -16.7，95% ci -26.3 to -7.1）。指標個案與個人層級分析亦顯示 ivermectin 較差，皮膚不良事件為 11.9% vs 15.6%。 藥師重點：結論顯示 口服 ivermectin 在此典型疥瘡家戶群聚試驗中未達 5% permethrin cream 的 不劣性，且 permethrin 統計上較佳；藥師衛教時仍需強調全家戶同步治療、外用藥正確塗抹與第二次療程完成。"},{"id":"pmid-41494781","kind":"article","issueId":"2026-week02","year":2026,"week":2,"weekLabel":"第 2 週","dateRange":"2026/01/05 – 01/11","href":"2026-week02.html","title":"Effects of lifestyle interventions in pregnancy on gestational diabetes: individual participant data and network meta-analysis","journal":"BMJ","type":"MA","typeLabel":"Meta-analysis","author":"Allotey","doi":"10.1136/bmj-2025-084159","url":"https://doi.org/10.1136/bmj-2025-084159","summary":"藥師重點：研究結果說明孕期生活型態介入可能預防妊娠糖尿病，但效果會受診斷標準與執行方式影響；藥師參與孕期照護時，可強化運動與飲食衛教、團體介入及轉介資源，同時留意低教育程度族群可能較難取得同等效益。","pubDate":"2026-01-06","terms":["lifestyle","interventions","pregnancy","gestational","diabetes","individual","participant","network","meta-analysis","allotey"],"drugTerms":[],"searchText":"effects of lifestyle interventions in pregnancy on gestational diabetes: individual participant data and network meta-analysis bmj meta-analysis allotey 10.1136/bmj-2025-084159 研究背景：孕期生活型態介入可能降低妊娠糖尿病風險，但效果是否受診斷標準、孕婦特性或介入形式影響，仍需整合個別受試者資料評估。 研究方法：此 individual participant 資料 與 network 統合分析 納入 1990 年 1 月至 2025 年 4 月的隨機試驗，評估孕期 physical activity based、diet based 或 mixed lifestyle interventions 對妊娠糖尿病的影響。主要結果包括任一標準、uk nice、iadpsg 與 modified iadpsg 定義的妊娠糖尿病，並以兩階段 ipd 統合分析 與 network 統合分析 估計效果及排名。 主要結果：共納入 104 項隨機試驗、35,993 名女性，其中 54 項提供 24,391 人 ipd。lifestyle interventions 在 ipd 試驗 中使任一標準妊娠糖尿病 勝算比 為 0.90（95% ci 0.80 to 1.02），合併 ipd 與 non-ipd 試驗 後為 0.80（95% ci 0.73 to 0.88）；以 nice 標準則未見降低（or 0.98，95% ci 0.84 to 1.13），physical activity based interventions 排名最高。 藥師重點：研究結果說明孕期生活型態介入可能預防妊娠糖尿病，但效果會受診斷標準與執行方式影響；藥師參與孕期照護時，可強化運動與飲食衛教、團體介入及轉介資源，同時留意低教育程度族群可能較難取得同等效益。"},{"id":"pmid-41500725","kind":"article","issueId":"2026-week02","year":2026,"week":2,"weekLabel":"第 2 週","dateRange":"2026/01/05 – 01/11","href":"2026-week02.html","title":"Edaravone dexborneol versus placebo on functional outcomes in patients with acute ischaemic stroke undergoing endovascular thrombectomy (TASTE-2): randomised controlled trial","journal":"BMJ","type":"RCT","typeLabel":"RCT","author":"Wang","doi":"10.1136/bmj-2025-086850","url":"https://doi.org/10.1136/bmj-2025-086850","summary":"藥師重點：結論顯示 edaravone dexborneol 用於發病 24 小時內且接受 血管內取栓 的急性缺血性中風患者，可小幅提高 90 天功能獨立比例且未增加明確安全性疑慮；解讀時需留意效果主要來自 mismatch 次族群與療程給藥時機。","pubDate":"2026-01-07","terms":["edaravone","dexborneol","placebo","functional","acute","ischaemic","stroke","undergoing","endovascular","thrombectomy"],"drugTerms":["anti-inflammatory"],"searchText":"edaravone dexborneol versus placebo on functional outcomes in patients with acute ischaemic stroke undergoing endovascular thrombectomy (taste-2): randomised controlled trial bmj rct wang 10.1136/bmj-2025-086850 研究背景：急性缺血性中風接受 血管內取栓 後仍可能有功能恢復不佳，edaravone dexborneol 具抗氧化與抗發炎作用，是否能改善 90 天功能結果需以隨機試驗確認。 研究方法：taste-2 為中國 106 家醫院進行的 多中心、雙盲、隨機、安慰劑對照 試驗，納入發病 24 小時內、18-80 歲、前循環大血管阻塞且預計接受 血管內取栓 的急性缺血性中風患者。受試者於 血管內取栓 前接受 edaravone dexborneol 37.5 mg 或 安慰劑，之後每日 2 次持續 10-14 天；主要終點為 第 90 天 modified rankin scale 0-2。 主要結果：1360 人納入 意向治療分析，第 90 天 功能獨立比例為 55.0% vs 49.6%（風險比 1.11，95% ci 1.00 to 1.23；p=0.05；風險差 5.4%）。入院時有 mismatch 的次族群效果較明顯（55.5% vs 42.9%；風險比 1.29，95% ci 1.10 to 1.52；p for interaction=0.003），嚴重不良事件 為 27.2% vs 25.7%。 藥師重點：結論顯示 edaravone dexborneol 用於發病 24 小時內且接受 血管內取栓 的急性缺血性中風患者，可小幅提高 90 天功能獨立比例且未增加明確安全性疑慮；解讀時需留意效果主要來自 mismatch 次族群與療程給藥時機。"},{"id":"pmid-41505155","kind":"article","issueId":"2026-week02","year":2026,"week":2,"weekLabel":"第 2 週","dateRange":"2026/01/05 – 01/11","href":"2026-week02.html","title":"Acetaminophen (Paracetamol) or Opioid Analgesia Added to Ibuprofen for Children's Musculoskeletal Injury: Two Randomized Clinical Trials","journal":"JAMA","type":"RCT","typeLabel":"RCT","author":"Ali","doi":"10.1001/jama.2025.25033","url":"https://doi.org/10.1001/jama.2025.25033","summary":"藥師重點：結論顯示兒童急性非手術肌肉骨骼傷害中，單次加用 acetaminophen 或 hydromorphone 未較 ibuprofen 單用 改善 60 分鐘疼痛分數；hydromorphone 不良事件較多，藥師可協助避免常規加用 opioid，並確認兒童止痛藥依體重給藥與安全上限。","pubDate":"2026-03-10","terms":["acetaminophen","paracetamol","opioid","analgesia","added","ibuprofen","children","musculoskeletal","injury","trials"],"drugTerms":[],"searchText":"acetaminophen (paracetamol) or opioid analgesia added to ibuprofen for children's musculoskeletal injury: two randomized clinical trials jama rct ali 10.1001/jama.2025.25033 研究背景：ibuprofen 是兒童肌肉骨骼疼痛常用第一線藥物，但中重度急性肢體傷害時，加用 acetaminophen 或 opioid 是否能進一步止痛仍不清楚。 研究方法：研究包含兩項加拿大 6 家兒科急診進行的 隨機、雙遮蔽、安慰劑對照 試驗，納入 6-17 歲、非手術急性肢體傷害 <24 小時且 vnrs 疼痛分數 ≥5 的兒童。opioid 試驗 比較 ibuprofen 加 hydromorphone、ibuprofen 加 acetaminophen 與 ibuprofen 單用；nonopioid 試驗 比較 ibuprofen 加 acetaminophen 與 ibuprofen 單用，主要療效終點為給藥後 60 分鐘 vnrs。 主要結果：699 人隨機分組，653 人納入療效分析；給藥後 60 分鐘平均 vnrs 為 ibuprofen 加 hydromorphone 4.8、ibuprofen 加 acetaminophen 4.6、ibuprofen 單用 4.6（p=.78）。任一不良事件在 hydromorphone 合併組為 28.2%，高於 acetaminophen 合併組 6.1% 與 ibuprofen 單用 5.8%，且未發生 嚴重不良事件。 藥師重點：結論顯示兒童急性非手術肌肉骨骼傷害中，單次加用 acetaminophen 或 hydromorphone 未較 ibuprofen 單用 改善 60 分鐘疼痛分數；hydromorphone 不良事件較多，藥師可協助避免常規加用 opioid，並確認兒童止痛藥依體重給藥與安全上限。"},{"id":"fda-2026-week02-1","kind":"fda","issueId":"2026-week02","year":2026,"week":2,"weekLabel":"第 2 週","dateRange":"2026/01/05 – 01/11","href":"2026-week02.html","title":"FDA’s Concerns with Unapproved GLP-1 Drugs Used for Weight Loss","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["concerns","unapproved","glp-1","drugs","used","weight","loss","https","drug-alerts-and-statements","fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"],"drugTerms":["glp-1"],"searchText":"fda’s concerns with unapproved glp-1 drugs used for weight loss fda drug safety 2026-06-15 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"},{"id":"fda-2026-week02-3","kind":"fda","issueId":"2026-week02","year":2026,"week":2,"weekLabel":"第 2 週","dateRange":"2026/01/05 – 01/11","href":"2026-week02.html","title":"FDA issues final decision to withdraw approval of Pepaxto (melphalan flufenamide)","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/398713","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["issues","final","decision","withdraw","approval","pepaxto","melphalan","flufenamide","https","node"],"drugTerms":[],"searchText":"fda issues final decision to withdraw approval of pepaxto (melphalan flufenamide) fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/398713"},{"id":"fda-2026-week02-2","kind":"fda","issueId":"2026-week02","year":2026,"week":2,"weekLabel":"第 2 週","dateRange":"2026/01/05 – 01/11","href":"2026-week02.html","title":"FDA alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/403159","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["alerts","caregivers","providers","cross-compatibility","issues","autoinjector","devices","that","optional","glatiramer"],"drugTerms":[],"searchText":"fda alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/403159"},{"id":"fda-2026-week02-4","kind":"fda","issueId":"2026-week02","year":2026,"week":2,"weekLabel":"第 2 週","dateRange":"2026/01/05 – 01/11","href":"2026-week02.html","title":"FDA Accepts First In Silico Drug Development Tool Under ISTAND Program to Help Predict Drug-Induced Liver Injury","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["accepts","first","silico","development","tool","under","istand","program","help","predict"],"drugTerms":[],"searchText":"fda accepts first in silico drug development tool under istand program to help predict drug-induced liver injury fda drug safety 2026-06-03 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver"},{"id":"pmid-41460638","kind":"article","issueId":"2026-week01","year":2026,"week":1,"weekLabel":"第 1 週","dateRange":"2025/12/29 – 01/04","href":"2026-week01.html","title":"Spinal Manipulation and Clinician-Supported Biopsychosocial Self-Management for Acute Back Pain: The PACBACK Randomized Clinical Trial","journal":"JAMA","type":"RCT","typeLabel":"RCT","author":"Bronfort","doi":"10.1001/jama.2025.21990","url":"https://doi.org/10.1001/jama.2025.21990","summary":"藥師重點：結論顯示醫療人員支持的身心社會自我管理可帶來統計上顯著但幅度小的失能改善，未改善疼痛強度；藥師參與下背痛照護時，可將非藥物自我管理納入衛教，但不宜將單獨脊椎操作視為優於指引導向醫療照護。","pubDate":"2026-02-10","terms":["spinal","manipulation","clinician-supported","biopsychosocial","self-management","acute","back","pain","pacback","jama"],"drugTerms":[],"searchText":"spinal manipulation and clinician-supported biopsychosocial self-management for acute back pain: the pacback randomized clinical trial jama rct bronfort 10.1001/jama.2025.21990 研究背景：下背痛受身體、心理與社會因素交互影響，但臨床治療常著重症狀緩解，較少處理病人的身心社會需求；pacback 試驗評估脊椎操作與醫療人員支持的自我管理是否能改善急性或亞急性下背痛。 研究方法：此 2 × 2 因子設計隨機臨床試驗於明尼蘇達大學與匹茲堡大學 3 個研究診所進行，納入依 start back tool 評估具中高慢性化風險的急性或亞急性下背痛成人。受試者隨機分配至脊椎操作治療、醫療人員支持的自我管理、兩者合併，或指引導向醫療照護，介入最長 8 週，主要終點為 1 年追蹤期間平均 roland-morris disability questionnaire 與疼痛強度。 主要結果：共 1000 人隨機分組，93% 完成試驗。四組在失能分數有顯著差異（p = .001），但疼痛強度無顯著差異（p = .16）；相較一般醫療照護，醫療人員支持的自我管理可降低下背痛失能（平均差 -1.2，95% ci -1.9 to -0.5），合併脊椎操作亦較低（平均差 -1.1，95% ci -1.9 to -0.3），單獨脊椎操作則未達顯著差異。 藥師重點：結論顯示醫療人員支持的身心社會自我管理可帶來統計上顯著但幅度小的失能改善，未改善疼痛強度；藥師參與下背痛照護時，可將非藥物自我管理納入衛教，但不宜將單獨脊椎操作視為優於指引導向醫療照護。"},{"id":"pmid-41467650","kind":"article","issueId":"2026-week01","year":2026,"week":1,"weekLabel":"第 1 週","dateRange":"2025/12/29 – 01/04","href":"2026-week01.html","title":"An Intravenous Brain-Penetrant Enzyme Therapy for Mucopolysaccharidosis II","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Muenzer","doi":"10.1056/NEJMoa2508681","url":"https://doi.org/10.1056/NEJMoa2508681","summary":"藥師重點：結論顯示 tividenofusp alfa 在 MPS II 受試者中常伴隨不良事件，尤其需注意輸注相關反應，即使常規給藥前預防用藥仍可能發生；heparan sulfate 下降屬早期開放性研究訊號，仍需等待進行中的隨機試驗確認臨床效益。","pubDate":"2026-01-01","terms":["intravenous","brain-penetrant","enzyme","mucopolysaccharidosis","nejm","muenzer","nejmoa2508681","tividenofusp","alfa","iduronate-2-sulfatase"],"drugTerms":[],"searchText":"an intravenous brain-penetrant enzyme therapy for mucopolysaccharidosis ii nejm original article muenzer 10.1056/nejmoa2508681 研究背景：第二型黏多醣症（mps ii）為罕見溶小體儲積疾病，會造成多系統與神經功能逐漸退化；tividenofusp alfa 將 iduronate-2-sulfatase 與工程化 transferrin 受體-binding fc domain 融合，目標是處理神經與周邊表現。 研究方法：此第 1/2 期開放標籤研究納入 18 歲以下男性 mps ii 受試者，接受每週靜脈 tividenofusp alfa 24 週，之後進入 80 週安全性延伸期與 157 週開放標籤延伸期。主要目標為安全性，次要目標包括 csf 與尿液 heparan sulfate、vineland adaptive behavior scales 及肝臟體積等中樞與周邊效果。 主要結果：共 47 名男性受試者納入；24 週主要分析時，所有人皆通報至少一項治療期間不良事件，最常見為輸注相關反應，發燒、蕁麻疹與嘔吐皆超過 40%。3 人發生嚴重治療相關不良事件，但均持續治療；csf 與尿液 heparan sulfate 較基準值分別下降 91% 與 88%，且至第 153 週仍大致維持，適應行為穩定或改善，肝臟體積則正常化或維持正常。 藥師重點：結論顯示 tividenofusp alfa 在 mps ii 受試者中常伴隨不良事件，尤其需注意輸注相關反應，即使常規給藥前預防用藥仍可能發生；heparan sulfate 下降屬早期開放性研究訊號，仍需等待進行中的隨機試驗確認臨床效益。"},{"id":"pmid-41468027","kind":"article","issueId":"2026-week01","year":2026,"week":1,"weekLabel":"第 1 週","dateRange":"2025/12/29 – 01/04","href":"2026-week01.html","title":"A Lay Health Worker-Led Symptom Intervention and Acute Care Use in Older Adults With Cancer: A Randomized Clinical Trial","journal":"JAMA","type":"RCT","typeLabel":"RCT","author":"Patel","doi":"10.1001/jama.2025.23403","url":"https://doi.org/10.1001/jama.2025.23403","summary":"藥師重點：研究結果說明由社區健康工作者主動電話評估並回報高分症狀，可能降低高齡癌症病人的急性照護使用；藥師可將此視為症狀監測與用藥調整流程的支持證據，尤其需留意疼痛、噁心、便秘與鎮靜等可介入症狀。","pubDate":"2026-02-24","terms":["worker-led","symptom","intervention","acute","older","adults","cancer","jama","patel","medicare"],"drugTerms":[],"searchText":"a lay health worker-led symptom intervention and acute care use in older adults with cancer: a randomized clinical trial jama rct patel 10.1001/jama.2025.23403 研究背景：高齡癌症病人常有症狀控制不足，若能早期辨識並介入，可能減少急診與住院等急性照護使用。 研究方法：此多中心隨機臨床試驗於加州與亞利桑那 43 家腫瘤診所進行，納入 75 歲以上、具 medicare advantage、且新診斷、復發或惡化之癌症病人。受試者 1:1 分配至常規照護加社區健康工作者電話症狀評估 12 個月，或單純常規照護；評估使用 edmonton symptom assessment system，主要結果為急診使用與住院。 主要結果：共 416 名病人，年齡中位數 82 歲，41.1% 為第 4 期疾病。症狀評估組較對照組急診使用較低（30.5% vs 47.7%；校正 or 0.47，95% ci 0.32-0.71），住院亦較低（18.5% vs 39.8%；or 0.32，95% ci 0.20-0.51），每人平均總成本少 $12,000（p = .01）。在死亡者中，症狀評估組死亡前 30 天急診使用與急性照護機構死亡也較低。 藥師重點：研究結果說明由社區健康工作者主動電話評估並回報高分症狀，可能降低高齡癌症病人的急性照護使用；藥師可將此視為症狀監測與用藥調整流程的支持證據，尤其需留意疼痛、噁心、便秘與鎮靜等可介入症狀。"},{"id":"fda-2026-week01-1","kind":"fda","issueId":"2026-week01","year":2026,"week":1,"weekLabel":"第 1 週","dateRange":"2025/12/29 – 01/04","href":"2026-week01.html","title":"FDA’s Concerns with Unapproved GLP-1 Drugs Used for Weight Loss","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["concerns","unapproved","glp-1","drugs","used","weight","loss","https","drug-alerts-and-statements","fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"],"drugTerms":["glp-1"],"searchText":"fda’s concerns with unapproved glp-1 drugs used for weight loss fda drug safety 2026-06-15 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"},{"id":"fda-2026-week01-3","kind":"fda","issueId":"2026-week01","year":2026,"week":1,"weekLabel":"第 1 週","dateRange":"2025/12/29 – 01/04","href":"2026-week01.html","title":"FDA issues final decision to withdraw approval of Pepaxto (melphalan flufenamide)","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/398713","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["issues","final","decision","withdraw"," <script>
const data = window.SEARCH_INDEX;
const records = data.records;
const issues = data.issues;
const issueById = Object.fromEntries(issues.map(issue => [issue.id, issue]));
let activeType = "all";
let selectedIssueId = issues.length ? issues[0].id : "";
const queryInput = document.querySelector("#q");
const journalSelect = document.querySelector("#journal");
const resultCount = document.querySelector("#result-count");
const resultsTitle = document.querySelector("#results-title");
const results = document.querySelector("#results");
const chips = document.querySelectorAll(".chip");
const issueCards = document.querySelectorAll(".issue-card");

function norm(value){ return (value || "").toString().trim().toLowerCase(); }
function typeClass(type){ return type === "FDA" ? "fda" : type.toLowerCase(); }
function typeMatches(record){ return activeType === "all" || record.type === activeType; }
function journalMatches(record){ return !journalSelect.value || record.journal === journalSelect.value; }
function queryMatches(record, query){ return !query || record.searchText.includes(query) || norm(record.title).includes(query); }
function isIssueOnlyView(){ return selectedIssueId && !norm(queryInput.value) && !journalSelect.value && activeType === "all"; }
function currentFilteredRecords(query){ return records.filter(record => typeMatches(record) && journalMatches(record) && queryMatches(record, query)); }
function setActiveIssueCard(issueId){
  issueCards.forEach(card => card.setAttribute("aria-pressed", String(card.dataset.issueId === issueId)));
}
function resetTypeFilter(){
  activeType = "all";
  chips.forEach(chip => chip.setAttribute("aria-pressed", String(chip.dataset.type === "all")));
}
function renderIssue(issue){
  resultsTitle.textContent = `${issue.weekLabel} 完整內容`;
  resultCount.textContent = `${issue.total} 篇｜${issue.fda} FDA`;
  results.innerHTML = `
    <div class="issue-frame-wrap">
      <iframe class="issue-frame" src="${issue.href}" title="${escapeHtml(issue.weekLabel)}完整週刊" loading="lazy"></iframe>
    </div>
  `;
}

function render(){
  const query = norm(queryInput.value);
  setActiveIssueCard(selectedIssueId);
  if (isIssueOnlyView()) {
    renderIssue(issueById[selectedIssueId]);
    return;
  }
  const filtered = currentFilteredRecords(query);
  resultsTitle.textContent = "文獻與警訊";
  resultCount.textContent = `${filtered.length} 筆`;
  if (!filtered.length) {
    results.innerHTML = `<div class="empty">沒有符合條件的結果</div>`;
    return;
  }
  results.innerHTML = filtered.map(record => `
    <article class="result-card">
      <div class="result-meta">
        <span class="tag ${typeClass(record.type)}">${record.typeLabel}</span>
        <span class="tag">${record.journal}</span>
        <span class="tag">${record.weekLabel}</span>
      </div>
      <h3>${escapeHtml(record.title)}</h3>
      <p>${escapeHtml(record.summary || "查看週刊全文取得摘要與藥師重點。")}</p>
      <div class="links">
        <a href="${record.href}">開啟週刊</a>
        ${record.url ? `<a href="${record.url}" target="_blank" rel="noopener noreferrer">原文連結</a>` : ""}
      </div>
    </article>
  `).join("");
}

function escapeHtml(value){
  return (value || "").replace(/[&<>"']/g, char => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[char]));
}

chips.forEach(chip => {
  chip.addEventListener("click", () => {
    activeType = chip.dataset.type;
    chips.forEach(item => item.setAttribute("aria-pressed", String(item === chip)));
    render();
  });
});
issueCards.forEach(card => {
  card.addEventListener("click", () => {
    queryInput.value = "";
    journalSelect.value = "";
    resetTypeFilter();
    selectedIssueId = card.dataset.issueId;
    render();
    document.querySelector(".results-panel").scrollIntoView({behavior: "smooth", block: "start"});
  });
});
queryInput.addEventListener("input", render);
journalSelect.addEventListener("change", render);
render();
</script>
