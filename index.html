:"藥師重點：target 試驗 emulation 可補足部分 RCT 不足，但目前整體僅達中等一致性；以此類證據支持用藥決策時，需回頭檢視族群定義、暴露與 結果指標 模擬品質、基礎風險平衡及資料來源限制。","pubDate":"2026-05-19","terms":["concordance","between","target","emulation","randomised","trials","meta-analysis","wang","bmj-2025-086810","medline"],"drugTerms":[],"searchText":"concordance between target trial emulation and randomised controlled trials: systematic review and meta-analysis bmj meta-analysis wang 10.1136/bmj-2025-086810 研究背景：target 試驗 emulation 常用於以觀察性資料模擬隨機試驗問題，但其結果與對應 rct 的一致性，以及哪些設計因素會影響成功程度仍需釐清。 研究方法：此 系統性回顧與統合分析 搜尋 medline、embase、scopus、psycinfo 與 web of science（2010-2025），納入明確模擬健康介入 rct 的觀察性研究。研究以 21 項預先定義的 emulation design features 評估 paired target 試驗 emulation 與 benchmarking rct 的一致性，包括 pearson correlation coefficients、standardised 差異 agreement 與 比值 of ratios。 主要結果：共納入 107 組 target 試驗 emulation-rct pairs，pearson correlation coefficient 為 0.59（95% ci 0.45-0.70），standardised 差異 agreement 為 79%（85/107），summary 比值 of ratios 為 0.96（95% ci 0.92-1.01；i2=36%）。在 63 組較接近原試驗設計的 emulations 中，一致性較高（pearson correlation coefficient 0.83；95% ci 0.73-0.89）；claims 資料、基準值 族群 characteristics 不平衡與 結果指標 emulation quality 較低者，一致性較差。 藥師重點：target 試驗 emulation 可補足部分 rct 不足，但目前整體僅達中等一致性；以此類證據支持用藥決策時，需回頭檢視族群定義、暴露與 結果指標 模擬品質、基礎風險平衡及資料來源限制。"},{"id":"pmid-42161415","kind":"article","issueId":"2026-week21","year":2026,"week":21,"weekLabel":"第 21 週","dateRange":"2026/05/18 – 05/24","href":"2026-week21.html","title":"Calcium, vitamin D, or combined supplementation to prevent fractures and falls: systematic review and meta-analysis","journal":"BMJ","type":"MA","typeLabel":"Meta-analysis","author":"Massé","doi":"10.1136/bmj-2025-088050","url":"https://doi.org/10.1136/bmj-2025-088050","summary":"藥師重點：結果不支持將 calcium 或 vitamin D 補充視為一般成人預防骨折與跌倒的主要策略；建議仍需依飲食攝取、缺乏風險、腎功能、結石或高血鈣風險，以及是否需 osteoporosis 藥物治療個別評估。","pubDate":"2026-05-20","terms":["calcium","vitamin","combined","supplementation","prevent","fractures","falls","meta-analysis","mass","bmj-2025-088050"],"drugTerms":[],"searchText":"calcium, vitamin d, or combined supplementation to prevent fractures and falls: systematic review and meta-analysis bmj meta-analysis massé 10.1136/bmj-2025-088050 研究背景：calcium、vitamin d 或兩者合併常用於預防骨折與跌倒，但對未接受 osteoporosis 藥物治療成人的實際效益仍有爭議。 研究方法：此 系統性回顧與統合分析 納入 rct，比較 calcium、vitamin d 或合併補充與 安慰劑 或未治療；受試者為 ≥18 歲且未接受 osteoporosis 藥物治療的成人。主要終點為 any fracture，次要終點包括 hip fracture、non-vertebral fracture、vertebral fracture、falling 及總跌倒次數，並以 等級 評估證據確定性。 主要結果：共納入 69 試驗、153902 人，多數為 community dwelling（87%）且非骨折或跌倒高風險（73%）。對 any fracture，calcium 的 風險比 為 0.91（95% ci 0.81-1.01；moderate certainty），vitamin d 為 1.00（95% ci 0.95-1.06；high certainty），合併補充為 0.91（95% ci 0.84-0.99；high certainty）；其他骨折與跌倒結果大多顯示 little to no effect，高風險或住宿照護族群證據有限。 藥師重點：結果不支持將 calcium 或 vitamin d 補充視為一般成人預防骨折與跌倒的主要策略；建議仍需依飲食攝取、缺乏風險、腎功能、結石或高血鈣風險，以及是否需 osteoporosis 藥物治療個別評估。"},{"id":"pmid-42167774","kind":"article","issueId":"2026-week21","year":2026,"week":21,"weekLabel":"第 21 週","dateRange":"2026/05/18 – 05/24","href":"2026-week21.html","title":"CRT-Estimands Framework: consensus based extension of the ICH E9(R1) addendum for cluster randomised trials","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"Kahan","doi":"10.1136/bmj-2025-089050","url":"https://doi.org/10.1136/bmj-2025-089050","summary":"藥師重點：此文不是個別藥物療效研究，但可協助藥師閱讀 cluster 試驗 時確認 estimand 是否對應臨床問題；在解讀用藥、照護流程或政策介入研究時，應留意隨機化單位、干預層級與 intercurrent 事件 的處理方式。","pubDate":"2026-05-21","terms":["crt-estimands","framework","consensus","extension","addendum","cluster","randomised","trials","kahan","bmj-2025-089050"],"drugTerms":[],"searchText":"crt-estimands framework: consensus based extension of the ich e9(r1) addendum for cluster randomised trials bmj original article kahan 10.1136/bmj-2025-089050 研究背景：ich e9(r1) addendum 提供 estimands 架構以明確定義臨床試驗欲估計的治療效果，但原架構主要聚焦 individually 隨機試驗s；群集隨機試驗s 因隨機化單位為群體，需更清楚描述研究問題與估計目標。 研究方法：本文為 consensus based methodological article，發展 crt-estimands framework 作為 ich e9(r1) addendum 在 群集隨機試驗s 的延伸。文章以屬性、解釋與範例說明如何定義 cluster 試驗 的 estimands，目標是提升研究問題與試驗結果解讀的一致性。 主要結果：crt-estimands framework 要求研究者在 群集隨機試驗s 中清楚描述估計目標相關屬性，包含群體與個人層級的介入、intercurrent 事件、結果指標、族群 與 治療 effect 描述。採用此架構可使 clinicians、patients 與 policy makers 更容易判斷試驗結果是否符合其決策問題。 藥師重點：此文不是個別藥物療效研究，但可協助藥師閱讀 cluster 試驗 時確認 estimand 是否對應臨床問題；在解讀用藥、照護流程或政策介入研究時，應留意隨機化單位、干預層級與 intercurrent 事件 的處理方式。"},{"id":"pmid-42149992","kind":"article","issueId":"2026-week21","year":2026,"week":21,"weekLabel":"第 21 週","dateRange":"2026/05/18 – 05/24","href":"2026-week21.html","title":"Azithromycin for Preschoolers with Wheezing in the Emergency Department","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Denninghoff","doi":"10.1056/NEJMoa2516505","url":"https://doi.org/10.1056/NEJMoa2516505","summary":"藥師重點：結果不支持對急診中重度喘鳴的學齡前兒童常規使用 azithromycin 以降低症狀嚴重度；藥師應協助抗生素 stewardship，確認是否有明確細菌感染證據，並留意 macrolide 不良反應與抗藥性風險。","pubDate":"2026-05-18","terms":["azithromycin","preschoolers","wheezing","emergency","department","nejm","denninghoff","nejmoa2516505","illnesses","recurrent"],"drugTerms":["azithromycin"],"searchText":"azithromycin for preschoolers with wheezing in the emergency department nejm original article denninghoff 10.1056/nejmoa2516505 研究背景：學齡前兒童 wheezing illnesses 是住院常見原因，臨床上常使用抗生素；既有觀察性研究發現 recurrent wheezing 兒童鼻咽檢體較常分離出 streptococcus pneumoniae、moraxella catarrhalis 與 haemophilus influenzae。 研究方法：此多中心試驗納入 18-59 個月、因 moderate-to-重度 急性 wheezing 至急診就醫的兒童，隨機接受 azithromycin 12 mg/kg 每日一次 或 安慰劑，共 5 天。主要終點為 5 天 asthma flare-up diary for young children（adyc）總分，並分別於 pathogenic bacteria 陽性 世代 與 negative 世代 評估；次要終點包括急診停留時間、住院時間，以及 72 小時內再急診或住院。 主要結果：840 名兒童隨機分派，其中 521 人 pathogenic bacteria 陽性；試驗在期中分析後因 futility 停止。adyc score 在 陽性 世代 中 azithromycin 與 安慰劑 無顯著差異（中位數 9.59 vs 9.72；p=0.70），negative 世代 亦無差異（中位數 9.30 vs 9.10；p=0.69）；陽性 世代 中 bacterial clearance 為 58.7% vs 11.4%，但次要臨床結果、bacterial resistance 發展與 不良事件 大致相似。 藥師重點：結果不支持對急診中重度喘鳴的學齡前兒童常規使用 azithromycin 以降低症狀嚴重度；藥師應協助抗生素 stewardship，確認是否有明確細菌感染證據，並留意 macrolide 不良反應與抗藥性風險。"},{"id":"pmid-42150112","kind":"article","issueId":"2026-week21","year":2026,"week":21,"weekLabel":"第 21 週","dateRange":"2026/05/18 – 05/24","href":"2026-week21.html","title":"4% Tetrasodium EDTA to Prevent Central Venous Access Device-Associated Complications: A Randomized Clinical Trial","journal":"JAMA","type":"RCT","typeLabel":"RCT","author":"Ornowska","doi":"10.1001/jama.2026.6025","url":"https://doi.org/10.1001/jama.2026.6025","summary":"藥師重點：4% t-EDTA lock 可降低 ICU 成人 CVAD 相關複合事件，主要訊號來自減少需 alteplase 的阻塞；導入前需確認院內 lock solution 濃度、管路相容性、透析管路例外流程與調製給藥安全。","pubDate":"2026-06-23","terms":["tetrasodium","edta","prevent","central","venous","access","device-associated","complications","jama","ornowska"],"drugTerms":[],"searchText":"4% tetrasodium edta to prevent central venous access device-associated complications: a randomized clinical trial jama rct ornowska 10.1001/jama.2026.6025 研究背景：cvad 可能造成 catheter-associated bloodstream infection、catheter 阻塞 與 catheter-related venous thrombosis；4% tetrasodium edta 具抗凝血、抗菌與抗 biofilm 特性，可作為未使用管腔的 locking fluid。 研究方法：此 實務型、triple-blind、多中心、cluster-隨機 crossover 試驗 於加拿大 6 家醫院 icu 進行，納入 18 歲以上、已有 cvad 且至少 1 個 lumen 未使用的患者。icu 在 3.5 個月期間使用 2.5 ml 4% t-edta 或 control locking fluid（saline 或 hemodialysis lines 使用 4% citrate），之後 crossover；主要終點為 cvad-associated bloodstream infection、需 alteplase 的 catheter 阻塞，或因 阻塞 移除 catheter 的 複合 incidence 比率。 主要結果：分析納入 1468 人，t-edta 組 696 人、control 組 772 人。主要複合終點發生率為 13.1 vs 19.9 per 1000 catheter-天（74 vs 126 事件），校正 比率 比值 0.68（95% ci 0.47-0.96；p=.03）；個別組成中，僅需 alteplase 的 cvad 阻塞 明顯較低（66 vs 112 事件；比率 比值 0.66；95% ci 0.46-0.96）。 藥師重點：4% t-edta lock 可降低 icu 成人 cvad 相關複合事件，主要訊號來自減少需 alteplase 的阻塞；導入前需確認院內 lock solution 濃度、管路相容性、透析管路例外流程與調製給藥安全。"},{"id":"fda-2026-week21-1","kind":"fda","issueId":"2026-week21","year":2026,"week":21,"weekLabel":"第 21 週","dateRange":"2026/05/18 – 05/24","href":"2026-week21.html","title":"FDA’s Concerns with Unapproved GLP-1 Drugs Used for Weight Loss","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss","summary":"FDA 提醒未經核准的 GLP-1 減重產品可能涉及成分、品質、劑量與安全性風險。藥師應確認病人取得的是 FDA 核准產品，避免使用來源不明或複方調製的 semaglutide/tirzepatide 類產品，並加強低血糖、胃腸道不良反應與劑量錯誤衛教。","terms":["concerns","unapproved","glp-1","drugs","used","weight","loss","semaglutide","tirzepatide","https"],"drugTerms":["glp-1","semaglutide","tirzepatide"],"searchText":"fda’s concerns with unapproved glp-1 drugs used for weight loss fda drug safety 2026-06-15 fda 提醒未經核准的 glp-1 減重產品可能涉及成分、品質、劑量與安全性風險。藥師應確認病人取得的是 fda 核准產品，避免使用來源不明或複方調製的 semaglutide/tirzepatide 類產品，並加強低血糖、胃腸道不良反應與劑量錯誤衛教。 https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"},{"id":"fda-2026-week21-3","kind":"fda","issueId":"2026-week21","year":2026,"week":21,"weekLabel":"第 21 週","dateRange":"2026/05/18 – 05/24","href":"2026-week21.html","title":"FDA issues final decision to withdraw approval of Pepaxto (melphalan flufenamide)","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/398713","summary":"FDA 已作成撤回 Pepaxto (melphalan flufenamide) 核准的最終決定。藥師應確認院內與病人用藥清單是否仍有相關品項，避免新開立或續用，並協助腫瘤團隊轉換替代治療。","terms":["issues","final","decision","withdraw","approval","pepaxto","melphalan","flufenamide","https","node"],"drugTerms":[],"searchText":"fda issues final decision to withdraw approval of pepaxto (melphalan flufenamide) fda drug safety  fda 已作成撤回 pepaxto (melphalan flufenamide) 核准的最終決定。藥師應確認院內與病人用藥清單是否仍有相關品項，避免新開立或續用，並協助腫瘤團隊轉換替代治療。 https://www.fda.gov/node/398713"},{"id":"fda-2026-week21-2","kind":"fda","issueId":"2026-week21","year":2026,"week":21,"weekLabel":"第 21 週","dateRange":"2026/05/18 – 05/24","href":"2026-week21.html","title":"FDA alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/403159","summary":"FDA 提醒 glatiramer acetate injection 的選配 autoinjector device 可能有交叉相容性問題。藥師調劑或衛教時應確認藥品廠牌、注射器與 autoinjector 是否相容，避免病人沿用不適配裝置造成注射失敗或劑量問題。","terms":["alerts","caregivers","providers","cross-compatibility","issues","autoinjector","devices","that","optional","glatiramer"],"drugTerms":[],"searchText":"fda alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection fda drug safety  fda 提醒 glatiramer acetate injection 的選配 autoinjector device 可能有交叉相容性問題。藥師調劑或衛教時應確認藥品廠牌、注射器與 autoinjector 是否相容，避免病人沿用不適配裝置造成注射失敗或劑量問題。 https://www.fda.gov/node/403159"},{"id":"fda-2026-week21-4","kind":"fda","issueId":"2026-week21","year":2026,"week":21,"weekLabel":"第 21 週","dateRange":"2026/05/18 – 05/24","href":"2026-week21.html","title":"FDA Accepts First In Silico Drug Development Tool Under ISTAND Program to Help Predict Drug-Induced Liver Injury","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver","summary":"FDA 接受第一個 ISTAND program 下的 in silico drug development tool，用於協助預測 drug-induced liver injury。此為藥物研發與安全評估工具訊息，藥師可關注 DILI 風險預測方法進展，但臨床用藥仍需依仿單、肝功能監測與病人風險因子判讀。","terms":["accepts","first","silico","development","tool","under","istand","program","help","predict"],"drugTerms":[],"searchText":"fda accepts first in silico drug development tool under istand program to help predict drug-induced liver injury fda drug safety 2026-06-03 fda 接受第一個 istand program 下的 in silico drug development tool，用於協助預測 drug-induced liver injury。此為藥物研發與安全評估工具訊息，藥師可關注 dili 風險預測方法進展，但臨床用藥仍需依仿單、肝功能監測與病人風險因子判讀。 https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver"},{"id":"pmid-42119587","kind":"article","issueId":"2026-week20","year":2026,"week":20,"weekLabel":"第 20 週","dateRange":"2026/05/11 – 05/17","href":"2026-week20.html","title":"Tirzepatide for maintenance of bodyweight reduction in people with obesity in the USA (SURMOUNT-MAINTAIN): a multicentre, double-blind, randomised, placebo-controlled trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Horn","doi":"10.1016/S0140-6736(26)00656-2","url":"https://doi.org/10.1016/S0140-6736(26)00656-2","summary":"藥師重點：tirzepatide 停用後體重回升明顯，持續 MTD 維持效果最佳，降至 5 mg 可能作為不中斷治療的替代策略；藥師需追蹤胃腸道耐受性、劑量調整、復胖幅度與病人長期治療期待。","pubDate":"2026-06-06","terms":["tirzepatide","maintenance","bodyweight","reduction","people","obesity","surmount-maintain","multicentre","double-blind","randomised"],"drugTerms":["tirzepatide"],"searchText":"tirzepatide for maintenance of bodyweight reduction in people with obesity in the usa (surmount-maintain): a multicentre, double-blind, randomised, placebo-controlled trial lancet rct horn 10.1016/s0140-6736(26)00656-2 研究背景：肥胖治療後體重維持對長期健康與生活品質重要，但停用藥物後常有復胖；surmount-maintain 評估 tirzepatide mtd 持續治療、降至 5 mg 或改 安慰劑 對體重維持的影響。 研究方法：此 第 3 期b 安慰劑對照 試驗 共 112 週，包含 60 週 開放標籤 weight-loss period 與 52 週 雙盲 maintenance period，於美國 20 個中心進行。完成 once 每週 subcutaneous tirzepatide mtd（10 mg 或 15 mg）初始減重後，bmi ≥30 kg/m2 或 bmi ≥27 kg/m2 且有體重相關共病的成人，3:3:2 隨機分派至持續 mtd、降至 tirzepatide 5 mg 或 安慰劑；主要終點為 基準值 至 week 112 的 bodyweight percentage change。 主要結果：441 人進入初始期，378 人於 week 60 隨機分派；week 112 相對 基準值 體重變化為 mtd -21.9%（95% ci -23.5 to -20.3）、tirzepatide 5 mg -16.6%（95% ci -18.0 to -15.1）、安慰劑 -9.9%（95% ci -11.1 to -8.8），與 安慰劑 比較皆 p<0.0001。因復胖超過 50% 而接受 rescue 治療 者為 8%、25%、67%；tirzepatide 最常見 不良事件 為多屬輕中度且多發生於劑量調整期的 gastrointestinal 事件。 藥師重點：tirzepatide 停用後體重回升明顯，持續 mtd 維持效果最佳，降至 5 mg 可能作為不中斷治療的替代策略；藥師需追蹤胃腸道耐受性、劑量調整、復胖幅度與病人長期治療期待。"},{"id":"pmid-42114550","kind":"article","issueId":"2026-week20","year":2026,"week":20,"weekLabel":"第 20 週","dateRange":"2026/05/11 – 05/17","href":"2026-week20.html","title":"Ticagrelor with aspirin dual antiplatelet therapy combined with intravenous thrombolysis in patients with ischaemic stroke in China (TAPIS): a multicentre, double-blind, randomised controlled trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Wang","doi":"10.1016/S0140-6736(26)00757-9","url":"https://doi.org/10.1016/S0140-6736(26)00757-9","summary":"藥師重點：中度缺血性中風 thrombolysis 後早期 DAPT 可能提升 90 天良好功能結果，但 有症狀 顱內出血 的 CI 較寬，不能排除小幅增加風險；藥師需協助確認溶栓時間、抗血小板起始時點與顱內出血監測。","pubDate":"2026-05-16","terms":["ticagrelor","aspirin","dual","antiplatelet","combined","intravenous","thrombolysis","ischaemic","stroke","china"],"drugTerms":[],"searchText":"ticagrelor with aspirin dual antiplatelet therapy combined with intravenous thrombolysis in patients with ischaemic stroke in china (tapis): a multicentre, double-blind, randomised controlled trial lancet rct wang 10.1016/s0140-6736(26)00757-9 研究背景：急性缺血性中風接受 intravenous thrombolysis 後，早期加入口服 dapt 的效益與出血風險仍未定論；tapis 評估發病 6 小時內 aspirin 加 ticagrelor 的輔助效果。 研究方法：tapis 為中國 60 家醫院進行的 隨機、雙盲、安慰劑對照 試驗，收錄接受 intravenous thrombolysis、nihss score 4-10 的缺血性中風患者。患者 1:1 接受 aspirin 加上 ticagrelor 或 安慰劑，於發病 6 小時內、thrombolysis 前中後皆可起始；ticagrelor 或 安慰劑 持續至 第 7 天，兩組 第 2 天-90 皆 開放標籤 aspirin，主要療效終點為 90 天 modified rankin scale score 0-1。 主要結果：1382 人隨機分派至 early dapt 690 人或 安慰劑 692 人。90 天 excellent functional 結果指標 為 68.7% vs 62.0%（風險比 1.11，95% ci 1.03-1.20；p=0.0089）；36 小時內 有症狀 顱內出血 為 0.9% vs 0.7%（風險比 1.20，95% ci 0.37-3.93；p=0.76）。 藥師重點：中度缺血性中風 thrombolysis 後早期 dapt 可能提升 90 天良好功能結果，但 有症狀 顱內出血 的 ci 較寬，不能排除小幅增加風險；藥師需協助確認溶栓時間、抗血小板起始時點與顱內出血監測。"},{"id":"pmid-42127391","kind":"article","issueId":"2026-week20","year":2026,"week":20,"weekLabel":"第 20 週","dateRange":"2026/05/11 – 05/17","href":"2026-week20.html","title":"Telitacicept for IgA Nephropathy - Interim Analysis of a Phase 3 Trial","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Lv","doi":"10.1056/NEJMoa2514415","url":"https://doi.org/10.1056/NEJMoa2514415","summary":"藥師重點：telitacicept 在高進展風險 IgA nephropathy 可明顯降低蛋白尿，且期中資料未出現新的安全性訊號；用藥評估仍需追蹤感染風險、免疫相關不良反應與較長期 eGFR 結果。","pubDate":"2026-05-14","terms":["telitacicept","nephropathy","interim","phase","nejm","nejmoa2514415","baff","april","biopsy-proven","proteinuria"],"drugTerms":[],"searchText":"telitacicept for iga nephropathy - interim analysis of a phase 3 trial nejm rct lv 10.1056/nejmoa2514415 研究背景：iga nephropathy 的進展與 baff、april 相關，telitacicept 可同時中和 baff 與 april，可能降低持續蛋白尿與疾病進展風險。 研究方法：此研究為預先規劃期中分析的 多中心、雙盲、隨機、安慰劑對照 第 3 期試驗，收錄 biopsy-proven iga nephropathy 且在支持治療後仍有 proteinuria ≥1.0 g/day 的成人。患者 1:1 接受 telitacicept 240 mg subcutaneous once 每週 或 安慰劑，主要終點為 week 39 相對基線的 24-hour urinary protein-to-creatinine 比值 幾何平均比值，並評估安全性。 主要結果：共 318 人隨機分派，每組 159 人；week 39 的 24-hour urinary protein-to-creatinine 比值 變化為 telitacicept -58.9% vs 安慰劑 -8.8%，相對差異 -55.0%（95% ci -61.3 to -47.6；p<0.001）。egfr 相對基線變化為 -1.0% vs -7.7%；不良事件 較常見於 telitacicept（89.3% vs 78.6%），但 嚴重不良事件 較少（2.5% vs 8.2%），未見非預期安全性訊號。 藥師重點：telitacicept 在高進展風險 iga nephropathy 可明顯降低蛋白尿，且期中資料未出現新的安全性訊號；用藥評估仍需追蹤感染風險、免疫相關不良反應與較長期 egfr 結果。"},{"id":"pmid-42134355","kind":"article","issueId":"2026-week20","year":2026,"week":20,"weekLabel":"第 20 週","dateRange":"2026/05/11 – 05/17","href":"2026-week20.html","title":"Quantifying relative health impact across Gavi, the Vaccine Alliance's portfolio in 117 countries at the subregional level: a modelling study","journal":"Lancet","type":"OA","typeLabel":"Original Article","author":"Gaythorpe","doi":"10.1016/S0140-6736(26)00555-6","url":"https://doi.org/10.1016/S0140-6736(26)00555-6","summary":"藥師重點：疫苗 impact ratios 可作為免疫政策規劃與資源配置的輔助指標，但不應單獨決定疫苗優先順序；仍需合併疾病負擔、接種可近性、成本、供應與地方流行病學資料。","pubDate":"2026-05-16","terms":["quantifying","relative","impact","across","gavi","vaccine","alliance","portfolio","countries","subregional"],"drugTerms":[],"searchText":"quantifying relative health impact across gavi, the vaccine alliance's portfolio in 117 countries at the subregional level: a modelling study lancet original article gaythorpe 10.1016/s0140-6736(26)00555-6 研究背景：在醫療資源受限下，各疫苗對死亡與 disability-校正 life-years 的相對影響可協助國家免疫計畫排序；本研究估計 gavi 支持疫苗組合在 117 個 low-income and middle-income countries 的 疫苗 impact ratios。 研究方法：此 modelling 研究 使用 疫苗 impact modelling consortium 模型，定義 疫苗 impact 比值 為每 1000 vaccinations 可避免的 deaths 或 disability-校正 life-years。模型採標準化人口資料與疫苗覆蓋率假設，包含 no-vaccination counterfactual，並納入 structural、parameter 與 stochastic uncertainty；分析 2000-2030 年接種（cholera 為 2000-2040 年）的 14 種 疫苗-preventable diseases。 主要結果：整體估計 human papillomavirus 疫苗 每 1000 vaccinations 可避免 deaths 最高（11.24，95% uncertainty 區間 10.88-11.64），其次為 measles 疫苗（6.09，4.90-7.07）。其他疫苗的 impact ratios 依 subregion 與 immunisation activity type 而異，且因不確定性範圍重疊，疫苗間排序需保守解讀。 藥師重點：疫苗 impact ratios 可作為免疫政策規劃與資源配置的輔助指標，但不應單獨決定疫苗優先順序；仍需合併疾病負擔、接種可近性、成本、供應與地方流行病學資料。"},{"id":"pmid-42128454","kind":"article","issueId":"2026-week20","year":2026,"week":20,"weekLabel":"第 20 週","dateRange":"2026/05/11 – 05/17","href":"2026-week20.html","title":"Prophylactic tranexamic acid for the prevention of postpartum haemorrhage in women with placenta praevia: multicentre, double blind, randomised, placebo controlled, phase 3 trial","journal":"BMJ","type":"RCT","typeLabel":"RCT","author":"Zhang","doi":"10.1136/bmj-2026-089636","url":"https://doi.org/10.1136/bmj-2026-089636","summary":"藥師重點：tranexamic acid 1 g 作為 placenta praevia 剖腹產且已使用 oxytocin 的輔助預防，可小幅降低 postpartum haemorrhage；藥師需確認給藥時點、血栓風險與腎功能等禁忌或慎用條件。","pubDate":"2026-05-13","terms":["prophylactic","tranexamic","acid","prevention","postpartum","haemorrhage","women","placenta","praevia","multicentre"],"drugTerms":[],"searchText":"prophylactic tranexamic acid for the prevention of postpartum haemorrhage in women with placenta praevia: multicentre, double blind, randomised, placebo controlled, phase 3 trial bmj rct zhang 10.1136/bmj-2026-089636 研究背景：placenta praevia 剖腹產婦女有較高 postpartum haemorrhage 風險，預防性 tranexamic acid 是否能在 oxytocin 基礎上進一步減少出血仍需大型試驗確認。 研究方法：此研究為中國 24 個產科單位進行的隨機、雙盲、安慰劑對照 第 3 期試驗，收錄 1732 名 placenta praevia 且接受 caesarean delivery 的婦女。受試者在臍帶夾閉後 5 分鐘內接受 prophylactic oxytocin，並靜脈輸注 tranexamic acid 1 g 或 安慰劑；主要終點為估算失血量 ≥1000 ml 或產後 2 天內輸注紅血球。 主要結果：主要終點資料可評估率為 99.8%（1691/1694），placenta accreta spectrum 佔 17.9%。postpartum haemorrhage 發生率為 tranexamic acid 29.7% vs 安慰劑 35.1%（相對風險 0.85，95.2% ci 0.75 to 0.96；p=0.01）；嚴重不良事件 兩組皆為 0.5%（相對風險 1.01，95% ci 0.25 to 4.00）。 藥師重點：tranexamic acid 1 g 作為 placenta praevia 剖腹產且已使用 oxytocin 的輔助預防，可小幅降低 postpartum haemorrhage；藥師需確認給藥時點、血栓風險與腎功能等禁忌或慎用條件。"},{"id":"pmid-42126852","kind":"article","issueId":"2026-week20","year":2026,"week":20,"weekLabel":"第 20 週","dateRange":"2026/05/11 – 05/17","href":"2026-week20.html","title":"Pragmatic Parental Support to Mitigate Burnout Among Pregnant and Postpartum Trainees: A Randomized Clinical Trial","journal":"JAMA","type":"RCT","typeLabel":"RCT","author":"Rubio-Chavez","doi":"10.1001/jama.2026.5663","url":"https://doi.org/10.1001/jama.2026.5663","summary":"藥師重點：此研究屬職場支持介入，顯示結構化 parental support package 可減少產後 burnout 增幅；對醫療團隊管理的意義在於支持方案需涵蓋實際育兒、哺乳與 mentorship，而非僅靠個人調適。","pubDate":"2026-06-09","terms":["pragmatic","parental","support","mitigate","burnout","pregnant","postpartum","trainees","jama","rubio-chavez"],"drugTerms":[],"searchText":"pragmatic parental support to mitigate burnout among pregnant and postpartum trainees: a randomized clinical trial jama rct rubio-chavez 10.1001/jama.2026.5663 研究背景：醫師訓練期間的 occupational burnout 會影響照護品質、留任與健康，懷孕與產後 trainees 因職場支持不足與家庭角色轉換而風險較高。 研究方法：此 實務型、隨機、controlled、parallel-group 臨床 試驗 於美國東北部 7 個訓練機構進行，收錄懷孕 ≥12 週的 residents 與 fellows，排除 nonbirthing parents。156 名受試者 1:1 分派至 parental support package 或 usual support；介入包含 smart bassinet、wearable breast pump、virtual perinatal support 與 faculty mentorship，主要終點為懷孕期間至產後 24 週 stanford professional fulfillment index burnout 分數變化。 主要結果：143 人納入主要分析，中位數 age 32 years。burnout score 變化在 parental support package 組為 2.96 至 3.03，usual support 組為 3.13 至 3.79（校正 between-group 差異 in change -0.58，95% ci -1.10 to -0.07；p=.03；d=0.65）；差異主要來自 interpersonal disengagement（-0.70，95% ci -1.24 to -0.15；p=.01），emotional exhaustion 未達統計顯著差異。 藥師重點：此研究屬職場支持介入，顯示結構化 parental support package 可減少產後 burnout 增幅；對醫療團隊管理的意義在於支持方案需涵蓋實際育兒、哺乳與 mentorship，而非僅靠個人調適。"},{"id":"pmid-42127296","kind":"article","issueId":"2026-week20","year":2026,"week":20,"weekLabel":"第 20 週","dateRange":"2026/05/11 – 05/17","href":"2026-week20.html","title":"Neuroepithelial Tumor with AAV Integration after Intracisternal Magna Vector Delivery","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Ahrens-Nicklas","doi":"10.1056/NEJMoa2601608","url":"https://doi.org/10.1056/NEJMoa2601608","summary":"藥師重點：此個案提供 AAV gene 治療 後罕見腫瘤與 vector integration 的安全性訊號；藥師在基因治療追蹤中需重視長期腫瘤監測、神經學變化通報與個案層級風險溝通。","pubDate":"2026-06-04","terms":["neuroepithelial","tumor","integration","intracisternal","magna","vector","delivery","nejm","ahrens-nicklas","nejmoa2601608"],"drugTerms":[],"searchText":"neuroepithelial tumor with aav integration after intracisternal magna vector delivery nejm original article ahrens-nicklas 10.1056/nejmoa2601608 研究背景：recombinant adeno-associated virus (aav) vectors 多數不整合入基因體，但 neonatal murine models 曾顯示罕見 genomic integration 可能與 oncogenesis 相關。 研究方法：本文報告 1 名 重度 mucopolysaccharidosis type i (mpsi, hurler subtype) 5 歲男童，在接受 intracisternal magna aav serotype 9 gene 治療 4 年後發生 neuroepithelial tumor，並進行腫瘤切除與分子分析。 主要結果：患者 主要 tumor 成功切除，術後仍保有優於年齡的 advanced cognitive function，顯示 mpsi 可能獲得緩解。腫瘤分子分析發現 rearranged aav vector elements clonal integration 至 plag1，並表現 chimeric aav-plag1 transcript。 藥師重點：此個案提供 aav gene 治療 後罕見腫瘤與 vector integration 的安全性訊號；藥師在基因治療追蹤中需重視長期腫瘤監測、神經學變化通報與個案層級風險溝通。"},{"id":"pmid-42107373","kind":"article","issueId":"2026-week20","year":2026,"week":20,"weekLabel":"第 20 週","dateRange":"2026/05/11 – 05/17","href":"2026-week20.html","title":"Impact of introducing RTS,S/AS01E malaria vaccine on mortality in young children in Ghana, Kenya, and Malawi: an observational evaluation of a cluster-randomised implementation programme","journal":"Lancet","type":"OA","typeLabel":"Original Article","author":"Mwapasa","doi":"10.1016/S0140-6736(26)00248-5","url":"https://doi.org/10.1016/S0140-6736(26)00248-5","summary":"藥師重點：RTS,S 導入 routine immunisation programme 與幼兒死亡率下降相關，效果約為避免八分之一死亡，但第 4 劑 uptake 偏低；疫苗政策與衛教應強調完整接種時程、地區瘧疾負擔與持續監測。","pubDate":"2026-05-09","terms":["impact","introducing","as01e","malaria","vaccine","mortality","young","children","ghana","kenya"],"drugTerms":[],"searchText":"impact of introducing rts,s/as01e malaria vaccine on mortality in young children in ghana, kenya, and malawi: an observational evaluation of a cluster-randomised implementation programme lancet original article mwapasa 10.1016/s0140-6736(26)00248-5 研究背景：rts,s/as01e malaria 疫苗 已納入多個 sub-saharan african countries 兒童免疫計畫，是否能降低幼兒死亡率是公共衛生推動的重要依據。 研究方法：此研究為 ghana、kenya 與 malawi 的 cluster-隨機 implementation programme 觀察性評估，158 個行政單位 cluster 1:1 分配為 2019 年導入 rts,s 或延後導入。rts,s 採 4 劑時程，主要評估符合接種 3 劑資格兒童的非傷害性 all-cause post-neonatal 死亡率，並追蹤 重度 malaria admissions、疫苗 uptake 與安全性，總評估期間 46 個月。 主要結果：46 個月期間，第 1、2、3、4 劑 rts,s 接種人數分別為 1,289,504、1,158,850、1,068,039 與 436,527；2022 年 coverage 為第 1 劑 82.8%、第 3 劑 71.1%、第 4 劑 39.9%。符合第 3 劑資格兒童中，排除 injury 的死亡為導入區 5576 例 vs 比較區 6152 例，死亡率 比率 比值 0.87（95% ci 0.77-0.97；p=0.016）。 藥師重點：rts,s 導入 routine immunisation programme 與幼兒死亡率下降相關，效果約為避免八分之一死亡，但第 4 劑 uptake 偏低；疫苗政策與衛教應強調完整接種時程、地區瘧疾負擔與持續監測。"},{"id":"pmid-42127390","kind":"article","issueId":"2026-week20","year":2026,"week":20,"weekLabel":"第 20 週","dateRange":"2026/05/11 – 05/17","href":"2026-week20.html","title":"Ensitrelvir for Covid-19 Postexposure Prophylaxis in Household Contacts","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Hayden","doi":"10.1056/NEJMoa2509306","url":"https://doi.org/10.1056/NEJMoa2509306","summary":"藥師重點：ensitrelvir 於家戶暴露後 72 小時內短期給藥可降低接觸者發病風險；實務上需確認當地核准適應症、起始時間窗、CYP 相關交互作用與高風險族群優先性。","pubDate":"2026-05-14","terms":["ensitrelvir","covid-19","postexposure","prophylaxis","household","contacts","nejm","hayden","nejmoa2509306","sars-cov-2"],"drugTerms":["ensitrelvir"],"searchText":"ensitrelvir for covid-19 postexposure prophylaxis in household contacts nejm rct hayden 10.1056/nejmoa2509306 研究背景：ensitrelvir 為口服 sars-cov-2 3c-like protease 抑制劑，已於日本用於 mild-to-moderate covid-19；covid-19 家戶接觸者暴露後預防仍缺乏核准抗病毒藥物選項。 研究方法：此研究為 雙盲、隨機、安慰劑對照 試驗，收錄 sars-cov-2 檢測陰性、但為 covid-19 index patient 家戶接觸者的受試者。受試者在 index patient 症狀開始 72 小時內接受 ensitrelvir（第 1 天 375 mg，天 2-5 125 mg 每日）或 安慰劑；主要終點為 第 10 天 前出現實驗室確認且症狀持續 ≥48 小時的 covid-19。 主要結果：modified intention-to-treat 族群 包含 ensitrelvir 1030 人與 安慰劑 1011 人，平均年齡 42.4 歲，37.0% 至少有 1 項 重度 covid-19 risk factor。covid-19 發生率為 2.9% vs 9.0%（風險比 0.33，95% ci 0.22 to 0.49；p<0.001）；不良事件 為 15.1% vs 15.5%，嚴重不良事件 兩組皆 0.2%，無 covid-19 相關住院或死亡。 藥師重點：ensitrelvir 於家戶暴露後 72 小時內短期給藥可降低接觸者發病風險；實務上需確認當地核准適應症、起始時間窗、cyp 相關交互作用與高風險族群優先性。"},{"id":"pmid-42107374","kind":"article","issueId":"2026-week20","year":2026,"week":20,"weekLabel":"第 20 週","dateRange":"2026/05/11 – 05/17","href":"2026-week20.html","title":"Enpatoran, a Toll-like receptor 7/8 inhibitor, in moderate-to-severe systemic lupus erythematosus: findings from Cohort B of a multicentre, international, double-blind, placebo-controlled dose-finding phase 2 trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Morand","doi":"10.1016/S0140-6736(26)00463-0","url":"https://doi.org/10.1016/S0140-6736(26)00463-0","summary":"藥師重點：enpatoran 在中重度 SLE 顯示 BICLA 反應 改善訊號，但未證實明確劑量反應；若後續納入治療討論，需留意疾病活動度評估、glucocorticoid tapering 背景與長期安全性資料仍待確認。","pubDate":"2026-05-09","terms":["enpatoran","toll-like","receptor","inhibitor","moderate-to-severe","systemic","lupus","erythematosus","findings","from"],"drugTerms":[],"searchText":"enpatoran, a toll-like receptor 7/8 inhibitor, in moderate-to-severe systemic lupus erythematosus: findings from cohort b of a multicentre, international, double-blind, placebo-controlled dose-finding phase 2 trial lancet rct morand 10.1016/s0140-6736(26)00463-0 研究背景：tlr7/8 會活化先天與後天免疫反應，與 systemic lupus erythematosus (sle) 致病機轉有關；willow 世代 b 評估口服 tlr7/8 抑制劑 enpatoran 用於中重度活動性 sle 的效果。 研究方法：此研究為多國、多中心、隨機、雙盲、安慰劑對照、dose-finding 第 2 期 試驗，收錄 18-75 歲、病程至少 6 個月且用藥穩定的中重度 sle 患者。受試者接受 enpatoran 25 mg、50 mg、100 mg 或 安慰劑 每日兩次 24 週，主要評估 week 24 的 bicla 反應 dose-反應 relationship，並追蹤不良事件。 主要結果：世代 b safety 族群 共 354 人；week 24 未達成 bicla 反應 具統計顯著 dose-反應 的主要目標（p=0.14）。各劑量 bicla 反應 皆高於 安慰劑（25 mg 58%，or 2.2，95% ci 1.1-4.0；50 mg 49%，or 1.5，95% ci 0.8-2.8；100 mg 49%，or 1.6，95% ci 0.9-2.8；安慰劑 39%），最常見 治療-emergent 不良事件 為 diarrhoea，嚴重不良事件 約 1-4%。 藥師重點：enpatoran 在中重度 sle 顯示 bicla 反應 改善訊號，但未證實明確劑量反應；若後續納入治療討論，需留意疾病活動度評估、glucocorticoid tapering 背景與長期安全性資料仍待確認。"},{"id":"pmid-42107392","kind":"article","issueId":"2026-week20","year":2026,"week":20,"weekLabel":"第 20 週","dateRange":"2026/05/11 – 05/17","href":"2026-week20.html","title":"Endovascular thrombectomy for patients with large-core ischaemic stroke presenting up to 24 h after onset (ATLAS): a systematic review and individual patient data meta-analysis with central imaging adjudication","journal":"Lancet","type":"MA","typeLabel":"Meta-analysis","author":"Sarraj","doi":"10.1016/S0140-6736(26)00876-7","url":"https://doi.org/10.1016/S0140-6736(26)00876-7","summary":"藥師重點：large-core ischaemic stroke 發病 24 h 內接受 血管內取栓 整體可改善功能結果並降低死亡率，但 core volume ≥150 mL 尤其超過 6 h 者證據較有限；抗栓、血壓與出血風險管理仍需依影像條件與中風團隊決策調整。","pubDate":"2026-05-23","terms":["endovascular","thrombectomy","large-core","ischaemic","stroke","presenting","onset","atlas","individual","meta-analysis"],"drugTerms":[],"searchText":"endovascular thrombectomy for patients with large-core ischaemic stroke presenting up to 24 h after onset (atlas): a systematic review and individual patient data meta-analysis with central imaging adjudication lancet meta-analysis sarraj 10.1016/s0140-6736(26)00876-7 研究背景：large-core ischaemic stroke 患者常被排除於 血管內取栓 之外；atlas 以 individual patient 資料 統合分析 整合近期試驗，評估發病 24 小時內此族群的效益與安全性。 研究方法：研究搜尋 2018 年 3 月 1 日至 2025 年 3 月 1 日 pubmed 與 embase 的隨機試驗，納入 aspects ≤5 或 estimated ischaemic core ≥50 ml 且發病 24 h 內的 large-core ischaemic stroke。共取得 eligible 試驗 的 individual patient-level 資料，經 central imaging core laboratory 重新判讀 aspects 與 core volume；主要終點為 90 天 mrs distribution，並評估 死亡率、neurological worsening 與 有症狀 intracerebral haemorrhage。 主要結果：共納入 6 個試驗、1886 人；90 天 mrs distribution 在 血管內取栓 組較 medical management 組佳（中位數 score 4 vs 5；agenor 1.63，95% ci 1.42-1.88；p<0.0001）。血管內取栓 組 90 天死亡率較低（31.1% vs 37.3%；arr 0.82，95% ci 0.70-0.97；p=0.022），有症狀 顱內出血 無顯著差異（1.1% vs 1.0%；風險差 -0.17 百分點，95% ci -1.01 to 0.67）。core volume ≥150 ml 者估計值仍偏向 血管內取栓，但 95% ci 較寬。 藥師重點：large-core ischaemic stroke 發病 24 h 內接受 血管內取栓 整體可改善功能結果並降低死亡率，但 core volume ≥150 ml 尤其超過 6 h 者證據較有限；抗栓、血壓與出血風險管理仍需依影像條件與中風團隊決策調整。"},{"id":"pmid-42127389","kind":"article","issueId":"2026-week20","year":2026,"week":20,"weekLabel":"第 20 週","dateRange":"2026/05/11 – 05/17","href":"2026-week20.html","title":"Endovascular Treatment of Medium-Vessel-Occlusion Strokes","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Hu","doi":"10.1056/NEJMoa2514120","url":"https://doi.org/10.1056/NEJMoa2514120","summary":"藥師重點：medium-vessel 阻塞 且中重度缺損患者接受 血管內取栓 可提高 90 天功能獨立機率，但伴隨較高 有症狀 intracranial hemorrhage；藥師在急性中風團隊中需協助掌握 thrombolysis 併用、抗栓恢復時點與出血監測。","pubDate":"2026-05-14","terms":["endovascular","medium-vessel-occlusion","strokes","nejm","nejmoa2514120","medium-vessel","blinded","assessment","nihss","score"],"drugTerms":[],"searchText":"endovascular treatment of medium-vessel-occlusion strokes nejm rct hu 10.1056/nejmoa2514120 研究背景：medium-vessel 阻塞 急性缺血性中風接受 血管內取栓 的效益在不同試驗中不一致，對中重度神經缺損患者是否改善功能恢復仍需確認。 研究方法：此中國 48 家中心 開放標籤 隨機試驗 採 blinded 結果指標 assessment，收錄發病 24 小時內、nihss score ≥6 且因 medium-vessel 阻塞 造成中重度中風的成人。患者 1:1 分派至 血管內取栓 加 medical management 或 medical management 單用；因 proportional-odds assumption 不成立，預先規劃改以 90 天 modified rankin scale score 0-2 的 功能獨立 為主要終點。 主要結果：血管內取栓 組 280 人、control 組 283 人，中位數 age 71 years，中位數 nihss score 10。90 天 功能獨立 為 58.6% vs 46.6%（校正 比率 比值 1.24，95% ci 1.07 to 1.44；p=0.004）；有症狀 intracranial hemorrhage 為 4.7% vs 2.2%，90-day 死亡率 為 11.1% vs 10.2%。 藥師重點：medium-vessel 阻塞 且中重度缺損患者接受 血管內取栓 可提高 90 天功能獨立機率，但伴隨較高 有症狀 intracranial hemorrhage；藥師在急性中風團隊中需協助掌握 thrombolysis 併用、抗栓恢復時點與出血監測。"},{"id":"pmid-42120081","kind":"article","issueId":"2026-week20","year":2026,"week":20,"weekLabel":"第 20 週","dateRange":"2026/05/11 – 05/17","href":"2026-week20.html","title":"Efficacy of dual antiplatelet therapy for three months versus 12 months after coronary artery bypass grafting: multicentre, double blinded, randomised controlled trial","journal":"BMJ","type":"RCT","typeLabel":"RCT","author":"Yuan","doi":"10.1136/bmj-2025-088939","url":"https://doi.org/10.1136/bmj-2025-088939","summary":"藥師重點：CABG 後 saphenous vein graft 患者使用 3 個月 ticagrelor 加 aspirin 後轉 aspirin，可維持 graft 阻塞 非劣性並降低出血；臨床仍需依缺血風險、出血風險與外科醫囑調整 DAPT 期間。","pubDate":"2026-05-12","terms":["efficacy","dual","antiplatelet","three","months","coronary","artery","bypass","grafting","multicentre"],"drugTerms":[],"searchText":"efficacy of dual antiplatelet therapy for three months versus 12 months after coronary artery bypass grafting: multicentre, double blinded, randomised controlled trial bmj rct yuan 10.1136/bmj-2025-088939 研究背景：冠狀動脈繞道手術後使用 dapt 可降低 saphenous vein graft 阻塞，但延長治療也可能增加出血風險；本研究比較 3 個月與 12 個月 dapt 的療效與安全性。 研究方法：此研究為中國 13 家心臟手術中心進行的多中心、雙盲、隨機、不劣性 試驗，收錄 2300 名 18-80 歲、接受 elective 主要 cabg 且至少有 1 條 saphenous vein graft 的患者。受試者接受 ticagrelor 90 mg 每日兩次 加 aspirin 100 mg 每日一次 共 12 個月，或前 3 個月 dapt 後改為 安慰劑 加 aspirin 9 個月；主要終點為 1 年 graft 阻塞 與 barc type 2、3 或 5 出血。 主要結果：modified intention-to-treat set 共 2290 人；1 年 saphenous vein graft 阻塞 為 10.8% vs 11.2%（absolute 差異 -0.31%，95% ci -3.13% to 2.52%；p=0.008 for 不劣性）。barc type 2、3 或 5 出血 為 8.3% vs 13.2%（absolute 差異 -4.67%，95% ci -7.18% to -2.16%；p<0.001），macce 兩組相近。 藥師重點：cabg 後 saphenous vein graft 患者使用 3 個月 ticagrelor 加 aspirin 後轉 aspirin，可維持 graft 阻塞 非劣性並降低出血；臨床仍需依缺血風險、出血風險與外科醫囑調整 dapt 期間。"},{"id":"pmid-42134354","kind":"article","issueId":"2026-week20","year":2026,"week":20,"weekLabel":"第 20 週","dateRange":"2026/05/11 – 05/17","href":"2026-week20.html","title":"Efficacy and safety of cefepime-nacubactam and aztreonam-nacubactam compared with imipenem-cilastatin for complicated urinary tract infection or acute uncomplicated pyelonephritis (Integral-1): a double-blind, randomised phase 3 trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Takahashi","doi":"10.1016/S0140-6736(26)00596-9","url":"https://doi.org/10.1016/S0140-6736(26)00596-9","summary":"藥師重點：cefepime-nacubactam 與 aztreonam-nacubactam 可作為 Gram-negative cUTI 或 急性 uncomplicated pyelonephritis 的潛在選項，尤其涉及抗藥性菌株時；實務採用前需依培養敏感性、腎功能劑量調整與院內抗菌藥物管理規範評估。","pubDate":"2026-05-16","terms":["efficacy","cefepime-nacubactam","aztreonam-nacubactam","imipenem-cilastatin","complicated","urinary","tract","infection","acute","uncomplicated"],"drugTerms":["cefepime-nacubactam","imipenem-cilastatin","cefepime","imipenem","cilastatin","meropenem"],"searchText":"efficacy and safety of cefepime-nacubactam and aztreonam-nacubactam compared with imipenem-cilastatin for complicated urinary tract infection or acute uncomplicated pyelonephritis (integral-1): a double-blind, randomised phase 3 trial lancet rct takahashi 10.1016/s0140-6736(26)00596-9 研究背景：nacubactam (op0595) 為新型 diazabicyclooctane β-lactamase 抑制劑，可與 cefepime 或 aztreonam 併用；本研究評估其治療 cuti 或 急性 uncomplicated pyelonephritis 的療效與安全性。 研究方法：integral-1 為 global、第 3 期、多中心、隨機、雙盲 試驗，收錄 ≥18 歲 cuti 或 急性 uncomplicated pyelonephritis 成人。患者 2:1:1 接受 cefepime 2 g + nacubactam 1 g、aztreonam 2 g + nacubactam 1 g，或 imipenem 1 g + cilastatin 1 g，每 8 小時靜脈給藥 5-14 天；主要終點為 test of cure 時 臨床 and microbiological 複合 success。 主要結果：614 人隨機分派，431 人納入主要療效分析；複合 success 為 cefepime-nacubactam 82%、aztreonam-nacubactam 72%、imipenem-cilastatin 61%。相較 imipenem-cilastatin，cefepime-nacubactam 差異 21.3%（95% ci 10.9 to 32.0，達 non-inferior and superior），aztreonam-nacubactam 差異 11.4%（95% ci -1.2 to 23.7，達 non-inferior）；治療期間出現的不良事件 為 33%、30%、43%，無 治療-related deaths。 藥師重點：cefepime-nacubactam 與 aztreonam-nacubactam 可作為 gram-negative cuti 或 急性 uncomplicated pyelonephritis 的潛在選項，尤其涉及抗藥性菌株時；實務採用前需依培養敏感性、腎功能劑量調整與院內抗菌藥物管理規範評估。"},{"id":"pmid-42134863","kind":"article","issueId":"2026-week20","year":2026,"week":20,"weekLabel":"第 20 週","dateRange":"2026/05/11 – 05/17","href":"2026-week20.html","title":"Analysing complex interventions using component network meta-analysis","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"Veroniki","doi":"10.1136/bmj-2024-083075","url":"https://doi.org/10.1136/bmj-2024-083075","summary":"藥師重點：解讀複合介入的 systematic review 時，CNMA 可協助判斷哪個成分可能貢獻療效，但結果高度依賴模型假設與資料連通性；用於藥事或照護方案決策前需確認 component 定義與交互作用設定。","pubDate":"2026-05-14","terms":["analysing","complex","interventions","component","network","meta-analysis","veroniki","bmj-2024-083075","components","cnma"],"drugTerms":[],"searchText":"analysing complex interventions using component network meta-analysis bmj original article veroniki 10.1136/bmj-2024-083075 研究背景：network 統合分析 常用於比較複雜介入，但當介入由多個 components 組成時，傳統方法不易估計各 component 的個別效果或交互作用。 研究方法：本文為方法學文章，介紹 component network 統合分析 (cnma) 的建模方式，並以實例說明 additive cnma 與 interaction cnma 如何估計 component effects。 主要結果：cnma 可在複雜介入中估計個別 component 的 additive effect，也可透過 interaction cnma 評估 component 在彼此存在時效果是否改變；但模型建立與解讀較複雜，需要 clinicians、methodologists 與 statisticians 的 multidisciplinary team。 藥師重點：解讀複合介入的 systematic review 時，cnma 可協助判斷哪個成分可能貢獻療效，但結果高度依賴模型假設與資料連通性；用於藥事或照護方案決策前需確認 component 定義與交互作用設定。"},{"id":"pmid-42134356","kind":"article","issueId":"2026-week20","year":2026,"week":20,"weekLabel":"第 20 週","dateRange":"2026/05/11 – 05/17","href":"2026-week20.html","title":"Addition of autologous stem-cell transplantation to an ibrutinib-containing first-line treatment in patients aged 18-65 years with mantle cell lymphoma (TRIANGLE): 4·5-year follow-up of a three-arm, randomised, open-label, phase 3 superiority trial of the European MCL Network","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Dreyling","doi":"10.1016/S0140-6736(26)00362-4","url":"https://doi.org/10.1016/S0140-6736(26)00362-4","summary":"藥師重點：年輕 mantle cell 淋巴瘤 患者使用 ibrutinib 合併免疫化療並維持治療可改善長期結果，但在此 處方 中加入 ASCT 未增加效益且毒性較高；藥師需關注 ibrutinib 相關感染、出血、心血管風險與維持治療期間交互作用。","pubDate":"2026-05-16","terms":["addition","autologous","stem-cell","transplantation","ibrutinib-containing","first-line","aged","years","mantle","cell"],"drugTerms":["ibrutinib","rituximab","cisplatin","oxaliplatin"],"searchText":"addition of autologous stem-cell transplantation to an ibrutinib-containing first-line treatment in patients aged 18-65 years with mantle cell lymphoma (triangle): 4·5-year follow-up of a three-arm, randomised, open-label, phase 3 superiority trial of the european mcl network lancet rct dreyling 10.1016/s0140-6736(26)00362-4 研究背景：triangle 早期結果顯示 ibrutinib 加入年輕 mantle cell 淋巴瘤 第一線免疫化療可改善 failure-free 存活期；延長追蹤後，本研究評估在 ibrutinib-containing 處方 中再加入 asct 是否仍有額外效益。 研究方法：triangle 為 13 個歐洲國家與以色列、165 個中心進行的 three-arm、隨機、開放標籤 第 3 期 優越性試驗，收錄 18-65 歲、未治療 stage ii-iv mantle cell 淋巴瘤 且適合 asct 的患者。患者分派至標準免疫化療後 asct（group a）、標準治療加 ibrutinib 並 asct（group a + i），或 ibrutinib-containing 處方 但省略 asct（group i）；主要終點為 failure-free 存活期，並評估 整體存活期 與安全性。 主要結果：870 人隨機分派，中位數 追蹤 54.9 個月。4-year failure-free 存活期 在 group a + i 與 group i 為 82% vs 81%（hr 0.86，one-sided 98.33% ci 0.00-1.27；one-sided p=0.21），未顯示 asct 額外優勢；group a + i 仍優於 group a（82% vs 70%；hr 0.63；one-sided p=0.0026）。4-year 整體存活期 為 group a + i 88% vs group a 81%（hr 0.59，95% ci 0.38-0.92），group i 90% vs group a 81%（hr 0.57，95% ci 0.36-0.90）；等級 3-5 haematological 疾患 與 infections 在 group a + i 較多。 藥師重點：年輕 mantle cell 淋巴瘤 患者使用 ibrutinib 合併免疫化療並維持治療可改善長期結果，但在此 處方 中加入 asct 未增加效益且毒性較高；藥師需關注 ibrutinib 相關感染、出血、心血管風險與維持治療期間交互作用。"},{"id":"pmid-42119585","kind":"article","issueId":"2026-week20","year":2026,"week":20,"weekLabel":"第 20 週","dateRange":"2026/05/11 – 05/17","href":"2026-week20.html","title":"A case of acute necrotising encephalitis secondary to human herpesvirus 6 infection","journal":"Lancet","type":"OA","typeLabel":"Original Article","author":"Shinaman","doi":"10.1016/S0140-6736(26)00252-7","url":"https://doi.org/10.1016/S0140-6736(26)00252-7","summary":"藥師重點：此病例提醒 急性 necrotising encephalitis 需快速辨識並及早介入免疫治療；藥師可協助 corticosteroids、IVIG 與 plasma exchange 相關用藥審核，並留意癲癇控制、感染線索與高死亡或中重度失能風險。","pubDate":"2026-05-12","terms":["case","acute","necrotising","encephalitis","human","herpesvirus","infection","lancet","shinaman","s0140-6736"],"drugTerms":[],"searchText":"a case of acute necrotising encephalitis secondary to human herpesvirus 6 infection lancet original article shinaman 10.1016/s0140-6736(26)00252-7 研究背景：急性 necrotising encephalitis 可與 human herpesvirus 6 infection 相關，常以發燒、癲癇、意識改變與局部神經缺損表現，且預後不佳。 研究方法：本文為 lancet 臨床 rounds case report，描述 1 名 11 個月大女嬰因 human herpesvirus 6 infection 併發 急性 necrotising encephalitis，並整理診斷檢查、影像特徵與治療重點。 主要結果：病例出現顱內壓升高、癲癇與張力增加；檢查可見血清學異常如 thrombocytopenia 與 liver 功能障礙，cerebrospinal fluid 可有蛋白升高但無 white blood cell pleocytosis，mri t2-weighted images 可見雙側 thalami、basal ganglia、subcortical white matter、cerebellum 與 brainstem 訊號變化及 diffusion restriction。文中指出治療需快速啟動 immunosuppression，包括 corticosteroids、intravenous immunoglobulin 與 plasma exchange。 藥師重點：此病例提醒 急性 necrotising encephalitis 需快速辨識並及早介入免疫治療；藥師可協助 corticosteroids、ivig 與 plasma exchange 相關用藥審核，並留意癲癇控制、感染線索與高死亡或中重度失能風險。"},{"id":"fda-2026-week20-1","kind":"fda","issueId":"2026-week20","year":2026,"week":20,"weekLabel":"第 20 週","dateRange":"2026/05/11 – 05/17","href":"2026-week20.html","title":"FDA’s Concerns with Unapproved GLP-1 Drugs Used for Weight Loss","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["concerns","unapproved","glp-1","drugs","used","weight","loss","https","drug-alerts-and-statements","fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"],"drugTerms":["glp-1"],"searchText":"fda’s concerns with unapproved glp-1 drugs used for weight loss fda drug safety 2026-06-15 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"},{"id":"fda-2026-week20-3","kind":"fda","issueId":"2026-week20","year":2026,"week":20,"weekLabel":"第 20 週","dateRange":"2026/05/11 – 05/17","href":"2026-week20.html","title":"FDA issues final decision to withdraw approval of Pepaxto (melphalan flufenamide)","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/398713","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["issues","final","decision","withdraw","approval","pepaxto","melphalan","flufenamide","https","node"],"drugTerms":[],"searchText":"fda issues final decision to withdraw approval of pepaxto (melphalan flufenamide) fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/398713"},{"id":"fda-2026-week20-2","kind":"fda","issueId":"2026-week20","year":2026,"week":20,"weekLabel":"第 20 週","dateRange":"2026/05/11 – 05/17","href":"2026-week20.html","title":"FDA alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/403159","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["alerts","caregivers","providers","cross-compatibility","issues","autoinjector","devices","that","optional","glatiramer"],"drugTerms":[],"searchText":"fda alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/403159"},{"id":"fda-2026-week20-4","kind":"fda","issueId":"2026-week20","year":2026,"week":20,"weekLabel":"第 20 週","dateRange":"2026/05/11 – 05/17","href":"2026-week20.html","title":"FDA Accepts First In Silico Drug Development Tool Under ISTAND Program to Help Predict Drug-Induced Liver Injury","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["accepts","first","silico","development","tool","under","istand","program","help","predict"],"drugTerms":[],"searchText":"fda accepts first in silico drug development tool under istand program to help predict drug-induced liver injury fda drug safety 2026-06-03 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver"},{"id":"pmid-42070573","kind":"article","issueId":"2026-week19","year":2026,"week":19,"weekLabel":"第 19 週","dateRange":"2026/05/04 – 05/10","href":"2026-week19.html","title":"Substantial increases in cervical cancer inequalities worldwide without enhanced human papillomavirus vaccination and screening efforts: a global modelling study","journal":"Lancet","type":"OA","typeLabel":"Original Article","author":"Brisson","doi":"10.1016/S0140-6736(26)00410-1","url":"https://doi.org/10.1016/S0140-6736(26)00410-1","summary":"藥師重點：模型結果指出若不強化 HPV vaccination 與 screening，全球子宮頸癌不平等可能擴大；公共衛生與臨床端應把疫苗接種、篩檢與治療連結視為一組策略，而非單靠單一措施。","pubDate":"2026-05-02","terms":["substantial","increases","cervical","cancer","inequalities","worldwide","enhanced","human","papillomavirus","vaccination"],"drugTerms":[],"searchText":"substantial increases in cervical cancer inequalities worldwide without enhanced human papillomavirus vaccination and screening efforts: a global modelling study lancet original article brisson 10.1016/s0140-6736(26)00410-1 研究背景：who 提出子宮頸癌消除目標，包括 90% 女童接種、70% 女性篩檢與 90% 癌前病變及癌症治療；但 lmics 與 hics 之間的 hpv vaccination 與 screening 落差仍大。 研究方法：此 global modelling 研究 使用 hpv-advise model，推估 67 個 lmics 與 42 個 hics 在不同 hpv vaccination 與 screening 情境下的 age-standardised cervical 癌症 incidence。研究比較 status quo 與 5 種 lmics 強化預防策略，並以 rrlmic/hic=asrlmics/asrhics 衡量不平等程度。 主要結果：在 status quo 下，模型預估 lmics 子宮頸癌發生率僅下降 23%，而 hics 會在 2048 年達到 elimination（age-standardised cervical 癌症 incidence <four cases per 100,000 women-years），使不平等由 rrlmic/hic=3（2022）上升至 12（2105）。若 lmics 女童接種率達 90%，2105 年不平等可降至 rrlmic/hic=2，並使 sub-saharan africa 以外 lmics 達到 elimination。 藥師重點：模型結果指出若不強化 hpv vaccination 與 screening，全球子宮頸癌不平等可能擴大；公共衛生與臨床端應把疫苗接種、篩檢與治療連結視為一組策略，而非單靠單一措施。"},{"id":"pmid-42070571","kind":"article","issueId":"2026-week19","year":2026,"week":19,"weekLabel":"第 19 週","dateRange":"2026/05/04 – 05/10","href":"2026-week19.html","title":"Once-weekly semaglutide versus placebo in patients with alcohol use disorder and comorbid obesity: a randomised, double-blind, placebo-controlled trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Klausen","doi":"10.1016/S0140-6736(26)00305-3","url":"https://doi.org/10.1016/S0140-6736(26)00305-3","summary":"藥師重點：研究結果支持 semaglutide 在 alcohol 使用 疾患 合併肥胖族群可能減少重度飲酒天數，但目前仍應視為特定研究族群中的治療訊號；藥師需留意胃腸道耐受性、體重相關用藥背景與實際適應症限制。","pubDate":"2026-05-02","terms":["once-weekly","semaglutide","placebo","alcohol","disorder","comorbid","obesity","randomised","double-blind","placebo-controlled"],"drugTerms":["semaglutide","glp-1"],"searchText":"once-weekly semaglutide versus placebo in patients with alcohol use disorder and comorbid obesity: a randomised, double-blind, placebo-controlled trial lancet rct klausen 10.1016/s0140-6736(26)00305-3 研究背景：alcohol 使用 疾患 造成明顯死亡負擔，現有治療仍有限；glp-1 受體 致效劑 semaglutide 是否可降低飲酒行為，仍需臨床試驗驗證。 研究方法：此 26 週、單中心、隨機、雙盲、安慰劑對照試驗，納入 108 位有中重度 alcohol 使用 疾患 且合併肥胖、正在尋求治療的患者。受試者接受 semaglutide 2.4 mg subcutaneously once 每週 或 安慰劑，並皆合併標準 cognitive behavioural 治療；主要終點為 26 週後 heavy drinking 天 減少幅度。 主要結果：semaglutide 組 heavy drinking 天 自基準下降 -41.1 百分點（95% ci -48.7 to -33.5），安慰劑 組為 -26.4（-34.1 to -18.6），estimated 治療 差異 為 -13.7 百分點（95% ci -22.0 to -5.4；p=0.0015）。不良事件多為暫時性、輕至中度胃腸道反應，且 semaglutide 組較常見。 藥師重點：研究結果支持 semaglutide 在 alcohol 使用 疾患 合併肥胖族群可能減少重度飲酒天數，但目前仍應視為特定研究族群中的治療訊號；藥師需留意胃腸道耐受性、體重相關用藥背景與實際適應症限制。"},{"id":"pmid-42102826","kind":"article","issueId":"2026-week19","year":2026,"week":19,"weekLabel":"第 19 週","dateRange":"2026/05/04 – 05/10","href":"2026-week19.html","title":"Long-term effects of colonoscopy screening on colorectal cancer incidence and mortality: a multicountry, population-based randomised controlled trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Kaminski","doi":"10.1016/S0140-6736(26)00508-8","url":"https://doi.org/10.1016/S0140-6736(26)00508-8","summary":"藥師重點：單次 colonoscopy screening 可降低 colorectal 癌症 發生率，但 13 年資料未顯示死亡率明確下降；衛教時可強調篩檢對發生率的長期效益，同時避免把結果解讀為已證實降低死亡。","pubDate":"2026-05-09","terms":["long-term","colonoscopy","screening","colorectal","cancer","incidence","mortality","multicountry","population-based","randomised"],"drugTerms":[],"searchText":"long-term effects of colonoscopy screening on colorectal cancer incidence and mortality: a multicountry, population-based randomised controlled trial lancet rct kaminski 10.1016/s0140-6736(26)00508-8 研究背景：單次大腸鏡篩檢對 colorectal 癌症 發生率與死亡率的長期影響仍需追蹤資料確認，本研究報告既有多國族群試驗 13 年追蹤結果。 研究方法：此多國、族群-based 隨機對照試驗 納入挪威、波蘭與瑞典 84,583 位 55-64 歲男女，依 1:2 分配至 colonoscopy screening 或 no screening。主要結果為 intention-to-screen 分析中追蹤 10-15 年的 colorectal 癌症 incidence 與 死亡率。 主要結果：13 年追蹤時，colorectal 癌症 發生率為篩檢組 375/28,217（1.46%）與未篩檢組 912/56,366（1.80%），intention-to-screen rr 0.81（95% ci 0.71-0.90），per-protocol rr 0.55（0.33-0.81）。colorectal 癌症 死亡率 為 0.41% vs 0.47%，intention-to-screen rr 0.88（0.68-1.08），未達明確下降。 藥師重點：單次 colonoscopy screening 可降低 colorectal 癌症 發生率，但 13 年資料未顯示死亡率明確下降；衛教時可強調篩檢對發生率的長期效益，同時避免把結果解讀為已證實降低死亡。"},{"id":"pmid-42100960","kind":"article","issueId":"2026-week19","year":2026,"week":19,"weekLabel":"第 19 週","dateRange":"2026/05/04 – 05/10","href":"2026-week19.html","title":"Intravenous Tirofiban After Tenecteplase in Acute Ischemic Stroke: The INSTANT Randomized Clinical Trial","journal":"JAMA","type":"RCT","typeLabel":"RCT","author":"Liu","doi":"10.1001/jama.2026.5245","url":"https://doi.org/10.1001/jama.2026.5245","summary":"藥師重點：在明確排除大中型血管阻塞與心因性來源、且 tenecteplase 後反應不足的族群中，tirofiban 增加 90 天良好功能結果；藥師需特別核對納入條件、抗血小板銜接時點與出血監測。","pubDate":"2026-06-09","terms":["intravenous","tirofiban","tenecteplase","acute","ischemic","stroke","instant","jama","investigator-initiated","bolus"],"drugTerms":["clopidogrel"],"searchText":"intravenous tirofiban after tenecteplase in acute ischemic stroke: the instant randomized clinical trial jama rct liu 10.1001/jama.2026.5245 研究背景：對 intravenous tenecteplase 反應不足且無大或中型血管阻塞、非心因性來源的急性缺血性中風患者，早期 tirofiban 的療效與安全性仍不確定。 研究方法：instant 為 investigator-initiated、隨機、雙盲、安慰劑對照 試驗，於中國 37 家醫院納入 359 位符合條件患者。受試者在 tenecteplase 後 4-24 小時內接受 intravenous tirofiban（0.3 μg/kg/min bolus 30 分鐘，接續 0.075 μg/kg/min infusion 最多 47.5 小時）或 安慰劑；主要終點為 90 天 modified rankin scale 0 或 1。 主要結果：90 天 excellent 結果指標 為 tirofiban 組 113/177（63.8%）與 安慰劑 組 95/182（52.2%），風險比 1.22（95% ci, 1.02-1.46；p=.03）。48 小時內 有症狀 intracranial hemorrhage 為 tirofiban 組 1 位（0.9%）與 安慰劑 組 0 位；90 天死亡率為 0.6% vs 1.6%。 藥師重點：在明確排除大中型血管阻塞與心因性來源、且 tenecteplase 後反應不足的族群中，tirofiban 增加 90 天良好功能結果；藥師需特別核對納入條件、抗血小板銜接時點與出血監測。"},{"id":"pmid-42099212","kind":"article","issueId":"2026-week19","year":2026,"week":19,"weekLabel":"第 19 週","dateRange":"2026/05/04 – 05/10","href":"2026-week19.html","title":"Intravenous Tenecteplase Prior to Endovascular Treatment for Ischemic Stroke at 4.5 to 24 Hours: The TNK-PLUS Randomized Clinical Trial","journal":"JAMA","type":"RCT","typeLabel":"RCT","author":"Xiong","doi":"10.1001/jama.2026.4292","url":"https://doi.org/10.1001/jama.2026.4292","summary":"藥師重點：在可執行 EVT 的中心、late window proximal MCA 阻塞 患者中，EVT 前加用 tenecteplase 未改善 90 天功能結果；用藥決策需回到中風時間窗、影像選擇條件與顱內出血風險。","pubDate":"2026-06-02","terms":["intravenous","tenecteplase","prior","endovascular","ischemic","stroke","hours","tnk-plus","jama","xiong"],"drugTerms":[],"searchText":"intravenous tenecteplase prior to endovascular treatment for ischemic stroke at 4.5 to 24 hours: the tnk-plus randomized clinical trial jama rct xiong 10.1001/jama.2026.4292 研究背景：急性缺血性中風在 4.5 至 24 小時 late time window 進行 evt 前，是否先給 intravenous tenecteplase 能降低失能仍不清楚。 研究方法：tnk-加上 為中國 40 家中心進行的 多中心 第 3 期、隨機、開放標籤、blinded end point 優越性試驗，納入 mca-m1 或 proximal m2 阻塞 且影像顯示 salvageable brain tissue 的成人患者。391 位患者隨機接受 intravenous tenecteplase 0.25 mg/kg（maximum dose, 25 mg）後 evt，或 evt 單用；主要終點為 90 天 modified rankin scale 0-2。 主要結果：90 天 功能獨立 為 tenecteplase before evt 組 88/199（44.2%）與 evt 單用 組 83/192（43.2%），校正 relative 比率 1.01（95% ci, 0.83-1.24；p=.89）。90 天死亡率為 12.7% vs 14.2%；36 小時內 有症狀 intracranial hemorrhage 為 5.1% vs 2.6%。 藥師重點：在可執行 evt 的中心、late window proximal mca 阻塞 患者中，evt 前加用 tenecteplase 未改善 90 天功能結果；用藥決策需回到中風時間窗、影像選擇條件與顱內出血風險。"},{"id":"pmid-42090792","kind":"article","issueId":"2026-week19","year":2026,"week":19,"weekLabel":"第 19 週","dateRange":"2026/05/04 – 05/10","href":"2026-week19.html","title":"Efficacy and Safety of an mRNA Seasonal Influenza Vaccine in Adults","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Leroux-Roels","doi":"10.1056/NEJMoa2516491","url":"https://doi.org/10.1056/NEJMoa2516491","summary":"藥師重點：mRNA-1010 在 50 歲以上成人預防 RT-PCR-confirmed influenza-like illness 的效果優於 standard-dose licensed vaccines，但局部與全身反應較多；疫苗諮詢時需同時說明相對保護效益與短期反應預期。","pubDate":"2026-05-07","terms":["efficacy","mrna","seasonal","influenza","vaccine","adults","nejm","leroux-roels","nejmoa2516491","mrna-1010"],"drugTerms":[],"searchText":"efficacy and safety of an mrna seasonal influenza vaccine in adults nejm rct leroux-roels 10.1056/nejmoa2516491 研究背景：50 歲以上成人即使接種現有流感疫苗，仍有明顯流感相關疾病負擔；mrna-1010 為 investigational mrna-based 疫苗，編碼 who 建議流感株的 hemagglutinin glycoproteins。 研究方法：此 第 3 期、雙盲、活性對照 試驗 隨機分配 40,703 位 50 歲以上成人接受 trivalent mrna-1010（37.5 μg，含每株 12.5 μg）或已核准 standard-dose comparator。主要療效終點為接種後至少 14 天至流感季結束期間，rt-pcr-confirmed、protocol-defined influenza-like illness 的相對疫苗效力。 主要結果：rt-pcr-confirmed influenza-like illness 發生於 mrna-1010 組 411/20,179（2.0%）與 standard-dose comparator 組 557/20,124（2.8%），relative 疫苗 efficacy 為 26.6%（95% ci, 16.7 to 35.4）。mrna-1010 組注射部位疼痛、疲倦、頭痛與肌痛較常見，多為輕至中度且短暫；嚴重不良事件 為 2.2% vs 1.9%。 藥師重點：mrna-1010 在 50 歲以上成人預防 rt-pcr-confirmed influenza-like illness 的效果優於 standard-dose licensed vaccines，但局部與全身反應較多；疫苗諮詢時需同時說明相對保護效益與短期反應預期。"},{"id":"pmid-42106991","kind":"article","issueId":"2026-week19","year":2026,"week":19,"weekLabel":"第 19 週","dateRange":"2026/05/04 – 05/10","href":"2026-week19.html","title":"Efficacy and Safety of Digitalis Glycosides in Heart Failure: A Meta-Analysis","journal":"JAMA","type":"MA","typeLabel":"Meta-analysis","author":"Damman","doi":"10.1001/jama.2026.7886","url":"https://doi.org/10.1001/jama.2026.7886","summary":"藥師重點：Digitalis glycosides 對 HFmrEF/HFrEF 的主要效益集中在減少 worsening HF event，而非降低死亡；若作為附加治療，仍需依病人腎功能、電解質、心律與中毒風險安排監測。","pubDate":"2026-06-16","terms":["efficacy","digitalis","glycosides","heart","failure","meta-analysis","jama","damman","hfmref","hfref"],"drugTerms":[],"searchText":"efficacy and safety of digitalis glycosides in heart failure: a meta-analysis jama meta-analysis damman 10.1001/jama.2026.7886 研究背景：digitalis glycosides 可作為 hfmref 或 hfref 患者的附加治療，但對死亡與心衰竭惡化事件的影響需彙整大型 安慰劑對照 rct 證據。 研究方法：此 統合分析 搜尋 pubmed 至 2026 年 3 月 1 日，納入超過 1000 位患者、英文發表且 安慰劑對照 的 隨機臨床試驗s。共納入 3 項研究、9,013 位 hfmref 或 hfref 患者，以 fixed-effects model 估計 hrs 與 95% cis；主要終點為 心血管 死亡 或 first worsening hf event 複合結果。 主要結果：主要複合結果發生於 digitalis glycoside 組 1,852/4,510（41%）與 安慰劑 組 2,037/4,503（45%），hr 0.85（95% ci, 0.80-0.90；p<.001）。first worsening hf event 風險較低（hr 0.75；95% ci, 0.69-0.81；p<.001），但 心血管 事件（hr 0.99；p=.81）與 all-cause 死亡（hr 0.97；p=.41）未見顯著差異。 藥師重點：digitalis glycosides 對 hfmref/hfref 的主要效益集中在減少 worsening hf event，而非降低死亡；若作為附加治療，仍需依病人腎功能、電解質、心律與中毒風險安排監測。"},{"id":"pmid-42070572","kind":"article","issueId":"2026-week19","year":2026,"week":19,"weekLabel":"第 19 週","dateRange":"2026/05/04 – 05/10","href":"2026-week19.html","title":"Effects of ovarian ablation or suppression on breast cancer recurrence and survival: patient-level meta-analysis of 15 000 women in 23 randomised trials","journal":"Lancet","type":"MA","typeLabel":"Meta-analysis","author":"N/A","doi":"10.1016/S0140-6736(26)00313-2","url":"https://doi.org/10.1016/S0140-6736(26)00313-2","summary":"藥師重點：OFS 對停經前 ER-陽性 early breast 癌症 可降低復發風險，且年齡與化療後停經狀態會影響效益解讀；藥師在衛教與用藥追蹤時需留意停經症狀、骨質風險、tamoxifen 併用情境與病人年齡層。","pubDate":"2026-05-02","terms":["ovarian","ablation","suppression","breast","cancer","recurrence","survival","patient-level","meta-analysis","women"],"drugTerms":[],"searchText":"effects of ovarian ablation or suppression on breast cancer recurrence and survival: patient-level meta-analysis of 15 000 women in 23 randomised trials lancet meta-analysis  10.1016/s0140-6736(26)00313-2 研究背景：停經前 er-陽性 early breast 癌症 患者中，ovarian function suppression（ofs）在化療後停經狀態與 tamoxifen 使用情境下的額外保護效果仍需整合證據評估。 研究方法：此 patient-level 統合分析 納入比較 ofs versus no ofs 的隨機試驗，對象為隨機分派時停經前且小於 55 歲、er-陽性 或 er-unknown early breast 癌症 女性。主要結果包括 invasive breast 癌症 recurrence、breast 癌症 死亡率、other 死亡率 與 全因死亡率，並依化療後停經狀態確認與 tamoxifen 配置分類分析。 主要結果：23 項合格試驗提供資料，共 18,851/19,053 位隨機分派女性；在 15,075 位 er-陽性 或 er-unknown 腫瘤且停經前女性中，ofs 降低 recurrence rates（rr 0.82，95% ci 0.77-0.87；p<0.00001）。在較近期 ofs 加上 tamoxifen versus tamoxifen 試驗中，45 歲以下女性 recurrence reduction 較明顯（rr 0.73，0.63-0.86），且 breast 癌症 死亡率 亦下降（rr 0.74，0.58-0.94；p=0.012）。 藥師重點：ofs 對停經前 er-陽性 early breast 癌症 可降低復發風險，且年齡與化療後停經狀態會影響效益解讀；藥師在衛教與用藥追蹤時需留意停經症狀、骨質風險、tamoxifen 併用情境與病人年齡層。"},{"id":"pmid-42106990","kind":"article","issueId":"2026-week19","year":2026,"week":19,"weekLabel":"第 19 週","dateRange":"2026/05/04 – 05/10","href":"2026-week19.html","title":"Digoxin in Patients With Symptomatic Rheumatic Heart Disease: A Randomized Clinical Trial","journal":"JAMA","type":"RCT","typeLabel":"RCT","author":"Karthikeyan","doi":"10.1001/jama.2026.7335","url":"https://doi.org/10.1001/jama.2026.7335","summary":"藥師重點：digoxin 在有症狀 rheumatic heart 疾病 族群可降低死亡或心衰竭惡化的複合風險，主要訊號來自心衰竭事件；藥師仍需落實腎功能、血鉀、血中濃度與 digoxin toxicity 監測。","pubDate":"2026-06-16","terms":["digoxin","symptomatic","rheumatic","heart","jama","karthikeyan","tertiary","hospitals","atrial","fibrillation"],"drugTerms":[],"searchText":"digoxin in patients with symptomatic rheumatic heart disease: a randomized clinical trial jama rct karthikeyan 10.1001/jama.2026.7335 研究背景：心衰竭是 rheumatic heart 疾病 患者常見死因，但 digoxin 在此族群中的療效與安全性證據有限。 研究方法：此多中心、隨機、安慰劑對照試驗於印度 12 家 tertiary care hospitals 納入有症狀 rheumatic heart 疾病，且合併 心衰竭、atrial fibrillation 或原本已使用 digoxin 的患者。1,769 位患者依 1:1 分配至 口服 digoxin 0.125 to 0.25 mg 每日一次 或 安慰劑，中位追蹤 2.1 年；主要終點為 all-cause 死亡 或 new-onset/worsening 心衰竭 複合結果。 主要結果：主要分析納入 1,759 位至少用藥一次的患者；主要複合結果發生於 digoxin 組 276 位（31.4%）與 安慰劑 組 312 位（35.5%），風險比 0.82（95% ci, 0.70-0.97；p=.02）。all-cause 死亡 為 10.0% vs 10.4%（風險比 0.94；95% ci, 0.70-1.26）；疑似 digoxin toxicity 導致永久停藥為 1.1% vs 1 位。 藥師重點：digoxin 在有症狀 rheumatic heart 疾病 族群可降低死亡或心衰竭惡化的複合風險，主要訊號來自心衰竭事件；藥師仍需落實腎功能、血鉀、血中濃度與 digoxin toxicity 監測。"},{"id":"pmid-42090791","kind":"article","issueId":"2026-week19","year":2026,"week":19,"weekLabel":"第 19 週","dateRange":"2026/05/04 – 05/10","href":"2026-week19.html","title":"Daraxonrasib in Previously Treated Advanced RAS-Mutated Pancreatic Cancer","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Wolpin","doi":"10.1056/NEJMoa2505783","url":"https://doi.org/10.1056/NEJMoa2505783","summary":"藥師重點：Daraxonrasib 在 previously treated RAS-mutated PDAC 顯示 antitumor activity，但 等級 3 or higher 治療相關不良事件 約三成；解讀時需記得這是 第 1 期-2、以安全性為主要終點的早期資料，臨床採用前仍需等待後續對照試驗。","pubDate":"2026-05-07","terms":["daraxonrasib","previously","treated","advanced","ras-mutated","pancreatic","cancer","nejm","wolpin","nejmoa2505783"],"drugTerms":[],"searchText":"daraxonrasib in previously treated advanced ras-mutated pancreatic cancer nejm original article wolpin 10.1056/nejmoa2505783 研究背景：pancreatic ductal adenocarcinoma（pdac）現有治療效益有限，超過 90% pdac tumors 帶有 activating ras mutations；daraxonrasib（rmc-6236）為 口服 ras(on) multiselective 抑制劑。 研究方法：此 第 1 期-2 研究 評估 daraxonrasib 用於帶有 activating ras mutations 的 advanced solid tumors，劑量為 10 to 400 mg orally 每日一次，並選定 300 mg 作為 第 3 期 dose。本文聚焦 168 位 previously treated ras-mutated pdac 患者；主要終點為安全性，藥物動力學與 antitumor activity 為次要終點。 主要結果：在 168 位接受 daraxonrasib 300 mg 或以下劑量的 pdac 患者中，任何等級 治療相關不良事件 發生率為 96%，等級 3 or higher 為 30%；常見事件包括 rash、diarrhea、nausea、stomatitis or mucositis、vomiting 與 fatigue。第二線接受 300 mg 治療且 ras g12 mutations 的 26 位患者中，objective 反應 為 35%（95% ci, 17 to 56），中位數 無惡化存活期 8.5 個月，中位數 整體存活期 13.1 個月。 藥師重點：daraxonrasib 在 previously treated ras-mutated pdac 顯示 antitumor activity，但 等級 3 or higher 治療相關不良事件 約三成；解讀時需記得這是 第 1 期-2、以安全性為主要終點的早期資料，臨床採用前仍需等待後續對照試驗。"},{"id":"pmid-42090793","kind":"article","issueId":"2026-week19","year":2026,"week":19,"weekLabel":"第 19 週","dateRange":"2026/05/04 – 05/10","href":"2026-week19.html","title":"Combined Oral Ivermectin and 5% Permethrin Cream to Treat Severe Scabies","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Bernigaud","doi":"10.1056/NEJMoa2411721","url":"https://doi.org/10.1056/NEJMoa2411721","summary":"藥師重點：結論顯示 ivermectin 400 μg/kg 合併 5% permethrin cream 未優於 200 μg/kg 合併療法；治療嚴重疥瘡時不宜僅因病情嚴重即推定高劑量較佳，仍需落實給藥時程、全身外用方式與接觸者處置。","pubDate":"2026-05-07","terms":["combined","oral","ivermectin","permethrin","cream","treat","severe","scabies","nejm","bernigaud"],"drugTerms":[],"searchText":"combined oral ivermectin and 5% permethrin cream to treat severe scabies nejm rct bernigaud 10.1056/nejmoa2411721 研究背景：嚴重疥瘡可能危及生命並造成公共衛生問題，臨床常建議口服 ivermectin 合併外用殺疥藥，但高劑量 ivermectin 是否更有效仍缺乏隨機試驗證據。 研究方法：此盲性隨機試驗納入經寄生蟲學或 dermoscopic assessment 確認的成人嚴重疥瘡患者，依 1:1 分配至 ivermectin 400 μg/kg 或 200 μg/kg，於第 0、7、14 天與食物併服。兩組均於第 0、7 天全身塗抹 5% permethrin cream，並依建議每日使用潤膚乳；主要終點為第 28 天確認治癒。 主要結果：主要分析共 132 位患者，每組 66 位；高劑量組治癒率為 75%，標準劑量組為 82%（or for cure, 0.64；95% ci, 0.25 to 1.67）。研究未發現安全性疑慮。 藥師重點：結論顯示 ivermectin 400 μg/kg 合併 5% permethrin cream 未優於 200 μg/kg 合併療法；治療嚴重疥瘡時不宜僅因病情嚴重即推定高劑量較佳，仍需落實給藥時程、全身外用方式與接觸者處置。"},{"id":"pmid-42091164","kind":"article","issueId":"2026-week19","year":2026,"week":19,"weekLabel":"第 19 週","dateRange":"2026/05/04 – 05/10","href":"2026-week19.html","title":"Aluminium adjuvants in vaccines and potential health effects: systematic review","journal":"BMJ","type":"SR","typeLabel":"Systematic Review","author":"Doyon-Plourde","doi":"10.1136/bmj-2025-088921","url":"https://doi.org/10.1136/bmj-2025-088921","summary":"藥師重點：目前證據不支持 aluminium adjuvanted vaccines 與嚴重或長期健康危害有因果關聯，較一致的不良反應為少見局部 hypersensitivity nodules/granulomas；疫苗諮詢時可用此證據協助回應安全疑慮，但仍需說明部分研究品質有限。","pubDate":"2026-05-06","terms":["aluminium","adjuvants","vaccines","potential","doyon-plourde","bmj-2025-088921","prisma","registries","adjuvanted","vaccination"],"drugTerms":[],"searchText":"aluminium adjuvants in vaccines and potential health effects: systematic review bmj systematic review doyon-plourde 10.1136/bmj-2025-088921 研究背景：含 aluminium adjuvants 疫苗的潛在健康影響長期受到關注，本研究系統性檢視人體研究證據並評估其可信度。 研究方法：此 systematic review 依 prisma 2020 進行，搜尋 6 個資料庫與 試驗 registries，自建庫至 2023 年 3 月 3 日，並更新至 2025 年 11 月 27 日。納入評估 aluminium adjuvanted vaccination 後健康結果的人體研究，包括 rct、世代 研究、case series 與 ecological 研究；以 rob 2.0、robins-i 或改編工具評估偏倚風險，並用 等級 評估證據確定性。 主要結果：共納入 59 項研究（37 case series、11 rct、9 世代 研究、2 ecological 研究）。較高品質 rct 與大型 世代 未顯示 aluminium adjuvanted vaccines 與 asthma、autism spectrum 疾患 或其他慢性疾病等嚴重或長期健康結果有關；persistent nodules 或 granulomas 罕見，主要見於 diphtheria-tetanus-pertussis vaccines 後，發生率 <1%、多為局部且自限。 藥師重點：目前證據不支持 aluminium adjuvanted vaccines 與嚴重或長期健康危害有因果關聯，較一致的不良反應為少見局部 hypersensitivity nodules/granulomas；疫苗諮詢時可用此證據協助回應安全疑慮，但仍需說明部分研究品質有限。"},{"id":"pmid-42096239","kind":"article","issueId":"2026-week19","year":2026,"week":19,"weekLabel":"第 19 週","dateRange":"2026/05/04 – 05/10","href":"2026-week19.html","title":"Adjunctive Intra-Arterial Alteplase After Successful Thrombectomy for Acute Ischemic Stroke: The CHOICE-2 Randomized Clinical Trial","journal":"JAMA","type":"RCT","typeLabel":"RCT","author":"Renú","doi":"10.1001/jama.2026.5164","url":"https://doi.org/10.1001/jama.2026.5164","summary":"藥師重點：成功 血管內取栓 後追加 intra-arterial alteplase 可增加 90 天 excellent functional 結果指標 並降低 residual hypoperfusion，但 alteplase 組死亡率較高需要進一步釐清；臨床解讀不能只看功能終點，也要納入死亡與出血安全性。","pubDate":"2026-06-02","terms":["adjunctive","intra-arterial","alteplase","successful","thrombectomy","acute","ischemic","stroke","choice-2","jama"],"drugTerms":[],"searchText":"adjunctive intra-arterial alteplase after successful thrombectomy for acute ischemic stroke: the choice-2 randomized clinical trial jama rct renú 10.1001/jama.2026.5164 研究背景：大型血管阻塞急性缺血性中風即使成功接受 血管內取栓，功能恢復仍可能不理想；成功再通後追加 intra-arterial alteplase 的效益與風險尚未定論。 研究方法：choice-2 為西班牙 14 個 stroke centers 進行的 隨機、開放標籤、blinded 結果指標 assessment 試驗，納入 血管內取栓 後達 expanded 治療 in cerebral ischemia score 2b50 to 3 的患者。受試者接受 血管內取栓 加上 intra-arterial alteplase 0.225 mg/kg（maximum dose, 20 mg）輸注 15 分鐘，或 血管內取栓 單用；主要終點為 90 天 modified rankin scale 0 或 1。 主要結果：依隨機分配治療者共 433 位；90 天 excellent functional 結果指標 為 alteplase 組 123/214（57.5%）與 血管內取栓 單用 組 93/219（42.5%），校正 風險差 15.0%（95% ci, 5.7% to 24.3%；p=.002）。residual hypoperfusion 為 28.6% vs 50.5%（p<.001）；有症狀 intracranial hemorrhage 為 1.4% vs 0.5%（p=.33），90 天死亡率為 12.1% vs 6.4%（p=.03）。 藥師重點：成功 血管內取栓 後追加 intra-arterial alteplase 可增加 90 天 excellent functional 結果指標 並降低 residual hypoperfusion，但 alteplase 組死亡率較高需要進一步釐清；臨床解讀不能只看功能終點，也要納入死亡與出血安全性。"},{"id":"fda-2026-week19-1","kind":"fda","issueId":"2026-week19","year":2026,"week":19,"weekLabel":"第 19 週","dateRange":"2026/05/04 – 05/10","href":"2026-week19.html","title":"FDA’s Concerns with Unapproved GLP-1 Drugs Used for Weight Loss","journal":"FDA","type":"FDA","typeLabel":"FD nal","glatiramer"],"drugTerms":[],"searchText":"fda alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/403159"},{"id":"fda-2026-week19-4","kind":"fda","issueId":"2026-week19","year":2026,"week":19,"weekLabel":"第 19 週","dateRange":"2026/05/04 – 05/10","href":"2026-week19.html","title":"FDA Accepts First In Silico Drug Development Tool Under ISTAND Program to Help Predict Drug-Induced Liver Injury","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["accepts","first","silico","development","tool","under","istand","program","help","predict"],"drugTerms":[],"searchText":"fda accepts first in silico drug development tool under istand program to help predict drug-induced liver injury fda drug safety 2026-06-03 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver"},{"id":"pmid-42054020","kind":"article","issueId":"2026-week18","year":2026,"week":18,"weekLabel":"第 18 週","dateRange":"2026/04/27 – 05/03","href":"2026-week18.html","title":"The Veterans Affairs' Whole Health Approach for Chronic Pain Management: The wHOPE Randomized Clinical Trial","journal":"JAMA","type":"RCT","typeLabel":"RCT","author":"Seal","doi":"10.1001/jama.2026.5006","url":"https://doi.org/10.1001/jama.2026.5006","summary":"藥師重點：結論顯示 VA Whole 健康 team approach 對慢性疼痛干擾有統計上顯著但幅度小的改善；藥師參與慢性疼痛照護時，可將此視為整合式非藥物照護證據，同時仍需評估疼痛藥物使用、心理健康風險與 suicidal ideation 監測。","pubDate":"2026-05-26","terms":["veterans","affairs","whole","approach","chronic","pain","management","whope","jama","seal"],"drugTerms":[],"searchText":"the veterans affairs' whole health approach for chronic pain management: the whope randomized clinical trial jama rct seal 10.1001/jama.2026.5006 研究背景：va whole 健康 approach 已被要求用於 va 醫療體系慢性疼痛照護，但其相較 cognitive behavioral 治療 與 常規照護 的隨機試驗證據仍不足。 研究方法：whope 隨機臨床試驗 於美國 6 個 va 健康 systems 進行，收錄接受 va 基層照護 的慢性疼痛患者。764 名患者以 11:11:2 分配至 whole 健康 team intervention、慢性疼痛 cognitive behavioral 治療 group sessions 或 常規照護，介入 12 個月；主要終點為 12 個月 brief pain inventory interference（bpi-i）分數。 主要結果：632/764 名（82.7%）完成 12 個月追蹤。whole 健康 組 bpi-i 由 6.6 降至 4.9，優於 cognitive behavioral 治療 組由 6.4 降至 5.5（平均差 -0.58，97% ci -1.11 to -0.05；p=.02），也優於 常規照護 組由 6.4 降至 5.7（平均差 -0.77，99% ci -1.40 to -0.15；p=.002）。cognitive behavioral 治療 相較 常規照護 未達顯著差異（平均差 -0.19，99% ci -0.89 to 0.50；p=.46）。最常見 不良事件 為 suicidal ideation，cbt、whole 健康 與 常規照護 組分別為 15.9%、13.7% 與 13.4%。 藥師重點：結論顯示 va whole 健康 team approach 對慢性疼痛干擾有統計上顯著但幅度小的改善；藥師參與慢性疼痛照護時，可將此視為整合式非藥物照護證據，同時仍需評估疼痛藥物使用、心理健康風險與 suicidal ideation 監測。"},{"id":"pmid-42035777","kind":"article","issueId":"2026-week18","year":2026,"week":18,"weekLabel":"第 18 週","dateRange":"2026/04/27 – 05/03","href":"2026-week18.html","title":"Safety and efficacy of the monoclonal antibody L9LS for malaria prevention in children exposed to perennial malaria transmission in Kenya: a randomised, double-blind, placebo-controlled, phase 2 trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Steinhardt","doi":"10.1016/S0140-6736(26)00258-8","url":"https://doi.org/10.1016/S0140-6736(26)00258-8","summary":"藥師重點：結論顯示 L9LS 在肯亞西部全年高傳播地區幼兒可降低瘧疾感染，6-12 個月追蹤未見明確安全性疑慮；但在 intense perennial P falciparum transmission 情境下，原文也指出可能需要較高劑量才能達到更高保護力，臨床外推時需留意地區流行型態、年齡與劑量差異。","pubDate":"2026-04-25","terms":["efficacy","monoclonal","antibody","l9ls","malaria","prevention","children","exposed","perennial","transmission"],"drugTerms":[],"searchText":"safety and efficacy of the monoclonal antibody l9ls for malaria prevention in children exposed to perennial malaria transmission in kenya: a randomised, double-blind, placebo-controlled, phase 2 trial lancet rct steinhardt 10.1016/s0140-6736(26)00258-8 研究背景：瘧疾仍是全球重要死因之一，撒哈拉以南非洲幼兒負擔尤其高；long-acting monoclonal 抗體 l9ls 在季節性傳播地區已有預防效果資料，但在全年高傳播與較小年齡層的證據仍有限。 研究方法：此雙盲、兩部分、隨機、安慰劑對照 第 2 期 試驗 於肯亞西部 siaya county 進行。part 1a/1b 以年齡遞減與劑量遞增方式評估 5-40 mg/kg 皮下注射 l9ls 的安全性與耐受性；part 2 將 5-59 個月健康兒童分為兩劑 l9ls、一劑 l9ls 或 安慰劑，追蹤 12 個月，以血液抹片偵測 plasmodium falciparum 感染作為主要療效終點。 主要結果：part 1a/1b 共 96 名兒童，part 2 共 324 名兒童。所有研究部分中，等級 3 或以上 治療相關不良事件 發生於 4/384 次 l9ls 注射與 2/338 次 安慰劑 注射，且試驗結束前皆已緩解；無與試驗相關 嚴重不良事件。part 2 中，兩劑 l9ls 組 70/106 名兒童（66%）至少發生一次 p falciparum 感染，安慰劑 組為 91/110 名（83%），protective efficacy 42.7%（95% ci 22.5-57.7；p=0.0003）。 藥師重點：結論顯示 l9ls 在肯亞西部全年高傳播地區幼兒可降低瘧疾感染，6-12 個月追蹤未見明確安全性疑慮；但在 intense perennial p falciparum transmission 情境下，原文也指出可能需要較高劑量才能達到更高保護力，臨床外推時需留意地區流行型態、年齡與劑量差異。"},{"id":"pmid-42041224","kind":"article","issueId":"2026-week18","year":2026,"week":18,"weekLabel":"第 18 週","dateRange":"2026/04/27 – 05/03","href":"2026-week18.html","title":"Pulsed Field Ablation as Initial Therapy for Persistent Atrial Fibrillation","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Wazni","doi":"10.1056/NEJMoa2600929","url":"https://doi.org/10.1056/NEJMoa2600929","summary":"藥師重點：研究結果顯示 PFA 作為 persistent atrial fibrillation 初始治療，可較 antiarrhythmic-drug 治療 降低心房心律不整復發或治療失敗風險；藥師在照護中仍需掌握抗心律不整藥物使用、抗凝治療銜接與術後不良事件監測。","pubDate":"2026-06-25","terms":["pulsed","field","ablation","initial","persistent","atrial","fibrillation","nejm","wazni","nejmoa2600929"],"drugTerms":[],"searchText":"pulsed field ablation as initial therapy for persistent atrial fibrillation nejm rct wazni 10.1056/nejmoa2600929 研究背景：持續性心房顫動目前通常建議先嘗試 antiarrhythmic drugs 再考慮導管燒灼；pulsed field ablation（pfa）是否適合作為初始治療仍不確定。 研究方法：avant guard 為國際隨機試驗，收錄先前未治療的 persistent atrial fibrillation 患者，以 2:1 分配至 pentaspline catheter pfa 或 antiarrhythmic-drug 治療；另有 pfa-assigned group 僅納入主要安全性終點分析。所有患者均植入 insertable cardiac monitor；主要療效終點為 12 個月內短期與長期治療成功，主要安全性終點為 device- and procedure-related 嚴重不良事件。 主要結果：12 個月時，pfa 組 128/207 名達治療成功（kaplan-meier estimate 56%；95% ci 48-63），antiarrhythmic-drug 組為 40/103 名（kaplan-meier estimate 30%；95% ci 21-40）。複合 治療 failure 的 風險比 為 0.46（95% ci 0.33-0.65；p<0.001）。合併 pfa 安全性族群中，13/257 名（5.1%）發生主要安全性終點事件；12 個月 嚴重不良事件 為 pfa 組 25% 與 antiarrhythmic-drug 組 21%。 藥師重點：研究結果顯示 pfa 作為 persistent atrial fibrillation 初始治療，可較 antiarrhythmic-drug 治療 降低心房心律不整復發或治療失敗風險；藥師在照護中仍需掌握抗心律不整藥物使用、抗凝治療銜接與術後不良事件監測。"},{"id":"pmid-42054680","kind":"article","issueId":"2026-week18","year":2026,"week":18,"weekLabel":"第 18 週","dateRange":"2026/04/27 – 05/03","href":"2026-week18.html","title":"Pulmonary Tuberculosis Detection with MiniDock MTB Using Swab Samples","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Yerlikaya","doi":"10.1056/NEJMoa2509761","url":"https://doi.org/10.1056/NEJMoa2509761","summary":"藥師重點：研究結果顯示 MiniDock MTB 在多國臨床場域達到 WHO near-point-of-care tuberculosis diagnostics 的準確性目標，且可用性良好；若未來導入臨床，藥師與感染管制團隊需確認檢體類型、陰性結果解讀、與既有 Xpert MTB/RIF Ultra 或培養流程的銜接。","pubDate":"2026-04-30","terms":["pulmonary","tuberculosis","detection","minidock","swab","samples","nejm","yerlikaya","nejmoa2509761","prospective"],"drugTerms":[],"searchText":"pulmonary tuberculosis detection with minidock mtb using swab samples nejm original article yerlikaya 10.1056/nejmoa2509761 研究背景：結核病仍存在估計病例與通報病例落差，周邊醫療院所需要準確且易用的診斷工具；minidock mtb 用於 pulmonary tuberculosis 偵測的診斷準確性與可用性仍需評估。 研究方法：此 prospective 橫斷面研究 於印度、奈及利亞、菲律賓、南非、烏干達、越南與尚比亞 outpatient centers 進行，收錄 12 歲以上疑似 pulmonary tuberculosis 患者。研究以 sputum swabs 與 tongue swabs 進行 minidock mtb，並以 sputum-culture-based reference 評估診斷準確性，同時與 sputum-smear microscopy 及 xpert mtb/rif ultra assay 比較；可用性以 system usability scale 與直接觀察評估。 主要結果：共收錄 1,380 名受試者，255 名（18.5%）有 hiv infection，226 名（16.4%）為 culture-confirmed tuberculosis。minidock mtb sputum swab sensitivity 為 85.7%（95% ci 80.4-90.0），tongue swab 為 79.6%（95% ci 73.8-84.7），兩者 specificity 均 >97.5%。sputum minidock mtb sensitivity 與 xpert mtb/rif ultra 接近（差異 -2.8 百分點，95% ci -6.0 to 0.5），且高於 smear microscopy；system usability scale 中位數 score 75（iqr 65-80），未通報與 index test 相關 不良事件。 藥師重點：研究結果顯示 minidock mtb 在多國臨床場域達到 who near-point-of-care tuberculosis diagnostics 的準確性目標，且可用性良好；若未來導入臨床，藥師與感染管制團隊需確認檢體類型、陰性結果解讀、與既有 xpert mtb/rif ultra 或培養流程的銜接。"},{"id":"pmid-42035778","kind":"article","issueId":"2026-week18","year":2026,"week":18,"weekLabel":"第 18 週","dateRange":"2026/04/27 – 05/03","href":"2026-week18.html","title":"Pharmacological blood-pressure lowering for the prevention of cardiovascular disease and death across the full spectrum of chronic kidney disease severity: an individual-participant data meta-analysis","journal":"Lancet","type":"MA","typeLabel":"Meta-analysis","author":"Zeng","doi":"10.1016/S0140-6736(26)00367-3","url":"https://doi.org/10.1016/S0140-6736(26)00367-3","summary":"藥師重點：研究結果說明 CKD 患者接受降血壓治療的心血管相對效益大致與非 CKD 族群相近，且跨 CKD 分期與蛋白尿狀態一致；但 CKD 合併 diabetes 者效益可能較小，藥師應協助個別化評估血壓目標、腎功能、電解質與多重用藥風險。","pubDate":"2026-04-25","terms":["pharmacological","blood-pressure","lowering","prevention","cardiovascular","death","across","full","spectrum","chronic"],"drugTerms":[],"searchText":"pharmacological blood-pressure lowering for the prevention of cardiovascular disease and death across the full spectrum of chronic kidney disease severity: an individual-participant data meta-analysis lancet meta-analysis zeng 10.1016/s0140-6736(26)00367-3 研究背景：慢性腎臟病（ckd）患者，特別是較晚期 ckd，常因安全性考量而在降血壓治療 rct 中代表性不足，使心血管風險管理證據有限。 研究方法：本研究為 individual-participant 資料 one-stage 統合分析，納入 血壓 lowering 治療 trialists' collaboration 資料集中符合條件的 rct。符合條件者須有每組至少 1000 person-years 追蹤、基線血壓與 creatinine 資料及 time-to-event 結果指標；主要終點為 主要心血管事件，包括致死或非致死 stroke、ischaemic heart 疾病，或 心衰竭 住院/死亡。 主要結果：52 項 rct 中，共 46 項、285,124 名受試者符合資格；59,185 名（20.7%）基線有 ckd，86,067 名（30.2%）有 type 2 diabetes。中位追蹤 4.4 年，收縮壓 每下降 5 mm hg，可降低 ckd 患者 重大 心血管 疾病 風險（hr 0.91，95% ci 0.87-0.94），無 ckd 者為 hr 0.90（95% ci 0.88-0.93；pinteraction>0.99）。效果在 ckd 各期、proteinuria 狀態與不同血壓分類大致一致；但合併 diabetes 的 ckd 患者效果較弱（hr 0.96，95% ci 0.90-1.02），未合併 diabetes 者為 hr 0.88（95% ci 0.84-0.93；pinteraction=0.044）。 藥師重點：研究結果說明 ckd 患者接受降血壓治療的心血管相對效益大致與非 ckd 族群相近，且跨 ckd 分期與蛋白尿狀態一致；但 ckd 合併 diabetes 者效益可能較小，藥師應協助個別化評估血壓目標、腎功能、電解質與多重用藥風險。"},{"id":"pmid-42054679","kind":"article","issueId":"2026-week18","year":2026,"week":18,"weekLabel":"第 18 週","dateRange":"2026/04/27 – 05/03","href":"2026-week18.html","title":"Mim8 Bispecific Antibody Prophylaxis in Hemophilia A with or without Inhibitors","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Mancuso","doi":"10.1056/NEJMoa2517384","url":"https://doi.org/10.1056/NEJMoa2517384","summary":"藥師重點：結論顯示 Mim8 prophylaxis 在 hemophilia A 伴或不伴 抑制劑 患者，可較 on-demand 治療 及原先 clotting factor concentrate prophylaxis 降低需治療出血事件；用藥評估時需關注給藥頻率、體重分層劑量、注射部位反應，以及與既有凝血因子或 bypassing agents 的實務銜接。","pubDate":"2026-04-30","terms":["mim8","bispecific","antibody","prophylaxis","hemophilia","inhibitors","nejm","mancuso","nejmoa2517384","denecimig"],"drugTerms":["anti-mim8"],"searchText":"mim8 bispecific antibody prophylaxis in hemophilia a with or without inhibitors nejm rct mancuso 10.1056/nejmoa2517384 研究背景：mim8（denecimig）為模擬 activated factor viii 的 bispecific 抗體，設計用於 hemophilia a 伴或不伴 factor viii 抑制劑 患者的出血預防。 研究方法：此 第 3 期 隨機試驗 收錄 12 歲以上 hemophilia a 患者。原本接受 on-demand 治療 者以 1:1:1 分配至持續 on-demand 治療、mim8 once 每週 或 mim8 once monthly；原本於 run-in phase 接受 clotting factor concentrates prophylaxis 者以 1:1 分配至 mim8 once 每週 或 once monthly。主要終點為需以凝血因子產品治療之出血事件年化率。 主要結果：在 pretrial on-demand 治療 世代，mim8 once 每週 與 once monthly 的 estimated 平均值 annualized treated 出血 比率 分別為 0.57（95% ci 0.25-1.30）與 0.20（95% ci 0.06-0.71），對照 on-demand 治療 為 15.76（95% ci 10.70-23.20），relative decrease 分別為 96.4% 與 98.7%（兩者 p<0.001）。在 pretrial prophylaxis 世代，mim8 once 每週 與 once monthly 相較 run-in 期 factor prophylaxis 亦降低 treated 出血 比率（54.0% 與 42.8%；兩者 p=0.006）。injection-site reactions 發生於 103/4005 次注射（2.6%），未通報 thromboembolic event 或 臨床 evidence of neutralizing anti-mim8 抗體。 藥師重點：結論顯示 mim8 prophylaxis 在 hemophilia a 伴或不伴 抑制劑 患者，可較 on-demand 治療 及原先 clotting factor concentrate prophylaxis 降低需治療出血事件；用藥評估時需關注給藥頻率、體重分層劑量、注射部位反應，以及與既有凝血因子或 bypassing agents 的實務銜接。"},{"id":"pmid-42060283","kind":"article","issueId":"2026-week18","year":2026,"week":18,"weekLabel":"第 18 週","dateRange":"2026/04/27 – 05/03","href":"2026-week18.html","title":"Management of Chronic Subdural Hematoma With Adjunctive Embolization of Middle Meningeal Artery: The EMMA-Can Randomized Clinical Trial","journal":"JAMA","type":"RCT","typeLabel":"RCT","author":"Shankar","doi":"10.1001/jama.2026.4910","url":"https://doi.org/10.1001/jama.2026.4910","summary":"藥師重點：研究結果顯示，手術引流後加做 EMMA 可降低單側慢性硬腦膜下血腫 90 天有症狀復發；但死亡率與 嚴重不良事件 數字仍需搭配完整原文與神經外科判斷解讀，藥師可協助釐清抗栓藥物、出血風險與圍手術期用藥管理。","pubDate":"2026-05-26","terms":["management","chronic","subdural","hematoma","adjunctive","embolization","middle","meningeal","artery","emma-can"],"drugTerms":[],"searchText":"management of chronic subdural hematoma with adjunctive embolization of middle meningeal artery: the emma-can randomized clinical trial jama rct shankar 10.1001/jama.2026.4910 研究背景：慢性硬腦膜下血腫在手術引流後仍可能復發，middle meningeal 動脈 adjunctive embolization（emma）是否能降低復發風險仍需隨機試驗證據。 研究方法：emma-can 為加拿大 9 個 tertiary care centers 進行的 隨機、開放標籤、blinded-end point 試驗，收錄接受手術引流的成人單側、有症狀慢性硬腦膜下血腫（≥10 mm）患者。介入組於術後 72 小時內使用 onyx-18 進行 emma，對照組僅接受手術引流；主要終點為 90 天 ct 偵測到的有症狀復發。 主要結果：192 名隨機分配者中，186 名完成試驗，兩組各 93 名，平均年齡 71.8 歲。90 天有症狀復發發生於 emma 組 4 名（4.3%）與對照組 26 名（28%），風險差 -23.7（95% ci -34.1 to -13.9；p<.001）。影像學復發為 14% vs 49.5%；死亡率為 4.3% vs 1.1%，嚴重不良事件 為 8.6% vs 5.4%。 藥師重點：研究結果顯示，手術引流後加做 emma 可降低單側慢性硬腦膜下血腫 90 天有症狀復發；但死亡率與 嚴重不良事件 數字仍需搭配完整原文與神經外科判斷解讀，藥師可協助釐清抗栓藥物、出血風險與圍手術期用藥管理。"},{"id":"pmid-42055584","kind":"article","issueId":"2026-week18","year":2026,"week":18,"weekLabel":"第 18 週","dateRange":"2026/04/27 – 05/03","href":"2026-week18.html","title":"Benzodiazepine or Z-hypnotic use during pregnancy and risk of psychiatric disorders in children: population based c
