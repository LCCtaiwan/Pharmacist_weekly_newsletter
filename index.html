le":2,"fda":4},{"id":"2026-week01","title":"【藥師文獻週報】2026 第01週","year":2026,"week":1,"weekLabel":"第 1 週","dateRange":"2025/12/29 – 01/04","href":"2026-week01.html","total":3,"rct":2,"metaAnalysis":0,"systematicReview":0,"originalArticle":1,"fda":4}],"records":[{"id":"pmid-42341302","kind":"article","issueId":"2026-week26","year":2026,"week":26,"weekLabel":"第 26 週","dateRange":"2026/06/22 – 06/28","href":"2026-week26.html","title":"Ten-Year Outcomes after CAR T-Cell Therapy for B-Cell Lymphomas","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Ruella","doi":"10.1056/NEJMoa2518035","url":"https://doi.org/10.1056/NEJMoa2518035","summary":"藥師重點：藥師照護接受 tisagenlecleucel 的 淋巴瘤 患者時，需兼顧長期緩解可能性與延遲性風險，持續追蹤 cytopenia、B-cell aplasia、感染預防與 second 主要 癌症 監測。","pubDate":"2026-06-25","terms":["ten-year","t-cell","b-cell","lymphomas","nejm","ruella","nejmoa2518035","anti-cd19","relapsed","refractory"],"drugTerms":["anti-cd19","car-transgene"],"searchText":"ten-year outcomes after car t-cell therapy for b-cell lymphomas nejm rct ruella 10.1056/nejmoa2518035 研究背景：anti-cd19 car t-cell 治療 已是 relapsed 或 refractory b-cell non-hodgkin 淋巴瘤 的標準治療之一，但十年以上緩解與可能治癒比例仍不明確。此研究追蹤早期接受 ctl019，也就是 tisagenlecleucel 的患者長期結果。 研究方法：研究評估 38 名 relapsed 或 refractory b-cell non-hodgkin 淋巴瘤 患者，包括 24 名 大型 b 細胞淋巴瘤 與 14 名 follicular 淋巴瘤，皆接受 cd19-directed、4-1bb-costimulated autologous car t cells。主要長期指標包含 無 淋巴瘤 存活期、無惡化存活期、整體存活期、non-relapse-related 死亡 與 second 主要 癌症。 主要結果：中位追蹤 10.1 年後，5.4 年後未再觀察到復發；10 年 無 淋巴瘤 存活期 在 大型 b 細胞淋巴瘤 為 32%，follicular 淋巴瘤 為 47%。second 主要 癌症 發生於 9 名患者，10 年累積發生率 21%；non-relapse-related 死亡率 為 18%，長期反應者中 44% 仍有 b-cell aplasia。 藥師重點：藥師照護接受 tisagenlecleucel 的 淋巴瘤 患者時，需兼顧長期緩解可能性與延遲性風險，持續追蹤 cytopenia、b-cell aplasia、感染預防與 second 主要 癌症 監測。"},{"id":"pmid-42340733","kind":"article","issueId":"2026-week26","year":2026,"week":26,"weekLabel":"第 26 週","dateRange":"2026/06/22 – 06/28","href":"2026-week26.html","title":"Self-Directed vs Clinician-Delivered Cognitive Behavioral Therapy for Chronic Pain: A Randomized Clinical Trial","journal":"JAMA","type":"OA","typeLabel":"Original Article","author":"Heapy","doi":"10.1001/jama.2026.7861","url":"https://doi.org/10.1001/jama.2026.7861","summary":"藥師重點：藥師照護慢性疼痛患者時，可將 self-directed CBT-CP 視為減少藥物依賴、擴大非藥物治療可近性的選項；尤其在 opioid 風險、鎮痛藥副作用或照護資源有限時，可主動轉介或納入衛教討論。","pubDate":"2026-06-24","terms":["self-directed","clinician-delivered","cognitive","behavioral","chronic","pain","jama","heapy","cbt-cp","usual-practice"],"drugTerms":[],"searchText":"self-directed vs clinician-delivered cognitive behavioral therapy for chronic pain: a randomized clinical trial jama original article heapy 10.1001/jama.2026.7861 研究背景：cognitive behavioral 治療 for chronic pain 是慢性疼痛的一線非藥物治療，但臨床取得率受人力、時間與可近性限制。此研究比較 self-directed cbt-cp 加上非同步個別回饋，是否優於 usual-practice clinician-delivered cbt-cp。 研究方法：這是一項 vha 9 個系統的 隨機、開放標籤 實務型 優越性試驗，納入 764 名 chronic musculoskeletal pain 患者。受試者 1:1 分派至 11 週 self-directed cbt-cp，含每週個別化 audio feedback，或 clinician-delivered cbt-cp 4-11 次；主要終點為 4 個月 brief pain inventory-interference score。 主要結果：4 個月時 self-directed cbt-cp 的 pain interference 較 clinician-delivered cbt-cp 低，平均 5.26 vs 6.23，平均差 -0.98，95% ci -1.31 至 -0.65，p<0.001，且 6 與 12 個月仍維持優勢。self-directed 組在其他 4 個月次要結果也較佳，且完成較多預期治療 session。 藥師重點：藥師照護慢性疼痛患者時，可將 self-directed cbt-cp 視為減少藥物依賴、擴大非藥物治療可近性的選項；尤其在 opioid 風險、鎮痛藥副作用或照護資源有限時，可主動轉介或納入衛教討論。"},{"id":"pmid-42341796","kind":"article","issueId":"2026-week26","year":2026,"week":26,"weekLabel":"第 26 週","dateRange":"2026/06/22 – 06/28","href":"2026-week26.html","title":"Safety, pharmacokinetics, and exploratory efficacy of the oral ghrelin receptor agonist AC01 in heart failure with reduced ejection fraction (GOAL-HF1): a randomised, double-blind, placebo-controlled, phase 1b/2a study","journal":"Lancet","type":"OA","typeLabel":"Original Article","author":"Lund","doi":"10.1016/S0140-6736(26)00904-9","url":"https://doi.org/10.1016/S0140-6736(26)00904-9","summary":"藥師重點：藥師應將 AC01 視為仍待大型研究驗證的早期 HFrEF 候選藥物，若進入臨床試驗或未來使用情境，需特別監測血壓、心律、血糖、troponin、NT-proBNP 與 ICD 相關安全訊號。","pubDate":"2026-06-24","terms":["pharmacokinetics","exploratory","efficacy","oral","ghrelin","receptor","agonist","ac01","heart","failure"],"drugTerms":[],"searchText":"safety, pharmacokinetics, and exploratory efficacy of the oral ghrelin receptor agonist ac01 in heart failure with reduced ejection fraction (goal-hf1): a randomised, double-blind, placebo-controlled, phase 1b/2a study lancet original article lund 10.1016/s0140-6736(26)00904-9 研究背景：射出分率降低型心衰竭 的核心問題之一是心肌收縮力下降，但既有 inotropes 常伴隨安全性疑慮。ac01 是口服 calcium-sensitising inotrope 與 ghrelin 受體 致效劑，本研究探索其在 hfref 的安全性、藥動學與初步療效。 研究方法：goal-hf1 為 第 1b/2a 期、隨機、雙盲、安慰劑對照 研究，納入 18-80 歲、心衰竭至少 6 個月且 ejection fraction ≤40% 的患者，且皆有 transvenous implantable cardioverter defibrillator。第 1b 期 使用 0.1、0.3、1.0、3.0 mg ac01 逐步劑量 7 天；第 2a 期 則比較 1.0 mg、3.0 mg ac01 與 安慰劑 28 天，主要終點為 safety 與 tolerability。 主要結果：共 58 名患者隨機分派，ac01 相關 不良事件 在 第 1b 期 有 12 件、第 2a 期 有 18 件，未見 ac01 相關 嚴重不良事件。治療期間出現的不良事件 在 ac01 組為 80%，安慰劑 組為 71%；常見事件包括 hypotension、non-sustained ventricular tachycardia、dyspnoea、hyperglycaemia、dizziness 或 vertigo、headache，但 ecg 未見明顯 tachycardia、新發 tachyarrhythmias、myocardial ischaemia 或 conduction abnormalities。 藥師重點：藥師應將 ac01 視為仍待大型研究驗證的早期 hfref 候選藥物，若進入臨床試驗或未來使用情境，需特別監測血壓、心律、血糖、troponin、nt-probnp 與 icd 相關安全訊號。"},{"id":"pmid-42335922","kind":"article","issueId":"2026-week26","year":2026,"week":26,"weekLabel":"第 26 週","dateRange":"2026/06/22 – 06/28","href":"2026-week26.html","title":"Non-invasive removal of the Smart tracheal occlusion device for fetal congenital diaphragmatic hernia: a single-arm, open-label, phase 1 study","journal":"Lancet","type":"OA","typeLabel":"Original Article","author":"Russo","doi":"10.1016/S0140-6736(26)00664-1","url":"https://doi.org/10.1016/S0140-6736(26)00664-1","summary":"藥師重點：藥師在高風險胎兒治療團隊中應認識 Smart-TO 仍屬早期裝置證據，需協助圍產期用藥與鎮靜/影像流程安全檢核，並提醒臨床結局仍受 CDH 肺發育不全嚴重度影響。","pubDate":"2026-06-23","terms":["non-invasive","removal","smart","tracheal","occlusion","device","fetal","congenital","diaphragmatic","hernia"],"drugTerms":[],"searchText":"non-invasive removal of the smart tracheal occlusion device for fetal congenital diaphragmatic hernia: a single-arm, open-label, phase 1 study lancet original article russo 10.1016/s0140-6736(26)00664-1 研究背景：fetoscopic endoluminal tracheal 阻塞 用於 congenital diaphragmatic hernia 時，傳統上需第二次介入以恢復胎兒氣道通暢。smart-to 是可在接近強磁場時自動洩氣的新型 tracheal 阻塞 device，目標是避免第二次子宮內處置。 研究方法：研究為 paris 與 leuven 兩個平行 單中心、單臂、開放標籤 首次人體試驗，納入成年孕婦、單胎 cdh 且具中重度肺發育不全等條件。smart-to balloon 於妊娠 27+0 至 31+6 週置入，預定 34+0 至 34+6 週以 mri 磁場誘發洩氣，主要終點為 balloon deflation，並評估安全性。 主要結果：48 名患者納入，47 名接受 feto，46 名成功置入 smart-to；除 1 例自發洩氣與 1 例不明原因 intrauterine fetal 死亡 外，其餘均嘗試 mri 誘發洩氣。洩氣率為 100%，95% ci 92-100；出生時所有嬰兒的空 balloon 均不在氣道內，14 名 neonatal deaths 均歸因於 pulmonary hypoplasia，無 嚴重不良事件 被認為與 smart-to 相關。 藥師重點：藥師在高風險胎兒治療團隊中應認識 smart-to 仍屬早期裝置證據，需協助圍產期用藥與鎮靜/影像流程安全檢核，並提醒臨床結局仍受 cdh 肺發育不全嚴重度影響。"},{"id":"pmid-42341797","kind":"article","issueId":"2026-week26","year":2026,"week":26,"weekLabel":"第 26 週","dateRange":"2026/06/22 – 06/28","href":"2026-week26.html","title":"Efficacy and safety of tirofiban after successful endovascular reperfusion in acute ischaemic stroke (ATTRACTION) in China: a multicentre, double-blind, randomised controlled trial","journal":"Lancet","type":"OA","typeLabel":"Original Article","author":"Huang","doi":"10.1016/S0140-6736(26)00983-9","url":"https://doi.org/10.1016/S0140-6736(26)00983-9","summary":"藥師重點：藥師評估 血管內取栓 後 tirofiban 時，應同時呈現功能獨立獲益與 顱內出血 數值較高的訊號，協助團隊依出血風險、影像與併用抗栓藥物審慎選用。","pubDate":"2026-06-24","terms":["efficacy","tirofiban","successful","endovascular","reperfusion","acute","ischaemic","stroke","attraction","china"],"drugTerms":[],"searchText":"efficacy and safety of tirofiban after successful endovascular reperfusion in acute ischaemic stroke (attraction) in china: a multicentre, double-blind, randomised controlled trial lancet original article huang 10.1016/s0140-6736(26)00983-9 研究背景：急性 ischaemic stroke 接受 血管內取栓 且成功 再灌流 後，仍不一定能達到功能獨立。tirofiban 是 glycoprotein iib/iiia 受體 拮抗劑，此研究評估其作為成功再灌流後輔助治療的療效與出血安全性。 研究方法：attraction 是中國 82 家醫院的 多中心、雙盲、隨機對照試驗，納入 anterior-circulation large-vessel 阻塞 且 血管內取栓 後成功 再灌流 的 急性 ischaemic stroke 患者。受試者 1:1 接受 tirofiban intra-arterial bolus 5 μg/kg 後 intravenous infusion 0.1 μg/kg/min 24 小時或 安慰劑；主要療效終點為 90 天 modified rankin scale 0-2 的 功能獨立。 主要結果：1380 名患者隨機分派，90 天 功能獨立 在 tirofiban 組為 49%，安慰劑 組為 43%，未校正 absolute 風險差 6.1 百分點，95% ci 0.8-11.3，校正 風險比 1.15，95% ci 1.03-1.27，p=0.0092。有症狀 顱內出血 48 小時內在 tirofiban 組為 12%，安慰劑 組為 9%，差異未達顯著；90 天死亡率分別為 18% 與 19%。 藥師重點：藥師評估 血管內取栓 後 tirofiban 時，應同時呈現功能獨立獲益與 顱內出血 數值較高的訊號，協助團隊依出血風險、影像與併用抗栓藥物審慎選用。"},{"id":"pmid-42335920","kind":"article","issueId":"2026-week26","year":2026,"week":26,"weekLabel":"第 26 週","dateRange":"2026/06/22 – 06/28","href":"2026-week26.html","title":"Combined bladder-kidney transplantation: first-in-human feasibility trial","journal":"Lancet","type":"OA","typeLabel":"Original Article","author":"Nassiri","doi":"10.1016/S0140-6736(26)00718-X","url":"https://doi.org/10.1016/S0140-6736(26)00718-X","summary":"藥師重點：藥師若參與 bladder-kidney transplantation 照護，需把此證據定位為極早期 feasibility 資料，重點在 tacrolimus、mycophenolate mofetil、prednisone 的免疫抑制監測、感染預防、腎功能與 rejection surveillance。","pubDate":"2026-06-23","terms":["combined","bladder-kidney","transplantation","first-in-human","feasibility","lancet","nassiri","s0140-6736","terminal","bladder"],"drugTerms":[],"searchText":"combined bladder-kidney transplantation: first-in-human feasibility trial lancet original article nassiri 10.1016/s0140-6736(26)00718-x 研究背景：terminal bladder 功能障礙 的腸道重建手術併發症負擔高，尤其對需免疫抑制的患者更具挑戰。vascularised 複合 bladder allograft transplantation 被提出作為重建替代方案。 研究方法：這是一項 進行中 第 0 期 feasibility 試驗，評估 deceased-donor bladder 或 combined bladder-kidney transplantation。本文報告首例 combined bladder-kidney transplantation，主要終點為技術可行性、恢復尿路連續性與 graft perfusion，以及以 不良事件 評估病人安全性。 主要結果：首例患者為 41 歲 anephric 男性，因高血壓導致 end-stage kidney 疾病 且 terminal bladder，接受 abo compatible 供者 kidney 與 bladder transplant；8 小時手術成功且無術中併發症。術後第 25 天發生 suprapubic tube tract urine leak 與 wound breakdown，經手術處理後恢復；6 個月後 egfr 維持 52-55 ml/min/1.73 m2，膀胱容量 600 ml，continence 與 spontaneous voiding 良好，serial bladder biopsies 未見 rejection。 藥師重點：藥師若參與 bladder-kidney transplantation 照護，需把此證據定位為極早期 feasibility 資料，重點在 tacrolimus、mycophenolate mofetil、prednisone 的免疫抑制監測、感染預防、腎功能與 rejection surveillance。"},{"id":"pmid-42342272","kind":"article","issueId":"2026-week26","year":2026,"week":26,"weekLabel":"第 26 週","dateRange":"2026/06/22 – 06/28","href":"2026-week26.html","title":"Assessing early effects of Australia's Social Media Minimum Age Act on adolescents' social media use: observational study","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"Barnes","doi":"10.1136/bmj-2026-363695","url":"https://doi.org/10.1136/bmj-2026-363695","summary":"藥師重點：此文與藥物治療關聯較低，但可提醒藥師在青少年心理健康、睡眠、疼痛或注意力問題衛教時，不應假設年齡限制已有效降低社群媒體暴露，仍需主動詢問使用型態與潛在風險。","pubDate":"2026-06-24","terms":["assessing","early","australia","social","media","minimum","adolescents","observational","barnes","bmj-2026-363695"],"drugTerms":[],"searchText":"assessing early effects of australia's social media minimum age act on adolescents' social media use: observational study bmj original article barnes 10.1136/bmj-2026-363695 研究背景：australia social media minimum age act 2024 設定 16 歲以下不得持有指定社群平台帳號，目的在降低線上傷害。此研究評估政策實施後早期對青少年社群媒體使用的影響。 研究方法：這是一項澳洲社區 observational 研究，納入 12 至未滿 17 歲青少年，於政策實施前與約 3 個月後收集資料。主要結果為過去 7 天是否每日使用社群媒體與每日使用時間，並使用 sharp regression discontinuity design 評估 16 歲門檻附近的差異。 主要結果：追蹤資料來自 408/436 名青少年；16 歲以下超過 85% 仍回報使用受法案規範的平台，且多數仍使用自己的帳號。年齡驗證、假帳號與私人瀏覽器規避情形均被回報。主要結果在 16 歲門檻未見足夠證據支持明顯 discontinuity，p 值皆 ≥0.60。 藥師重點：此文與藥物治療關聯較低，但可提醒藥師在青少年心理健康、睡眠、疼痛或注意力問題衛教時，不應假設年齡限制已有效降低社群媒體暴露，仍需主動詢問使用型態與潛在風險。"},{"id":"pmid-42341301","kind":"article","issueId":"2026-week26","year":2026,"week":26,"weekLabel":"第 26 週","dateRange":"2026/06/22 – 06/28","href":"2026-week26.html","title":"A Pragmatic Trial of a 6-Month Strategy for Rifampicin-Resistant Tuberculosis","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Conradie","doi":"10.1056/NEJMoa2503687","url":"https://doi.org/10.1056/NEJMoa2503687","summary":"藥師重點：藥師參與 rifampicin 抗藥性 tuberculosis 治療時，可將 6 個月 bedaquiline/linezolid/delamanid 為核心的策略視為可行選項，但必須依 drug susceptibility testing 調整並嚴密監測 linezolid 毒性、QT 風險與嚴重不良事件。","pubDate":"2026-06-25","terms":["pragmatic","month","strategy","rifampicin-resistant","tuberculosis","nejm","conradie","nejmoa2503687","rifampicin","bedaquiline"],"drugTerms":["bedaquiline","linezolid","delamanid","levofloxacin","clofazimine","rifampicin"],"searchText":"a pragmatic trial of a 6-month strategy for rifampicin-resistant tuberculosis nejm rct conradie 10.1056/nejmoa2503687 研究背景：rifampicin 抗藥性 tuberculosis 需要更安全、有效且較短的治療策略。此研究評估包含 bedaquiline、linezolid、delamanid 及 levofloxacin 或 clofazimine 的 6 個月策略是否不劣於南非當時 9 個月 standard-of-care 處方。 研究方法：這是一項 south africa 的 第 3 期、開放標籤、實務型、隨機、controlled 不劣性 試驗，納入 6 歲以上 pulmonary rifampicin 抗藥性 tuberculosis 患者，並包含孕婦、哺乳者與部分特殊族群，但排除或依藥敏調整 fluoroquinolone-resistant tuberculosis。主要療效終點為治療結束與隨機後 76 週的 cure 或 治療 completion，非劣性界值為 10 個百分點；主要安全終點為 等級 3 以上不良事件。 主要結果：403 名受試者隨機分派，成功結果在 6 個月策略組為 86.1%，控制組為 86.0%，校正 風險差 -0.2 百分點，95% ci -6.9 至 6.5，p=0.001 for 不劣性。治療期間 等級 3 以上 不良事件 分別為 31.2% 與 37.0%，兩組各有 10 名死亡。 藥師重點：藥師參與 rifampicin 抗藥性 tuberculosis 治療時，可將 6 個月 bedaquiline/linezolid/delamanid 為核心的策略視為可行選項，但必須依 drug susceptibility testing 調整並嚴密監測 linezolid 毒性、qt 風險與嚴重不良事件。"},{"id":"fda-2026-week26-1","kind":"fda","issueId":"2026-week26","year":2026,"week":26,"weekLabel":"第 26 週","dateRange":"2026/06/22 – 06/28","href":"2026-week26.html","title":"FDA’s Concerns with Unapproved GLP-1 Drugs Used for Weight Loss","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss","summary":"FDA 提醒未經核准的 GLP-1 減重產品可能涉及成分、品質、劑量與安全性風險。藥師應確認病人取得的是 FDA 核准產品，避免使用來源不明或複方調製的 semaglutide/tirzepatide 類產品，並加強低血糖、胃腸道不良反應與劑量錯誤衛教。","terms":["concerns","unapproved","glp-1","drugs","used","weight","loss","semaglutide","tirzepatide","https"],"drugTerms":["glp-1","semaglutide","tirzepatide"],"searchText":"fda’s concerns with unapproved glp-1 drugs used for weight loss fda drug safety 2026-06-15 fda 提醒未經核准的 glp-1 減重產品可能涉及成分、品質、劑量與安全性風險。藥師應確認病人取得的是 fda 核准產品，避免使用來源不明或複方調製的 semaglutide/tirzepatide 類產品，並加強低血糖、胃腸道不良反應與劑量錯誤衛教。 https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"},{"id":"fda-2026-week26-3","kind":"fda","issueId":"2026-week26","year":2026,"week":26,"weekLabel":"第 26 週","dateRange":"2026/06/22 – 06/28","href":"2026-week26.html","title":"FDA issues final decision to withdraw approval of Pepaxto (melphalan flufenamide)","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/398713","summary":"FDA 已作成撤回 Pepaxto (melphalan flufenamide) 核准的最終決定。藥師應確認院內與病人用藥清單是否仍有相關品項，避免新開立或續用，並協助腫瘤團隊轉換替代治療。","terms":["issues","final","decision","withdraw","approval","pepaxto","melphalan","flufenamide","https","node"],"drugTerms":[],"searchText":"fda issues final decision to withdraw approval of pepaxto (melphalan flufenamide) fda drug safety  fda 已作成撤回 pepaxto (melphalan flufenamide) 核准的最終決定。藥師應確認院內與病人用藥清單是否仍有相關品項，避免新開立或續用，並協助腫瘤團隊轉換替代治療。 https://www.fda.gov/node/398713"},{"id":"fda-2026-week26-2","kind":"fda","issueId":"2026-week26","year":2026,"week":26,"weekLabel":"第 26 週","dateRange":"2026/06/22 – 06/28","href":"2026-week26.html","title":"FDA alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/403159","summary":"FDA 提醒 glatiramer acetate injection 的選配 autoinjector device 可能有交叉相容性問題。藥師調劑或衛教時應確認藥品廠牌、注射器與 autoinjector 是否相容，避免病人沿用不適配裝置造成注射失敗或劑量問題。","terms":["alerts","caregivers","providers","cross-compatibility","issues","autoinjector","devices","that","optional","glatiramer"],"drugTerms":[],"searchText":"fda alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection fda drug safety  fda 提醒 glatiramer acetate injection 的選配 autoinjector device 可能有交叉相容性問題。藥師調劑或衛教時應確認藥品廠牌、注射器與 autoinjector 是否相容，避免病人沿用不適配裝置造成注射失敗或劑量問題。 https://www.fda.gov/node/403159"},{"id":"fda-2026-week26-4","kind":"fda","issueId":"2026-week26","year":2026,"week":26,"weekLabel":"第 26 週","dateRange":"2026/06/22 – 06/28","href":"2026-week26.html","title":"FDA Accepts First In Silico Drug Development Tool Under ISTAND Program to Help Predict Drug-Induced Liver Injury","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver","summary":"FDA 接受第一個 ISTAND program 下的 in silico drug development tool，用於協助預測 drug-induced liver injury。此為藥物研發與安全評估工具訊息，藥師可關注 DILI 風險預測方法進展，但臨床用藥仍需依仿單、肝功能監測與病人風險因子判讀。","terms":["accepts","first","silico","development","tool","under","istand","program","help","predict"],"drugTerms":[],"searchText":"fda accepts first in silico drug development tool under istand program to help predict drug-induced liver injury fda drug safety 2026-06-03 fda 接受第一個 istand program 下的 in silico drug development tool，用於協助預測 drug-induced liver injury。此為藥物研發與安全評估工具訊息，藥師可關注 dili 風險預測方法進展，但臨床用藥仍需依仿單、肝功能監測與病人風險因子判讀。 https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver"},{"id":"pmid-42294841","kind":"article","issueId":"2026-week25","year":2026,"week":25,"weekLabel":"第 25 週","dateRange":"2026/06/15 – 06/21","href":"2026-week25.html","title":"Talquetamab-Daratumumab in Relapsed or Refractory Myeloma","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Mina","doi":"10.1056/NEJMoa2604657","url":"https://doi.org/10.1056/NEJMoa2604657","summary":"藥師重點：Tal-DP 與 Tal-D 均較 DPd 延長無惡化存活期；藥師需重點監測感染、血球低下、免疫治療相關反應，以及 talquetamab 相關皮膚、味覺或黏膜毒性。","pubDate":"2026-06-13","terms":["talquetamab-daratumumab","relapsed","refractory","myeloma","nejm","mina","nejmoa2604657","talquetamab","gprc5d","bispecific"],"drugTerms":["talquetamab-daratumumab","talquetamab","daratumumab"],"searchText":"talquetamab-daratumumab in relapsed or refractory myeloma nejm original article mina 10.1056/nejmoa2604657 研究背景：talquetamab 為同時標靶 gprc5d 與 cd3 的 bispecific 抗體，在重度治療過的復發或難治多發性骨髓瘤已有持久反應訊號；本研究評估其合併 daratumumab 相關療法的效果。 研究方法：此第 3 期試驗將曾接受至少一線治療的復發或難治多發性骨髓瘤患者，隨機分配至 talquetamab+daratumumab+pomalidomide（tal-dp）、talquetamab+daratumumab（tal-d）或 daratumumab+pomalidomide+dexamethasone（dpd）。主要終點為獨立委員會評估的無惡化存活期。 主要結果：tal-dp、tal-d 與 dpd 組分別納入 287、287、290 人；中位追蹤 24.6 個月時，24 個月無惡化存活率為 81.3%、77.6% vs 51.2%。相較 dpd，tal-dp 的疾病惡化或死亡 hr 為 0.28（95% ci 0.20-0.40），tal-d 為 0.33（95% ci 0.24-0.46），皆 p<0.001。嚴重不良事件為 63.0%、52.6% 與 53.7%，致死性不良事件為 1.8%、4.0% 與 4.6%。 藥師重點：tal-dp 與 tal-d 均較 dpd 延長無惡化存活期；藥師需重點監測感染、血球低下、免疫治療相關反應，以及 talquetamab 相關皮膚、味覺或黏膜毒性。"},{"id":"pmid-42315290","kind":"article","issueId":"2026-week25","year":2026,"week":25,"weekLabel":"第 25 週","dateRange":"2026/06/15 – 06/21","href":"2026-week25.html","title":"Stereotactic radiotherapy for neovascular age related macular degeneration: year 3 and 4 extended follow up results of a randomised, double masked, sham controlled, device trial (STAR)","journal":"BMJ","type":"RCT","typeLabel":"RCT","author":"Jackson","doi":"10.1136/bmj-2026-729694","url":"https://doi.org/10.1136/bmj-2026-729694","summary":"藥師重點：雖然 SRT 可維持部分減少 anti-VEGF 注射的效果，但第 4 年視力較差且微血管異常較多，結果已不支持將 SRT 用於 neovascular AMD；藥師進行病人衛教時仍應以 anti-VEGF 追蹤與眼科評估為核心。","pubDate":"2026-06-18","terms":["stereotactic","radiotherapy","neovascular","related","macular","degeneration","year","extended","randomised","double"],"drugTerms":["anti-vegf"],"searchText":"stereotactic radiotherapy for neovascular age related macular degeneration: year 3 and 4 extended follow up results of a randomised, double masked, sham controlled, device trial (star) bmj rct jackson 10.1136/bmj-2026-729694 研究背景：濕性年齡相關性黃斑部病變（neovascular amd）常需長期 anti-vegf 玻璃體內注射；star 試驗評估 立體定位放射治療（srt）在 2 年主要分析後的第 3、4 年效果。 研究方法：此英國 30 家 nhs 醫院進行的隨機、雙遮蔽、假治療對照裝置試驗，納入 411 名至少 50 歲、慢性且已治療但仍活躍的 amd 患者。受試者接受一次性 16 gray srt 或假 srt；第 4 年主要療效結果為 anti-vegf 注射次數，另一主要結果為視力變化，並評估不良事件、嚴重不良事件與微血管異常。 主要結果：srt 組 274 人、假治療組 137 人。第 4 年意向治療分析中，srt 組 4 年平均注射 19.1 次，假治療組 21.6 次，校正後減少 3.2 次（95% ci -5.7 to -0.7）；但 srt 組最終視力較假治療組差 8.3 個字母（95% ci -12.7 to -4.0）。不良事件率相近，但 reading centre 偵測到的微血管異常為 58% vs 16%。 藥師重點：雖然 srt 可維持部分減少 anti-vegf 注射的效果，但第 4 年視力較差且微血管異常較多，結果已不支持將 srt 用於 neovascular amd；藥師進行病人衛教時仍應以 anti-vegf 追蹤與眼科評估為核心。"},{"id":"pmid-42309116","kind":"article","issueId":"2026-week25","year":2026,"week":25,"weekLabel":"第 25 週","dateRange":"2026/06/15 – 06/21","href":"2026-week25.html","title":"Patellar resurfacing in total knee replacement: 20-year clinical and economic results of a large multicentre, randomised controlled trial in the UK","journal":"Lancet","type":"OA","typeLabel":"Original Article","author":"Murray","doi":"10.1016/S0140-6736(26)00652-5","url":"https://doi.org/10.1016/S0140-6736(26)00652-5","summary":"藥師重點：結果顯示主要臨床結果未達顯著差異，但 QALYs 與成本效益傾向支持髕骨表面置換；此議題主要屬骨科決策，藥師可協助術後止痛、抗凝與感染預防用藥管理。","pubDate":"2026-06-17","terms":["patellar","resurfacing","total","knee","replacement","year","economic","large","multicentre","randomised"],"drugTerms":[],"searchText":"patellar resurfacing in total knee replacement: 20-year clinical and economic results of a large multicentre, randomised controlled trial in the uk lancet original article murray 10.1016/s0140-6736(26)00652-5 研究背景：全膝關節置換時是否進行髕骨表面置換仍有爭議，既有隨機試驗常樣本不足且追蹤不超過 10 年；本研究提供 20 年臨床與經濟結果。 研究方法：此英國實務型、多中心、開放標籤隨機試驗於 1999 年開始，將預計接受 初次全膝關節置換術 的成人分配至進行或不進行髕骨表面置換，追蹤 20 年。主要結果為 oxford knee score（oks），次要結果包括 sf-12、eq-5d-3l、成本、成本效益與後續膝關節手術。 主要結果：1715 人隨機分組，861 人接受髕骨表面置換、854 人未接受。20 年追蹤期間 oks 邊際差為 0.76（95% ci -0.08 to 1.59；p=0.076），未達統計顯著；置換組 qalys 較高（7.295 vs 6.884；差異 0.380，95% ci 0.061-0.700；p=0.020），20 年整體醫療成本相近。 藥師重點：結果顯示主要臨床結果未達顯著差異，但 qalys 與成本效益傾向支持髕骨表面置換；此議題主要屬骨科決策，藥師可協助術後止痛、抗凝與感染預防用藥管理。"},{"id":"pmid-42289183","kind":"article","issueId":"2026-week25","year":2026,"week":25,"weekLabel":"第 25 週","dateRange":"2026/06/15 – 06/21","href":"2026-week25.html","title":"Mezigdomide, carfilzomib, and dexamethasone versus carfilzomib and dexamethasone in patients with relapsed or refractory multiple myeloma (SUCCESSOR-2): a phase 3, open-label, randomised controlled trial","journal":"Lancet","type":"OA","typeLabel":"Original Article","author":"Dimopoulos","doi":"10.1016/S0140-6736(26)01088-3","url":"https://doi.org/10.1016/S0140-6736(26)01088-3","summary":"藥師重點：mezigdomide 合併 carfilzomib/dexamethasone 可明顯延長無惡化存活期，但高等級不良事件與感染較多；藥師需強化血球、感染、腎功能、心血管風險與類固醇相關副作用監測。","pubDate":"2026-06-14","terms":["mezigdomide","carfilzomib","dexamethasone","relapsed","refractory","multiple","myeloma","successor-2","phase","open-label"],"drugTerms":["anti-cd38"],"searchText":"mezigdomide, carfilzomib, and dexamethasone versus carfilzomib and dexamethasone in patients with relapsed or refractory multiple myeloma (successor-2): a phase 3, open-label, randomised controlled trial lancet original article dimopoulos 10.1016/s0140-6736(26)01088-3 研究背景：多發性骨髓瘤患者在第一次復發時常已暴露於 anti-cd38 抗體 與 lenalidomide，後續選擇受限；successor-2 評估 mezigdomide 合併 carfilzomib/dexamethasone 的療效與安全性。 研究方法：此第 3 期、開放標籤、隨機對照試驗於 26 國 160 個醫院據點進行，納入可測量且曾接受至少一線治療、最近治療期間或之後疾病惡化的成人多發性骨髓瘤患者。主要終點為 mezigdomide 1.0 mg 加 carfilzomib/dexamethasone 相較 carfilzomib/dexamethasone 的無惡化存活期。 主要結果：479 人納入分析，其中 288 人接受 mezigdomide-carfilzomib-dexamethasone，191 人接受 carfilzomib-dexamethasone。中位追蹤 10.6 個月時，無惡化存活期為 18.0 vs 8.3 個月（hr 0.48，95% ci 0.36-0.63；p<0.0001）。等級 3 或 4 不良事件為 84% vs 56%，包含 neutropenia 61% vs 9% 與感染 34% vs 16%；治療相關 等級 5 不良事件為 3% vs 1%。 藥師重點：mezigdomide 合併 carfilzomib/dexamethasone 可明顯延長無惡化存活期，但高等級不良事件與感染較多；藥師需強化血球、感染、腎功能、心血管風險與類固醇相關副作用監測。"},{"id":"pmid-42294842","kind":"article","issueId":"2026-week25","year":2026,"week":25,"weekLabel":"第 25 週","dateRange":"2026/06/15 – 06/21","href":"2026-week25.html","title":"Lonvoguran Ziclumeran - In Vivo CRISPR Gene Editing in Hereditary Angioedema","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Cohn","doi":"10.1056/NEJMoa2600931","url":"https://doi.org/10.1056/NEJMoa2600931","summary":"藥師重點：lonvo-z 單次輸注可大幅降低遺傳性血管性水腫發作率，但仍屬新型 gene-editing 治療；藥師需留意輸注反應、長期安全性、發作紀錄與是否符合 C1 抑制劑 deficiency 族群。","pubDate":"2026-06-13","terms":["lonvoguran","ziclumeran","vivo","crispr","gene","editing","hereditary","angioedema","nejm","cohn"],"drugTerms":[],"searchText":"lonvoguran ziclumeran - in vivo crispr gene editing in hereditary angioedema nejm original article cohn 10.1056/nejmoa2600931 研究背景：遺傳性血管性水腫為罕見且可能危及生命的遺傳疾病，會反覆發生使人失能的腫脹發作；lonvoguran ziclumeran（lonvo-z）為單次給藥的體內 crispr gene-editing 治療候選藥物。 研究方法：此第 3 期雙盲試驗將 16 歲以上、c1 抑制劑 deficiency 的遺傳性血管性水腫患者，以 2:1 隨機分配接受單次靜脈 lonvo-z 50 mg 或 安慰劑。主要終點為輸注後第 5 至 28 週經研究者確認的每月血管性水腫發作率。 主要結果：共 80 人隨機分組，lonvo-z 組 52 人、安慰劑 組 28 人；中位追蹤 7.5 個月。第 5 至 28 週每月發作率 least-squares 平均值 為 0.26 vs 2.10，相對差異 -87%（95% ci -93 to -78；p<0.001）。輸注期間或之後不良事件為 92% vs 86%；lonvo-z 組較常見者包括輸注相關反應、頭痛、疲倦、背痛與上呼吸道感染，未通報嚴重或 等級 3 以上不良事件。 藥師重點：lonvo-z 單次輸注可大幅降低遺傳性血管性水腫發作率，但仍屬新型 gene-editing 治療；藥師需留意輸注反應、長期安全性、發作紀錄與是否符合 c1 抑制劑 deficiency 族群。"},{"id":"pmid-42309117","kind":"article","issueId":"2026-week25","year":2026,"week":25,"weekLabel":"第 25 週","dateRange":"2026/06/15 – 06/21","href":"2026-week25.html","title":"Cervical cancer mortality trends following HPV vaccination in England, 2001-24: an analysis of population-based mortality data","journal":"Lancet","type":"OA","typeLabel":"Original Article","author":"Sasieni","doi":"10.1016/S0140-6736(26)00918-9","url":"https://doi.org/10.1016/S0140-6736(26)00918-9","summary":"藥師重點：研究提供高 HPV vaccination coverage 與年輕女性子宮頸癌死亡大幅下降相關的全國層級證據；藥師可在疫苗衛教中強調青少年高涵蓋率與按時接種的重要性。","pubDate":"2026-06-17","terms":["cervical","cancer","mortality","trends","following","vaccination","england","population-based","lancet","sasieni"],"drugTerms":[],"searchText":"cervical cancer mortality trends following hpv vaccination in england, 2001-24: an analysis of population-based mortality data lancet original article sasieni 10.1016/s0140-6736(26)00918-9 研究背景：hpv vaccination 是消除子宮頸癌策略的重要措施，但對死亡率影響的全國層級證據仍有限；英格蘭 2008 年起推動 12-13 歲女孩 hpv vaccination，並對 14-18 歲進行 catch-up campaign。 研究方法：研究分析英格蘭 2001 至 2024 年 20-24、25-29 與 30-34 歲女性子宮頸癌死亡資料，並依出生世代 hpv vaccination coverage 估算各年齡層死亡年份中已接種比例。研究以 poisson regression 估計接種女性相較未導入疫苗時的相對風險降低。 主要結果：2020-2024 年 20-24 歲女性、12-13 歲接種率約 88-90% 的族群中，未發生子宮頸癌死亡，歷史推估預期為 23.1 例，死亡率降低 100%（95% ci 84-100）。整體至 2024 年底，hpv vaccination 與約 199.6 例子宮頸癌死亡減少相關（95% ci 125.0-274.2）。 藥師重點：研究提供高 hpv vaccination coverage 與年輕女性子宮頸癌死亡大幅下降相關的全國層級證據；藥師可在疫苗衛教中強調青少年高涵蓋率與按時接種的重要性。"},{"id":"pmid-42308484","kind":"article","issueId":"2026-week25","year":2026,"week":25,"weekLabel":"第 25 週","dateRange":"2026/06/15 – 06/21","href":"2026-week25.html","title":"Cefazolin for Methicillin-Susceptible Staphylococcus aureus Bacteremia","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Lee","doi":"10.1056/NEJMoa2506905","url":"https://doi.org/10.1056/NEJMoa2506905","summary":"藥師重點：結果支持 cefazolin 對 MSSA 菌血症 90 天死亡率不劣於 flucloxacillin 或 cloxacillin，且急性腎損傷較少；藥師仍需依培養、susceptibility、過敏史、感染部位與腎功能調整抗生素策略。","pubDate":"2026-06-18","terms":["cefazolin","methicillin-susceptible","staphylococcus","aureus","bacteremia","nejm","nejmoa2506905","mssa","penicillin","flucloxacillin"],"drugTerms":["cefazolin","penicillin","flucloxacillin","cloxacillin","antistaphylococcal-penicillin"],"searchText":"cefazolin for methicillin-susceptible staphylococcus aureus bacteremia nejm rct lee 10.1056/nejmoa2506905 研究背景：mssa 菌血症死亡率高，臨床上 cefazolin 與抗葡萄球菌 penicillin（flucloxacillin 或 cloxacillin）何者較適合作為首選治療仍有爭議。 研究方法：此進行中的國際 bayesian adaptive platform 試驗，以開放標籤、隨機方式比較 cefazolin 與 flucloxacillin 或 cloxacillin，用於 penicillin-resistant、methicillin-susceptible s. aureus 菌血症成人。主要結果為平台納入後 90 天全因死亡，並評估 cefazolin 的不劣性與優越性；次要安全性結果包括 14 天內急性腎損傷。 主要結果：此分析期間為 2022 年 2 月 17 日至 2024 年 8 月 7 日，已達不劣性標準。90 天死亡率為 cefazolin 組 15.0% 與抗葡萄球菌 penicillin 組 17.0%（校正 or 0.81，95% 可信區間 0.59-1.12；不劣性機率 99.2%）。急性腎損傷發生率為 13.9% vs 19.6%（校正 or 0.67，95% 可信區間 0.50-0.89；優越性機率 99.7%）。 藥師重點：結果支持 cefazolin 對 mssa 菌血症 90 天死亡率不劣於 flucloxacillin 或 cloxacillin，且急性腎損傷較少；藥師仍需依培養、susceptibility、過敏史、感染部位與腎功能調整抗生素策略。"},{"id":"pmid-42307937","kind":"article","issueId":"2026-week25","year":2026,"week":25,"weekLabel":"第 25 週","dateRange":"2026/06/15 – 06/21","href":"2026-week25.html","title":"Bispecific Antibody Ivonescimab Added to Chemotherapy in EGFR-Variant Non-Small Cell Lung Cancer: The HARMONi-A Randomized Clinical Trial","journal":"JAMA","type":"OA","typeLabel":"Original Article","author":"Fang","doi":"10.1001/jama.2026.7745","url":"https://doi.org/10.1001/jama.2026.7745","summary":"藥師重點：ivonescimab 合併 pemetrexed/carboplatin 可改善 EGFR-TKI 後惡化之 EGFR-variant NSCLC 的整體存活期，但高等級不良事件較多；藥師需監測骨髓抑制、出血/血栓、蛋白尿、高血壓與免疫相關不良事件。","pubDate":"2026-06-17","terms":["bispecific","antibody","ivonescimab","added","chemotherapy","egfr-variant","non-small","cell","lung","cancer"],"drugTerms":["ivonescimab","carboplatin"],"searchText":"bispecific antibody ivonescimab added to chemotherapy in egfr-variant non-small cell lung cancer: the harmoni-a randomized clinical trial jama original article fang 10.1001/jama.2026.7745 研究背景：egfr-variant nonsquamous nsclc 患者在既有 egfr-tki 治療後疾病惡化時，後續選擇有限；ivonescimab 為同時標靶 pd-1 與 vegf 的 bispecific 抗體。 研究方法：harmoni-a 為中國 55 個據點進行的隨機、雙盲、安慰劑對照第 3 期試驗，納入 322 名局部晚期或轉移性 egfr-variant nonsquamous nsclc 且曾接受 egfr-tki 的成人。受試者 1:1 接受 ivonescimab 20 mg/kg 或 安慰劑 合併 pemetrexed/carboplatin，每 3 週一次共 4 個療程後進入維持治療；本次最終分析聚焦整體存活期。 主要結果：中位追蹤 32.5 個月時，ivonescimab 加化療較單純化療改善整體存活期（中位數 16.8 vs 14.1 個月；stratified hr 0.74，95% ci 0.58-0.95；p=.02），中位整體存活期絕對差 2.7 個月。30 個月估計存活率為 29.1% vs 18.4%；等級 3 以上治療期間不良事件為 67.1% vs 54.7%。 藥師重點：ivonescimab 合併 pemetrexed/carboplatin 可改善 egfr-tki 後惡化之 egfr-variant nsclc 的整體存活期，但高等級不良事件較多；藥師需監測骨髓抑制、出血/血栓、蛋白尿、高血壓與免疫相關不良事件。"},{"id":"pmid-42309115","kind":"article","issueId":"2026-week25","year":2026,"week":25,"weekLabel":"第 25 週","dateRange":"2026/06/15 – 06/21","href":"2026-week25.html","title":"Benzylpenicillin versus flucloxacillin or cloxacillin for the treatment of penicillin-susceptible Staphylococcus aureus bacteraemia (SNAP): an international, multicentre, open-label, non-inferiority randomised controlled trial","journal":"Lancet","type":"OA","typeLabel":"Original Article","author":"N/A","doi":"10.1016/S0140-6736(26)00761-0","url":"https://doi.org/10.1016/S0140-6736(26)00761-0","summary":"藥師重點：雖未達預設不劣性門檻，但 benzylpenicillin 在死亡與急性腎損傷風險上呈有利訊號；藥師需確認 PSSA、penicillin susceptibility、感染嚴重度與當地抗生素可近性後，再協助抗生素選擇與腎功能監測。","pubDate":"2026-06-17","terms":["benzylpenicillin","flucloxacillin","cloxacillin","penicillin-susceptible","staphylococcus","aureus","bacteraemia","snap","international","multicentre"],"drugTerms":["benzylpenicillin","flucloxacillin","cloxacillin","anti-staphylococcal","penicillin"],"searchText":"benzylpenicillin versus flucloxacillin or cloxacillin for the treatment of penicillin-susceptible staphylococcus aureus bacteraemia (snap): an international, multicentre, open-label, non-inferiority randomised controlled trial lancet original article  10.1016/s0140-6736(26)00761-0 研究背景：penicillin-susceptible s. aureus（pssa）菌血症近年重新受到重視；benzylpenicillin 可能具藥動學與不良反應優勢，但臨床仍常因未偵測 penicillin resistance 風險而使用抗葡萄球菌 penicillin。 研究方法：此研究者發起、國際、多中心、開放標籤、不劣性隨機對照試驗，納入 snap 試驗 中 pssa 菌血症成人，比較 benzylpenicillin 與 flucloxacillin 或 cloxacillin。主要結果為平台納入後 90 天全因死亡，並以 bayesian logistic regression 評估不劣性；同時追蹤急性腎損傷與嚴重不良反應。 主要結果：成人 pssa 菌血症共 493 人中，156 人分配至 benzylpenicillin，125 人分配至 flucloxacillin 或 cloxacillin。90 天死亡為 14% vs 22%（校正 or 0.67，95% 可信區間 0.35-1.28），benzylpenicillin 不劣性後驗機率 96.1%；急性腎損傷為 11% vs 22%（校正 or 0.50，95% 可信區間 0.26-0.94）。 藥師重點：雖未達預設不劣性門檻，但 benzylpenicillin 在死亡與急性腎損傷風險上呈有利訊號；藥師需確認 pssa、penicillin susceptibility、感染嚴重度與當地抗生素可近性後，再協助抗生素選擇與腎功能監測。"},{"id":"fda-2026-week25-1","kind":"fda","issueId":"2026-week25","year":2026,"week":25,"weekLabel":"第 25 週","dateRange":"2026/06/15 – 06/21","href":"2026-week25.html","title":"FDA’s Concerns with Unapproved GLP-1 Drugs Used for Weight Loss","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss","summary":"FDA 提醒未經核准的 GLP-1 減重產品可能涉及成分、品質、劑量與安全性風險。藥師應確認病人取得的是 FDA 核准產品，避免使用來源不明或複方調製的 semaglutide/tirzepatide 類產品，並加強低血糖、胃腸道不良反應與劑量錯誤衛教。","terms":["concerns","unapproved","glp-1","drugs","used","weight","loss","semaglutide","tirzepatide","https"],"drugTerms":["glp-1","semaglutide","tirzepatide"],"searchText":"fda’s concerns with unapproved glp-1 drugs used for weight loss fda drug safety 2026-06-15 fda 提醒未經核准的 glp-1 減重產品可能涉及成分、品質、劑量與安全性風險。藥師應確認病人取得的是 fda 核准產品，避免使用來源不明或複方調製的 semaglutide/tirzepatide 類產品，並加強低血糖、胃腸道不良反應與劑量錯誤衛教。 https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"},{"id":"fda-2026-week25-3","kind":"fda","issueId":"2026-week25","year":2026,"week":25,"weekLabel":"第 25 週","dateRange":"2026/06/15 – 06/21","href":"2026-week25.html","title":"FDA issues final decision to withdraw approval of Pepaxto (melphalan flufenamide)","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/398713","summary":"FDA 已作成撤回 Pepaxto (melphalan flufenamide) 核准的最終決定。藥師應確認院內與病人用藥清單是否仍有相關品項，避免新開立或續用，並協助腫瘤團隊轉換替代治療。","terms":["issues","final","decision","withdraw","approval","pepaxto","melphalan","flufenamide","https","node"],"drugTerms":[],"searchText":"fda issues final decision to withdraw approval of pepaxto (melphalan flufenamide) fda drug safety  fda 已作成撤回 pepaxto (melphalan flufenamide) 核准的最終決定。藥師應確認院內與病人用藥清單是否仍有相關品項，避免新開立或續用，並協助腫瘤團隊轉換替代治療。 https://www.fda.gov/node/398713"},{"id":"fda-2026-week25-2","kind":"fda","issueId":"2026-week25","year":2026,"week":25,"weekLabel":"第 25 週","dateRange":"2026/06/15 – 06/21","href":"2026-week25.html","title":"FDA alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/403159","summary":"FDA 提醒 glatiramer acetate injection 的選配 autoinjector device 可能有交叉相容性問題。藥師調劑或衛教時應確認藥品廠牌、注射器與 autoinjector 是否相容，避免病人沿用不適配裝置造成注射失敗或劑量問題。","terms":["alerts","caregivers","providers","cross-compatibility","issues","autoinjector","devices","that","optional","glatiramer"],"drugTerms":[],"searchText":"fda alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection fda drug safety  fda 提醒 glatiramer acetate injection 的選配 autoinjector device 可能有交叉相容性問題。藥師調劑或衛教時應確認藥品廠牌、注射器與 autoinjector 是否相容，避免病人沿用不適配裝置造成注射失敗或劑量問題。 https://www.fda.gov/node/403159"},{"id":"fda-2026-week25-4","kind":"fda","issueId":"2026-week25","year":2026,"week":25,"weekLabel":"第 25 週","dateRange":"2026/06/15 – 06/21","href":"2026-week25.html","title":"FDA Accepts First In Silico Drug Development Tool Under ISTAND Program to Help Predict Drug-Induced Liver Injury","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver","summary":"FDA 接受第一個 ISTAND program 下的 in silico drug development tool，用於協助預測 drug-induced liver injury。此為藥物研發與安全評估工具訊息，藥師可關注 DILI 風險預測方法進展，但臨床用藥仍需依仿單、肝功能監測與病人風險因子判讀。","terms":["accepts","first","silico","development","tool","under","istand","program","help","predict"],"drugTerms":[],"searchText":"fda accepts first in silico drug development tool under istand program to help predict drug-induced liver injury fda drug safety 2026-06-03 fda 接受第一個 istand program 下的 in silico drug development tool，用於協助預測 drug-induced liver injury。此為藥物研發與安全評估工具訊息，藥師可關注 dili 風險預測方法進展，但臨床用藥仍需依仿單、肝功能監測與病人風險因子判讀。 https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver"},{"id":"pmid-42274006","kind":"article","issueId":"2026-week24","year":2026,"week":24,"weekLabel":"第 24 週","dateRange":"2026/06/08 – 06/14","href":"2026-week24.html","title":"Vasopressors or Fluids in Early Septic Shock","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Peake","doi":"10.1056/NEJMoa2516225","url":"https://doi.org/10.1056/NEJMoa2516225","summary":"藥師重點：早期限制輸液並較早使用 vasopressor 未增加 90 天院外存活天數，但可減少輸液量與肺水腫；藥師協助 septic shock 復甦時應關注升壓劑啟用時機、輸液累積量與灌流目標。","pubDate":"2026-06-11","terms":["vasopressors","fluids","early","septic","shock","nejm","peake","nejmoa2516225","vasopressor","arise"],"drugTerms":[],"searchText":"vasopressors or fluids in early septic shock nejm original article peake 10.1056/nejmoa2516225 研究背景：septic shock 早期復甦在較多靜脈輸液與較早使用 vasopressor、限制輸液之間仍無最佳策略定論。 研究方法：arise fluids 為急診 septic shock 成人隨機試驗，將患者分配至 restricted fluid volume 加 early vasopressor 治療，或 higher fluid volume 加 later vasopressor 治療，介入至少 6 小時、最長 24 小時。主要終點為隨機分派至第 90 天 alive and out of hospital 天。 主要結果：963 名患者納入 意向治療分析，前 24 小時 vasopressor 組輸液量較 fluids 組少（中位數 差異 -1108 ml，95% ci -1395 to -850），vasopressor 使用比例高 18.9 百分點（95% ci 13.3 to 24.5）。第 90 天 alive and out of hospital 天 兩組中位數皆為 76 天（差異 0.0 天，95% ci -2.7 to 2.7，p=1.00）；pulmonary edema 較少見於 vasopressor 組（0.6% vs 5.0%，p<0.001）。 藥師重點：早期限制輸液並較早使用 vasopressor 未增加 90 天院外存活天數，但可減少輸液量與肺水腫；藥師協助 septic shock 復甦時應關注升壓劑啟用時機、輸液累積量與灌流目標。"},{"id":"pmid-42285563","kind":"article","issueId":"2026-week24","year":2026,"week":24,"weekLabel":"第 24 週","dateRange":"2026/06/08 – 06/14","href":"2026-week24.html","title":"Updated International Patient Decision Aid Standards (IPDAS version 5.0): modified Delphi, evidence informed consensus process","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"Volk","doi":"10.1136/bmj-2025-088116","url":"https://doi.org/10.1136/bmj-2025-088116","summary":"藥師重點：IPDAS 5.0 可作為藥師設計或審閱用藥決策輔助工具的品質框架，重點在於資訊平衡、降低偏差與讓病人價值偏好能被納入決策。","pubDate":"2026-06-12","terms":["updated","international","decision","standards","ipdas","version","modified","delphi","evidence","informed"],"drugTerms":[],"searchText":"updated international patient decision aid standards (ipdas version 5.0): modified delphi, evidence informed consensus process bmj original article volk 10.1136/bmj-2025-088116 研究背景：patient decision aids (pdas) 是協助病人在醫療選項間作知情決策的 evidence-informed tools；ipdas 上次更新在 2013 年，近年相關證據已明顯增加。 研究方法：本文報告 ipdas 5.0 更新，採 modified delphi process，經兩輪投票形成 evidence-informed consensus。共有 202 名來自 26 國的 patients/consumers、policy makers、researchers 與 clinician researchers 參與。 主要結果：ipdas 5.0 包含 7 項 qualifying criteria、10 項 essential criteria 與 54 項 enhancing criteria，分別用於判定是否為 pda、降低 biased decisions，以及提升 pda 品質。 藥師重點：ipdas 5.0 可作為藥師設計或審閱用藥決策輔助工具的品質框架，重點在於資訊平衡、降低偏差與讓病人價值偏好能被納入決策。"},{"id":"pmid-42276088","kind":"article","issueId":"2026-week24","year":2026,"week":24,"weekLabel":"第 24 週","dateRange":"2026/06/08 – 06/14","href":"2026-week24.html","title":"The impact of Chile's multipronged food labelling and advertising law on early childhood excess weight: a cohort difference-in-differences study","journal":"Lancet","type":"OA","typeLabel":"Original Article","author":"Paraje","doi":"10.1016/S0140-6736(26)00651-3","url":"https://doi.org/10.1016/S0140-6736(26)00651-3","summary":"藥師重點：此研究提供食物標示與行銷限制可能降低幼兒過重盛行的政策證據；藥師在衛教兒童肥胖與慢性病預防時，可將食品標示識讀與健康食物環境納入討論。","pubDate":"2026-06-27","terms":["impact","chile","multipronged","food","labelling","advertising","early","childhood","excess","weight"],"drugTerms":[],"searchText":"the impact of chile's multipronged food labelling and advertising law on early childhood excess weight: a cohort difference-in-differences study lancet original article paraje 10.1016/s0140-6736(26)00651-3 研究背景：智利 2016 food labelling and advertising law (flal) 以包裝正面黑色八角形警示標示、行銷限制與校園限制改善食物環境，但其與兒童體重結果的因果關聯仍需評估。 研究方法：研究採 世代 差異-in-differences approach，使用 chilean national board of school aid and scholarships 全國行政資料，涵蓋 2012-2017 年超過 300,000 名公立與補助學校 4-6 歲兒童。以 prekindergarten 入學年度定義 世代，比較未暴露 世代（2012、2013）與暴露於 flal 第 1 期 的 世代（2014、2015），主要結果為 excess weight（overweight 或 obesity）的二元指標。 主要結果：最終分析樣本為 321,597 名學生。暴露於 flal 第 1 期 與 excess weight 機率下降相關，kindergarten 與 first 等級 均暴露 18 個月者效果最大：女孩下降 2.85%（95% ci -0.0407 to -0.0163），男孩下降 2.40%（95% ci -0.0358 to -0.0122）；暴露 6 個月亦見下降，女孩 -1.91%（95% ci -0.0315 to -0.0068），男孩 -2.24%（95% ci -0.0345 to -0.0104）。 藥師重點：此研究提供食物標示與行銷限制可能降低幼兒過重盛行的政策證據；藥師在衛教兒童肥胖與慢性病預防時，可將食品標示識讀與健康食物環境納入討論。"},{"id":"pmid-42253238","kind":"article","issueId":"2026-week24","year":2026,"week":24,"weekLabel":"第 24 週","dateRange":"2026/06/08 – 06/14","href":"2026-week24.html","title":"Survodutide Once Weekly for the Treatment of Adults with Obesity","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"le Roux","doi":"10.1056/NEJMoa2600751","url":"https://doi.org/10.1056/NEJMoa2600751","summary":"藥師重點：survodutide 在無糖尿病肥胖成人可帶來較 安慰劑 更大的體重下降；用藥評估需留意其仍為研發中治療、劑量調整與胃腸道副作用負擔。","pubDate":"2026-06-07","terms":["survodutide","once","weekly","adults","obesity","nejm","roux","nejmoa2600751","glp-1","glucagon"],"drugTerms":["glp-1"],"searchText":"survodutide once weekly for the treatment of adults with obesity nejm original article le roux 10.1056/nejmoa2600751 研究背景：glp-1 受體 致效劑 類藥物已改變肥胖治療，但仍有未滿足需求；survodutide 是研發中的 glucagon 受體-glp-1 受體 dual 致效劑，早期研究曾顯示減重效果。 研究方法：synchronize-1 為 第 3 期、雙盲 試驗，納入 bmi >=30 或 bmi >=27 且至少一項肥胖相關併發症、但無糖尿病的成人 725 名。受試者以 1:1:1 分配接受 每週一次 subcutaneous survodutide 調整至 3.6 mg、6.0 mg 或 安慰劑，並接受生活型態諮詢；主要終點為第 76 週體重百分比變化與達成至少 5% 減重比例。 主要結果：第 76 週 治療-處方 estimand 顯示體重變化為 survodutide 3.6 mg -12.2%（95% ci -13.6 to -10.8）、6.0 mg -13.0%（95% ci -14.4 to -11.6），安慰劑 -5.4%（95% ci -6.9 to -4.0）。達成至少 5% 減重比例為 72.6%、71.9% 與 46.3%（p<0.001 for all comparisons with 安慰劑）；胃腸道症狀為最常見不良事件，發生率 80.9%、89.7% 與 47.9%，且無死亡通報。 藥師重點：survodutide 在無糖尿病肥胖成人可帶來較 安慰劑 更大的體重下降；用藥評估需留意其仍為研發中治療、劑量調整與胃腸道副作用負擔。"},{"id":"pmid-42269152","kind":"article","issueId":"2026-week24","year":2026,"week":24,"weekLabel":"第 24 週","dateRange":"2026/06/08 – 06/14","href":"2026-week24.html","title":"Subretinal Gene Therapy for X-Linked Retinoschisis","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Liang","doi":"10.1056/NEJMoa2515953","url":"https://doi.org/10.1056/NEJMoa2515953","summary":"藥師重點：scAAV8-hRS1 在少數患者中未見高度不良事件或眼內發炎，並有結構改善訊號；目前仍屬早期基因治療證據，臨床意義需等待更大樣本與較長追蹤確認。","pubDate":"2026-06-11","terms":["subretinal","gene","x-linked","retinoschisis","nejm","liang","nejmoa2515953","pathogenic","variation","human"],"drugTerms":[],"searchText":"subretinal gene therapy for x-linked retinoschisis nejm original article liang 10.1056/nejmoa2515953 研究背景：x-linked retinoschisis 是因 rs1 pathogenic variation 導致的隱性遺傳疾病，會造成進行性黃斑部退化與視力喪失。 研究方法：研究將含 human rs1 complementary dna 的 aav8 vector（scaav8-hrs1）以單次視網膜下注射給予 5-18 歲 x-linked retinoschisis 患者的一眼。主要終點為注射後 52 週安全性；次要終點包括 bcva、ss-oct 評估之視網膜結構、full-field electroretinography 與 microperimetry。 主要結果：共 12 名患者納入，scaav8-hrs1 劑量為 7.5×10^10 或 1×10^11 vector genomes。52 週內通報 56 件 不良事件，無 等級 3 以上 不良事件 或 ocular inflammation；1 名患者治療眼於 week 1 出現 macular hole。week 52 治療眼 bcva 平均增加 10.8 letters，未治療眼增加 2.4 letters；12 名患者治療眼 macular schisis cavity 於 week 13 閉合，但光感受器與 bipolar cell 功能或 macular sensitivity 未見具臨床意義變化。 藥師重點：scaav8-hrs1 在少數患者中未見高度不良事件或眼內發炎，並有結構改善訊號；目前仍屬早期基因治療證據，臨床意義需等待更大樣本與較長追蹤確認。"},{"id":"pmid-42283370","kind":"article","issueId":"2026-week24","year":2026,"week":24,"weekLabel":"第 24 週","dateRange":"2026/06/08 – 06/14","href":"2026-week24.html","title":"Sodium Bicarbonate for Critically Ill Adults with Metabolic Acidosis and Shock","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Serpa Neto","doi":"10.1056/NEJMoa2600526","url":"https://doi.org/10.1056/NEJMoa2600526","summary":"藥師重點：在接受 vasopressor 的重症 metabolic acidosis 患者，sodium bicarbonate 未降低 30 天 重大腎臟不良事件；使用時仍應以酸鹼狀態、鈉負荷、容量狀態與腎臟替代治療需求作個別化評估。","pubDate":"2026-06-12","terms":["sodium","bicarbonate","critically","adults","metabolic","acidosis","shock","nejm","serpa","neto"],"drugTerms":[],"searchText":"sodium bicarbonate for critically ill adults with metabolic acidosis and shock nejm original article serpa neto 10.1056/nejmoa2600526 研究背景：重症患者 metabolic acidosis 常與器官功能障礙及死亡相關，sodium bicarbonate 可矯正 acidemia，但對接受 vasopressor 的 metabolic acidosis 患者是否改善臨床結果仍不明確。 研究方法：soda-bic 為 實務型、adaptive、雙盲、隨機試驗，於 7 國 55 個 icu 納入 metabolic acidosis 且接受 vasopressors 的成人 500 名。受試者接受 sodium bicarbonate 或 安慰劑（5% dextrose）輸注最長 5 小時，並依 ph >=7.30 與 base excess >=0 mmol/l 目標調整；主要終點為 30 天內 重大腎臟不良事件（死亡、renal-replacement 治療 或 持續性腎功能障礙）。 主要結果：30 天 重大腎臟不良事件 發生率為 sodium bicarbonate 40.2%（98/244）與 安慰劑 39.4%（100/254）（校正 差異 1.2 百分點，95% ci -7.1 to 9.4，p=0.78）。30 天內 renal-replacement 治療 為 16.8% vs 20.9%（校正 差異 -3.9 百分點，95% ci -10.6 to 2.7），院內 30 天死亡率為 25.4% vs 24.0%；sodium bicarbonate 組 4 名（1.6%）發生 adverse effect，安慰劑 無（p=0.06）。 藥師重點：在接受 vasopressor 的重症 metabolic acidosis 患者，sodium bicarbonate 未降低 30 天 重大腎臟不良事件；使用時仍應以酸鹼狀態、鈉負荷、容量狀態與腎臟替代治療需求作個別化評估。"},{"id":"pmid-42285568","kind":"article","issueId":"2026-week24","year":2026,"week":24,"weekLabel":"第 24 週","dateRange":"2026/06/08 – 06/14","href":"2026-week24.html","title":"Reporting of Cohort and Routinely Collected Data in Randomised Controlled Trial Protocols (SPIRIT-ROUTINE): extension checklist with explanation and elaboration","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"Kearney","doi":"10.1136/bmj-2025-087095","url":"https://doi.org/10.1136/bmj-2025-087095","summary":"藥師重點：此文件屬研究報告品質工具，不是臨床療效研究；閱讀使用 routinely collected 資料 的藥物試驗時，可用其檢核資料來源透明度、追蹤完整性與偏差風險。","pubDate":"2026-06-12","terms":["reporting","routinely","collected","randomised","protocols","spirit-routine","extension","checklist","explanation","elaboration"],"drugTerms":[],"searchText":"reporting of cohort and routinely collected data in randomised controlled trial protocols (spirit-routine): extension checklist with explanation and elaboration bmj original article kearney 10.1136/bmj-2025-087095 研究背景：使用 世代 或 routinely collected 資料（如 electronic 健康 records、registries、administrative claims）的 隨機對照試驗s 越來越常見，但資料治理、品質與取得延遲會影響可重現性與 bias 評估。 研究方法：本文介紹 spirit-routine extension，作為 spirit 2025 guideline 的延伸 checklist 與 explanation，聚焦依賴 世代 或 routinely collected 資料 sources 的試驗 protocol 報告。 主要結果：spirit-routine 旨在補足這類試驗 protocol 對資料來源、治理路徑、資料品質、追蹤與偏差評估等資訊揭露，供 investigators、funders、ethics committees、journal editors 與 peer reviewers 使用。 藥師重點：此文件屬研究報告品質工具，不是臨床療效研究；閱讀使用 routinely collected 資料 的藥物試驗時，可用其檢核資料來源透明度、追蹤完整性與偏差風險。"},{"id":"pmid-42259339","kind":"article","issueId":"2026-week24","year":2026,"week":24,"weekLabel":"第 24 週","dateRange":"2026/06/08 – 06/14","href":"2026-week24.html","title":"Orforglipron compared with dapagliflozin in adults with type 2 diabetes and inadequate glycaemic control with metformin (ACHIEVE-2): a multicentre, randomised, non-inferiority, open-label, phase 3 trial","journal":"Lancet","type":"OA","typeLabel":"Original Article","author":"Welch","doi":"10.1016/S0140-6736(26)00800-7","url":"https://doi.org/10.1016/S0140-6736(26)00800-7","summary":"藥師重點：orforglipron 顯示優於 dapagliflozin 的降 HbA1c 效果，但胃腸道事件與停藥較多；若未來進入臨床使用，劑量耐受性與病人偏好會是用藥選擇的重要考量。","pubDate":"2026-06-08","terms":["orforglipron","dapagliflozin","adults","type","diabetes","inadequate","glycaemic","control","metformin","achieve-2"],"drugTerms":["dapagliflozin","glp-1"],"searchText":"orforglipron compared with dapagliflozin in adults with type 2 diabetes and inadequate glycaemic control with metformin (achieve-2): a multicentre, randomised, non-inferiority, open-label, phase 3 trial lancet original article welch 10.1016/s0140-6736(26)00800-7 研究背景：第二型糖尿病常需合併治療以達血糖目標；本研究比較 口服 非胜肽 glp-1 受體 致效劑 orforglipron 與 sglt2 抑制劑 dapagliflozin 在 metformin 控制不足患者的療效與安全性。 研究方法：achieve-2 為 40 週、第 3 期、多中心、開放標籤（orforglipron dose-blinded）、隨機試驗，納入使用 metformin >=1500 mg/day、hba1c 7.0-10.5%、bmi >=23.0 kg/m2 的第二型糖尿病成人 962 名。受試者以 1:1:1:1 分配接受 每日一次 口服 orforglipron 3、12、36 mg 或 dapagliflozin 10 mg；主要終點為 week 40 hba1c 變化，不劣性 margin 為 0.3%。 主要結果：week 40 治療 處方 estimand 顯示 orforglipron 各劑量均不劣於 dapagliflozin，且 hba1c 降幅較大：orforglipron 3、12、36 mg 分別為 -1.23%、-1.50%、-1.56%，dapagliflozin 10 mg 為 -0.81%；estimated 治療 差異 分別為 -0.42%、-0.70%、-0.75%（all p<0.0001）。orforglipron 胃腸道不良事件較多（47%、46%、54% vs 12%），停藥率也較高（15%、18%、20% vs 6%），未通報 重度 hypoglycaemia。 藥師重點：orforglipron 顯示優於 dapagliflozin 的降 hba1c 效果，但胃腸道事件與停藥較多；若未來進入臨床使用，劑量耐受性與病人偏好會是用藥選擇的重要考量。"},{"id":"pmid-42276557","kind":"article","issueId":"2026-week24","year":2026,"week":24,"weekLabel":"第 24 週","dateRange":"2026/06/08 – 06/14","href":"2026-week24.html","title":"Low concentration atropine eye drops and progression of myopia in children: multicentre placebo controlled, double masked, randomised trial in the UK (CHAMP-UK)","journal":"BMJ","type":"RCT","typeLabel":"RCT","author":"Azuara-Blanco","doi":"10.1136/bmj-2025-086698","url":"https://doi.org/10.1136/bmj-2025-086698","summary":"藥師重點：結論顯示 atropine 0.01% 眼藥水在兒童近視控制可減緩屈光度與眼軸進展，藥師衛教時需提醒每日點藥依從性，並留意瞳孔放大、視覺不適與適用年齡族群。","pubDate":"2026-06-11","terms":["concentration","atropine","drops","progression","myopia","children","multicentre","placebo","double","masked"],"drugTerms":["atropine"],"searchText":"low concentration atropine eye drops and progression of myopia in children: multicentre placebo controlled, double masked, randomised trial in the uk (champ-uk) bmj rct azuara-blanco 10.1136/bmj-2025-086698 研究背景：兒童近視進展會增加後續眼科併發症風險，低濃度 atropine 眼藥水能否在英國兒童族群安全減緩近視加深仍需評估。 研究方法：champ-uk 為英國 5 個中心進行的多中心、雙盲、安慰劑 對照、隨機優越性試驗，納入 289 名 6-12 歲、近視 -0.50 至 -10.0 d 的兒童。受試者以 2:1 分配，每日使用 preserved atropine 0.01% 或 安慰劑 眼藥水 2 年，主要終點為睫狀肌麻痺下測得的 spherical equivalent refractive error。 主要結果：atropine 0.01% 較 安慰劑 減少近視進展（平均差 0.33 d，95% ci 0.17 to 0.49 d，p<0.001），central axial length 增加也較少（平均差 0.14 mm，95% ci 0.07 to 0.21，p<0.001）。除 pupil diameter 較大外，不良事件、耐受性與其他次要結果未見差異，且無 試驗 drug 相關 嚴重不良事件。 藥師重點：結論顯示 atropine 0.01% 眼藥水在兒童近視控制可減緩屈光度與眼軸進展，藥師衛教時需提醒每日點藥依從性，並留意瞳孔放大、視覺不適與適用年齡族群。"},{"id":"pmid-42269151","kind":"article","issueId":"2026-week24","year":2026,"week":24,"weekLabel":"第 24 週","dateRange":"2026/06/08 – 06/14","href":"2026-week24.html","title":"Interleukin-10 Autoantibodies and HLA-DRB1*01:03 in Inflammatory Bowel Disease","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Gharahdaghi","doi":"10.1056/NEJMoa2513654","url":"https://doi.org/10.1056/NEJMoa2513654","summary":"藥師重點：此研究指出 IBD 中有一小群患者帶有 neutralizing interleukin-10 autoantibodies，且與 HLA-DRB1*01:03 高度相關；目前較偏向疾病分型與機轉證據，尚不能直接推論治療選擇。","pubDate":"2026-06-11","terms":["interleukin-10","autoantibodies","hla-drb1","inflammatory","bowel","nejm","gharahdaghi","nejmoa2513654","neutralizing","signaling"],"drugTerms":["anti-interleukin-10"],"searchText":"interleukin-10 autoantibodies and hla-drb1*01:03 in inflammatory bowel disease nejm original article gharahdaghi 10.1056/nejmoa2513654 研究背景：neutralizing interleukin-10 autoantibodies 可能模擬單基因 interleukin-10 signaling 缺陷並與 inflammatory bowel 疾病 (ibd) 相關，而 hla-drb1*01:03 是 ulcerative colitis 的重要遺傳風險因子。 研究方法：研究使用 cellular interleukin-10 reporter assay 與 confirmatory competitive enzyme-linked immunosorbent assay，檢測 oxford 與 u.k. ibd bioresource cohorts 中 ibd 患者及非 ibd controls 的血清 neutralizing interleukin-10 autoantibodies。另於部分患者進行 in vitro cytokine-release bioassay，並以 imputation 與 high-resolution sequencing 進行 hla association 分析。 主要結果：interleukin-10-neutralizing autoantibodies 見於 173/4909 名 ibd 患者（3.5%，95% ci 3.0 to 4.1），1006 名 controls 中未檢出（p<0.001）。anti-interleukin-10 seropositivity 與 hla-drb1*01:03 強烈相關，oxford 世代 or 50.0（95% ci 16.4 to 152.3，p=6.14×10^-12）、u.k. ibd bioresource or 24.7（95% ci 14.5 to 42.1，p=6.20×10^-32），high-resolution sequencing 分析 or 29.5（95% ci 12.2 to 71.1，p=4.85×10^-14）。 藥師重點：此研究指出 ibd 中有一小群患者帶有 neutralizing interleukin-10 autoantibodies，且與 hla-drb1*01:03 高度相關；目前較偏向疾病分型與機轉證據，尚不能直接推論治療選擇。"},{"id":"pmid-42267805","kind":"article","issueId":"2026-week24","year":2026,"week":24,"weekLabel":"第 24 週","dateRange":"2026/06/08 – 06/14","href":"2026-week24.html","title":"Hospital Policy of Tranexamic Acid to Reduce Transfusion in Major Noncardiac Surgery","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Houston","doi":"10.1056/NEJMoa2515820","url":"https://doi.org/10.1056/NEJMoa2515820","summary":"藥師重點：結論顯示重大非心臟手術導入 tranexamic acid policy 可降低輸血需求，且未高於 安慰劑 的 venous thromboembolism 風險；藥師參與圍手術期用藥時仍需依手術類型、血栓風險與院內 protocol 評估。","pubDate":"2026-06-25","terms":["hospital","policy","tranexamic","acid","reduce","transfusion","major","noncardiac","surgery","nejm"],"drugTerms":[],"searchText":"hospital policy of tranexamic acid to reduce transfusion in major noncardiac surgery nejm rct houston 10.1056/nejmoa2515820 研究背景：重大非心臟手術中，院內常規使用 tranexamic acid 是否能在不增加 venous thromboembolism 下減少 red-cell transfusion 仍不確定。 研究方法：traction 為加拿大 10 家醫院進行的 多中心、雙盲、cluster-隨機、安慰劑對照 試驗，納入接受非心臟手術且 red-cell transfusion 高風險患者。醫院每 4 週隨機切換為全院性術中 tranexamic acid 或 安慰劑 policy，共同主要終點為住院期間 red-cell transfusion 與 90 天內 venous thromboembolism。 主要結果：8273 名患者可納入共同主要終點分析，red-cell transfusion 發生率為 tranexamic acid 7.4% vs 安慰劑 9.8%（相對風險 0.73，95% ci 0.61 to 0.86；校正 差異 -2.7 百分點，95% ci -4.2 to -1.4）。90 天 venous thromboembolism 為 2.1% vs 2.1%（相對風險 0.96，95% ci 0.65 to 1.38），符合 不劣性 標準。 藥師重點：結論顯示重大非心臟手術導入 tranexamic acid policy 可降低輸血需求，且未高於 安慰劑 的 venous thromboembolism 風險；藥師參與圍手術期用藥時仍需依手術類型、血栓風險與院內 protocol 評估。"},{"id":"pmid-42283228","kind":"article","issueId":"2026-week24","year":2026,"week":24,"weekLabel":"第 24 週","dateRange":"2026/06/08 – 06/14","href":"2026-week24.html","title":"Gastric Residual Volume Assessment in Critically Ill Children: The GASTRIC-PICU Randomized Clinical Trial","journal":"JAMA","type":"OA","typeLabel":"Original Article","author":"Tume","doi":"10.1001/jama.2026.10639","url":"https://doi.org/10.1001/jama.2026.10639","summary":"藥師重點：結果支持重症兒童腸道營養不必常規依 GRV 調整餵食，且可能提升早期營養達標；藥師與營養團隊可協助建立以臨床耐受性為主的監測流程。","pubDate":"2026-06-12","terms":["gastric","residual","volume","assessment","critically","children","gastric-picu","jama","tume","enteral"],"drugTerms":[],"searchText":"gastric residual volume assessment in critically ill children: the gastric-picu randomized clinical trial jama original article tume 10.1001/jama.2026.10639 研究背景：重症兒童 enteral feeding 時常規評估 gastric residual volume (grv) 很普遍，但證據有限，且高 grv 判讀可能導致餵食中斷與營養不足。 研究方法：gastric-picu 為英國 23 個 picu 與瑞士 1 個 picu 的 實務型、多中心、隨機、不劣性 試驗，納入 4700 名 0-16 歲、接受侵入性通氣並開始 enteral feeds 的兒童。受試者分配至不常規測量 grv、僅以臨床徵象評估餵食耐受性，或 常規照護 每 6 小時評估 grv；共同主要終點為 30 天 存活期 and ventilator-free 天，以及 72 小時達成能量需求比例。 主要結果：4460 名兒童納入 意向治療分析，不常規評估 grv 對 30 天 存活期 and ventilator-free 天 不劣於每 6 小時評估（兩組 中位數 25 [iqr 21-27] 天；校正 or 0.95，95% ci 0.86-1.05）。72 小時達成能量需求比例為 80.3% vs 76.8%（校正 平均差 3.2 百分點，95% ci 1.3-5.2，p<.001）。 藥師重點：結果支持重症兒童腸道營養不必常規依 grv 調整餵食，且可能提升早期營養達標；藥師與營養團隊可協助建立以臨床耐受性為主的監測流程。"},{"id":"pmid-42274009","kind":"article","issueId":"2026-week24","year":2026,"week":24,"weekLabel":"第 24 週","dateRange":"2026/06/08 – 06/14","href":"2026-week24.html","title":"Exa-cel in Children with Transfusion-Dependent β-Thalassemia or Sickle Cell Disease","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Frangoul","doi":"10.1056/NEJMoa2603387","url":"https://doi.org/10.1056/NEJMoa2603387","summary":"藥師重點：exa-cel 在兒童族群呈現降低輸血需求或 vaso-occlusive crises 的早期結果，但治療伴隨 myeloablative conditioning 與嚴重不良事件風險；藥師重點在於調理療法毒性、感染與肝臟併發症監測。","pubDate":"2026-06-11","terms":["exa-cel","children","transfusion-dependent","thalassemia","sickle","cell","nejm","frangoul","nejmoa2603387","exagamglogene"],"drugTerms":[],"searchText":"exa-cel in children with transfusion-dependent β-thalassemia or sickle cell disease nejm original article frangoul 10.1056/nejmoa2603387 研究背景：exagamglogene autotemcel (exa-cel) 是以 ex vivo crispr-cas9 編輯自體 cd34+ hematopoietic cells，使其表現 fetal hemoglobin 的細胞治療；成人與青少年研究已顯示可改善 sickle cell 疾病 或 transfusion-dependent β-thalassemia 的臨床負擔。 研究方法：兩項 進行中、第 3 期、開放標籤、single-group 研究 評估 5-11 歲 transfusion-dependent β-thalassemia 或 sickle cell 疾病 兒童接受 exa-cel。治療前使用 pharmacokinetically dose-校正 busulfan 進行 myeloablative conditioning；主要終點分別為 transfusion-dependent β-thalassemia 兒童連續至少 12 個月 transfusion independence，以及 sickle cell 疾病 兒童連續至少 12 個月無 重度 vaso-occlusive crises。 主要結果：15 名 transfusion-dependent β-thalassemia 與 11 名 sickle cell 疾病 兒童接受 exa-cel，中位追蹤分別為 16.0 與 16.9 個月。追蹤至少 16 個月者中，β-thalassemia 8/8 達 transfusion independence，sickle cell 疾病 8/8 無 vaso-occlusive crises；所有兒童至少發生一次 等級 3 或 4 不良事件，2 名 β-thalassemia 兒童發生與 busulfan conditioning 相關 重度 veno-occlusive liver 疾病，其中 1 名死亡。 藥師重點：exa-cel 在兒童族群呈現降低輸血需求或 vaso-occlusive crises 的早期結果，但治療伴隨 myeloablative conditioning 與嚴重不良事件風險；藥師重點在於調理療法毒性、感染與肝臟併發症監測。"},{"id":"pmid-42259343","kind":"article","issueId":"2026-week24","year":2026,"week":24,"weekLabel":"第 24 週","dateRange":"2026/06/08 – 06/14","href":"2026-week24.html","title":"Elecoglipron, an oral small molecule GLP-1 receptor agonist in adults with type 2 diabetes (SOLSTICE): a multicentre, phase 2b, randomised, placebo-controlled trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Aroda","doi":"10.1016/S0140-6736(26)00802-0","url":"https://doi.org/10.1016/S0140-6736(26)00802-0","summary":"藥師重點：研究結果支持 elecoglipron 進入 第 3 期 評估；臨床解讀時宜視為研發中新型口服 GLP-1 受體 致效劑 證據，重點放在血糖下降幅度、胃腸道耐受性與後續較大型試驗結果。","pubDate":"2026-06-20","terms":["elecoglipron","oral","small","molecule","glp-1","receptor","agonist","adults","type","diabetes"],"drugTerms":["glp-1","semaglutide"],"searchText":"elecoglipron, an oral small molecule glp-1 receptor agonist in adults with type 2 diabetes (solstice): a multicentre, phase 2b, randomised, placebo-controlled trial lancet rct aroda 10.1016/s0140-6736(26)00802-0 研究背景：elecoglipron 為研發中的 每日一次 口服 小分子 glp-1 受體 致效劑，設計上不受食物或水分限制，本研究評估其用於第二型糖尿病的療效、安全性與耐受性。 研究方法：solstice 為跨 9 國的 第 2b 期、隨機、雙盲、安慰劑對照 試驗，納入 18 歲以上、bmi >=23 kg/m2、hba1c 7.0-10.5% 且以生活型態、metformin 或 sglt2 抑制劑 單藥治療的第二型糖尿病成人。受試者分配至 elecoglipron 5、15、25、50 或 75 mg 不同劑量與 titration 處方、對應 安慰劑，另有 開放標籤 口服 semaglutide 14 mg；主要終點為 26 週 hba1c 百分比變化。 主要結果：404 名受試者接受至少一劑試驗治療，26 週時 elecoglipron 各劑量 hba1c 平均變化為 -0.91%（95% ci -1.25 to -0.58；5 mg）至 -1.88%（95% ci -2.23 to -1.53；75 mg 每 2 週劑量調升），安慰劑 為 -0.15%（95% ci -0.42 to 0.12）。elecoglipron 不良事件發生率為 63%-87%，安慰劑 為 63%，最常見為 nausea、constipation、diarrhoea 與 vomiting。 藥師重點：研究結果支持 elecoglipron 進入 第 3 期 評估；臨床解讀時宜視為研發中新型口服 glp-1 受體 致效劑 證據，重點放在血糖下降幅度、胃腸道耐受性與後續較大型試驗結果。"},{"id":"pmid-42259337","kind":"article","issueId":"2026-week24","year":2026,"week":24,"weekLabel":"第 24 週","dateRange":"2026/06/08 – 06/14","href":"2026-week24.html","title":"Elecoglipron, an oral small molecule GLP-1 receptor agonist in adults with obesity or overweight (VISTA): a multicentre, phase 2, randomised, placebo-controlled clinical trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Davies","doi":"10.1016/S0140-6736(26)00748-8","url":"https://doi.org/10.1016/S0140-6736(26)00748-8","summary":"藥師重點：此 第 2 期 結果顯示 elecoglipron 對肥胖或過重族群具減重訊號，但仍屬劑量探索階段；藥師應關注後續 第 3 期 的持續療效、停藥率與胃腸道耐受性。","pubDate":"2026-06-20","terms":["elecoglipron","oral","small","molecule","glp-1","receptor","agonist","adults","obesity","overweight"],"drugTerms":["glp-1"],"searchText":"elecoglipron, an oral small molecule glp-1 receptor agonist in adults with obesity or overweight (vista): a multicentre, phase 2, randomised, placebo-controlled clinical trial lancet rct davies 10.1016/s0140-6736(26)00748-8 研究背景：elecoglipron (azd5004) 為 每日一次 口服 small-molecule glp-1 受體 致效劑，本研究評估其在無第二型糖尿病、具肥胖或過重合併體重相關共病成人的體重控制效果與安全性。 研究方法：vista 為 第 2 期、雙盲、隨機、controlled dose-ranging 研究，治療期 36 週，收案地點涵蓋澳洲、加拿大、德國、日本、台灣、英國與美國。310 名 bmi >=30 kg/m2 或 bmi >=27 kg/m2 且至少一項體重相關共病的成人，分配接受 每日一次 口服 elecoglipron 5、15、50、75 mg（每週 titration 或 每 2 週劑量調整）或 匹配安慰劑；雙主要終點為第 26 週體重百分比變化與達成至少 5% 減重比例。 主要結果：第 26 週 estimated 平均值 bodyweight change 為 elecoglipron -2.6%（5 mg）至 -10.5%（75 mg 每週 titration），安慰劑 為 -0.6%；達成至少 5% 減重比例為 elecoglipron 40.4%-88.8%，安慰劑 為 15.6%。不良事件在 elecoglipron 各劑量為 84%-98%，安慰劑 為 84%，常見為 nausea、constipation、diarrhoea、headache 與 vomiting。 藥師重點：此 第 2 期 結果顯示 elecoglipron 對肥胖或過重族群具減重訊號，但仍屬劑量探索階段；藥師應關注後續 第 3 期 的持續療效、停藥率與胃腸道耐受性。"},{"id":"pmid-42267831","kind":"article","issueId":"2026-week24","year":2026,"week":24,"weekLabel":"第 24 週","dateRange":"2026/06/08 – 06/14","href":"2026-week24.html","title":"Conservative Oxygen for Unresponsive Patients after Cardiac Arrest","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Hodgson","doi":"10.1056/NEJMoa2513814","url":"https://doi.org/10.1056/NEJMoa2513814","summary":"藥師重點：研究未顯示較保守氧氣策略可提升心跳停止後患者的功能性存活；臨床照護仍應依 ICU 氧合目標與病人狀態調整，避免將降低氧氣暴露解讀為已證實的預後改善策略。","pubDate":"2026-06-10","terms":["conservative","oxygen","unresponsive","cardiac","arrest","nejm","hodgson","nejmoa2513814","logical","liberal"],"drugTerms":[],"searchText":"conservative oxygen for unresponsive patients after cardiac arrest nejm original article hodgson 10.1056/nejmoa2513814 研究背景：心跳停止復甦後仍無反應且需機械通氣的患者，限制氧氣暴露是否能改善存活且保有良好功能結果仍具不確定性。 研究方法：logical 為澳洲、紐西蘭與愛爾蘭 53 個 icu 的隨機試驗，納入心跳停止後在 icu 接受機械通氣且無反應的成人。受試者分配至 conservative oxygen 治療 或 liberal oxygen 治療；兩組 spo2 下限皆為 90%，conservative 組設定 spo2 上限警示 95% 並可將 fio2 降至 0.21，主要終點為 180 天存活且 extended glasgow 結果指標 scale (gos-e) >=5。 主要結果：1840 名患者中，180 天 favorable functional 結果指標 發生率為 conservative oxygen 38.2%（313/819）與 liberal oxygen 39.7%（353/890）（相對風險 0.97，95% ci 0.87 to 1.09，p=0.65）。未通報 不良事件。 藥師重點：研究未顯示較保守氧氣策略可提升心跳停止後患者的功能性存活；臨床照護仍應依 icu 氧合目標與病人狀態調整，避免將降低氧氣暴露解讀為已證實的預後改善策略。"},{"id":"pmid-42267821","kind":"article","issueId":"2026-week24","year":2026,"week":24,"weekLabel":"第 24 週","dateRange":"2026/06/08 – 06/14","href":"2026-week24.html","title":"Carbocisteine or Hypertonic Saline for Acute Respiratory Failure","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Connolly","doi":"10.1056/NEJMoa2603406","url":"https://doi.org/10.1056/NEJMoa2603406","summary":"藥師重點：carbocisteine 與 HTS 未縮短急性呼吸衰竭患者機械通氣時間，且各自出現明確安全性訊號；藥師在 ICU 用藥審查時應避免常規化使用，並監測出血、支氣管收縮與霧化期間低血氧。","pubDate":"2026-06-10","terms":["carbocisteine","hypertonic","saline","acute","respiratory","failure","nejm","connolly","nejmoa2603406","mucoactive"],"drugTerms":[],"searchText":"carbocisteine or hypertonic saline for acute respiratory failure nejm original article connolly 10.1056/nejmoa2603406 研究背景：mucoactive agents 常用於急性呼吸衰竭與機械通氣患者，但其療效與安全性證據有限。 研究方法：march 為 多中心、開放標籤、隨機、2-by-2 factorial 試驗，納入 16 歲以上、急性呼吸衰竭且分泌物不易清除的重症機械通氣患者 1956 名。受試者接受 常規照護 加 carbocisteine 750 mg three times 每日 enterally、6% 或 7% nebulized hypertonic saline (hts) 4 ml four times 每日、兩者併用或 常規照護 單用，最長 28 天；主要終點為機械通氣時間。 主要結果：carbocisteine 與 no carbocisteine 的機械通氣中位時間為 186.1 vs 172.7 小時（校正 風險比 0.96，95% ci 0.87 to 1.05，p=0.34），hts 與 no hts 為 184.5 vs 174.3 小時（校正 風險比 1.00，95% ci 0.91 to 1.10，p=0.98）。carbocisteine 增加 clinically important upper gastrointestinal 出血（風險比 6.51，95% ci 1.47 to 28.76，p=0.01），hts 增加 bronchoconstriction（風險比 5.73，95% ci 1.99 to 16.52，p=0.001）與 nebulization 期間 hypoxemia（風險比 13.29，95% ci 4.12 to 42.83，p<0.001）。 藥師重點：carbocisteine 與 hts 未縮短急性呼吸衰竭患者機械通氣時間，且各自出現明確安全性訊號；藥師在 icu 用藥審查時應避免常規化使用，並監測出血、支氣管收縮與霧化期間低血氧。"},{"id":"pmid-42251856","kind":"article","issueId":"2026-week24","year":2026,"week":24,"weekLabel":"第 24 週","dateRange":"2026/06/08 – 06/14","href":"2026-week24.html","title":"Cagrilintide-semaglutide (CagriSema) as an add-on to basal insulin in adults with type 2 diabetes (REIMAGINE 3): a randomised, double-blind, placebo-controlled, multicentre, phase 3 study","journal":"Lancet","type":"OA","typeLabel":"Original Article","author":"Rosenstock","doi":"10.1016/S0140-6736(26)01022-6","url":"https://doi.org/10.1016/S0140-6736(26)01022-6","summary":"藥師重點：在 基礎胰島素 控制不足的第二型糖尿病患者，CagriSema 作為加成治療可改善 HbA1c 並降低體重；藥師需特別評估胃腸道耐受性、胰島素併用下的血糖監測與後續實務可近性。","pubDate":"2026-06-07","terms":["cagrilintide-semaglutide","cagrisema","add-on","basal","insulin","adults","type","diabetes","reimagine","randomised"],"drugTerms":["cagrilintide-semaglutide","semaglutide","glp-1"],"searchText":"cagrilintide-semaglutide (cagrisema) as an add-on to basal insulin in adults with type 2 diabetes (reimagine 3): a randomised, double-blind, placebo-controlled, multicentre, phase 3 study lancet original article rosenstock 10.1016/s0140-6736(26)01022-6 研究背景：第二型糖尿病患者使用 基礎胰島素 後仍可能血糖控制不足，且常伴隨體重增加與低血糖風險；cagrisema 為 cagrilintide 與 semaglutide 的 每週一次 組合。 研究方法：reimagine 3 為 6 國 46 中心的 雙盲、parallel-group、隨機、controlled 第 3 期a 研究，納入 hba1c 7.0-10.5%、使用穩定 每日一次 基礎胰島素 且可併用 metformin 的第二型糖尿病成人 274 名。受試者分配接受 每週一次 subcutaneous cagrilintide-semaglutide 2.4 mg each、1.0 mg each 或 dose-matched 安慰劑 40 週，主要終點為 week 40 hba1c 變化。 主要結果：week 40 hba1c 降幅顯著大於 安慰劑：cagrilintide-semaglutide 2.4 mg each -2.33%（se 0.08）、1.0 mg each -2.10%（se 0.08），安慰劑 -0.66%（se 0.11）；estimated 治療 差異 分別為 -1.68 百分點（95% ci -1.95 to -1.41，p<0.0001）與 -1.44 百分點（95% ci -1.71 to -1.17，p<0.0001）。體重下降約 10-12%，不良事件多為輕中度胃腸道事件，未通報 重度 hypoglycaemia。 藥師重點：在 基礎胰島素 控制不足的第二型糖尿病患者，cagrisema 作為加成治療可改善 hba1c 並降低體重；藥師需特別評估胃腸道耐受性、胰島素併用下的血糖監測與後續實務可近性。"},{"id":"fda-2026-week24-1","kind":"fda","issueId":"2026-week24","year":2026,"week":24,"weekLabel":"第 24 週","dateRange":"2026/06/08 – 06/14","href":"2026-week24.html","title":"FDA’s Concerns with Unapproved GLP-1 Drugs Used for Weight Loss","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["concerns","unapproved","glp-1","drugs","used","weight","loss","https","drug-alerts-and-statements","fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"],"drugTerms":["glp-1"],"searchText":"fda’s concerns with unapproved glp-1 drugs used for weight loss fda drug safety 2026-06-15 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"},{"id":"fda-2026-week24-3","kind":"fda","issueId":"2026-week24","year":2026,"week":24,"weekLabel":"第 24 週","dateRange":"2026/06/08 – 06/14","href":"2026-week24.html","title":"FDA issues final decision to withdraw approval of Pepaxto (melphalan flufenamide)","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/398713","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["issues","final","decision","withdraw","approval","pepaxto","melphalan","flufenamide","https","node"],"drugTerms":[],"searchText":"fda issues final decision to withdraw approval of pepaxto (melphalan flufenamide) fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/398713"},{"id":"fda-2026-week24-2","kind":"fda","issueId":"2026-week24","year":2026,"week":24,"weekLabel":"第 24 週","dateRange":"2026/06/08 – 06/14","href":"2026-week24.html","title":"FDA alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/403159","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["alerts","caregivers","providers","cross-compatibility","issues","autoinjector","devices","that","optional","glatiramer"],"drugTerms":[],"searchText":"fda alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/403159"},{"id":"fda-2026-week24-4","kind":"fda","issueId":"2026-week24","year":2026,"week":24,"weekLabel":"第 24 週","dateRange":"2026/06/08 – 06/14","href":"2026-week24.html","title":"FDA Accepts First In Silico Drug Development Tool Under ISTAND Program to Help Predict Drug-Induced Liver Injury","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["accepts","first","silico","development","tool","under","istand","program","help","predict"],"drugTerms":[],"searchText":"fda accepts first in silico drug development tool under istand program to help predict drug-induced liver injury fda drug safety 2026-06-03 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver"},{"id":"pmid-42251595","kind":"article","issueId":"2026-week23","year":2026,"week":23,"weekLabel":"第 23 週","dateRange":"2026/06/01 – 06/07","href":"2026-week23.html","title":"Treatment With 9-mg Mazdutide for Weight Reduction in Chinese Adults With Obesity: The GLORY-2 Randomized Clinical Trial","journal":"JAMA","type":"OA","typeLabel":"Original Article","author":"Gao","doi":"10.1001/jama.2026.8142","url":"https://doi.org/10.1001/jama.2026.8142","summary":"藥師重點：Mazdutide 9 mg 在中國中重度 obesity 成人可帶來明顯體重下降，但胃腸道不良反應頻率高；藥師需評估 nausea/vomiting 對水分、營養與服藥順從性的影響，並提醒結果需依核准適應症與族群外推限制解讀。","pubDate":"2026-06-07","terms":["mazdutide","weight","reduction","chinese","adults","obesity","glory-2","jama","glucagon","glp-1"],"drugTerms":["glp-1"],"searchText":"treatment with 9-mg mazdutide for weight reduction in chinese adults with obesity: the glory-2 randomized clinical trial jama original article gao 10.1001/jama.2026.8142 研究背景：obesity 是中國與全球重要公共衛生問題；mazdutide 為 每週一次 glucagon 與 glp-1 受體 dual 致效劑，本研究評估 9-mg 劑量在中國成人 obesity 的減重療效與安全性。 研究方法：glory-2 為 雙盲、安慰劑對照、第 3 期 隨機臨床試驗，於中國 27 家醫院收錄 bmi ≥30、可有或無 type 2 diabetes 的成人。受試者以 2:1 接受 mazdutide 9 mg once 每週 subcutaneous injection 或 安慰劑，並搭配 reduced calorie diet 與 increased physical activity 60 週；co-主要 結果指標 為體重百分比變化與 ≥5% weight reduction。 主要結果：461 人接受治療；week 60 體重變化為 -16.65% vs -1.50%，組間差 -15.15%（95% ci -17.22% to -13.09%；p<.001）。達 ≥5% weight reduction 為 84.3% vs 33.1%，組間差 51.6%（95% ci 43.0% to 60.1%；p<.001）；停藥不良事件為 2.9% vs 0%，常見事件為 vomiting 53.1%、nausea 46.9%、diarrhea 39.4%，多為輕至中度。 藥師重點：mazdutide 9 mg 在中國中重度 obesity 成人可帶來明顯體重下降，但胃腸道不良反應頻率高；藥師需評估 nausea/vomiting 對水分、營養與服藥順從性的影響，並提醒結果需依核准適應症與族群外推限制解讀。"},{"id":"pmid-42242770","kind":"article","issueId":"2026-week23","year":2026,"week":23,"weekLabel":"第 23 週","dateRange":"2026/06/01 – 06/07","href":"2026-week23.html","title":"Systematic estimates of global causes of neonatal and under 5 mortality in 2000-24: secondary data analysis using bayesian multinomial logistic regression","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"Perin","doi":"10.1136/bmj-2025-088686","url":"https://doi.org/10.1136/bmj-2025-088686","summary":"藥師重點：結果顯示新生兒照護、呼吸道感染、周產期照護與 malaria 仍是 under 5 死亡率 的核心負擔；藥師可用於抗感染藥物、疫苗、孕產用藥與兒科劑量安全的公共衛生規劃。","pubDate":"2026-06-04","terms":["estimates","global","causes","neonatal","under","mortality","bayesian","multinomial","logistic","regression"],"drugTerms":[],"searchText":"systematic estimates of global causes of neonatal and under 5 mortality in 2000-24: secondary data analysis using bayesian multinomial logistic regression bmj original article perin 10.1136/bmj-2025-088686 研究背景：neonatal 與 under 5 死亡的主要原因隨地區與時間改變而不同；掌握 cause-specific 死亡率 可協助設定兒童健康介入優先順序。 研究方法：此 次要 資料 分析 使用 bayesian multinomial logistic regression model，整合系統性文獻、who 死亡率 database、dhs、mics、hdss 等資料，估計 195 國 2000-2024 年 neonates 與 under 5 cause-specific 死亡率。 主要結果：2024 年 under 5 deaths 估計 4.9 百萬；主要死因為 preterm birth complications 0.82 百萬（90% ui 0.76 to 0.88）、lower respiratory infections 0.66 百萬、intrapartum related 事件 0.48 百萬 與 malaria 0.45 百萬。多數主要死因下降速度自 2016 年後放緩。 藥師重點：結果顯示新生兒照護、呼吸道感染、周產期照護與 malaria 仍是 under 5 死亡率 的核心負擔；藥師可用於抗感染藥物、疫苗、孕產用藥與兒科劑量安全的公共衛生規劃。"},{"id":"pmid-42223087","kind":"article","issueId":"2026-week23","year":2026,"week":23,"weekLabel":"第 23 週","dateRange":"2026/06/01 – 06/07","href":"2026-week23.html","title":"Selpercatinib in Early-Stage RET Fusion-Positive Non-Small-Cell Lung Cancer","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Wu","doi":"10.1056/NEJMoa2602628","url":"https://doi.org/10.1056/NEJMoa2602628","summary":"藥師重點：結果顯示 adjuvant selpercatinib 可延長 stage II-IIIA RET fusion-陽性 NSCLC 的 無事件存活期；藥師需確認 RET fusion 檢測、治療期間肝功能監測、交互作用與長達 3 年治療的順從性管理。","pubDate":"2026-05-31","terms":["selpercatinib","early-stage","fusion-positive","non-small-cell","lung","cancer","nejm","nejmoa2602628","fusion","advanced"],"drugTerms":["selpercatinib"],"searchText":"selpercatinib in early-stage ret fusion-positive non-small-cell lung cancer nejm original article wu 10.1056/nejmoa2602628 研究背景：selpercatinib 為高選擇性、可進入中樞神經系統的 ret 抑制劑，已用於 ret fusion-陽性 advanced 或 轉移性 nsclc；其在早期根治治療後作為 adjuvant 治療 的效益尚未確定。 研究方法：libretto-432 為 第 3 期、雙盲 試驗，納入 ret fusion-陽性 nsclc 且已接受 curative-intent definitive 治療 的患者。受試者隨機接受 adjuvant selpercatinib 或 安慰劑 最多 3 年；主要終點為 stage ii 或 iiia 患者的 investigator-assessed 無事件存活期。 主要結果：151 人隨機分組；stage ii 或 iiia 的 2-year 無事件存活期 為 92% vs 61%（hr 0.17，95% ci 0.06 to 0.51；p<0.001）。stage ib/ii/iiia 全體 2-year 無事件存活期 為 94% vs 70%（hr 0.17，95% ci 0.06 to 0.49；p<0.001）；selpercatinib 組 alt 與 ast 升高 等級 ≥3 分別為 17% 與 19%。 藥師重點：結果顯示 adjuvant selpercatinib 可延長 stage ii-iiia ret fusion-陽性 nsclc 的 無事件存活期；藥師需確認 ret fusion 檢測、治療期間肝功能監測、交互作用與長達 3 年治療的順從性管理。"},{"id":"pmid-42234540","kind":"article","issueId":"2026-week23","year":2026,"week":23,"weekLabel":"第 23 週","dateRange":"2026/06/01 – 06/07","href":"2026-week23.html","title":"Phase 3 Trial of Secukinumab in Polymyalgia Rheumatica","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Stone","doi":"10.1056/NEJMoa2602567","url":"https://doi.org/10.1056/NEJMoa2602567","summary":"藥師重點：Secukinumab 加 prednisone taper 可提高復發性 polymyalgia rheumatica 的持續緩解並降低類固醇累積劑量；藥師需追蹤感染、fungal infection、過敏反應與 steroid taper 期間症狀復燃。","pubDate":"2026-06-03","terms":["phase","secukinumab","polymyalgia","rheumatica","nejm","stone","nejmoa2602567","glucocorticoids","selective","interleukin-17a"],"drugTerms":["secukinumab"],"searchText":"phase 3 trial of secukinumab in polymyalgia rheumatica nejm original article stone 10.1056/nejmoa2602567 研究背景：polymyalgia rheumatica 常以肩臀疼痛與僵硬表現，glucocorticoids 為第一線治療但復發與類固醇毒性常見；secukinumab 為 selective interleukin-17a 抑制劑。 研究方法：replenish 收錄 recently relapsed polymyalgia rheumatica 患者，以 1:1:1 分配至 secukinumab 300 mg、secukinumab 150 mg 或 安慰劑 52 週。所有患者並接受 24 週 prednisone taper；主要終點為 week 52 sustained 緩解，次要終點包括 annual cumulative glucocorticoid dose 與安全性。 主要結果：381 人隨機分組；week 52 sustained 緩解 為 41.2%、40.6% vs 20.4%，兩種 secukinumab 劑量相較 安慰劑 均 p<0.001。平均值 校正 annual cumulative glucocorticoid dose 為 1603.7 mg、1683.2 mg vs 2093.0 mg；嚴重不良事件 為 13.5%、15.9% vs 14.2%，nasopharyngitis、hypersensitivity reactions、urinary tract infections、fungal infections 較常見於 secukinumab 組。 藥師重點：secukinumab 加 prednisone taper 可提高復發性 polymyalgia rheumatica 的持續緩解並降低類固醇累積劑量；藥師需追蹤感染、fungal infection、過敏反應與 steroid taper 期間症狀復燃。"},{"id":"pmid-42225112","kind":"article","issueId":"2026-week23","year":2026,"week":23,"weekLabel":"第 23 週","dateRange":"2026/06/01 – 06/07","href":"2026-week23.html","title":"Perioperative serplulimab with neoadjuvant chemotherapy versus perioperative chemotherapy in PD-L1-positive gastric cancer (ASTRUM-006): a randomised, double-blind, multicentre, phase 3 study","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Shen","doi":"10.1016/S0140-6736(26)00974-8","url":"https://doi.org/10.1016/S0140-6736(26)00974-8","summary":"藥師重點：結論顯示 perioperative serplulimab 加 SOX 可延長 PD-L1 陽性 可切除胃癌族群的 無事件存活期；臨床導入前需確認 PD-L1 CPS、手術時程、免疫相關不良事件與 oxaliplatin/S-1 相關毒性監測。","pubDate":"2026-06-20","terms":["perioperative","serplulimab","neoadjuvant","chemotherapy","pd-l1-positive","gastric","cancer","astrum-006","randomised","double-blind"],"drugTerms":["serplulimab","oxaliplatin"],"searchText":"perioperative serplulimab with neoadjuvant chemotherapy versus perioperative chemotherapy in pd-l1-positive gastric cancer (astrum-006): a randomised, double-blind, multicentre, phase 3 study lancet rct shen 10.1016/s0140-6736(26)00974-8 研究背景：可切除胃癌或 gastro-oesophageal junction adenocarcinoma 的圍手術期 chemo-immunotherapy 效果仍不一致；astrum-006 評估 pd-l1 陽性 族群中 serplulimab 合併 sox 的效益與安全性。 研究方法：此隨機、雙盲、多中心 第 3 期 試驗收錄 18-70 歲、pd-l1 cps ≥5、局部晚期且可切除之胃或 gastro-oesophageal junction adenocarcinoma。受試者以 1:1 接受 neoadjuvant serplulimab 4.5 mg/kg 或 安慰劑 加 sox 三個 cycle，之後 serplulimab 組接受 adjuvant serplulimab 最多 17 cycles，對照組接受 adjuvant sox 五個 cycles；主要終點為 無事件存活期。 主要結果：588 人隨機分組；pd-l1 cps ≥10 族群 中位數 無事件存活期 為 nr vs 42.0 個月（hr 0.65，95% ci 0.47-0.90；p=0.0082）。intention-to-treat 族群 亦為 nr vs 35.9 個月（hr 0.73，95% ci 0.56-0.94；p=0.015）；等級 3 以上 治療相關不良事件 為 47% vs 59%。 藥師重點：結論顯示 perioperative serplulimab 加 sox 可延長 pd-l1 陽性 可切除胃癌族群的 無事件存活期；臨床導入前需確認 pd-l1 cps、手術時程、免疫相關不良事件與 oxaliplatin/s-1 相關毒性監測。"},{"id":"pmid-42223077","kind":"article","issueId":"2026-week23","year":2026,"week":23,"weekLabel":"第 23 週","dateRange":"2026/06/01 – 06/07","href":"2026-week23.html","title":"Perioperative Apalutamide in High-Risk Localized Prostate Cancer","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Taplin","doi":"10.1056/NEJMoa2603878","url":"https://doi.org/10.1056/NEJMoa2603878","summary":"藥師重點：Perioperative apalutamide 加 ADT 可改善高風險局部攝護腺癌手術相關結果，但不良事件較多；藥師需追蹤 rash、內分泌治療相關代謝與骨骼風險、跌倒風險及 perioperative 用藥銜接。","pubDate":"2026-05-31","terms":["perioperative","apalutamide","high-risk","localized","prostate","cancer","nejm","taplin","nejmoa2603878","radical"],"drugTerms":[],"searchText":"perioperative apalutamide in high-risk localized prostate cancer nejm original article taplin 10.1056/nejmoa2603878 研究背景：高風險局部或局部晚期攝護腺癌即使接受 radical prostatectomy，5 年內仍可能復發；本研究評估 perioperative adt 加 apalutamide 是否可改善手術後腫瘤學結果。 研究方法：proteus 為 第 3 期、雙盲、安慰劑對照 試驗，新診斷高風險 localized 或 locally advanced prostate 癌症 患者以 1:1 接受 adt 加 apalutamide 240 mg per day 或 adt 加 安慰劑。治療於 radical prostatectomy with pelvic lymph-node dissection 前後各 6 cycles（每 cycle 28 天），dual 主要終點s 為 pathological 完全反應/minimal residual 疾病 複合 與 無轉移存活期。 主要結果：2109 人隨機分組，中位追蹤 61.7 個月；pathological 完全反應 或 minimal residual 疾病 為 8.9% vs 1.0%（or 10.17，95% ci 5.27 to 19.64；p<0.001）。5 年 無轉移存活期 為 78.2% vs 73.5%（hr 0.80，95% ci 0.67 to 0.96；p=0.02）；等級 3 或 4 不良事件 為 39.6% vs 31.0%，差異主要來自 rash。 藥師重點：perioperative apalutamide 加 adt 可改善高風險局部攝護腺癌手術相關結果，但不良事件較多；藥師需追蹤 rash、內分泌治療相關代謝與骨骼風險、跌倒風險及 perioperative 用藥銜接。"},{"id":"pmid-42223064","kind":"article","issueId":"2026-week23","year":2026,"week":23,"weekLabel":"第 23 週","dateRange":"2026/06/01 – 06/07","href":"2026-week23.html","title":"PARP and Androgen-Signaling Inhibition plus ADT in Metastatic Prostate Cancer","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Agarwal","doi":"10.1056/NEJMoa2604126","url":"https://doi.org/10.1056/NEJMoa2604126","summary":"藥師重點：Talazoparib 加 enzalutamide 可延長具 DNA repair gene alterations 的 轉移性 APMS prostate 癌症 影像無惡化存活，但整體存活仍屬 interim 結果；藥師需確認基因檢測結果並密切監測 anemia、neutropenia、疲倦與劑量調整需求。","pubDate":"2026-05-30","terms":["parp","androgen-signaling","inhibition","plus","metastatic","prostate","cancer","nejm","agarwal","nejmoa2604126"],"drugTerms":[],"searchText":"parp and androgen-signaling inhibition plus adt in metastatic prostate cancer nejm original article agarwal 10.1056/nejmoa2604126 研究背景：talazoparib 加 enzalutamide 先前在 androgen pathway modulation-resistant 轉移性 prostate 癌症 顯示效益，且 homologous recombination repair gene alterations 族群受益較明顯；本研究評估較早期 apms 轉移性 prostate 癌症 的治療角色。 研究方法：此 進行中 第 3 期、雙盲 試驗 收錄帶有 homologous recombination repair gene alterations 的 轉移性 androgen pathway modulation-sensitive prostate 癌症 患者。受試者以 1:1 接受 talazoparib 0.5 mg 加 enzalutamide 160 mg 每日一次，或 安慰劑 加 enzalutamide 16
