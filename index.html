ohort study","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"Cho","doi":"10.1136/bmj-2025-088671","url":"https://doi.org/10.1136/bmj-2025-088671","summary":"藥師重點：結論顯示，在控制家庭共享因素後，孕期 benzodiazepines 或 Z-hypnotics 暴露未與子代精神疾病整體風險增加相關；但部分暴露時點與較長 Z-hypnotic 使用仍無法完全排除小幅風險，孕期用藥諮詢應維持最低有效劑量、最短必要療程並評估非藥物選項。","pubDate":"2026-04-29","terms":["benzodiazepine","z-hypnotic","pregnancy","psychiatric","disorders","children","population","bmj-2025-088671","benzodiazepines","z-hypnotics"],"drugTerms":["benzodiazepine"],"searchText":"benzodiazepine or z-hypnotic use during pregnancy and risk of psychiatric disorders in children: population based cohort study bmj original article cho 10.1136/bmj-2025-088671 研究背景：孕期使用 benzodiazepines 或 z-hypnotics 是否增加子代精神疾病風險仍有疑慮，且需區分藥物暴露與家庭、遺傳及適應症相關因素的影響。 研究方法：此南韓 national 健康 information database 族群 based 世代研究 納入 2010-2022 年所有活產兒並追蹤至 2023 年，比較孕期暴露 benzodiazepines 或 z-hypnotics、未暴露，以及母親曾使用但孕期未暴露者。研究以 propensity score overlap weighting 平衡共變項，並進行 sibling controlled 分析；主要評估子代整體與 12 類特定 psychiatric 疾患。 主要結果：共納入 3,809,949 名活產兒，其中 94,482 名（2.5%）孕期暴露 benzodiazepines 或 z-hypnotics。與未暴露或 past users 相比，初步分析顯示孕期暴露與較高 psychiatric 疾患 風險相關，但在 sibling controlled 分析 後關聯減弱（hr 0.99，95% ci 0.94-1.04），個別 psychiatric 疾患 亦未見風險增加。部分 次族群 的點估計略高，例如孕期後半段暴露或 z-hypnotic 暴露 ≥30 天，但 sibling 分析 的 信賴區間s 較寬且包含 null。 藥師重點：結論顯示，在控制家庭共享因素後，孕期 benzodiazepines 或 z-hypnotics 暴露未與子代精神疾病整體風險增加相關；但部分暴露時點與較長 z-hypnotic 使用仍無法完全排除小幅風險，孕期用藥諮詢應維持最低有效劑量、最短必要療程並評估非藥物選項。"},{"id":"pmid-42055586","kind":"article","issueId":"2026-week18","year":2026,"week":18,"weekLabel":"第 18 週","dateRange":"2026/04/27 – 05/03","href":"2026-week18.html","title":"Accelerated continuous theta burst stimulation targeting left primary motor cortex for children with autism spectrum disorder: multicentre randomised sham controlled trial","journal":"BMJ","type":"RCT","typeLabel":"RCT","author":"Tan","doi":"10.1136/bmj-2025-086295","url":"https://doi.org/10.1136/bmj-2025-086295","summary":"藥師重點：研究結果說明五天 a-cTBS protocol 對 4-10 歲自閉症類群障礙兒童的社交溝通量表有短期改善訊號，且不良事件多為輕中度；臨床解讀仍需留意介入設備、操作人員訓練、追蹤僅一個月，以及此研究並非藥物治療試驗。","pubDate":"2026-04-29","terms":["accelerated","continuous","theta","burst","stimulation","targeting","left","motor","cortex","children"],"drugTerms":[],"searchText":"accelerated continuous theta burst stimulation targeting left primary motor cortex for children with autism spectrum disorder: multicentre randomised sham controlled trial bmj rct tan 10.1136/bmj-2025-086295 研究背景：自閉症類群障礙兒童的社交溝通困難仍缺乏可快速執行且具安全性資料的介入方式；本研究評估五天 accelerated continuous theta burst stimulation（a-ctbs）是否能改善社交溝通表現。 研究方法：此多中心、隨機、sham controlled 試驗 於中國三所學術醫院進行，收錄 200 名 4-10 歲、自閉症類群障礙且 full scale intelligence quotient ≥50 的兒童。受試者以 1:1 分配至 active a-ctbs 或 sham，連續五天每日 10 次刺激，目標為 left 主要 motor cortex；主要終點為 srs-2 自基線至治療後與一個月追蹤的變化。 主要結果：198 名兒童納入 modified 意向治療分析，193 名完成完整介入。相較 sham，a-ctbs 組治療後 srs-2 分數下降較多（-6.25，95% ci -8.69 to -3.81；cohen's d -0.92；p<0.001），一個月追蹤仍有差異（-6.17，95% ci -8.65 to -3.70；cohen's d -0.90；p<0.001）。語言能力次要終點亦較有利（cohen's d 0.12-0.47；all p<0.02），通報不良事件皆為輕至中度且未需介入即緩解。 藥師重點：研究結果說明五天 a-ctbs protocol 對 4-10 歲自閉症類群障礙兒童的社交溝通量表有短期改善訊號，且不良事件多為輕中度；臨床解讀仍需留意介入設備、操作人員訓練、追蹤僅一個月，以及此研究並非藥物治療試驗。"},{"id":"fda-2026-week18-1","kind":"fda","issueId":"2026-week18","year":2026,"week":18,"weekLabel":"第 18 週","dateRange":"2026/04/27 – 05/03","href":"2026-week18.html","title":"FDA’s Concerns with Unapproved GLP-1 Drugs Used for Weight Loss","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["concerns","unapproved","glp-1","drugs","used","weight","loss","https","drug-alerts-and-statements","fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"],"drugTerms":["glp-1"],"searchText":"fda’s concerns with unapproved glp-1 drugs used for weight loss fda drug safety 2026-06-15 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"},{"id":"fda-2026-week18-3","kind":"fda","issueId":"2026-week18","year":2026,"week":18,"weekLabel":"第 18 週","dateRange":"2026/04/27 – 05/03","href":"2026-week18.html","title":"FDA issues final decision to withdraw approval of Pepaxto (melphalan flufenamide)","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/398713","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["issues","final","decision","withdraw","approval","pepaxto","melphalan","flufenamide","https","node"],"drugTerms":[],"searchText":"fda issues final decision to withdraw approval of pepaxto (melphalan flufenamide) fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/398713"},{"id":"fda-2026-week18-2","kind":"fda","issueId":"2026-week18","year":2026,"week":18,"weekLabel":"第 18 週","dateRange":"2026/04/27 – 05/03","href":"2026-week18.html","title":"FDA alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/403159","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["alerts","caregivers","providers","cross-compatibility","issues","autoinjector","devices","that","optional","glatiramer"],"drugTerms":[],"searchText":"fda alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/403159"},{"id":"fda-2026-week18-4","kind":"fda","issueId":"2026-week18","year":2026,"week":18,"weekLabel":"第 18 週","dateRange":"2026/04/27 – 05/03","href":"2026-week18.html","title":"FDA Accepts First In Silico Drug Development Tool Under ISTAND Program to Help Predict Drug-Induced Liver Injury","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["accepts","first","silico","development","tool","under","istand","program","help","predict"],"drugTerms":[],"searchText":"fda accepts first in silico drug development tool under istand program to help predict drug-induced liver injury fda drug safety 2026-06-03 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver"},{"id":"pmid-42008277","kind":"article","issueId":"2026-week17","year":2026,"week":17,"weekLabel":"第 17 週","dateRange":"2026/04/20 – 04/26","href":"2026-week17.html","title":"Using Serious Games to Increase the Implementation of Trauma Triage Guidelines: A Randomized Clinical Trial","journal":"JAMA","type":"RCT","typeLabel":"RCT","author":"Mohan","doi":"10.1001/jama.2026.4079","url":"https://doi.org/10.1001/jama.2026.4079","summary":"藥師重點：研究結果說明 serious game 可改善急診醫師對高齡嚴重創傷病人的分流行為，但尚未顯示 30 天死亡或再住院複合臨床結果改善；此類工具較適合作為指引導入與教育介入的輔助證據。","pubDate":"2026-05-19","terms":["serious","games","increase","implementation","trauma","triage","guidelines","jama","mohan","nontrauma"],"drugTerms":[],"searchText":"using serious games to increase the implementation of trauma triage guidelines: a randomized clinical trial jama rct mohan 10.1001/jama.2026.4079 研究背景：創傷分流屬於高度時間敏感的臨床決策，但醫師遵循分流指引的比例仍偏低，特別是在處理高齡受傷病人時。 研究方法：此 隨機臨床試驗 納入美國 nontrauma centers 急診中負責 medicare fee-for-service、65 歲以上受傷病人分流的 800 名急診醫師。介入組接受 tablet 上的 theory-based serious game training，初始 2 小時後每季 20 分鐘、共 4 次，對照組為 usual education；主要終點為隨機後 1 年內 重度 injury 病人未轉送 trauma centers 的 undertriage 比例。 主要結果：800 名醫師在 1147 家醫院照護 41073 名受傷 medicare 病人，其中 1738 人（4.2%）為 重度 injuries。game-based training 組 重度 injured older adults 的 undertriage 比例低於 usual education 組（49% vs 57%；model-校正 差異 -7%，95% ci -13% to -0.8%；p=.02）；overtriage（-3%，95% ci -6% to 1%；p=.14）與 30-day 死亡率 或 readmission 複合 結果指標（-0.4%，95% ci -5% to 4%；p=.87）未見差異。 藥師重點：研究結果說明 serious game 可改善急診醫師對高齡嚴重創傷病人的分流行為，但尚未顯示 30 天死亡或再住院複合臨床結果改善；此類工具較適合作為指引導入與教育介入的輔助證據。"},{"id":"pmid-42018318","kind":"article","issueId":"2026-week17","year":2026,"week":17,"weekLabel":"第 17 週","dateRange":"2026/04/20 – 04/26","href":"2026-week17.html","title":"Tucidinostat Plus R-CHOP vs R-CHOP in MYC/BCL2 Double-Expressor Diffuse Large B-Cell Lymphoma: A Randomized Clinical Trial","journal":"JAMA","type":"RCT","typeLabel":"RCT","author":"Xu","doi":"10.1001/jama.2026.4199","url":"https://doi.org/10.1001/jama.2026.4199","summary":"藥師重點：結論顯示 tucidinostat 加 R-CHOP 可改善新診斷 MYC/BCL2 DEL 病人的 無事件存活期；若納入治療選項，藥師需留意合併 R-CHOP 與維持治療期間的毒性管理、支持性照護與劑量延遲或停藥判斷。","pubDate":"2026-05-19","terms":["tucidinostat","plus","r-chop","bcl2","double-expressor","diffuse","large","b-cell","lymphoma","jama"],"drugTerms":["rituximab"],"searchText":"tucidinostat plus r-chop vs r-chop in myc/bcl2 double-expressor diffuse large b-cell lymphoma: a randomized clinical trial jama rct xu 10.1001/jama.2026.4199 研究背景：myc/bcl2 double-expressor 淋巴瘤 (del) 是 瀰漫性大型 b 細胞淋巴瘤 (dlbcl) 中預後較差的族群，標準 r-chop 後仍有治療需求；tucidinostat（chidamide）為口服 selective histone deacetylase 抑制劑，先前在 del 顯示潛在活性。 研究方法：此 隨機, 雙盲, 安慰劑對照 第 3 期試驗 於中國 40 個中心進行，共納入 423 名新診斷 del 病人。受試者以 1:1 隨機接受 口服 tucidinostat 20 mg on 天 1, 4, 8, and 11 of each 21-day cycle 或 匹配安慰劑，皆合併 6 cycles r-chop；完全反應 後可續用 tucidinostat 或 安慰劑 maintenance up to 24 週，主要終點為 無事件存活期。 主要結果：423 名隨機分組病人 中位數 age 63 歲，中位數 追蹤 41.3 個月。tucidinostat 組相較 安慰劑 組，疾病 progression、完全反應 後復發、死亡或因殘餘疾病啟動新治療的風險降低 28%（stratified 風險比 0.72；95% ci 0.54-0.96；p=.02），2-year 無事件存活期 為 60.3% vs 50.5%；complete 反應率 為 73.0% vs 61.8%（差異 11.1%；95% ci 2.3%-20.0%）。tucidinostat 組治療相關毒性較高，但摘要描述多可經支持性照護處理。 藥師重點：結論顯示 tucidinostat 加 r-chop 可改善新診斷 myc/bcl2 del 病人的 無事件存活期；若納入治療選項，藥師需留意合併 r-chop 與維持治療期間的毒性管理、支持性照護與劑量延遲或停藥判斷。"},{"id":"pmid-42019018","kind":"article","issueId":"2026-week17","year":2026,"week":17,"weekLabel":"第 17 週","dateRange":"2026/04/20 – 04/26","href":"2026-week17.html","title":"Three Low-Dose Antihypertensive Agents in a Single Pill after Intracerebral Hemorrhage","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Anderson","doi":"10.1056/NEJMoa2515043","url":"https://doi.org/10.1056/NEJMoa2515043","summary":"藥師重點：結論顯示腦內出血後病人使用 telmisartan、amlodipine、indapamide 低劑量單錠複方可降低復發中風與 主要心血管事件；藥師需同步監測血壓、腎功能與停藥原因，特別是 creatinine 上升造成的耐受性問題。","pubDate":"2026-04-23","terms":["three","low-dose","antihypertensive","agents","single","pill","intracerebral","hemorrhage","nejm","anderson"],"drugTerms":["telmisartan","amlodipine"],"searchText":"three low-dose antihypertensive agents in a single pill after intracerebral hemorrhage nejm rct anderson 10.1056/nejmoa2515043 研究背景：降低血壓是預防中風的重要治療策略，但腦內出血後以單錠複方低劑量降壓藥加上標準照護，是否可進一步降低血壓與復發中風風險仍不確定。 研究方法：此 多國, 雙盲, 隨機, 安慰劑對照 試驗 納入曾發生腦內出血、基準 收縮壓 130-160 mm hg 且臨床穩定的病人。所有病人先接受 2 週 活性藥物導入期 的 triple pill（telmisartan 20 mg、amlodipine 2.5 mg、indapamide 1.25 mg 每日一次），再隨機續用 triple pill 或 匹配安慰劑，主要終點為首次復發中風。 主要結果：共 1670 人隨機分組，triple-pill 組 833 人、安慰劑 組 837 人，中位數 追蹤 2.5 年。復發中風發生率為 4.6% vs 7.4%（風險比 0.61；95% ci 0.41-0.92；p=0.02），追蹤期間平均收縮壓為 127 mm hg vs 138 mm hg；主要心血管事件 為 6.6% vs 9.8%（p=0.04），因不良事件提前停藥為 13.6% vs 6.0%，最常見原因為 serum creatinine level 增加 20% 或以上。 藥師重點：結論顯示腦內出血後病人使用 telmisartan、amlodipine、indapamide 低劑量單錠複方可降低復發中風與 主要心血管事件；藥師需同步監測血壓、腎功能與停藥原因，特別是 creatinine 上升造成的耐受性問題。"},{"id":"pmid-42033722","kind":"article","issueId":"2026-week17","year":2026,"week":17,"weekLabel":"第 17 週","dateRange":"2026/04/20 – 04/26","href":"2026-week17.html","title":"Symptom-Based Dosing for Neonatal Opioid Withdrawal: The OPTimize NOW Randomized Clinical Trial","journal":"JAMA","type":"RCT","typeLabel":"RCT","author":"Devlin","doi":"10.1001/jama.2026.5782","url":"https://doi.org/10.1001/jama.2026.5782","summary":"藥師重點：結論顯示在 ESC 照護架構下，NOWS 嬰兒採 symptom-based dosing 可縮短達到出院準備的時間，但仍有三分之一以上需轉為 固定 opioid 給藥；院內導入時需搭配一致的評估工具、opioid 給藥演算法與安全監測。","pubDate":"2026-06-23","terms":["symptom-based","dosing","neonatal","opioid","withdrawal","optimize","jama","devlin","nows","scheduled"],"drugTerms":[],"searchText":"symptom-based dosing for neonatal opioid withdrawal: the optimize now randomized clinical trial jama rct devlin 10.1001/jama.2026.5782 研究背景：neonatal opioid withdrawal 症候群 (nows) 需藥物治療時，傳統多採 scheduled opioid taper；symptom-based dosing 可能更貼近實際戒斷嚴重度。 研究方法：optimize now 為 cluster, crossover 隨機臨床試驗 with run-in period，23 家美國醫院依 eat, sleep, console approach (esc) 或 finnegan-based care 照護嬰兒，並使用各院偏好的 主要 opioid。納入出生週數至少 36 週且有 nows、具藥物治療風險的嬰兒，院所隨機依序採 symptom-based dosing 或 scheduled opioid taper；主要終點為出生至 醫療上可出院 的時間。 主要結果：共 626 名嬰兒納入，383 名屬 esc 主要 結果指標 世代。esc 世代 中，symptom-based dosing 組至 醫療上可出院 的平均時間短於 scheduled opioid taper 組（9.18 vs 11.61 天；校正 平均值 比值 0.79，95% ci 0.65-0.96），但開始藥物治療風險（校正 風險比 0.99，95% ci 0.77-1.27）與 length of stay（amr 0.9，95% ci 0.72-1.13）未見差異；症狀導向組 中 35% 仍因戒斷嚴重度需 固定 opioid 給藥。finnegan 世代 未見 醫療上可出院 或 length of stay 顯著差異，住院 複合 safety 結果指標 少見。 藥師重點：結論顯示在 esc 照護架構下，nows 嬰兒採 symptom-based dosing 可縮短達到出院準備的時間，但仍有三分之一以上需轉為 固定 opioid 給藥；院內導入時需搭配一致的評估工具、opioid 給藥演算法與安全監測。"},{"id":"pmid-42019019","kind":"article","issueId":"2026-week17","year":2026,"week":17,"weekLabel":"第 17 週","dateRange":"2026/04/20 – 04/26","href":"2026-week17.html","title":"Oral Nirmatrelvir-Ritonavir for Covid-19 in Higher-Risk Outpatients","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Butler","doi":"10.1056/NEJMoa2502457","url":"https://doi.org/10.1056/NEJMoa2502457","summary":"藥師重點：結論顯示在已接種疫苗的高風險 SARS-CoV-2 感染者中，nirmatrelvir-ritonavir 未降低 28 天住院或死亡發生率；用藥評估仍應回到發病天數、腎功能與 ritonavir 相關交互作用，避免把病毒量下降直接解讀為臨床事件下降。","pubDate":"2026-04-23","terms":["oral","nirmatrelvir-ritonavir","covid-19","higher-risk","outpatients","nejm","butler","nejmoa2502457","platform","panoramic"],"drugTerms":["nirmatrelvir-ritonavir","nirmatrelvir","ritonavir","mg-ritonavir"],"searchText":"oral nirmatrelvir-ritonavir for covid-19 in higher-risk outpatients nejm rct butler 10.1056/nejmoa2502457 研究背景：nirmatrelvir-ritonavir 已知可降低未接種疫苗高風險門診 covid-19 病人進展為重症的風險，但對已接種疫苗、曾自然感染或兩者皆有者的效益仍不明確。 研究方法：研究整合兩項 開放標籤 platform 試驗：英國 panoramic 與加拿大 cantreatcovid，收錄社區中 sars-cov-2 陽性且症狀不超過 5 天的高風險成人。受試者隨機接受 常規照護 加 nirmatrelvir 300 mg-ritonavir 100 mg 每日兩次 for 5 天，或 常規照護 單用，主要終點為隨機後 28 天內全因住院或死亡。 主要結果：panoramic 納入 3516 人，nirmatrelvir-ritonavir 組與 usual-care 組住院或死亡為 0.8% vs 0.7%（校正 勝算比 1.18；95% bayesian 可信區間 0.55-2.62；probability of superiority 0.334）。cantreatcovid 納入 716 人，對應結果為 0.6% vs 1.2%（校正 勝算比 0.48；95% bayesian 可信區間 0.08-2.23；probability of superiority 0.830）；634 人 substudy 顯示治療結束時病毒量下降，嚴重不良事件 分別通報 9 人與 4 人。 藥師重點：結論顯示在已接種疫苗的高風險 sars-cov-2 感染者中，nirmatrelvir-ritonavir 未降低 28 天住院或死亡發生率；用藥評估仍應回到發病天數、腎功能與 ritonavir 相關交互作用，避免把病毒量下降直接解讀為臨床事件下降。"},{"id":"pmid-42019989","kind":"article","issueId":"2026-week17","year":2026,"week":17,"weekLabel":"第 17 週","dateRange":"2026/04/20 – 04/26","href":"2026-week17.html","title":"Home environment conditions during childhood and psychosocial outcomes across three generations in Sweden: population based adoption-discordant sibling comparison study","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"Liao","doi":"10.1136/bmj-2025-087844","url":"https://doi.org/10.1136/bmj-2025-087844","summary":"藥師重點：研究結果說明童年家庭環境改善與精神、社會及認知結果的長期較佳表現有關，且可能延伸至下一代；此為登錄資料與手足比較研究，解讀時仍需注意收養選擇、家庭環境差異與非藥物介入的因果限制。","pubDate":"2026-04-22","terms":["home","environment","conditions","childhood","psychosocial","across","three","generations","sweden","population"],"drugTerms":[],"searchText":"home environment conditions during childhood and psychosocial outcomes across three generations in sweden: population based adoption-discordant sibling comparison study bmj original article liao 10.1136/bmj-2025-087844 研究背景：早期進入較有利的家庭環境，是否能降低來自精神或行為問題家庭兒童的長期 psychosocial risks，並延伸至下一代，仍需要長期族群資料釐清。 研究方法：此研究為瑞典登錄資料的 族群 based adoption-discordant sibling comparison 研究，追蹤 1950 至 1980 年出生者至 2020 年 12 月 31 日。研究比較風險家庭中 4254 對 full siblings 與 7796 對 maternal half siblings，依 10 歲前是否被收養進入非生物家庭分組，並追蹤其子代以評估 intergenerational spillover effects。 主要結果：被收養者（n=1535）相較未被收養手足，psychiatric 疾患 較低（29.8% v 36.1%）、criminal convictions 較低（26.1% v 34.0%）、receiving social welfare 較低（37.8% v 48.5%），且 平均值 intelligence scores（4.5 v 3.8）、non-cognitive skills scores（4.8 v 3.9）與大學就讀比例（26.0% v 15.2%）較高。被收養者子代（n=2750）相較 cousins 也呈現較佳 psychosocial functioning，但關聯較弱且估計較不精確。 藥師重點：研究結果說明童年家庭環境改善與精神、社會及認知結果的長期較佳表現有關，且可能延伸至下一代；此為登錄資料與手足比較研究，解讀時仍需注意收養選擇、家庭環境差異與非藥物介入的因果限制。"},{"id":"pmid-42030965","kind":"article","issueId":"2026-week17","year":2026,"week":17,"weekLabel":"第 17 週","dateRange":"2026/04/20 – 04/26","href":"2026-week17.html","title":"Efficacy and safety of cemdisiran siRNA in myasthenia gravis (NIMBLE): a double-blind, randomised, placebo-controlled, phase 3 trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Vu","doi":"10.1016/S0140-6736(26)00690-2","url":"https://doi.org/10.1016/S0140-6736(26)00690-2","summary":"藥師重點：結論顯示 cemdisiran 單用與 cemdisiran 加 pozelimab 可改善 generalised myasthenia gravis 的 MG-ADL score，cemdisiran 每 12 週皮下注射也提供較低給藥頻率的可能性；臨床評估時仍需確認抗體陽性族群、感染風險監測與 C5 抑制相關風險管理。","pubDate":"2026-05-02","terms":["efficacy","cemdisiran","sirna","myasthenia","gravis","nimble","double-blind","randomised","placebo-controlled","phase"],"drugTerms":["pozelimab","anti-achr","anti-lrp4"],"searchText":"efficacy and safety of cemdisiran sirna in myasthenia gravis (nimble): a double-blind, randomised, placebo-controlled, phase 3 trial lancet rct vu 10.1016/s0140-6736(26)00690-2 研究背景：achr 抗體-陽性 generalised myasthenia gravis 的病理與 autoantibody-mediated complement activation 有關，本研究評估 targeting complement component 5 (c5) 的 sirna cemdisiran，作為單一治療或與 c5 抗體 pozelimab 合併治療的效果。 研究方法：nimble 為 隨機, 雙盲, 安慰劑對照, 第 3 期試驗，在 13 國 86 個中心進行，納入 18 歲以上 generalised myasthenia gravis、anti-achr 或 anti-lrp4 抗體 陽性，且 mg-adl score 6 分以上的病人。受試者接受 cemdisiran 600 mg 每 12 週、pozelimab 200 mg 每 4 週、cemdisiran 200 mg 加上 pozelimab 200 mg 每 4 週，或 安慰劑，皆為皮下注射，主要終點為第 24 週 mg-adl score 相對基準值變化。 主要結果：截至資料截止日，284 人隨機分組，277 人接受至少一劑研究治療，263 人完成 雙盲 治療 period。mitt 主要 分析 set 中，第 24 週 mg-adl 最小平方平均變化 為 cemdisiran -4.5、combination -4.0、安慰劑 -2.2；相較 安慰劑 的差異為 cemdisiran -2.3（95% ci -3.6 to -1.0；p=0.0005）與 combination -1.7（95% ci -3.0 to -0.4；p=0.0086）。至少一項 不良事件 發生於 cemdisiran 69%、combination 81%、pozelimab 82%、安慰劑 77%；cemdisiran 組未發生 serious 或 meningococcal infections，雙盲 期間無死亡。 藥師重點：結論顯示 cemdisiran 單用與 cemdisiran 加 pozelimab 可改善 generalised myasthenia gravis 的 mg-adl score，cemdisiran 每 12 週皮下注射也提供較低給藥頻率的可能性；臨床評估時仍需確認抗體陽性族群、感染風險監測與 c5 抑制相關風險管理。"},{"id":"pmid-42026010","kind":"article","issueId":"2026-week17","year":2026,"week":17,"weekLabel":"第 17 週","dateRange":"2026/04/20 – 04/26","href":"2026-week17.html","title":"Clinical and bacteriological effectiveness of three different short-course antibiotic regimens and single-dose fosfomycin for uncomplicated lower urinary tract infections in women (SCOUT): a pragmatic, multicentre, open-label, randomised clinical trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Llor","doi":"10.1016/S0140-6736(25)02171-3","url":"https://doi.org/10.1016/S0140-6736(25)02171-3","summary":"藥師重點：研究結果說明 uncomplicated lower UTI 女性中，nitrofurantoin 的第 7 天症狀解除比例最高，single-dose fosfomycin 最低；處方建議仍需結合在地抗藥性、腎功能、用藥禁忌與病人能否完成療程。","pubDate":"2026-04-25","terms":["bacteriological","effectiveness","three","different","short-course","antibiotic","regimens","single-dose","fosfomycin","uncomplicated"],"drugTerms":["fosfomycin"],"searchText":"clinical and bacteriological effectiveness of three different short-course antibiotic regimens and single-dose fosfomycin for uncomplicated lower urinary tract infections in women (scout): a pragmatic, multicentre, open-label, randomised clinical trial lancet rct llor 10.1016/s0140-6736(25)02171-3 研究背景：nitrofurantoin、fosfomycin 與 pivmecillinam 常被建議用於女性 uncomplicated lower uti，但這些短療程抗生素之間仍需要直接比較療效與安全性。 研究方法：scout 為 phase 4 實務型, 多中心, parallel-group, 開放標籤, 隨機臨床試驗，於 2022 至 2024 年在西班牙基層醫療中心進行。研究納入 18 歲以上、有 dysuria、urinary urgency、urinary frequency 或 suprapubic tenderness 至少一項且尿液 dipstick nitrites 或 leukocyte esterase 陽性的女性，隨機分配至 single-dose fosfomycin 3 g、two-dose fosfomycin 3 g、nitrofurantoin 100 mg three times per day for 5 天，或 pivmecillinam 400 mg three times per day for 3 天；主要終點為第 7 天所有感染症狀消失。 主要結果：768 人完成隨機分組，720 人納入主要分析。第 7 天 臨床 resolution 以 single-dose fosfomycin 最低（109/185，59%），nitrofurantoin 最高（128/172，74%；差異 15.5 百分點，95% ci 5.9-25.1；p=0.0168），其次為 pivmecillinam（127/182，70%；差異 10.9 百分點，95% ci 1.1-20.6；p=0.2352）與 two-dose fosfomycin（122/181，67%；差異 8.5 百分點，95% ci -1.4-18.3；p=0.6935）。不良事件多為輕微且自行緩解的腸胃道事件；4 件 嚴重不良事件 中 1 件 pyelonephritis 被判定與 pivmecillinam 相關。 藥師重點：研究結果說明 uncomplicated lower uti 女性中，nitrofurantoin 的第 7 天症狀解除比例最高，single-dose fosfomycin 最低；處方建議仍需結合在地抗藥性、腎功能、用藥禁忌與病人能否完成療程。"},{"id":"pmid-42028918","kind":"article","issueId":"2026-week17","year":2026,"week":17,"weekLabel":"第 17 週","dateRange":"2026/04/20 – 04/26","href":"2026-week17.html","title":"Balanced Fluid or 0.9% Saline in Children Treated for Septic Shock","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Balamuth","doi":"10.1056/NEJMoa2601969","url":"https://doi.org/10.1056/NEJMoa2601969","summary":"藥師重點：結論顯示兒童 septic shock 使用 balanced fluid 與 0.9% saline 復甦，在死亡、新 renal-replacement 治療 或 persistent kidney 功能障礙 的複合終點未見顯著差異；液體選擇仍需依院內流程與病人電解質、chloride、sodium、lactate 變化監測調整。","pubDate":"2026-04-24","terms":["balanced","fluid","saline","children","treated","septic","shock","nejm","balamuth","nejmoa2601969"],"drugTerms":[],"searchText":"balanced fluid or 0.9% saline in children treated for septic shock nejm original article balamuth 10.1056/nejmoa2601969 研究背景：兒童 septic shock 復甦時使用 balanced crystalloid fluid 是否優於 0.9% saline，特別是腎臟相關結果，臨床仍有爭議。 研究方法：此 實務型 臨床 試驗 於 5 國 47 個急診部門進行，納入 2 個月至未滿 18 歲、疑似 septic shock 且灌流異常的病人。受試者隨機接受 balanced fluid 或 0.9% saline 進行最長 48 小時 fluid resuscitation，主要終點為 30 天或出院前 重大腎臟不良事件，包括死亡、新 renal-replacement 治療 或 persistent kidney 功能障礙。 主要結果：9041 名納入者中，balanced-fluid 組 4235 人、0.9%-saline 組 4247 人進入分析。主要終點發生率為 3.4% vs 3.0%（差異 0.4 百分點；95% ci -0.5 to 1.3；風險比 1.10；95% ci 0.88-1.40；p=0.85），28 天 hospital-free 天 中位數皆為 23 天。hyperchloremia 為 31.4% vs 49.0%，hypernatremia 為 1.8% vs 3.1%，hyperlactatemia 為 19.8% vs 16.7%；其他 safety 結果指標 或 不良事件 未見差異。 藥師重點：結論顯示兒童 septic shock 使用 balanced fluid 與 0.9% saline 復甦，在死亡、新 renal-replacement 治療 或 persistent kidney 功能障礙 的複合終點未見顯著差異；液體選擇仍需依院內流程與病人電解質、chloride、sodium、lactate 變化監測調整。"},{"id":"fda-2026-week17-1","kind":"fda","issueId":"2026-week17","year":2026,"week":17,"weekLabel":"第 17 週","dateRange":"2026/04/20 – 04/26","href":"2026-week17.html","title":"FDA’s Concerns with Unapproved GLP-1 Drugs Used for Weight Loss","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["concerns","unapproved","glp-1","drugs","used","weight","loss","https","drug-alerts-and-statements","fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"],"drugTerms":["glp-1"],"searchText":"fda’s concerns with unapproved glp-1 drugs used for weight loss fda drug safety 2026-06-15 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"},{"id":"fda-2026-week17-3","kind":"fda","issueId":"2026-week17","year":2026,"week":17,"weekLabel":"第 17 週","dateRange":"2026/04/20 – 04/26","href":"2026-week17.html","title":"FDA issues final decision to withdraw approval of Pepaxto (melphalan flufenamide)","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/398713","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["issues","final","decision","withdraw","approval","pepaxto","melphalan","flufenamide","https","node"],"drugTerms":[],"searchText":"fda issues final decision to withdraw approval of pepaxto (melphalan flufenamide) fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/398713"},{"id":"fda-2026-week17-2","kind":"fda","issueId":"2026-week17","year":2026,"week":17,"weekLabel":"第 17 週","dateRange":"2026/04/20 – 04/26","href":"2026-week17.html","title":"FDA alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/403159","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["alerts","caregivers","providers","cross-compatibility","issues","autoinjector","devices","that","optional","glatiramer"],"drugTerms":[],"searchText":"fda alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/403159"},{"id":"fda-2026-week17-4","kind":"fda","issueId":"2026-week17","year":2026,"week":17,"weekLabel":"第 17 週","dateRange":"2026/04/20 – 04/26","href":"2026-week17.html","title":"FDA Accepts First In Silico Drug Development Tool Under ISTAND Program to Help Predict Drug-Induced Liver Injury","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["accepts","first","silico","development","tool","under","istand","program","help","predict"],"drugTerms":[],"searchText":"fda accepts first in silico drug development tool under istand program to help predict drug-induced liver injury fda drug safety 2026-06-03 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver"},{"id":"pmid-41985133","kind":"article","issueId":"2026-week16","year":2026,"week":16,"weekLabel":"第 16 週","dateRange":"2026/04/13 – 04/19","href":"2026-week16.html","title":"Randomized Trial of Adjunctive Prednisolone for Kawasaki Disease","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Lin","doi":"10.1056/NEJMoa2511478","url":"https://doi.org/10.1056/NEJMoa2511478","summary":"藥師重點：結果顯示在未篩選的新診斷 Kawasaki 疾病 族群中，prednisolone 加入初始標準治療未降低 1 個月冠狀動脈病變；藥師可留意其雖減少 rescue 治療 與縮短發燒時間，但不應據此推論可改善主要血管終點。","pubDate":"2026-04-16","terms":["adjunctive","prednisolone","kawasaki","nejm","nejmoa2511478","glucocorticoids","rescue"],"drugTerms":[],"searchText":"randomized trial of adjunctive prednisolone for kawasaki disease nejm rct lin 10.1056/nejmoa2511478 研究背景：kawasaki 疾病 初始治療是否應於未篩選族群中加用 glucocorticoids，過去仍缺乏明確證據。 研究方法：此中國多中心、開放標籤、隨機對照試驗納入新診斷 kawasaki 疾病 兒童，1:1 分配接受 prednisolone 加標準治療或單用標準治療；主要終點為發病後 1 個月冠狀動脈病變。 主要結果：共 3208 人隨機分組，基線已有冠狀動脈病變者占 27.3%。1 個月時 prednisolone 加標準治療組與標準治療組冠狀動脈病變發生率為 16.0% vs 13.8%（校正 風險差 1.1 百分點，95% ci -1.0 to 3.4；p = 0.31），整體不良事件發生率未見顯著差異。 藥師重點：結果顯示在未篩選的新診斷 kawasaki 疾病 族群中，prednisolone 加入初始標準治療未降低 1 個月冠狀動脈病變；藥師可留意其雖減少 rescue 治療 與縮短發燒時間，但不應據此推論可改善主要血管終點。"},{"id":"pmid-41969010","kind":"article","issueId":"2026-week16","year":2026,"week":16,"weekLabel":"第 16 週","dateRange":"2026/04/13 – 04/19","href":"2026-week16.html","title":"Prevalence of liver fibrosis in the general population (the LiverScreen project): a multinational European cohort study","journal":"Lancet","type":"OA","typeLabel":"Original Article","author":"Graupera","doi":"10.1016/S0140-6736(26)00354-5","url":"https://doi.org/10.1016/S0140-6736(26)00354-5","summary":"藥師重點：此研究提示歐洲一般族群未診斷 liver fibrosis 與肥胖、type 2 diabetes、harmful alcohol 使用 密切相關；藥師在慢性病與代謝症候群照護中，可將肝纖維化風險納入用藥與生活型態衛教，但外推至非歐洲族群需保守。","pubDate":"2026-04-11","terms":["prevalence","liver","fibrosis","general","population","liverscreen","project","multinational","european","lancet"],"drugTerms":[],"searchText":"prevalence of liver fibrosis in the general population (the liverscreen project): a multinational european cohort study lancet original article graupera 10.1016/s0140-6736(26)00354-5 研究背景：小型單國研究顯示一般族群中可能存在未診斷 liver fibrosis，但真實盛行率及 metabolic factors、alcohol consumption 的關聯仍不明確。 研究方法：liverscreen 為歐洲九國前瞻性 族群-based 世代研究，納入 40 歲以上一般族群 30,199 人，使用 vibration-controlled transient elastography（vcte）測量 liver stiffness measurement（lsm）。lsm ≥8 kpa、alanine aminotransferase 至少 1.5 倍正常上限，或兩者並存者轉介肝臟科評估；主要結果為 lsm ≥8 kpa 盛行率。 主要結果：受試者平均 58 歲，57% 為女性；70% 有 metabolic factors，6.1% 報告 harmful alcohol consumption。陽性篩檢率為 6.9%，lsm ≥8 kpa 盛行率為 4.6%；完成肝臟科評估者中 32% 確認 chronic liver 疾病 with fibrosis，整體估計盛行率為 1.6%，其中 steatotic liver 疾病 占 93%。 藥師重點：此研究提示歐洲一般族群未診斷 liver fibrosis 與肥胖、type 2 diabetes、harmful alcohol 使用 密切相關；藥師在慢性病與代謝症候群照護中，可將肝纖維化風險納入用藥與生活型態衛教，但外推至非歐洲族群需保守。"},{"id":"pmid-41985931","kind":"article","issueId":"2026-week16","year":2026,"week":16,"weekLabel":"第 16 週","dateRange":"2026/04/13 – 04/19","href":"2026-week16.html","title":"Prenatal exposure to buprenorphine or methadone and adverse neurodevelopmental outcomes: population based cohort study","journal":"BMJ","type":"OA","typeLabel":"Original Article","author":"Friedrich","doi":"10.1136/bmj-2025-087321","url":"https://doi.org/10.1136/bmj-2025-087321","summary":"藥師重點：結果未顯示孕期 buprenorphine 相較 methadone 會增加子代長期神經發展不良風險；藥師協助孕婦 opioid 使用 疾患 治療時，仍需把母體穩定治療、暴露時點、共病與其他物質使用納入共同評估。","pubDate":"2026-04-15","terms":["prenatal","exposure","buprenorphine","methadone","adverse","neurodevelopmental","population","friedrich","bmj-2025-087321","opioid"],"drugTerms":[],"searchText":"prenatal exposure to buprenorphine or methadone and adverse neurodevelopmental outcomes: population based cohort study bmj original article friedrich 10.1136/bmj-2025-087321 研究背景：孕期 opioid 使用 疾患 治療常使用 buprenorphine 或 methadone，但兩者對子代長期 neurodevelopmental 疾患 的相對風險仍是臨床關注問題。 研究方法：此 族群 based 世代研究 使用美國 nationwide medicaid 2000-2018 年超過 250 萬活產資料，分析孕期暴露 buprenorphine 或 methadone 的兒童。主要結果為 autism spectrum 疾患、attention deficit/hyperactivity 疾患、語言或動作發展障礙、行為障礙、學習困難或 intellectual disability 的複合 neurodevelopmental 疾患，並以 propensity score overlap weighting 校正混雜因子。 主要結果：12,635 名兒童孕期暴露 buprenorphine，5,390 名暴露 methadone。8 歲時任何 neurodevelopmental 疾患 粗累積發生率為 34%（95% ci 30% to 38%）vs 33%（29% to 37%）；校正後 buprenorphine 相較 methadone 的風險略低（校正 hr 0.81，95% ci 0.70 to 0.94），prevalent 使用 分析亦較低（校正 hr 0.62，0.51 to 0.76），但 pregnancy 期間開始治療者未見此關聯（校正 hr 1.13，0.90 to 1.42）。 藥師重點：結果未顯示孕期 buprenorphine 相較 methadone 會增加子代長期神經發展不良風險；藥師協助孕婦 opioid 使用 疾患 治療時，仍需把母體穩定治療、暴露時點、共病與其他物質使用納入共同評估。"},{"id":"pmid-41974150","kind":"article","issueId":"2026-week16","year":2026,"week":16,"weekLabel":"第 16 週","dateRange":"2026/04/13 – 04/19","href":"2026-week16.html","title":"Pembrolizumab plus weekly paclitaxel in platinum-resistant recurrent ovarian cancer (ENGOT-ov65/KEYNOTE-B96): a multicentre, randomised, double-blind, phase 3 study","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Colombo","doi":"10.1016/S0140-6736(26)00602-1","url":"https://doi.org/10.1016/S0140-6736(26)00602-1","summary":"藥師重點：研究支持 pembrolizumab 加 每週 paclitaxel（可併用 bevacizumab）作為 platinum-resistant recurrent ovarian 癌症 的治療選項之一，但 等級 3 以上治療相關不良事件較高，藥師需特別追蹤免疫相關毒性、周邊神經病變、血液學毒性與 bevacizumab 併用風險。","pubDate":"2026-04-18","terms":["pembrolizumab","plus","weekly","paclitaxel","platinum-resistant","recurrent","ovarian","cancer","engot-ov65","keynote-b96"],"drugTerms":["pembrolizumab","paclitaxel","bevacizumab"],"searchText":"pembrolizumab plus weekly paclitaxel in platinum-resistant recurrent ovarian cancer (engot-ov65/keynote-b96): a multicentre, randomised, double-blind, phase 3 study lancet rct colombo 10.1016/s0140-6736(26)00602-1 研究背景：上皮性卵巢癌常復發並轉為 platinum-resistant，pembrolizumab 加 每週 paclitaxel 是否能改善 無惡化存活期 與 整體存活期 是本研究重點。 研究方法：engot-ov65/keynote-b96 為多國、隨機、雙盲、第 3 期 研究，納入曾接受 1-2 線全身治療且最後 platinum 處方 後 6 個月內惡化的 epithelial ovarian、fallopian tube 或 主要 peritoneal carcinoma 成人。受試者分配接受 pembrolizumab 400 mg 每 6 週 加 paclitaxel 80 mg/m2 天 1, 8, 15 每 21 天，或 安慰劑 加相同 paclitaxel；可依研究者判斷加用 bevacizumab。 主要結果：共 643 名女性受試者隨機分組。第一次期中分析顯示 pembrolizumab 加 paclitaxel 在 pd-l1 cps 1 or higher 族群改善 無惡化存活期（中位數 8.3 vs 7.2 個月；hr 0.72，95% ci 0.58-0.89；p=0.0014），整體族群亦改善 無惡化存活期（中位數 8.3 vs 6.4 個月；hr 0.70，95% ci 0.58-0.84；p<0.0001）；最終分析整體族群 整體存活期 為 17.7 vs 14.0 個月（hr 0.82，95% ci 0.69-0.97；p=0.011）。等級 3 or worse 治療相關不良事件 為 68% vs 55%。 藥師重點：研究支持 pembrolizumab 加 每週 paclitaxel（可併用 bevacizumab）作為 platinum-resistant recurrent ovarian 癌症 的治療選項之一，但 等級 3 以上治療相關不良事件較高，藥師需特別追蹤免疫相關毒性、周邊神經病變、血液學毒性與 bevacizumab 併用風險。"},{"id":"pmid-41974149","kind":"article","issueId":"2026-week16","year":2026,"week":16,"weekLabel":"第 16 週","dateRange":"2026/04/13 – 04/19","href":"2026-week16.html","title":"Overall survival with relacorilant and nab-paclitaxel in patients with platinum-resistant ovarian cancer (ROSELLA): a phase 3 randomised controlled trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Lorusso","doi":"10.1016/S0140-6736(26)00462-9","url":"https://doi.org/10.1016/S0140-6736(26)00462-9","summary":"藥師重點：結果顯示 relacorilant 加 nab-paclitaxel 在不需 biomarker selection 的 platinum-resistant ovarian 癌症 族群可延長 整體存活期；藥師需留意 nab-paclitaxel 相關 neutropenia、anaemia、fatigue、nausea，以及三日口服 relacorilant 與輸注時程的用藥銜接。","pubDate":"2026-04-18","terms":["overall","survival","relacorilant","nab-paclitaxel","platinum-resistant","ovarian","cancer","rosella","phase","randomised"],"drugTerms":["nab-paclitaxel","bevacizumab"],"searchText":"overall survival with relacorilant and nab-paclitaxel in patients with platinum-resistant ovarian cancer (rosella): a phase 3 randomised controlled trial lancet rct lorusso 10.1016/s0140-6736(26)00462-9 研究背景：relacorilant 為 selective glucocorticoid 受體 拮抗劑，可能增加腫瘤細胞對化療敏感性；rosella 研究評估其與 nab-paclitaxel 用於 platinum-resistant ovarian 癌症 的療效與安全性。 研究方法：此 開放標籤 第 3 期試驗 將 18 歲以上、曾接受 1-3 線抗癌治療且 platinum-resistant 的患者，1:1 分配至 relacorilant 150 mg（nab-paclitaxel 前一天、當天與後一天口服）加 nab-paclitaxel 80 mg/m2 天 1, 8, 15 每 28 天，或 nab-paclitaxel monotherapy 100 mg/m2 同療程；無惡化存活期 與 整體存活期 為雙主要終點。 主要結果：381 名患者隨機分組，所有患者曾接受 bevacizumab，61% 曾接受 poly(adp-ribose) polymerase 抑制劑。中位追蹤 24.8 個月 時，relacorilant 加 nab-paclitaxel 較單用 nab-paclitaxel 改善 整體存活期（hr for 死亡 0.65，95% ci 0.51-0.83；p=0.0004），18-month 整體存活期 為 46% vs 27%，中位數 整體存活期 為 16.0 vs 11.9 個月；未觀察到新的安全性訊號。 藥師重點：結果顯示 relacorilant 加 nab-paclitaxel 在不需 biomarker selection 的 platinum-resistant ovarian 癌症 族群可延長 整體存活期；藥師需留意 nab-paclitaxel 相關 neutropenia、anaemia、fatigue、nausea，以及三日口服 relacorilant 與輸注時程的用藥銜接。"},{"id":"pmid-41999286","kind":"article","issueId":"2026-week16","year":2026,"week":16,"weekLabel":"第 16 週","dateRange":"2026/04/13 – 04/19","href":"2026-week16.html","title":"Long-Term Cognitive Ability and Academic Achievement After Childhood Severe Malaria","journal":"JAMA","type":"OA","typeLabel":"Original Article","author":"Bangirana","doi":"10.1001/jama.2026.0704","url":"https://doi.org/10.1001/jama.2026.0704","summary":"藥師重點：研究顯示兒童期 cerebral malaria 或 重度 malarial anemia 存活者，數年後仍可能有部分認知與數學表現下降；此結果提醒臨床照護除急性抗瘧治療外，也應重視急性腎損傷、高尿酸與 angiopoietin-2 等風險訊號及長期追蹤需求。","pubDate":"2026-05-12","terms":["long-term","cognitive","ability","academic","achievement","childhood","severe","malaria","jama","bangirana"],"drugTerms":[],"searchText":"long-term cognitive ability and academic achievement after childhood severe malaria jama original article bangirana 10.1001/jama.2026.0704 研究背景：cerebral malaria 與 重度 malarial anemia 後 1-2 年可能出現認知與學業表現下降，但此影響是否延續至較晚兒童期或青春期仍不清楚。 研究方法：研究追蹤烏干達兩項 重度 malaria 世代 中完成前期研究的兒童，於 2020-2023 年重新納入 939 人，分析 889 名未滿 18 歲者。暴露組包括 cerebral malaria、重度 malarial anemia、其他 重度 malaria 型態與未受影響社區兒童，評估整體認知、注意力與數學、閱讀等 academic achievement 的 age-校正 z scores。 主要結果：受試者平均 11.1 歲，距 重度 malaria 事件平均 8.4 年。相較社區兒童，cerebral malaria 與 重度 malarial anemia 病史者整體認知分數較低（校正 平均差 -0.41，bonferroni-corrected 95% ci -0.74 to -0.09；以及 -0.31，95% ci -0.61 to -0.01）且數學分數較低（-0.46，95% ci -0.78 to -0.14；以及 -0.32，95% ci -0.61 to -0.03）；注意力與閱讀未見顯著差異。 藥師重點：研究顯示兒童期 cerebral malaria 或 重度 malarial anemia 存活者，數年後仍可能有部分認知與數學表現下降；此結果提醒臨床照護除急性抗瘧治療外，也應重視急性腎損傷、高尿酸與 angiopoietin-2 等風險訊號及長期追蹤需求。"},{"id":"pmid-41984450","kind":"article","issueId":"2026-week16","year":2026,"week":16,"weekLabel":"第 16 週","dateRange":"2026/04/13 – 04/19","href":"2026-week16.html","title":"Intrawound Tobramycin Plus Vancomycin to Prevent Surgical Site Infection in Tibial Fractures: The TOBRA Randomized Clinical Trial","journal":"JAMA","type":"RCT","typeLabel":"RCT","author":"O'Toole","doi":"10.1001/jama.2026.4023","url":"https://doi.org/10.1001/jama.2026.4023","summary":"藥師重點：此研究未支持在 intrawound vancomycin powder 外常規加用 tobramycin powder 以預防高風險脛骨關節周邊骨折深部感染；骨科抗生素局部使用仍應回到感染風險、菌種涵蓋需求與院內 antimicrobial stewardship 原則。","pubDate":"2026-05-12","terms":["intrawound","tobramycin","plus","vancomycin","prevent","surgical","site","infection","tibial","fractures"],"drugTerms":["tobramycin","vancomycin"],"searchText":"intrawound tobramycin plus vancomycin to prevent surgical site infection in tibial fractures: the tobra randomized clinical trial jama rct o'toole 10.1001/jama.2026.4023 研究背景：既有研究指出 intrawound vancomycin powder 可能降低高感染風險脛骨關節周邊骨折的深部手術部位感染，但加用 tobramycin powder 是否能進一步降低感染仍不清楚。 研究方法：tobra 為美國 39 個 trauma centers 進行的 開放標籤、assessor-masked 隨機臨床試驗，納入需手術治療且感染風險較高的 tibial plateau 或 pilon fracture 成人。受試者於 definitive fixation 時接受 intrawound tobramycin 1.2 g 加 vancomycin 1.0 g powder，或單用 intrawound vancomycin 1.0 g powder；主要終點為 182 天內需手術處置的 deep surgical site infection。 主要結果：1660 人隨機分組，1528 人納入主要分析。deep surgical site infection 在 tobramycin 加 vancomycin 組為 51/753（182-day probability 7.4%），單用 vancomycin 組為 47/775（182-day probability 6.6%）；hr 1.11，95% bayesian 可信區間 0.75-1.66，posterior probability of superiority 29.7%。次要終點亦未達 superiority 門檻。 藥師重點：此研究未支持在 intrawound vancomycin powder 外常規加用 tobramycin powder 以預防高風險脛骨關節周邊骨折深部感染；骨科抗生素局部使用仍應回到感染風險、菌種涵蓋需求與院內 antimicrobial stewardship 原則。"},{"id":"pmid-41985129","kind":"article","issueId":"2026-week16","year":2026,"week":16,"weekLabel":"第 16 週","dateRange":"2026/04/13 – 04/19","href":"2026-week16.html","title":"First-Line Zongertinib in Advanced HER2-Mutant Non-Small-Cell Lung Cancer","journal":"NEJM","type":"OA","typeLabel":"Original Article","author":"Heymach","doi":"10.1056/NEJMoa2516969","url":"https://doi.org/10.1056/NEJMoa2516969","summary":"藥師重點：zongertinib 在未治療 advanced or 轉移性 HER2-mutant NSCLC 顯示較高反應率與一定顱內活性；由於資料來自早期 multicohort 試驗，藥師應留意 HER2 mutation 檢測、120 mg 每日一次 給藥、治療相關不良事件與後續較大規模比較資料。","pubDate":"2026-04-30","terms":["first-line","zongertinib","advanced","her2-mutant","non-small-cell","lung","cancer","nejm","heymach","nejmoa2516969"],"drugTerms":["zongertinib"],"searchText":"first-line zongertinib in advanced her2-mutant non-small-cell lung cancer nejm original article heymach 10.1056/nejmoa2516969 研究背景：her2-mutant nsclc 過去缺乏明確 first-line targeted 治療；zongertinib 為口服 irreversible tyrosine kinase 抑制劑，可選擇性抑制 her2 並減少 wild-type egfr 相關毒性。 研究方法：beamion lung-1 為 第 1 期a-1b multicohort 試驗，評估 zongertinib 用於 advanced or 轉移性 nonsquamous her2-mutant nsclc。本摘要聚焦未曾接受治療的 世代 2，給予 zongertinib 120 mg 每日一次；主要終點為 盲性獨立中央審查 評估的 objective 反應，次要終點包括 duration of 反應 與 無惡化存活期，另有 active brain metastases exploratory 世代 4。 主要結果：世代 2 共 74 名未治療患者接受 zongertinib 120 mg，confirmed objective 反應 為 76%（95% ci 65 to 84），中位數 duration of 反應 15.2 個月（95% ci 9.8 to not evaluable），中位數 無惡化存活期 14.4 個月（95% ci 11.1 to not evaluable）。any 等級 不良事件 發生於 99%，等級 3 or higher 治療相關不良事件 為 19%；active brain metastases 世代 的 confirmed intracranial objective 反應 為 47%（95% ci 30 to 64）。 藥師重點：zongertinib 在未治療 advanced or 轉移性 her2-mutant nsclc 顯示較高反應率與一定顱內活性；由於資料來自早期 multicohort 試驗，藥師應留意 her2 mutation 檢測、120 mg 每日一次 給藥、治療相關不良事件與後續較大規模比較資料。"},{"id":"pmid-41999287","kind":"article","issueId":"2026-week16","year":2026,"week":16,"weekLabel":"第 16 週","dateRange":"2026/04/13 – 04/19","href":"2026-week16.html","title":"Fast Antimicrobial Susceptibility Testing for Gram-Negative Bacteremia: The FAST Randomized Clinical Trial","journal":"JAMA","type":"RCT","typeLabel":"RCT","author":"Banerjee","doi":"10.1001/jama.2026.5487","url":"https://doi.org/10.1001/jama.2026.5487","summary":"藥師重點：快速 AST 未能在整體 gram-negative bacilli BSI 族群改善 DOOR，但可加速抗生素升階或降階；藥師解讀時應把檢驗週轉時間與 antimicrobial stewardship 介入流程一起評估，而非單看檢測技術本身。","pubDate":"2026-05-26","terms":["fast","antimicrobial","susceptibility","testing","gram-negative","bacteremia","jama","banerjee","bloodstream","infections"],"drugTerms":[],"searchText":"fast antimicrobial susceptibility testing for gram-negative bacteremia: the fast randomized clinical trial jama rct banerjee 10.1001/jama.2026.5487 研究背景：新型血液培養診斷可快速提供 bloodstream infections 的 antimicrobial susceptibility testing（ast），但在 gram-negative bacilli bacteremia 中能否改善臨床結局仍不明確。 研究方法：fast 為 開放標籤 隨機臨床試驗，於希臘、印度、以色列與西班牙 7 個醫學中心納入住院成人與兒童 gram-negative bacilli bloodstream infections 患者。患者接受 陽性 blood cultures 直接快速 phenotypic ast 加標準 susceptibility testing（n=413），或單用標準 susceptibility testing（n=437）；主要終點為 第 30 天 desirability of 結果指標 ranking（door）。 主要結果：899 人隨機分組，850 人納入主要終點分析；快速檢測組 door 結果較佳的機率為 48.8%（95% ci 45.3%-52.4%），未達 superiority。as-隨機 族群 中有效抗生素治療時間無差異，但 antibiotic escalation or deescalation 中位時間快 14 hours（95% ci 6-22）；carbapenem-resistant infections 預設次族群中有效治療時間為 9.5 vs 28 hours（差異 -18 hours，95% ci -42 to 6）。 藥師重點：快速 ast 未能在整體 gram-negative bacilli bsi 族群改善 door，但可加速抗生素升階或降階；藥師解讀時應把檢驗週轉時間與 antimicrobial stewardship 介入流程一起評估，而非單看檢測技術本身。"},{"id":"pmid-41972998","kind":"article","issueId":"2026-week16","year":2026,"week":16,"weekLabel":"第 16 週","dateRange":"2026/04/13 – 04/19","href":"2026-week16.html","title":"Endovascular Therapy for Post-Thrombotic Syndrome - A Randomized Trial","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Vedantham","doi":"10.1056/NEJMoa2519001","url":"https://doi.org/10.1056/NEJMoa2519001","summary":"藥師重點：endovascular 治療 可改善中重度 post-thrombotic 症候群 及 iliac-vein obstruction 患者 6 個月症狀與生活品質，但出血風險增加；藥師需協助評估 enhanced antithrombotic 治療 的出血風險、併用藥物與術後追蹤。","pubDate":"2026-06-18","terms":["endovascular","post-thrombotic","syndrome","nejm","vedantham","nejmoa2519001","deep-vein","thrombosis","iliac-vein","obstruction"],"drugTerms":[],"searchText":"endovascular therapy for post-thrombotic syndrome - a randomized trial nejm rct vedantham 10.1056/nejmoa2519001 研究背景：post-thrombotic 症候群 是 deep-vein thrombosis 後常見併發症，可造成肢體症狀並影響活動與生活品質；endovascular 治療 是否能減輕 iliac-vein obstruction 相關症狀需以隨機試驗確認。 研究方法：研究將 225 名 moderate or 重度 post-thrombotic 症候群 且影像確認 iliac-vein obstruction 患者，隨機分配至 endovascular 治療（iliac-vein stent placement 加 enhanced antithrombotic 治療）合併標準照護，或單用標準 post-thrombotic 症候群 care。主要終點為 6 個月 venous 臨床 severity score（vcss），分數越高代表症狀越嚴重。 主要結果：6 個月時 endovascular 治療 組 vcss 較低（8.1±5.1 vs 10.0±4.9；校正 差異 -2.0；p = 0.001），venous 疾病-specific quality of life 與 sf-36 physical component summary score 亦較佳。6 個月內出血在 endovascular 治療 組較多（11.6% vs 3.6%；p = 0.03）。 藥師重點：endovascular 治療 可改善中重度 post-thrombotic 症候群 及 iliac-vein obstruction 患者 6 個月症狀與生活品質，但出血風險增加；藥師需協助評估 enhanced antithrombotic 治療 的出血風險、併用藥物與術後追蹤。"},{"id":"pmid-41985976","kind":"article","issueId":"2026-week16","year":2026,"week":16,"weekLabel":"第 16 週","dateRange":"2026/04/13 – 04/19","href":"2026-week16.html","title":"Effectiveness of interventions to increase vaccine uptake: component network meta-analysis","journal":"BMJ","type":"MA","typeLabel":"Meta-analysis","author":"Davies","doi":"10.1136/bmj-2025-087578","url":"https://doi.org/10.1136/bmj-2025-087578","summary":"藥師重點：研究結果說明提升疫苗接種率不宜只靠單一衛教訊息，介入成分需依年齡與族群調整；藥師參與接種推廣時，可優先考慮人工互動、預約協助、延伸接種機會與動機式晤談，但仍需留意納入研究異質性與資源成本。","pubDate":"2026-04-15","terms":["effectiveness","interventions","increase","vaccine","uptake","component","network","meta-analysis","davies","bmj-2025-087578"],"drugTerms":[],"searchText":"effectiveness of interventions to increase vaccine uptake: component network meta-analysis bmj meta-analysis davies 10.1136/bmj-2025-087578 研究背景：提升疫苗接種率的介入方式很多，但哪些內容與執行成分最有效，且是否因年齡、弱勢族群或 covid-19 pandemic 前後而不同，仍需整合證據。 研究方法：此 component network 統合分析 納入 high and upper middle income countries 的隨機對照試驗，共 237 項研究、570 個介入組與 4,361,717 名參與者；主要結果為 疫苗 uptake，並以 bayesian component level meta-regression 估計各介入成分的 比值 of 勝算比s 與 95% 可信區間s（cris）。 主要結果：兒童族群中，支付相關成本（比值 of 勝算比s 3.01，95% cri 1.49 to 6.06）與 decision aids（2.73，1.14 to 7.06）有助於提升接種；青少年與年輕成人以 personal delivery formats（2.13，1.09 to 4.40）、社區成員與醫療專業人員共同執行（6.42，1.94 to 25.62）及 social factors（2.62，1.45 to 5.04）較有效；成人則以 human interaction（1.86，1.42 to 2.45）、extended opportunities（1.63，1.35 to 2.00）、appointment scheduling help（1.38，1.06 to 1.78）與 motivational interviewing（1.79，1.21 to 2.64）較有利。 藥師重點：研究結果說明提升疫苗接種率不宜只靠單一衛教訊息，介入成分需依年齡與族群調整；藥師參與接種推廣時，可優先考慮人工互動、預約協助、延伸接種機會與動機式晤談，但仍需留意納入研究異質性與資源成本。"},{"id":"pmid-41985132","kind":"article","issueId":"2026-week16","year":2026,"week":16,"weekLabel":"第 16 週","dateRange":"2026/04/13 – 04/19","href":"2026-week16.html","title":"Asundexian for Secondary Stroke Prevention","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Sharma","doi":"10.1056/NEJMoa2513880","url":"https://doi.org/10.1056/NEJMoa2513880","summary":"藥師重點：結論顯示 asundexian 50 mg 每日 併用抗血小板治療可降低缺血性中風與主要心血管事件風險，且未增加 重大出血；實務上仍需依病人出血風險、抗血小板策略與動脈粥樣硬化證據評估適用性。","pubDate":"2026-04-16","terms":["asundexian","stroke","prevention","nejm","sharma","nejmoa2513880","high-risk","activated","factor","ischemic"],"drugTerms":[],"searchText":"asundexian for secondary stroke prevention nejm rct sharma 10.1056/nejmoa2513880 研究背景：非心因性缺血性中風或 high-risk tia 患者仍有復發風險，asundexian 作為 activated factor xi 抑制劑，是否能在抗血小板治療外提供額外保護仍需驗證。 研究方法：此 第 3 期、雙盲 試驗 將發病 72 小時內的非心因性缺血性中風或 high-risk tia 患者隨機分配至 asundexian 50 mg 每日一次 或 安慰劑，並併用計畫中的單一或雙重抗血小板治療；主要療效終點為 ischemic stroke，主要安全性終點為 重大出血。 主要結果：共 12,327 人隨機分組，asundexian 組 ischemic stroke 低於 安慰劑（6.2% vs 8.4%；cause-specific hr 0.74，95% ci 0.65 to 0.84；p<0.001）。重大出血 發生率相近（1.9% vs 1.7%；cause-specific hr 1.10，95% ci 0.85 to 1.44），嚴重不良事件為 19.2% vs 19.5%。 藥師重點：結論顯示 asundexian 50 mg 每日 併用抗血小板治療可降低缺血性中風與主要心血管事件風險，且未增加 重大出血；實務上仍需依病人出血風險、抗血小板策略與動脈粥樣硬化證據評估適用性。"},{"id":"pmid-41999289","kind":"article","issueId":"2026-week16","year":2026,"week":16,"weekLabel":"第 16 週","dateRange":"2026/04/13 – 04/19","href":"2026-week16.html","title":"Amoxicillin-Clavulanate vs Amoxicillin for Acute Sinusitis in Adults","journal":"JAMA","type":"OA","typeLabel":"Original Article","author":"Savage","doi":"10.1001/jama.2025.26902","url":"https://doi.org/10.1001/jama.2025.26902","summary":"藥師重點：在 18-64 歲門診 uncomplicated 急性 sinusitis 觀察性資料中，standard-dose amoxicillin 與 amoxicillin-clavulanate 治療失敗率相近，且後者次發感染風險較高；藥師可據此支持窄效抗生素優先與避免不必要 clavulanate 暴露。","pubDate":"2026-05-19","terms":["amoxicillin-clavulanate","amoxicillin","acute","sinusitis","adults","jama","savage","uncomplicated","new-user","active"],"drugTerms":["amoxicillin"],"searchText":"amoxicillin-clavulanate vs amoxicillin for acute sinusitis in adults jama original article savage 10.1001/jama.2025.26902 研究背景：成人急性鼻竇炎是抗生素處方常見原因，但 uncomplicated 急性 sinusitis 第一線使用 amoxicillin-clavulanate 或 amoxicillin 仍缺乏一致共識。 研究方法：此 new-user、active comparator 回溯性世代研究 使用全國性醫療利用資料庫，納入 2018 年 1 月 1 日至 2023 年 12 月 1 日新診斷門診 急性 sinusitis、年齡 18-64 歲成人，並以 propensity score matching 比較 standard-dose amoxicillin-clavulanate 875 mg-125 mg 每日兩次 與 amoxicillin 875 mg 每日兩次 或 500 mg 3 times 每日。 主要結果：配對後共有 234,608 人，每組 117,304 人；整體 治療 failure 為 3.1%，需急診或住院者為 0.03%。amoxicillin-clavulanate 與 amoxicillin 的 治療 failure 無差異（3.0% vs 3.1%；rr 0.96，95% ci 0.92-1.01），抗生素相關不良事件亦相近（1.3% vs 1.2%；rr 1.04，95% ci 0.97-1.12）；但 amoxicillin-clavulanate 的 yeast infections（1.1% vs 0.8%；rr 1.40，95% ci 1.29-1.53）與 clostridioides difficile infections（0.04% vs 0.02%；rr 2.14，95% ci 1.29-3.54）較高。 藥師重點：在 18-64 歲門診 uncomplicated 急性 sinusitis 觀察性資料中，standard-dose amoxicillin 與 amoxicillin-clavulanate 治療失敗率相近，且後者次發感染風險較高；藥師可據此支持窄效抗生素優先與避免不必要 clavulanate 暴露。"},{"id":"fda-2026-week16-1","kind":"fda","issueId":"2026-week16","year":2026,"week":16,"weekLabel":"第 16 週","dateRange":"2026/04/13 – 04/19","href":"2026-week16.html","title":"FDA’s Concerns with Unapproved GLP-1 Drugs Used for Weight Loss","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["concerns","unapproved","glp-1","drugs","used","weight","loss","https","drug-alerts-and-statements","fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"],"drugTerms":["glp-1"],"searchText":"fda’s concerns with unapproved glp-1 drugs used for weight loss fda drug safety 2026-06-15 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fdas-concerns-unapproved-glp-1-drugs-used-weight-loss"},{"id":"fda-2026-week16-3","kind":"fda","issueId":"2026-week16","year":2026,"week":16,"weekLabel":"第 16 週","dateRange":"2026/04/13 – 04/19","href":"2026-week16.html","title":"FDA issues final decision to withdraw approval of Pepaxto (melphalan flufenamide)","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/398713","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["issues","final","decision","withdraw","approval","pepaxto","melphalan","flufenamide","https","node"],"drugTerms":[],"searchText":"fda issues final decision to withdraw approval of pepaxto (melphalan flufenamide) fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/398713"},{"id":"fda-2026-week16-2","kind":"fda","issueId":"2026-week16","year":2026,"week":16,"weekLabel":"第 16 週","dateRange":"2026/04/13 – 04/19","href":"2026-week16.html","title":"FDA alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/node/403159","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["alerts","caregivers","providers","cross-compatibility","issues","autoinjector","devices","that","optional","glatiramer"],"drugTerms":[],"searchText":"fda alerts patients, caregivers, and health care providers of cross-compatibility issues with autoinjector devices that are optional for use with glatiramer acetate injection fda drug safety  請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/node/403159"},{"id":"fda-2026-week16-4","kind":"fda","issueId":"2026-week16","year":2026,"week":16,"weekLabel":"第 16 週","dateRange":"2026/04/13 – 04/19","href":"2026-week16.html","title":"FDA Accepts First In Silico Drug Development Tool Under ISTAND Program to Help Predict Drug-Induced Liver Injury","journal":"FDA","type":"FDA","typeLabel":"FDA Drug Safety","author":"FDA","doi":"","url":"https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver","summary":"請開啟 FDA 原文確認警訊內容、適用藥品、受影響產品與建議處置。","terms":["accepts","first","silico","development","tool","under","istand","program","help","predict"],"drugTerms":[],"searchText":"fda accepts first in silico drug development tool under istand program to help predict drug-induced liver injury fda drug safety 2026-06-03 請開啟 fda 原文確認警訊內容、適用藥品、受影響產品與建議處置。 https://www.fda.gov/drugs/drug-alerts-and-statements/fda-accepts-first-silico-drug-development-tool-under-istand-program-help-predict-drug-induced-liver"},{"id":"pmid-41936368","kind":"article","issueId":"2026-week15","year":2026,"week":15,"weekLabel":"第 15 週","dateRange":"2026/04/06 – 04/12","href":"2026-week15.html","title":"Percutaneous coronary intervention versus coronary artery bypass grafting for unprotected left main stenosis: 10-year final results from the randomised, open-label, non-inferiority NOBLE trial","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Holck","doi":"10.1016/S0140-6736(26)00205-9","url":"https://doi.org/10.1016/S0140-6736(26)00205-9","summary":"藥師重點：結論顯示，在同時適合 PCI 與 CABG 且無額外複雜病灶的 left main 冠狀動脈 動脈 疾病 患者，兩種策略 10 年死亡率相近；臨床討論仍需回到 heart team 對冠狀動脈解剖、共病與病人偏好的整體判斷。","pubDate":"2026-04-04","terms":["percutaneous","coronary","intervention","artery","bypass","grafting","unprotected","left","main","stenosis"],"drugTerms":[],"searchText":"percutaneous coronary intervention versus coronary artery bypass grafting for unprotected left main stenosis: 10-year final results from the randomised, open-label, non-inferiority noble trial lancet rct holck 10.1016/s0140-6736(26)00205-9 研究背景：對於 significant unprotected left main 冠狀動脈 動脈 疾病，臨床多建議 cabg 優先於 pci；然而 newer generation drug-eluting stents 與 cabg 的長期比較資料仍有限。 研究方法：noble 試驗 為前瞻性、隨機、開放標籤、不劣性 試驗，納入歐洲 36 家醫院中經 heart team 評估可接受 pci 或 cabg 的 unprotected left main 冠狀動脈 動脈 stenosis 患者。受試者以 1:1 分配至 pci 或 cabg，主要終點為 itt 族群 的 10-year 全因死亡率。 主要結果：2008 年 12 月至 2015 年 1 月共 1201 人隨機分組，itt 族群 兩組各 592 人。10 年 全因死亡率 無顯著差異，pci 組 136/592（23%），cabg 組 145/592（25%）；hr 0.93，95% ci 0.74-1.18，p=0.56。 藥師重點：結論顯示，在同時適合 pci 與 cabg 且無額外複雜病灶的 left main 冠狀動脈 動脈 疾病 患者，兩種策略 10 年死亡率相近；臨床討論仍需回到 heart team 對冠狀動脈解剖、共病與病人偏好的整體判斷。"},{"id":"pmid-41965242","kind":"article","issueId":"2026-week15","year":2026,"week":15,"weekLabel":"第 15 週","dateRange":"2026/04/06 – 04/12","href":"2026-week15.html","title":"Non-surgical casting versus surgical reduction for children with severely displaced distal radial fractures (the CRAFFT Study): a multicentre, randomised, controlled non-inferiority trial and economic evaluation","journal":"Lancet","type":"RCT","typeLabel":"RCT","author":"Perry","doi":"10.1016/S0140-6736(26)00409-5","url":"https://doi.org/10.1016/S0140-6736(26)00409-5","summary":"藥師重點：研究未在保守界值下證明 non-surgical casting 於 3 個月功能 non-inferior，但差異小且未延續至早期恢復後；兒童骨折照護可討論 cast-first strategy，同時向家屬說明短期功能、外觀、麻醉與手術併發症取捨。","pubDate":"2026-04-18","terms":["non-surgical","casting","surgical","reduction","children","severely","displaced","distal","radial","fractures"],"drugTerms":[],"searchText":"non-surgical casting versus surgical reduction for children with severely displaced distal radial fractures (the crafft study): a multicentre, randomised, controlled non-inferiority trial and economic evaluation lancet rct perry 10.1016/s0140-6736(26)00409-5 研究背景：兒童 severely displaced distal radial fractures 常因影像外觀明顯位移而接受手術復位固定，但較年幼兒童具骨骼重塑能力，是否可優先採 non-surgical casting 仍有爭議。 研究方法：crafft 研究 為英國 49 家醫院進行的 實務型、多中心、隨機、controlled 不劣性 試驗，納入 4-10 歲 severely displaced distal radial fracture 兒童。受試者分配至 non-surgical casting 或 surgical reduction，主要終點為 3 個月 promis upper extremity score for children，並進行 12 個月 nhs 觀點經濟評估。 主要結果：共 750 名兒童隨機分組，兩組各 375 人；3 個月 promis upper extremity score 為 casting 組 44.9（sd 8.7）、surgical reduction 組 46.6（8.8），校正 平均差 -1.64，95% ci -2.84 to -0.44，信賴區間超過預設 不劣性 margin -2.5。手術組 8 週內併發症較多，non-surgical casting 平均每人節省 £1665（95% ci 1487 to 1843）。 藥師重點：研究未在保守界值下證明 non-surgical casting 於 3 個月功能 non-inferior，但差異小且未延續至早期恢復後；兒童骨折照護可討論 cast-first strategy，同時向家屬說明短期功能、外觀、麻醉與手術併發症取捨。"},{"id":"pmid-41956522","kind":"article","issueId":"2026-week15","year":2026,"week":15,"weekLabel":"第 15 週","dateRange":"2026/04/06 – 04/12","href":"2026-week15.html","title":"Non-drug perioperative interventions to reduce postoperative pulmonary complications after abdominal surgery: systematic review and meta-analysis","journal":"BMJ","type":"MA","typeLabel":"Meta-analysis","author":"Huang","doi":"10.1136/bmj-2025-089001","url":"https://doi.org/10.1136/bmj-2025-089001","summary":"藥師重點：此分析建立腹部手術 PPC 預防介入的證據排序，low FiO2 證據最穩定；藥師參與 perioperative care 時，可將鎮痛策略、營養支持與跨團隊肺部保護措施納入討論，但仍需留意各介入異質性與病人手術風險。","pubDate":"2026-04-09","terms":["non-drug","perioperative","interventions","reduce","postoperative","pulmonary","complications","abdominal","surgery","meta-analysis"],"drugTerms":[],"searchText":"non-drug perioperative interventions to reduce postoperative pulmonary complications after abdominal surgery: systematic review and meta-analysis bmj meta-analysis huang 10.1136/bmj-2025-089001 研究背景：腹部手術後 postoperative pulmonary complications（ppcs）會增加住院與照護負擔，圍手術期非藥物介入的相對效益需要系統性整理。 研究方法：此 系統性回顧與統合分析 納入自資料庫建置至 2025 年 1 月、並於 2026 年 1 月更新的 隨機對照試驗s，評估成人 elective abdominal surgery under general anaesthesia 的非藥物 ppc 預防介入。主要終點為發生 ppcs 的比例，證據確定性以 等級 評估。 主要結果：共納入 255 試驗、55,260 名受試者，評估 10 類介入與 39 個 subtype；ppcs 發生於 6467 人（11.7%）。high certainty evidence 顯示 low fio2 可降低 ppcs（rr 0.81，95% ci 0.71 to 0.92）；moderate certainty evidence 支持 lung protective ventilation（rr 0.66，0.57 to 0.76）、physiotherapy（0.55，0.46 to 0.65）、analgesia（0.73，0.64 to 0.84）與 nutrition（0.74，0.63 to 0.87）。 藥師重點：此分析建立腹部手術 ppc 預防介入的證據排序，low fio2 證據最穩定；藥師參與 perioperative care 時，可將鎮痛策略、營養支持與跨團隊肺部保護措施納入討論，但仍需留意各介入異質性與病人手術風險。"},{"id":"pmid-41950472","kind":"article","issueId":"2026-week15","year":2026,"week":15,"weekLabel":"第 15 週","dateRange":"2026/04/06 – 04/12","href":"2026-week15.html","title":"Multifaceted Strategies for Hypertension Control in Low-Income Patients","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Mills","doi":"10.1056/NEJMoa2504068","url":"https://doi.org/10.1056/NEJMoa2504068","summary":"藥師重點：研究結果支持低收入高血壓患者採用團隊照護與居家血壓監測等整合策略，可比單純加強 guideline 教育帶來更大收縮壓下降；藥師角色可聚焦於用藥調整流程、服藥遵從性與居家量測回饋。","pubDate":"2026-04-09","terms":["multifaceted","strategies","hypertension","control","low-income","nejm","mills","nejmoa2504068","uncontrolled","team-based"],"drugTerms":[],"searchText":"multifaceted strategies for hypertension control in low-income patients nejm rct mills 10.1056/nejmoa2504068 研究背景：uncontrolled hypertension 在健康不平等族群中負擔較高，但低收入患者使用多面向、team-based strategies 控制血壓的成效與執行資料仍不足。 研究方法：研究將 louisiana 與 mississippi 的 federally qualified 健康 center clinics 隨機分配至 multifaceted implementation strategy 或 enhanced 常規照護。介入包含 team-based care、protocol-based intensive blood-pressure management、audit and feedback、生活型態與服藥遵從性 coaching，以及 home blood-pressure monitoring；主要成效終點為 18 個月 收縮壓 變化。 主要結果：共 36 間診所、1272 名 40 歲以上 uncontrolled hypertension 患者納入分析。18 個月 收縮壓 平均變化為介入組 -15.5 mm hg（95% ci -17.4 to -13.6），對照組 -9.1 mm hg（95% ci -11.0 to -7.2），組間差 -6.4 mm hg，95% ci -9.0 to -3.8，p<0.001；嚴重不良事件 為 20.9% vs 21.7%。 藥師重點：研究結果支持低收入高血壓患者採用團隊照護與居家血壓監測等整合策略，可比單純加強 guideline 教育帶來更大收縮壓下降；藥師角色可聚焦於用藥調整流程、服藥遵從性與居家量測回饋。"},{"id":"pmid-41950474","kind":"article","issueId":"2026-week15","year":2026,"week":15,"weekLabel":"第 15 週","dateRange":"2026/04/06 – 04/12","href":"2026-week15.html","title":"Immunogenicity and Safety of vYF, a Yellow Fever Vaccine - A Phase 2 Trial","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Feroldi","doi":"10.1056/NEJMoa2505665","url":"https://doi.org/10.1056/NEJMoa2505665","summary":"藥師重點：研究結果說明 vYF 的早期免疫生成性與安全性大致與 YF-VAX 相近，可作為後續疫苗供應與替代品評估的依據；實際採用仍需等待完整追蹤與核准資訊。","pubDate":"2026-04-09","terms":["immunogenicity","yellow","fever","vaccine","phase","nejm","feroldi","nejmoa2505665","vero","cells"],"drugTerms":[],"searchText":"immunogenicity and safety of vyf, a yellow fever vaccine - a phase 2 trial nejm rct feroldi 10.1056/nejmoa2505665 研究背景：vyf 是以 vero cells 製備的新一代 live-attenuated yellow fever 疫苗，目的在改善黃熱病疫苗供應；其相較於已核准 yf-vax 的免疫反應與安全性仍需確認。 研究方法：此 第 2 期、observer-blinded、隨機、活性對照 試驗 的第 1 年期中分析，將 18-60 歲健康成人以 2:1 分配接受單劑 vyf 或 yf-vax。研究於 第 29 天、month 6 與 year 1 測量 neutralizing 抗體 titers，主要分析評估 第 29 天 seroconversion 的 不劣性。 主要結果：共納入 568 人，vyf 組 382 人、yf-vax 組 186 人；per-protocol 不劣性 分析分別為 329 人與 156 人。第 29 天 seroconversion 為 99.7% vs 99.4%，差異 0.3 百分點，95% ci -1.2 to 3.2，達 不劣性；solicited 不良事件 為 56.7% vs 61.1%，未發現 重大 safety concerns。 藥師重點：研究結果說明 vyf 的早期免疫生成性與安全性大致與 yf-vax 相近，可作為後續疫苗供應與替代品評估的依據；實際採用仍需等待完整追蹤與核准資訊。"},{"id":"pmid-41936367","kind":"article","issueId":"2026-week15","year":2026,"week":15,"weekLabel":"第 15 週","dateRange":"2026/04/06 – 04/12","href":"2026-week15.html","title":"Global burden of cancer in children and adolescents aged 0-19 years, 1990-2023: a systematic analysis for the Global Burden of Disease Study 2023","journal":"Lancet","type":"OA","typeLabel":"Original Article","author":"N/A","doi":"10.1016/S0140-6736(26)00200-X","url":"https://doi.org/10.1016/S0140-6736(26)00200-X","summary":"藥師重點：研究結果說明全球兒癌負擔仍明顯集中於資源有限地區，改善診斷、可近性與完整照護流程仍是核心；藥師可將此作為支持兒癌藥品可近性、支持療法與跨國資源配置討論的背景資料。","pubDate":"2026-04-04","terms":["global","burden","cancer","children","adolescents","aged","years","lancet","s0140-6736","childhood"],"drugTerms":[],"searchText":"global burden of cancer in children and adolescents aged 0-19 years, 1990-2023: a systematic analysis for the global burden of disease study 2023 lancet original article  10.1016/s0140-6736(26)00200-x 研究背景：兒童與青少年癌症負擔資料對癌症政策與資源配置重要，但許多國家缺乏完整兒癌觀察資料，過去全球估計也未能細分多種常見兒童癌症。 研究方法：本研究分析 gbd 2023 中 0-19 歲 childhood cancers 的全球疾病負擔，資料來源包含 族群-based 癌症 registries、vital registration systems 與 verbal autopsies。研究估計 incidence、死亡率、ylls、ylds 與 dalys，並以地區與資源分組呈現 95% uncertainty intervals（uis）。 主要結果：2023 年全球估計有 377,000 件 childhood 癌症 新發病例（95% ui 288,000-489,000）、144,000 例死亡（131,000-162,000），以及 11.7 百萬 dalys（10.7-13.2）。1990 至 2023 年全球兒癌死亡下降 27.0%（15.5-36.1），但 who african region 增加 55.6%（25.5-92.4）；who gicc target cancers 佔 2023 年全球兒癌死亡 47.3%（42.2-52.0）。 藥師重點：研究結果說明全球兒癌負擔仍明顯集中於資源有限地區，改善診斷、可近性與完整照護流程仍是核心；藥師可將此作為支持兒癌藥品可近性、支持療法與跨國資源配置討論的背景資料。"},{"id":"pmid-41962942","kind":"article","issueId":"2026-week15","year":2026,"week":15,"weekLabel":"第 15 週","dateRange":"2026/04/06 – 04/12","href":"2026-week15.html","title":"Efficacy and safety of VPM1002 and Immuvac in preventing tuberculosis: phase 3 randomised clinical trial (PreVenTB trial)","journal":"BMJ","type":"RCT","typeLabel":"RCT","author":"Singh","doi":"10.1136/bmj-2025-085716","url":"https://doi.org/10.1136/bmj-2025-085716","summary":"藥師重點：結論顯示 VPM1002 與 Immuvac 整體安全性可接受，但未證實可預防 all forms of microbiologically confirmed TB 或 pulmonary TB；VPM1002 對 extrapulmonary TB 的訊號需結合族群、tuberculin skin test 狀態與後續證據審慎解讀。","pubDate":"2026-04-09","terms":["efficacy","vpm1002","immuvac","preventing","tuberculosis","phase","randomised","preventb","singh","bmj-2025-085716"],"drugTerms":[],"searchText":"efficacy and safety of vpm1002 and immuvac in preventing tuberculosis: phase 3 randomised clinical trial (preventb trial) bmj rct singh 10.1136/bmj-2025-085716 研究背景：結核病家庭接觸者為高風險族群，vpm1002 與 immuvac 是否能降低 microbiologically confirmed tb、latent tb infection 並維持安全性仍需大型試驗評估。 研究方法：preventb 試驗 為印度 18 個試驗地點進行的 第 3 期 隨機臨床試驗，納入 12,717 名 6 歲以上、smear 陽性 tb 患者的健康家庭接觸者。受試者以 1:1:1 分配接受 vpm1002、immuvac 或 安慰劑 皮內注射，並追蹤 38 個月；主要終點為 confirmed tb。 主要結果：per protocol 分析中，vpm1002、immuvac 與 安慰劑 組 confirmed tb 分別為 65（1.68%）、80（2.09%）與 82（2.13%）。vpm1002 對 all tb、pulmonary tb 與 extrapulmonary tb 的 疫苗 efficacy 分別為 21.4%（95% ci -8.9% to 43.2%）、19.5%（-14.6% to 43.4%）與 50.4%（0.8% to 75.2%）；兩種疫苗約三分之一受試者出現 mild local reactions。 藥師重點：結論顯示 vpm1002 與 immuvac 整體安全性可接受，但未證實可預防 all forms of microbiologically confirmed tb 或 pulmonary tb；vpm1002 對 extrapulmonary tb 的訊號需結合族群、tuberculin skin test 狀態與後續證據審慎解讀。"},{"id":"pmid-41949879","kind":"article","issueId":"2026-week15","year":2026,"week":15,"weekLabel":"第 15 週","dateRange":"2026/04/06 – 04/12","href":"2026-week15.html","title":"Cost-Effectiveness of ApoB, Non-HDL-C, and LDL-C Goals for Primary Prevention Lipid-Lowering Therapy","journal":"JAMA","type":"OA","typeLabel":"Original Article","author":"Luebbe","doi":"10.1001/jama.2026.2986","url":"https://doi.org/10.1001/jama.2026.2986","summary":"藥師重點：研究結果支持 apoB 可作為 主要 prevention LLT 強化決策的成本效益指標之一；實務採用仍需考量檢驗可近性、不同醫療支付情境，以及模型假設與真實族群差異。","pubDate":"2026-05-05","terms":["cost-effectiveness","apob","non-hdl-c","ldl-c","goals","prevention","lipid-lowering","jama","luebbe","residual"],"drugTerms":["statin"],"searchText":"cost-effectiveness of apob, non-hdl-c, and ldl-c goals for primary prevention lipid-lowering therapy jama original article luebbe 10.1001/jama.2026.2986 研究背景：在接受 lipid-lowering 治療（llt）的患者中，apob 可能比 ldl-c 與 non-hdl-c 更能反映 residual atherosclerotic 心血管 疾病 risk；但以 apob 目標強化 主要 prevention llt 的成本效益尚未確立。 研究方法：此 economic evaluation 使用 computer simulation model，比較依 ldl-c、non-hdl-c 或 apob 目標強化 llt 的成本效益。模型建立 250,000 名符合 statin 條件且無 atherosclerotic 心血管 疾病 的美國成人 世代，依 2018 american heart association/american college of cardiology guidelines 起始 statin 治療，並在未達 ldl-c <100 mg/dl、non-hdl-c <118 mg/dl 或 apob <78.7 mg/dl 時強化治療。 主要結果：相較 ldl-c 目標，non-hdl-c 目標增加 965 qalys（95% ui -3551 to 5341 qalys），並減少 $2.1 百萬 成本（95% ui -$94.2 百萬 to $92.0 百萬）。相較 non-hdl-c 目標，apob 目標增加 1324 qalys（95% ui -2602 to 5669 qalys），成本增加 $40.2 百萬（95% ui -$43.6 百萬 to $134 百萬），incremental cost-effectiveness 比值 為 $30,300 per qaly gained。 藥師重點：研究結果支持 apob 可作為 主要 prevention llt 強化決策的成本效益指標之一；實務採用仍需考量檢驗可近性、不同醫療支付情境，以及模型假設與真實族群差異。"},{"id":"pmid-41954928","kind":"article","issueId":"2026-week15","year":2026,"week":15,"weekLabel":"第 15 週","dateRange":"2026/04/06 – 04/12","href":"2026-week15.html","title":"Colorectal Cancer and Mortality Risk Among Older Adults With vs Without Adenoma on Prior Colonoscopy","journal":"JAMA","type":"OA","typeLabel":"Original Article","author":"Gupta","doi":"10.1001/jama.2026.3414","url":"https://doi.org/10.1001/jama.2026.3414","summary":"藥師重點：結論顯示曾有 adenoma 的高齡者 CRC 與 CRC 死亡 風險雖較高，但絕對風險低且常被 non-CRC 死亡 競爭風險超過；藥師在高齡照護討論中可協助評估 frailty、預期壽命、用藥負擔與監測程序風險。","pubDate":"2026-05-05","terms":["colorectal","cancer","mortality","older","adults","adenoma","prior","colonoscopy","jama","gupta"],"drugTerms":[],"searchText":"colorectal cancer and mortality risk among older adults with vs without adenoma on prior colonoscopy jama original article gupta 10.1001/jama.2026.3414 研究背景：75 歲以上成人若過去 colonoscopy 曾發現 adenoma，其後續 colorectal 癌症（crc）與死亡風險仍不明確，是否持續監測需與其他健康風險一起評估。 研究方法：此 回溯性世代研究 使用 us department of veterans affairs 資料，納入 2006 年 1 月 1 日至 2019 年 12 月 31 日間、75 歲前曾接受 colonoscopy 的高齡成人。研究比較 75 歲前有無 adenoma 者在 10 年追蹤的 crc、crc 死亡、non-crc 死亡 與 全因死亡率 累積發生率，並依 veterans affairs frailty index 分層。 主要結果：共 91,952 人納入分析，最後一次 colonoscopy 時 中位數 age 71 歲（iqr 69-73），98% 為男性；25,538 人（27.8%）曾有 adenoma。10 年 crc 累積發生率為 adenoma 組 1.1%（95% ci 0.8%-1.3%）、無 adenoma 組 0.7%（0.5%-0.8%），gray test p<.001；crc 死亡 為 0.5%（0.3%-0.7%）vs 0.4%（0.3%-0.5%），p=.005；non-crc 死亡 風險遠高於 crc。 藥師重點：結論顯示曾有 adenoma 的高齡者 crc 與 crc 死亡 風險雖較高，但絕對風險低且常被 non-crc 死亡 競爭風險超過；藥師在高齡照護討論中可協助評估 frailty、預期壽命、用藥負擔與監測程序風險。"},{"id":"pmid-41950473","kind":"article","issueId":"2026-week15","year":2026,"week":15,"weekLabel":"第 15 週","dateRange":"2026/04/06 – 04/12","href":"2026-week15.html","title":"A Phase 2 Randomized Trial of Mezagitamab in Primary Immune Thrombocytopenia","journal":"NEJM","type":"RCT","typeLabel":"RCT","author":"Kuter","doi":"10.1056/NEJMoa2513120","url":"https://doi.org/10.1056/NEJMoa2513120","summary":"藥師重點：結論顯示 mezagitamab 可能提高 persistent or chronic ITP 患者血小板數，且本研究安全性與 安慰劑 大致相近；但樣本數很小，藥師解讀時需留意劑量別資料、感染或免疫相關風險與後續較大型試驗結果。","pubDate":"2026-04-09","terms":["phase","mezagitamab","immune","thrombocytopenia","nejm","kuter","nejmoa2513120","anti-cd38","plasma","cells"],"drugTerms":["mezagitamab","anti-cd38"],"searchText":"a phase 2 randomized trial of mezagitamab in primary immune thrombocytopenia nejm rct kuter 10.1056/nejmoa2513120 研究背景：immune thrombocytopenia（itp）會造成血小板破壞增加與生成下降，並提高出血風險；現有治療仍有至少 20% 病例療效不足。mezagitamab 為 anti-cd38 抗體，可作用於 plasma cells、plasmablasts 與 natural killer cells。 研究方法：此 多中心、雙盲、隨機、安慰劑對照 試驗 評估 mezagitamab 100 mg、300 mg 或 600 mg 相較於 安慰劑 的安全性與療效。成人 persistent or chronic itp 患者接受每週一次皮下注射、共 8 週；主要終點為 不良事件，關鍵次要終點為 week 16 前至少兩次達 platelet 反應。 主要結果：合併 mezagitamab 組 28 人、安慰劑 組 13 人，基準值 平均值 platelet count 分別為 19,100 與 17,300 per microliter。不良事件 為 68% vs 69%，等級 3 or higher 不良事件 為 18% vs 23%，嚴重不良事件 為 14% vs 8%；week 16 前 platelet 反應 在 mezagitamab 600-mg 組為 10/11（91%），合併 安慰劑 組為 3/13（23%）。 藥師重點：結論顯示 mezagitamab 可能提高 persistent or chronic itp 患者血小板數，且本研究安全性與 安慰劑 大致相近；但樣本數很小，藥師解讀時需留意劑量別資料、感染或免疫相關風險與後續較大型試驗結果。"},{"id":"fda-2026-week15-1","kind":"fda","issueId":"2026-week15","year":2026,"week":15,"weekLabel":"第 15 週","dateRange":"2026/04/06 – 04/12","href":"2026-week15.html","title":"FDA’s Concerns with Unapproved GLP-1 Drugs Used for Weight Loss","journal":"FDA","type"
